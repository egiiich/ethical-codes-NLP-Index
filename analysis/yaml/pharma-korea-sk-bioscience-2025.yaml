    key_excerpts:
      - excerpt_id: "HOT01_explicit_section"
        original: "Whistleblower may report via e-mail, homepage, telephone or mail, or in-person visit."
        translated_ru: "Для информаторов предусмотрены каналы сообщения: email, сайт, телефон, почта и личное обращение."
        section_title: "Article 10.2"
        relevance_comment: "Прямой доступ работников к горячей линии."
      - excerpt_id: "HOT02_explicit_section"
        original: "The person in charge of the investigation shall keep the identity of the whistleblower and the contents of the report confidential"
        translated_ru: "Лицо, проводящее расследование, обязано сохранять конфиденциальность личности информатора и содержания сообщения."
        section_title: "Article 9.2.6"
        relevance_comment: "Прямая конфиденциальность расследования."
      - excerpt_id: "HOT03_explicit_section"
        original: "The Company shall not engage in any unfair acts such as delivering disadvantages or discriminating working conditions to the whistleblower"
        translated_ru: "Компания не допускает неблагоприятных последствий или дискриминации условий труда для информатора."
        section_title: "Article 9.2.2"
        relevance_comment: "Прямой запрет преследования заявителей."
      - excerpt_id: "HOT04_explicit_section"
        original: "The Members shall not engage in any act that has the possibility of exposing the identity of a whistleblower"
        translated_ru: "Сотрудникам запрещены действия, которые могут раскрыть личность информатора."
        section_title: "Article 9.2.3"
        relevance_comment: "Прямая защита анонимности заявителя."
      - excerpt_id: "HOT05_explicit_section"
        original: "The Members who become aware of a violation ... shall immediately report ... so that the Company can promptly take appropriate actions"
        translated_ru: "О нарушениях необходимо немедленно сообщать, чтобы компания оперативно приняла надлежащие меры."
        section_title: "Article 9.2.1"
        relevance_comment: "Прямой принцип обязательного реагирования."
      - excerpt_id: "HOT06_explicit_section"
        original: "When a member violates the Code of Ethics or recognizes that others have violated the Code of Ethics, he/she must report the fact"
        translated_ru: "При выявлении нарушения сотрудник обязан сообщить об этом в ответственное подразделение."
        section_title: "Article 1.3.2"
        relevance_comment: "Прямая обязанность сообщать о нарушениях."

    key_excerpts:
      - excerpt_id: "WtoC01_explicit_section"
        original: "The Members shall conduct their duties based on the principle of integrity"
        translated_ru: "Сотрудники должны исполнять обязанности на основе принципа добросовестности."
        section_title: "Article 2.1.1"
        relevance_comment: "Прямой стандарт качества выполнения работы."
      - excerpt_id: "WtoC02_explicit_section"
        original: "The Members shall not use the Company’s assets ... for personal gains without the Company’s approval."
        translated_ru: "Использование активов компании в личных целях без одобрения запрещено."
        section_title: "Article 2.3.1"
        relevance_comment: "Прямое требование беречь активы компании."
      - excerpt_id: "WtoC03_explicit_section"
        original: "The Members shall not disclose ... the Company’s information and trade secrets without prior approval"
        translated_ru: "Запрещено раскрывать информацию и коммерческие тайны компании без предварительного одобрения."
        section_title: "Article 2.3.7"
        relevance_comment: "Прямой принцип конфиденциальности и ИБ."
      - excerpt_id: "WtoC04_explicit_section"
        original: "The Members shall proactively protect the Company’s intellectual property rights ... The intellectual property rights of third parties shall also receive the same protection."
        translated_ru: "Сотрудники обязаны защищать ИС компании, а также права ИС третьих лиц."
        section_title: "Article 2.3.2"
        relevance_comment: "Прямой принцип защиты интеллектуальной собственности."
      - excerpt_id: "WtoC05_explicit_section"
        original: "The Company shall abide by the laws and regulations in each nation where it conducts business"
        translated_ru: "Компания соблюдает законы и нормативные требования в каждой стране присутствия."
        section_title: "Article 8.1"
        relevance_comment: "Прямой правовой комплаенс."
      - excerpt_id: "WtoC10_brief_mention"
        original: "their words and deeds are directly related to the trust and reputation of the Company"
        translated_ru: "Слова и действия сотрудников напрямую связаны с доверием и репутацией компании."
        section_title: "Article 2.1.3"
        relevance_comment: "Краткий фокус на деловой репутации."

    key_excerpts:
      - excerpt_id: "CtoB01_explicit_section"
        original: "The Company shall constantly strive to provide products and services that will satisfy customers’ needs."
        translated_ru: "Компания постоянно стремится предоставлять продукты и услуги, удовлетворяющие потребности клиентов."
        section_title: "Article 3.1.1"
        relevance_comment: "Прямой клиентоориентированный стандарт."
      - excerpt_id: "CtoB02_explicit_section"
        original: "The Company shall provide customers with accurate product information in terms of functions and risks"
        translated_ru: "Компания предоставляет клиентам точную информацию о функциях и рисках продукта."
        section_title: "Article 3.1.4"
        relevance_comment: "Прямой принцип полноты/точности информации."
      - excerpt_id: "CtoB05_explicit_section"
        original: "The Company shall be responsible for meeting the customers’ needs and the relevant laws and regulations with respect to quality and safety of its products"
        translated_ru: "Компания обязуется одновременно учитывать требования клиентов и законов в вопросах качества и безопасности продуктов."
        section_title: "Article 8.4"
        relevance_comment: "Прямой этико-правовой стандарт взаимодействия с клиентами."
      - excerpt_id: "CtoB07_explicit_section"
        original: "The Company shall respect various opinions of customers and actively reflect them in the Company’s management activities."
        translated_ru: "Компания учитывает мнения клиентов и активно отражает их в управленческих процессах."
        section_title: "Article 3.1.3"
        relevance_comment: "Прямой канал обратной связи с клиентами."
      - excerpt_id: "CtoB08_explicit_section"
        original: "The Company shall protect customers’ property and information safely"
        translated_ru: "Компания обязуется защищать имущество и информацию клиентов."
        section_title: "Article 3.2"
        relevance_comment: "Прямой принцип защиты данных клиентов."
      - excerpt_id: "CtoB09_explicit_section"
        original: "continuously maintain the manufacturing environment to ensure the highest standards of pharmaceutical safety."
        translated_ru: "Компания поддерживает производственную среду для обеспечения высочайших стандартов фармбезопасности."
        section_title: "Article 3.1.2"
        relevance_comment: "Прямой принцип безопасности продукта."

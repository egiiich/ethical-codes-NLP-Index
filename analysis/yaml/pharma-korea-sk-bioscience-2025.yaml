    key_excerpts:
      - excerpt_id: "COMP03_explicit_section"
        original: "The Company shall comply with the laws and regulations related to fair trade ... and conduct business in accordance with the principle of free and fair competition."
        translated_ru: "Компания обязуется соблюдать нормы честной конкуренции и вести бизнес по принципу свободной и справедливой конкуренции."
        section_title: "Article 8"
        relevance_comment: "Прямой принцип добросовестной конкуренции."
      - excerpt_id: "COMP07_explicit_section"
        original: "the Company shall not acquire or use the trade secrets of a fellow player in an illegal or improper manner."
        translated_ru: "Компания не должна незаконно или ненадлежащим образом получать и использовать коммерческие тайны конкурентов."
        section_title: "Article 6.1.3"
        relevance_comment: "Прямое уважение интеллектуальных прав и тайн конкурентов."

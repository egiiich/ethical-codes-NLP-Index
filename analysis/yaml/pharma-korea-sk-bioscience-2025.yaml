    key_excerpts:
      - excerpt_id: "CtoS01_explicit_section"
        original: "The Company shall provide business partners with fair trading opportunities"
        translated_ru: "Компания предоставляет бизнес-партнёрам справедливые торговые возможности."
        section_title: "Article 6.1.1"
        relevance_comment: "Прямой принцип честного выбора/допуска партнёров."
      - excerpt_id: "CtoS03_explicit_section"
        original: "The Members shall not engage in acts that deviate from basic etiquette ... toward business partners."
        translated_ru: "Сотрудникам запрещены злоупотребления и неэтичные действия по отношению к бизнес-партнёрам."
        section_title: "Article 6.2.1"
        relevance_comment: "Прямой запрет злоупотребления сильной позицией."
      - excerpt_id: "CtoS06_explicit_section"
        original: "The Company shall provide business partners with fair trading opportunities and pursue mutual benefit and joint development."
        translated_ru: "Компания стремится к взаимной выгоде и совместному развитию с партнёрами."
        section_title: "Article 6.1.1"
        relevance_comment: "Прямой принцип долгосрочного партнёрства."
      - excerpt_id: "CtoS07_brief_mention"
        original: "The Members shall not make an improper solicitation to business partners ... against fair business practices."
        translated_ru: "Сотрудникам запрещены неправомерные просьбы к партнёрам, нарушающие честную деловую практику."
        section_title: "Article 6.2.2"
        relevance_comment: "Краткий контроль против манипуляций в отношениях с контрагентами."

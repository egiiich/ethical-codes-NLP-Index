    key_excerpts:
      -
        excerpt_id: "WtoC02_explicit_section"
        original: "Each employee of ZAI has a responsibility to use company resources ... for company business purposes only and not for personal benefit."
        translated_ru: "Сотрудники обязаны использовать ресурсы компании исключительно в интересах бизнеса."
        section_title: "Use of Company Resources"
        relevance_comment: "Прямое требование сохранности/целевого использования активов."
      -
        excerpt_id: "WtoC03_explicit_section"
        original: "All employees ... are expected to maintain such information in confidence and not to disclose or use it other than in ZAI's business and for ZAI's benefit."
        translated_ru: "Сотрудники обязаны сохранять конфиденциальность служебной информации и не раскрывать её вне интересов компании."
        section_title: "Use of Company Resources"
        relevance_comment: "Прямой принцип конфиденциальности."
      -
        excerpt_id: "WtoC05_explicit_section"
        original: "Adherence to legal and regulatory requirements must govern the business decisions and actions of every ZAI employee."
        translated_ru: "Решения и действия сотрудников должны строго соответствовать правовым и регуляторным требованиям."
        section_title: "Legal and Regulatory Requirements"
        relevance_comment: "Прямое требование законопослушного поведения."

        relevance_comment: "Прямой запрет антиконкурентного сговора."
      - excerpt_id: "COMP05_brief_mention"
        original: "The Company shall respect the principles that underpin a fair and free market economy and abide fair trade regulations."
        translated_ru: "Компания уважает принципы свободной и честной рыночной экономики и соблюдает нормы добросовестной торговли."
        section_title: "2.2.3 Attitude towards competitors and partners"
        relevance_comment: "Краткая фиксация поддержки добросовестной конкуренции."

    key_excerpts:
      - excerpt_id: "CtoS01_brief_mention"
        original: "The Company shall pursue mutual development through fair trades with partners."
        translated_ru: "Компания должна стремиться к взаимному развитию через справедливые сделки с партнерами."
        section_title: "2.2.3 Attitude towards competitors and partners"
        relevance_comment: "Краткий ориентир на справедливый выбор и работу с партнерами."
      - excerpt_id: "CtoS03_explicit_section"
        original: "The Company shall not impose unfair demands or exert malign influence using its dominant status."
        translated_ru: "Компания не должна навязывать несправедливые требования или злоупотреблять доминирующим положением."
        section_title: "2.2.3 Attitude towards competitors and partners"
        relevance_comment: "Прямой запрет злоупотребления рыночной властью над поставщиками."
      - excerpt_id: "CtoS06_brief_mention"
        original: "We respect Subcontractors and conduct business with sincerity and fairness."
        translated_ru: "Мы уважаем субподрядчиков и ведем бизнес искренне и справедливо."
        section_title: "2.3 Site Code of Ethics"
        relevance_comment: "Краткая ориентация на устойчивое партнерство."
      - excerpt_id: "CtoS07_explicit_section"
        original: "The Company shall take initiative to establish a sound subcontract transaction and refrain from engaging in unfair subcontract transactions."
        translated_ru: "Компания должна формировать здоровые субподрядные отношения и воздерживаться от несправедливых субподрядных сделок."
        section_title: "2.2.3 Attitude towards competitors and partners"
        relevance_comment: "Прямой запрет манипулятивных/несправедливых практик в субподряде."

      - excerpt_id: "HOT03_explicit_section"
        original: "Violations ... include ... retaliating ... employees who reported issues on ethical management."
        translated_ru: "К нарушениям относится преследование сотрудников, сообщивших об этических нарушениях."
        section_title: "3.15 Disciplinary action"
        relevance_comment: "Прямой запрет репрессий против заявителей."
      - excerpt_id: "HOT05_explicit_section"
        original: "Employees violating the Company's ethical policies shall be subject to disciplinary action based on the severity of violation."
        translated_ru: "Сотрудники, нарушившие этические политики, подлежат дисциплинарным мерам в зависимости от тяжести нарушения."
        section_title: "3.15 Disciplinary action"
        relevance_comment: "Прямое обязательство реагировать на нарушения."
      - excerpt_id: "HOT06_explicit_section"
        original: "In case of having discovered or recognized a violation of Code of Conduct, employees must report immediately through the whistle blowing Channel."
        translated_ru: "При обнаружении или осознании нарушения Кодекса сотрудники обязаны немедленно сообщить через канал информирования."
        section_title: "3.14 Raise issues on Code of Conduct violations"
        relevance_comment: "Прямая обязанность сообщать о нарушениях."

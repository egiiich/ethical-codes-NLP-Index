    key_excerpts:
      - excerpt_id: "CtoI01_explicit_section"
        original: "The Company shall protect shareholders’ rights and respect shareholders‘ reasonable demands and proposals."
        translated_ru: "Компания должна защищать права акционеров и уважать их разумные требования и предложения."
        section_title: "2.2.1 Attitude towards shareholders and investors"
        relevance_comment: "Прямое подтверждение защиты прав инвесторов/акционеров."
      - excerpt_id: "CtoI03_explicit_section"
        original: "The Company shall provide accurate management information in a timely manner according to relevant regulations."
        translated_ru: "Компания должна предоставлять точную управленческую информацию своевременно согласно применимым нормам."
        section_title: "2.2.1 Attitude towards shareholders and investors"
        relevance_comment: "Прямое требование своевременного и точного раскрытия."
      - excerpt_id: "CtoI07_explicit_section"
        original: "The Company shall treat all shareholders, including minority shareholders, fairly and equally."
        translated_ru: "Компания должна справедливо и равноправно относиться ко всем акционерам, включая миноритарных."
        section_title: "2.2.1 Equal Treatment"
        relevance_comment: "Прямая защита прав миноритарных акционеров."

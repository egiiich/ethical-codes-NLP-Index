    key_excerpts:
      - excerpt_id: "WtoC01_brief_mention"
        original: "We, as a member of the society... are competent individuals, continuously practicing the core values."
        translated_ru: "Мы как члены общества должны быть компетентными и постоянно практиковать ключевые ценности."
        section_title: "1.2 Body"
        relevance_comment: "Краткий ориентир на качественное выполнение работы."
      - excerpt_id: "WtoC02_explicit_section"
        original: "Employees shall protect the company's material property, intellectual property and trade secrets, and shall not use them for private purposes."
        translated_ru: "Сотрудники должны защищать материальные и нематериальные активы компании и не использовать их в личных целях."
        section_title: "3.3 Protect company assets and intellectual properties"
        relevance_comment: "Прямой принцип сохранности активов."
      - excerpt_id: "WtoC03_explicit_section"
        original: "Employees shall not disclose critical information that may affect the Company's profits and stock prices without due legal process."
        translated_ru: "Сотрудники не должны раскрывать критически важную информацию без надлежащих правовых процедур."
        section_title: "3.3 Protect company assets and intellectual properties"
        relevance_comment: "Прямой принцип конфиденциальности информации."
      - excerpt_id: "WtoC04_explicit_section"
        original: "Employees shall protect the company's ... intellectual property ... and shall not use them for private purposes."
        translated_ru: "Сотрудники обязаны защищать интеллектуальную собственность компании и не использовать ее в личных целях."
        section_title: "3.3 Protect company assets and intellectual properties"
        relevance_comment: "Прямое требование защиты ИС компании."
      - excerpt_id: "WtoC05_explicit_section"
        original: "We comply with laws and company regulations."
        translated_ru: "Мы соблюдаем законы и корпоративные правила."
        section_title: "2.3 Site Code of Ethics"
        relevance_comment: "Прямое требование правового комплаенса."
      - excerpt_id: "WtoC09_brief_mention"
        original: "The Company shall provide systematical education and training for employees."
        translated_ru: "Компания должна предоставлять систематическое обучение и тренинги для сотрудников."
        section_title: "2.2.4 Responsibility to employees"
        relevance_comment: "Краткая поддержка профессионального развития."
      - excerpt_id: "WtoC10_brief_mention"
        original: "set a standard for just conduct and value judgement for each employee and stakeholders"
        translated_ru: "установить стандарт надлежащего поведения и ценностных суждений для каждого сотрудника"
        section_title: "Preamble"
        relevance_comment: "Краткая связь поведения сотрудников с этическим обликом компании."

        relevance_comment: "Подтверждение статуса для принципа HOT03."
      -
        excerpt_id: "HOT05_explicit_section"
        original: "The Company shall firmly reprimand employees who violate the Code of Ethics and Practice Guidelines."
        translated_ru: "При нарушениях обязательно применяются меры и санкции."
        section_title: "Article 18 Rewards and sanctions"
        relevance_comment: "Подтверждение статуса для принципа HOT05."
      -
        excerpt_id: "HOT06_explicit_section"
        original: "Employees who recognize ... someone else has violated the Code ... shall ... report ... as quickly ... as possible."
        translated_ru: "Сотрудники обязаны оперативно сообщать о нарушениях этики."
        section_title: "Article 17 Reporting obligations and confidentiality"
        relevance_comment: "Подтверждение статуса для принципа HOT06."

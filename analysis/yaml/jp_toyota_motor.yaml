    key_excerpts:
      - excerpt_id: "COMP01_explicit_section"
        original: "Toyota also does not tolerate the illegal or unauthorized use of another party’s intellectual property or confidential information."
        translated_ru: «Toyota также не допускает незаконное или несанкционированное использование интеллектуальной собственности или конфиденциальной информации другой стороны».
        section_title: "Research and Development Activities"
        relevance_comment: "Явное требование не использовать чужую конфиденциальную информацию и ИС (COMP01, COMP07)."
      - excerpt_id: "COMP03_explicit_section"
        original: "Do not discuss or make agreements with competitors about pricing, costs, bids, markets, territories, customers, suppliers or contract terms and conditions."
        translated_ru: «Не обсуждайте и не заключайте с конкурентами соглашения о ценах, издержках, тендерах, рынках, территориях, клиентах, поставщиках или условиях контрактов».
        section_title: "Sales Activities and Fair Competition"
        relevance_comment: "Прямой запрет картельных/сговорных практик (COMP03)."
      - excerpt_id: "COMP07_explicit_section"
        original: "Respect the intellectual property rights of others at all times..."
        translated_ru: «Всегда уважайте права интеллектуальной собственности других лиц...».
        section_title: "Research and Development Activities"
        relevance_comment: "Прямое закрепление уважения прав ИС других лиц (COMP07)."

    key_excerpts:
      -
        excerpt_id: "WtoC01_brief_mention"
        original: "Bank personnel must maintain the integrity and accountability of all Bank data shared with internal or external parties."
        translated_ru: "Сотрудники обязаны поддерживать целостность и подотчётность банковских данных."
        section_title: "Integrity and Accuracy of Bank Data"
        relevance_comment: "Краткое подтверждение стандарта качества и добросовестности работы."
      -
        excerpt_id: "WtoC02_explicit_section"
        original: "Corporate identity can only be used for the Bank’s interests and with the Bank’s authorization."
        translated_ru: "Корпоративная идентичность и ресурсы могут использоваться только в интересах банка и с разрешением."
        section_title: "Conflict of Interest"
        relevance_comment: "Прямой запрет нецелевого использования корпоративных активов/идентичности."
      -
        excerpt_id: "WtoC03_explicit_section"
        original: "Bank personnel must maintain the confidentiality of all data or information related to the Bank or its customers and use it solely for the Bank’s interests."
        translated_ru: "Сотрудники обязаны сохранять конфиденциальность данных банка и клиентов."
        section_title: "Confidentiality"
        relevance_comment: "Прямой принцип конфиденциальности."
      -
        excerpt_id: "WtoC05_explicit_section"
        original: "Dissemination of data or information related to the Bank and its customers may only occur according to applicable regulations."
        translated_ru: "Раскрытие информации допускается только в соответствии с применимыми нормами."
        section_title: "Confidentiality"
        relevance_comment: "Прямое требование правового комплаенса в обращении с данными."
      -
        excerpt_id: "WtoC10_explicit_section"
        original: "Bank personnel must adhere to the Code of Conduct ... with full responsibility for maintaining the Bank’s image."
        translated_ru: "Сотрудники несут ответственность за соблюдение кодекса ради поддержания имиджа банка."
        section_title: "Sanctions for Violations/Non-Compliance"
        relevance_comment: "Прямой принцип защиты репутации компании."

    key_excerpts:
      -
        excerpt_id: "HOT03_explicit_section"
        original: "Bank Aladin Syariah does not tolerate any retaliation, discrimination, or harassment against the whistleblower."
        translated_ru: "Кодекс прямо запрещает реталиацию/преследование в отношении заявителя."
        section_title: "Speaking and raising concerns"
        relevance_comment: "Прямой запрет преследования заявителей."
      -
        excerpt_id: "HOT04_explicit_section"
        original: "the Bank’s senior management will ensure that any information given is treated with a high degree of confidentiality."
        translated_ru: "Информация от заявителя обрабатывается с высокой степенью конфиденциальности."
        section_title: "Speaking and raising concerns"
        relevance_comment: "Прямая защита анонимности/конфиденциальности заявителя."
      -
        excerpt_id: "HOT05_explicit_section"
        original: "Disciplinary action, up to and including termination of employment will be imposed on Aladiners ... based on the degree of the deviation/violation."
        translated_ru: "По сообщениям о нарушениях предусмотрены дисциплинарные меры вплоть до увольнения."
        section_title: "Speaking and raising concerns"
        relevance_comment: "Прямое подтверждение обязательного реагирования на нарушения."
      -
        excerpt_id: "HOT06_explicit_section"
        original: "Immediately report unacceptable conduct, and promptly escalate violations or potential violations of law ... or this Code."
        translated_ru: "Сотрудники обязаны немедленно сообщать и эскалировать нарушения/риски нарушений."
        section_title: "Responsibility of Aladiners"
        relevance_comment: "Прямая обязанность сообщения о нарушениях."

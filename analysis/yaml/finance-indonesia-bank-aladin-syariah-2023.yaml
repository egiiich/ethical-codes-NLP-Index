    key_excerpts:
      -
        excerpt_id: "CtoB01_explicit_section"
        original: "Provide fair and equitable access to products, services, facilities and privileges provided by the Bank."
        translated_ru: "Банк обязан обеспечивать клиентам справедливый и равный доступ к продуктам и услугам."
        section_title: "Fair Treatment"
        relevance_comment: "Прямой клиентоориентированный принцип."
      -
        excerpt_id: "CtoB02_explicit_section"
        original: "Inform customers and potential customers about options that may be appropriate for them, and explain terms and features in a fair and balanced way."
        translated_ru: "Клиентам должна предоставляться понятная и сбалансированная информация об условиях и опциях."
        section_title: "Fair Treatment"
        relevance_comment: "Прямой принцип информационной прозрачности для клиентов."
      -
        excerpt_id: "CtoB05_explicit_section"
        original: "Act in accordance with the highest standards of personal and professional integrity, honesty and ethical conduct."
        translated_ru: "Сотрудники обязаны действовать с максимальной честностью и этичностью."
        section_title: "Responsibility of Aladiners"
        relevance_comment: "Прямой этический стандарт обслуживания и взаимодействия."
      -
        excerpt_id: "CtoB08_explicit_section"
        original: "When in doubt, assume all information received is confidential."
        translated_ru: "Любая клиентская/банковская информация по умолчанию рассматривается как конфиденциальная."
        section_title: "Data Security and Privacy"
        relevance_comment: "Прямое требование защиты клиентских данных."

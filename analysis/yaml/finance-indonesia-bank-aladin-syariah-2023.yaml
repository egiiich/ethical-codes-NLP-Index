    key_excerpts:
      -
        excerpt_id: "CtoS01_explicit_section"
        original: "Purchase all goods and services based on price, quality, availability, terms, and service."
        translated_ru: "Закупки должны основываться на объективных критериях цены, качества и условий."
        section_title: "Supplier/Vendor Relationships"
        relevance_comment: "Прямой критерий эффективности выбора поставщиков."
      -
        excerpt_id: "CtoS02_explicit_section"
        original: "Ensure equal and fair treatment during the supplier selection process."
        translated_ru: "В процессе выбора поставщиков требуется равное и справедливое отношение."
        section_title: "Supplier/Vendor Relationships"
        relevance_comment: "Прямой принцип равного доступа поставщиков."
      -
        excerpt_id: "CtoS07_explicit_section"
        original: "Not lead suppliers or vendors to believe that they can inappropriately influence any procurement decisions at the Bank."
        translated_ru: "Запрещено создавать возможности для неэтичного влияния поставщиков на закупочные решения."
        section_title: "Supplier/Vendor Relationships"
        relevance_comment: "Прямой запрет манипулирования закупочным процессом."

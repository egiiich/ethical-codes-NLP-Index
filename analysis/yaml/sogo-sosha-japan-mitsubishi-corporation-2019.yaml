    key_excerpts:
      - excerpt_id: "HOT01_explicit_section"
        original: "Promptly report to or consult the superiors, the Group Compliance Officers... upon discovering or committing any violations..."
        translated_ru: "Необходимо незамедлительно сообщать руководителям/комплаенс-офицерам о выявленных нарушениях или консультироваться с ними."
        section_title: "11. Promptly report to or consult..."
        relevance_comment: "Прямо закреплен доступ к каналам сообщения и консультации (HOT01)."
      - excerpt_id: "HOT02_explicit_section"
        original: "...shall not, without such person’s consent, disclose the name or any other information of such person..."
        translated_ru: "...без согласия лица нельзя раскрывать его имя или иную информацию о нём..."
        section_title: "11. Promptly report to or consult..."
        relevance_comment: "Прямое требование конфиденциальности данных заявителя (HOT02)."
      - excerpt_id: "HOT03_explicit_section"
        original: "...shall secure that such person shall not incur any disadvantage as a result of such person’s disclosure..."
        translated_ru: "...должно быть обеспечено, что заявитель не понесёт неблагоприятных последствий из-за сообщения..."
        section_title: "11. Promptly report to or consult..."
        relevance_comment: "Прямой запрет преследования/неблагоприятного обращения (HOT03)."
      - excerpt_id: "HOT04_explicit_section"
        original: "If a person desires to report or consult on an anonymous basis, reports or consultations shall be made to either the “Compliance Mail Box”..."
        translated_ru: "Если лицо желает сообщить анонимно, сообщение может быть направлено через специальные почтовые каналы комплаенса."
        section_title: "11. Promptly report to or consult..."
        relevance_comment: "Прямая возможность анонимного обращения (HOT04)."
      - excerpt_id: "HOT05_implicit_scattered"
        original: "Cooperate with the Company’s investigations ... and take the appropriate action to prevent future occurrences."
        translated_ru: "Сотрудничайте с расследованиями компании и принимайте меры для предотвращения повторных случаев."
        section_title: "11. Promptly report to or consult..."
        relevance_comment: "Косвенно закреплена нулевая терпимость: расследование + корректирующие меры (HOT05)."
      - excerpt_id: "HOT06_explicit_section"
        original: "...upon discovering or committing any violations of this “Code of Conduct”."
        translated_ru: "...при обнаружении или совершении нарушений данного Кодекса поведения."
        section_title: "11. Promptly report to or consult..."
        relevance_comment: "Прямая обязанность сообщать о нарушениях (HOT06)."

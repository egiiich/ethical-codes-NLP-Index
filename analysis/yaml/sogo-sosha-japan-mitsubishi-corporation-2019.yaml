        relevance_comment: "Прямой запрет антиконкурентного сговора (COMP03)."
      - excerpt_id: "COMP07_explicit_section"
        original: "Do not infringe intellectual property rights owned by another company or person..."
        translated_ru: "Не нарушайте права интеллектуальной собственности, принадлежащие другим компаниям или лицам."
        section_title: "5. Protect and properly use confidential and proprietary information"
        relevance_comment: "Прямое уважение ИС конкурентов/третьих сторон (COMP07)."

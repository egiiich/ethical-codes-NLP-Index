      - excerpt_id: "WtoC02_explicit_section"
        original: "Do not use the Company’s tangible and/or intangible assets other than for authorized business purposes."
        translated_ru: "Не используйте материальные и нематериальные активы компании вне авторизованных деловых целей."
        section_title: "7. Avoid conflicts of interest"
        relevance_comment: "Прямое требование сохранности и целевого использования активов (WtoC02)."
      - excerpt_id: "WtoC03_explicit_section"
        original: "Carefully manage the Company’s trade secrets, and do not disclose or use such secrets for unauthorized purposes."
        translated_ru: "Тщательно управляйте коммерческими тайнами компании и не раскрывайте/не используйте их несанкционированно."
        section_title: "5. Protect and properly use confidential and proprietary information"
        relevance_comment: "Прямое требование конфиденциальности (WtoC03)."
      - excerpt_id: "WtoC04_explicit_section"
        original: "...protect the rights of the Company and respect the rights of others."
        translated_ru: "...защищать права Компании и уважать права других."
        section_title: "Basic Principles"
        relevance_comment: "Прямое требование защиты прав компании, включая ИС (WtoC04)."
      - excerpt_id: "WtoC05_explicit_section"
        original: "All officers and employees ... must comply with all applicable laws, rules and regulations..."
        translated_ru: "Все руководители и сотрудники обязаны соблюдать применимые законы, правила и нормативные требования."
        section_title: "Basic Policy"
        relevance_comment: "Прямое требование соблюдения законов (WtoC05)."
      - excerpt_id: "WtoC10_explicit_section"
        original: "Avoid conflicts of interest with the Company; maintain a distinction between corporate and private business."
        translated_ru: "Избегайте конфликта интересов с Компанией и разграничивайте корпоративную и личную деятельность."
        section_title: "Basic Principles"
        relevance_comment: "Прямое требование защищать интересы и репутацию компании (WtoC10)."

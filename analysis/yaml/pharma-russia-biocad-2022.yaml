    key_excerpts:
      - excerpt_id: "HOT01_explicit_section"
        original: "Если ... информация о его нарушении, то вы можете обратить в Этический совет, направив письмо по адресу ethics@biocad.ru."
        translated_ru: "Сотрудникам предоставлен прямой канал обращения в Этический совет по вопросам нарушений."
        section_title: "Обращение председателя Этического совета"
        relevance_comment: "Прямой доступ работников к каналу сообщений."
      - excerpt_id: "HOT02_explicit_section"
        original: "BIOCAD гарантирует, что персональные данные сотрудника, предоставившего информацию о нарушении Кодекса, не станут предметом огласки."
        translated_ru: "Компания гарантирует конфиденциальность данных заявителя."
        section_title: "Как понять не нарушаю ли я этический кодекс?"
        relevance_comment: "Прямая гарантия конфиденциальности."
      - excerpt_id: "HOT03_explicit_section"
        original: "... не станут ... причиной негативных последствий, преследования или дискриминации, в отношении сотрудника, сообщившего такую информацию."
        translated_ru: "Сообщивший о нарушении сотрудник защищен от преследования и негативных последствий."
        section_title: "Как понять не нарушаю ли я этический кодекс?"
        relevance_comment: "Прямой запрет реталиации."
      - excerpt_id: "HOT05_brief_mention"
        original: "Каждый случай нарушения кодекса рассматривается Этическим советом ... могут быть ... приняты меры ответственности."
        translated_ru: "Каждое нарушение рассматривается, и при необходимости применяются меры ответственности."
        section_title: "На кого распространяется Этический кодекс"
        relevance_comment: "Краткое подтверждение обязательного реагирования."
      - excerpt_id: "HOT06_brief_mention"
        original: "... с информацией о его нарушении, сотрудникам следует обращаться ... в Этический совет ..."
        translated_ru: "Сотрудники должны сообщать о нарушениях через утвержденные каналы."
        section_title: "Этический совет"
        relevance_comment: "Краткая норма об обязательной эскалации нарушений."

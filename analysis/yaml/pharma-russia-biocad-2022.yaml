    key_excerpts:
      - excerpt_id: "WtoC01_explicit_section"
        original: "... мы должны создавать и поддерживать самые высокие стандарты качества, и обеспечивать следование им на каждом этапе создания продукта."
        translated_ru: "Сотрудники обязаны поддерживать высокие стандарты качества на всех этапах работы."
        section_title: "Обращение председателя совета директоров"
        relevance_comment: "Прямое требование качества выполняемой работы."
      - excerpt_id: "WtoC02_brief_mention"
        original: "Использование ресурсов компании."
        translated_ru: "Кодекс выделяет отдельный блок о корректном использовании ресурсов компании."
        section_title: "Оглавление"
        relevance_comment: "Краткое подтверждение принципа сохранности активов."
      - excerpt_id: "WtoC03_explicit_section"
        original: "Защита конфиденциальной информации и противодействие неправомерному использованию инсайдерской информации."
        translated_ru: "Кодекс прямо закрепляет защиту конфиденциальной информации и предотвращение утечек/злоупотреблений."
        section_title: "Оглавление"
        relevance_comment: "Прямой принцип конфиденциальности и инфобезопасности."
      - excerpt_id: "WtoC04_brief_mention"
        original: "... противодействие неправомерному использованию инсайдерской информации."
        translated_ru: "Запрещено неправомерно использовать инсайдерскую информацию."
        section_title: "Оглавление"
        relevance_comment: "Краткое подтверждение защиты интеллектуальных и чувствительных данных компании."
      - excerpt_id: "WtoC05_explicit_section"
        original: "... каждый сотрудник BIOCAD должен знать, понимать и применять ... законодательные ... нормы."
        translated_ru: "Сотрудник обязан соблюдать применимое законодательство и этические нормы."
        section_title: "Обращение председателя совета директоров"
        relevance_comment: "Прямой правовой комплаенс сотрудника."
      - excerpt_id: "WtoC09_brief_mention"
        original: "... возможность для повышения квалификации и реализации собственного потенциала ..."
        translated_ru: "Компания поддерживает профессиональное развитие сотрудников."
        section_title: "Уважение к людям"
        relevance_comment: "Краткое подтверждение поддержки профуровня."
      - excerpt_id: "WtoC10_explicit_section"
        original: "... сохраняя безупречную репутацию — это ответственность, которую разделяют все сотрудники компании."
        translated_ru: "Сохранение репутации компании — прямая ответственность сотрудников."
        section_title: "Обращение председателя совета директоров"
        relevance_comment: "Прямой репутационный принцип."

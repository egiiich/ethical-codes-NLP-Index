    key_excerpts:
      - excerpt_id: "COMP01_explicit_section"
        original: "We must not acquire confidential information of our competitors or others through improper means."
        translated_ru: "«Мы не должны получать конфиденциальную информацию конкурентов или иных лиц ненадлежащими способами»."
        section_title: "Information Management"
        relevance_comment: "Прямой запрет на неправомерное получение конфиденциальной информации конкурентов (COMP01)."
      - excerpt_id: "COMP03_explicit_section"
        original: "We must ... comply with the laws and regulations relating to anti-trust and fair competition ... never enter into ... anti-competitive or collusive agreements ... not engage in discussions ... fixing prices or sales volume, or allocating customers or sales territories."
        translated_ru: "«Мы должны соблюдать законы об антимонопольном регулировании и честной конкуренции ... никогда не вступать в антиконкурентные/сговорные соглашения ... не обсуждать фиксацию цен, объемов продаж или раздел клиентов/территорий»."
        section_title: "Fair Competition"
        relevance_comment: "Развернутый и явный анти-картельный блок (COMP03)."
      - excerpt_id: "COMP05_explicit_section"
        original: "Fair Competition — We must promote fair competition through our business activities."
        translated_ru: "«Честная конкуренция — мы должны продвигать честную конкуренцию в нашей деятельности»."
        section_title: "The Group Compliance Principles"
        relevance_comment: "Явно закреплен принцип уважения честной конкурентной среды (COMP05)."
      - excerpt_id: "COMP07_explicit_section"
        original: "We must ... respect the IP rights of others."
        translated_ru: "«Мы должны ... уважать права интеллектуальной собственности других лиц»."
        section_title: "Intellectual Property Rights"
        relevance_comment: "Прямое требование соблюдать ИС-права третьих лиц, включая конкурентов (COMP07)."

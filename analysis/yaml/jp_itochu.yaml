    key_excerpts:
      - excerpt_id: "COMP03_brief_mention"
        original: "Compliance with Competition Law (Antitrust Law) — We will conduct business practices in compliance with competition laws (antitrust laws) and related laws and regulations in each country and region."
        translated_ru: "«Соблюдение законодательства о конкуренции (антимонопольного законодательства) — мы будем вести бизнес-практики в соответствии с законами о конкуренции (антимонопольными законами) и связанными с ними нормами в каждой стране и регионе»."
        section_title: "5. Fair Business Practices"
        relevance_comment: "Общее антимонопольное обязательство без детализации конкретных видов сговора (COMP03 как brief_mention)."
      - excerpt_id: "COMP05_explicit_section"
        original: "5. Fair Business Practices"
        translated_ru: "«5. Честные деловые практики»."
        section_title: "Code of Ethical Conduct"
        relevance_comment: "Явное закрепление принципа fair business/fair competition (COMP05)."
      - excerpt_id: "COMP07_explicit_section"
        original: "The company will appropriately protect and manage its own intellectual property rights and will not engage in business activities that infringe on intellectual property rights held by others."
        translated_ru: "«Компания будет надлежащим образом защищать и управлять собственными правами интеллектуальной собственности и не будет вести деятельность, нарушающую права интеллектуальной собственности других лиц»."
        section_title: "6. Management and Provision of Information — Protection of Intellectual Property"
        relevance_comment: "Прямое требование уважать ИС других сторон, включая конкурентов (COMP07)."

    key_excerpts:
      - excerpt_id: "CtoS01_brief_mention"
        original: "Thank you for helping us ... promoting a fair and competitive work environment."
        translated_ru: "Компания декларирует справедливую и конкурентную среду взаимодействия с поставщиками."
        section_title: "Application"
        relevance_comment: "Краткий ориентир на справедливые закупочные отношения."
      - excerpt_id: "CtoS03_explicit_section"
        original: "You are not permitted to give cash ... gift ... to Yum China employees or their family members."
        translated_ru: "Поставщику запрещено давать деньги/подарки сотрудникам Yum China и их родственникам."
        section_title: "Conflict of Interest"
        relevance_comment: "Прямой запрет злоупотреблений и неэтичных стимулов в отношениях с поставщиками."
      - excerpt_id: "CtoS06_brief_mention"
        original: "The business relationship with Yum China is strengthened upon full and complete compliance with this Code"
        translated_ru: "Долгосрочность отношений с поставщиком напрямую увязана с полным соблюдением Кодекса."
        section_title: "Audit and Inspection"
        relevance_comment: "Краткий принцип устойчивого партнерства при комплаенсе."
      - excerpt_id: "CtoS07_explicit_section"
        original: "Gift giving must be occasional ... Maximum RMB 300 per occasion ... and cannot be permitted without authorization"
        translated_ru: "Подарки/деловые взаимодействия строго лимитированы и требуют предварительного одобрения в ряде случаев."
        section_title: "Appendix VI"
        relevance_comment: "Прямой контроль против манипуляций условиями взаимодействия."

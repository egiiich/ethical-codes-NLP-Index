      - excerpt_id: "HOT01_explicit_section"
        original: "you may call Yum China Ethics and Compliance Hotline ... (24 hours a day, 7 days a week)"
        translated_ru: "Для сообщений доступна Ethics and Compliance Hotline 24/7."
        section_title: "Application"
        relevance_comment: "Прямой постоянно доступный канал горячей линии."
      - excerpt_id: "HOT03_explicit_section"
        original: "Yum China has a strict policy against retaliation for good faith reports."
        translated_ru: "Yum China придерживается строгой политики запрета преследования за добросовестные сообщения."
        section_title: "Application"
        relevance_comment: "Прямой запрет преследования заявителей."
      - excerpt_id: "HOT05_brief_mention"
        original: "We will have designated personnel to deal with your complaints."
        translated_ru: "Для обработки обращений назначаются ответственные сотрудники."
        section_title: "Application"
        relevance_comment: "Краткий признак обязательного рассмотрения жалоб."
      - excerpt_id: "HOT06_explicit_section"
        original: "you have a duty to raise questions and report concerns immediately."
        translated_ru: "Участники обязаны немедленно поднимать вопросы и сообщать о нарушениях."
        section_title: "Application"
        relevance_comment: "Прямая обязанность сообщать о нарушениях."

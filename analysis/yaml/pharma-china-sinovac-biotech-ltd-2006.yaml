        original: "...report the violation to the Compliance Officer, who will work with you to investigate your concern."
        translated_ru: "Каждое сообщение должно передаваться на расследование Compliance Officer."
        section_title: "X. Violations of the Code"
        relevance_comment: "Прямой стандарт расследования."
      - excerpt_id: "HOT06_explicit_section"
        original: "The Company strictly prohibits retaliation against an employee who ... reports known or suspected violations."

    key_excerpts:
      - excerpt_id: "HOT01_explicit_section"
        original: "...please call the Compliance Officer ... or e-mail her at info@sinovac.com."
        translated_ru: "Для работников закреплен прямой контакт с Compliance Officer для вопросов и сообщений."
        section_title: "II. Applicability"
        relevance_comment: "Прямой канал сообщения о нарушениях."
      - excerpt_id: "HOT04_explicit_section"
        original: "...may also confidentially, and anonymously if they desire, submit the information..."

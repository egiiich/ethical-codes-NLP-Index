        original: "No employee may be concurrently employed by a business that competes with the Company..."
        translated_ru: "Кодекс прямо запрещает сотруднику работать в конкурирующем бизнесе."
        section_title: "III.A.1 Competing Business"
        relevance_comment: "Прямой антиконкурентный конфликтный запрет."
      - excerpt_id: "COMP03_brief_mention"
        original: "The Company's business conduct is founded on the principle of “fair transaction.”"
        translated_ru: "Кодекс кратко закрепляет принцип справедливых сделок в деловой практике."
        section_title: "IV. Gifts and Entertainment"
        relevance_comment: "Краткое подтверждение принципа fair dealing."

    key_excerpts:
      -
        excerpt_id: "WtoC01_brief_mention"
        original: "Act Professionally by prioritizing the values of work culture Beliefs and Core Values AKHLAK."
        translated_ru: "Профессиональное поведение закреплено как базовая обязанность сотрудника."
        section_title: "Principles of Code of Ethics"
        relevance_comment: "Краткое подтверждение стандарта качества труда."
      -
        excerpt_id: "WtoC02_explicit_section"
        original: "Not using BNI assets for personal interest."
        translated_ru: "Запрещено использовать активы компании в личных целях."
        section_title: "Principles of Code of Ethics"
        relevance_comment: "Прямое требование сохранности и целевого использования активов."
      -
        excerpt_id: "WtoC03_explicit_section"
        original: "Maintain bank confidentiality and job confidentiality."
        translated_ru: "Сотрудники обязаны сохранять банковскую и должностную тайну."
        section_title: "Principles of Code of Ethics"
        relevance_comment: "Прямой принцип конфиденциальности."
      -
        excerpt_id: "WtoC05_explicit_section"
        original: "Compliance with the Code of Ethics reflects the Bank's commitment to complying with legal regulations."
        translated_ru: "Соблюдение кодекса прямо связано с соблюдением правовых норм."
        section_title: "Efforts to Implement and Enforce the Code of Ethics Through Various Media"
        relevance_comment: "Прямое требование правового комплаенса."
      -
        excerpt_id: "WtoC10_explicit_section"
        original: "implement the highest ethical standards to increase the positive outlook and strengthen the Bank's reputation in the eyes of stakeholders."
        translated_ru: "Кодекс ориентирован на укрепление репутации банка через высокие этические стандарты."
        section_title: "Code of Ethics Applies to All Levels of Organization"
        relevance_comment: "Прямое указание на защиту репутации компании."

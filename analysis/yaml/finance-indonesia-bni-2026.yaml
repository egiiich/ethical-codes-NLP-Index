        relevance_comment: "Краткое подтверждение этичного отношения к поставщикам в закупках."
      -
        excerpt_id: "CtoS07_explicit_section"
        original: "They do not influence each other directly or indirectly, which may cause unfair business competition."
        translated_ru: "Запрещено влияние на решения, приводящее к недобросовестной конкуренции при закупке."
        section_title: "Code of Conduct Relating to Vendors"
        relevance_comment: "Прямой запрет манипулятивных практик в тендерном/закупочном процессе."

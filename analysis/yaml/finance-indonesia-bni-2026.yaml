        original: "Every employee can report any deviation from the Code of Ethics."
        translated_ru: "Каждый сотрудник имеет доступ к каналу сообщений о нарушениях кодекса."
        section_title: "Efforts to Implement and Enforce the Code of Ethics Through Various Media"

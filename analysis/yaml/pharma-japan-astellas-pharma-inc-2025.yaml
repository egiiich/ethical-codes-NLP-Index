    key_excerpts:
      - excerpt_id: "WtoC02_explicit_section"
        original: "We use Astellas resources efficiently and securely to prevent theft, loss, or damage."
        translated_ru: "Сотрудники обязаны эффективно и безопасно использовать ресурсы компании, предотвращая потери и ущерб."
        section_title: "We use information systems and devices properly"
        relevance_comment: "Прямой принцип сохранности активов."
      - excerpt_id: "WtoC03_explicit_section"
        original: "We keep information confidential ... We protect the confidentiality of both Astellas’ and third parties’ confidential information ..."
        translated_ru: "Сотрудники обязаны защищать конфиденциальную информацию компании и третьих сторон."
        section_title: "We keep information confidential"
        relevance_comment: "Прямой принцип конфиденциальности."
      - excerpt_id: "WtoC04_explicit_section"
        original: "We protect intellectual property ... report it promptly ... company retains rights to these creations ..."
        translated_ru: "Компания требует своевременно декларировать и защищать результаты интеллектуальной деятельности."
        section_title: "We protect intellectual property"
        relevance_comment: "Прямой принцип защиты ИС компании."
      - excerpt_id: "WtoC05_explicit_section"
        original: "We are truthful and compliant ... We provide clear, accurate, and timely information ..."
        translated_ru: "Сотрудники обязаны действовать правдиво и комплаентно в публичных раскрытиях и коммуникациях."
        section_title: "We are truthful and compliant"
        relevance_comment: "Прямой правовой и этический комплаенс."

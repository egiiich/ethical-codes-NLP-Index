    key_excerpts:
      - excerpt_id: "HOT01_explicit_section"
        original: "Astellas has a global investigation process to address employee concerns, often called a Speak Up or Whistleblowing Report."
        translated_ru: "В компании действует глобальный процесс Speak Up/Whistleblowing для обращений сотрудников."
        section_title: "We ensure compliance investigations are fair"
        relevance_comment: "Прямой канал сообщений о нарушениях."
      - excerpt_id: "HOT05_explicit_section"
        original: "Our global investigation process ensures that reported concerns are handled in a thorough, fair, objective and respectful manner."
        translated_ru: "Сообщения рассматриваются полно, объективно и справедливо по единым стандартам расследования."
        section_title: "We ensure compliance investigations are fair"
        relevance_comment: "Прямой принцип обязательного и корректного расследования."

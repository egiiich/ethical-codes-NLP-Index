    key_excerpts:
      - excerpt_id: "COMP03_explicit_section"
        original: "Fair competition ... I will not engage in any unjust restrictions on transactions, such as collusion and cartels, any unfair transactions, or any act that may be construed as doing any of the above."
        translated_ru: "«Честная конкуренция ... я не буду участвовать в необоснованных ограничениях сделок, таких как сговоры и картели, недобросовестные сделки или действия, которые могут быть так истолкованы»."
        section_title: "4. Business Activities with Integrity"
        relevance_comment: "Прямой анти-картельный/анти-сговорный запрет (COMP03)."
      - excerpt_id: "COMP05_explicit_section"
        original: "I will recognize the importance of fair and free competition in the market."
        translated_ru: "«Я признаю важность честной и свободной конкуренции на рынке»."
        section_title: "Fair competition"
        relevance_comment: "Явный принцип fair/free competition (COMP05)."
      - excerpt_id: "COMP07_explicit_section"
        original: "I will respect and not infringe or illegally use third party’s legitimate intellectual property rights."
        translated_ru: "«Я буду уважать и не нарушать/незаконно использовать законные права интеллектуальной собственности третьих лиц»."
        section_title: "Protection and utilization of intellectual property rights"
        relevance_comment: "Прямое требование уважения ИС прав третьих сторон (COMP07)."
      - excerpt_id: "COMP08_explicit_section"
        original: "I will ... not use any expression that may be slanderous, libelous, or socially discriminatory."
        translated_ru: "«Я ... не буду использовать выражения, которые могут быть клеветническими, порочащими или социально дискриминационными»."
        section_title: "Sincere publicity and advertising"
        relevance_comment: "Прямой запрет клеветнических/порочащих формулировок (COMP08)."

    key_excerpts:
      - excerpt_id: "WtoC01_brief_mention"
        original: "Tempo Scan Employees are expected to: - Carefully assess, on a case-by-case basis, whether the conduct of a Tempo Scan Employee meets the integrity standards and expectations of the Tempo Scan business."
        translated_ru: "От сотрудников ожидается оценивать своё поведение на соответствие стандартам добросовестности и ожиданиям бизнеса Tempo Scan."
        section_title: "VII. PERSONAL INTEGRITY"
        relevance_comment: "Краткое подтверждение ожидания качественного и ответственного выполнения работы."
      - excerpt_id: "WtoC05_explicit_section"
        original: "In running its business, Tempo Scan is committed to adhering and complying with each law and regulation applicable to Tempo Scan."
        translated_ru: "При ведении бизнеса Tempo Scan обязуется соблюдать все применимые законы и нормативные требования."
        section_title: "II. BUSINESS INTEGRITY"
        relevance_comment: "Прямое требование правового комплаенса как базовой нормы поведения."
      - excerpt_id: "WtoC06_brief_mention"
        original: "If a Tempo Scan Employee is unsure of the proper conduct, such a Tempo Scan Employee must discuss this with their superior to obtain the best guidance."
        translated_ru: "Если сотрудник не уверен в корректности поведения, он должен обсудить это со своим руководителем для получения указаний."
        section_title: "VII. PERSONAL INTEGRITY"
        relevance_comment: "Краткое подтверждение следования вертикали управления и согласования решений с руководителем."
      - excerpt_id: "WtoC09_implicit_scattered"
        original: "Tempo Scan provides Tempo Scan employees with education, coaching, and guidance as required from time to time in order to achieve the business integrity standards of Tempo Scan."
        translated_ru: "Tempo Scan предоставляет сотрудникам обучение, коучинг и наставничество по мере необходимости для достижения стандартов деловой добросовестности."
        section_title: "II. BUSINESS INTEGRITY"
        relevance_comment: "Поддержка профессионального уровня сотрудников описана как регулярная практика, но не как отдельный развернутый раздел о развитии компетенций."
      - excerpt_id: "WtoC10_explicit_section"
        original: "Correct, honest, and accurate financial and non-financial information is the foundation of Tempo Scan’s reputation."
        translated_ru: "Корректная, честная и точная финансовая и нефинансовая информация является основой репутации Tempo Scan."
        section_title: "III. ACCURATE REPORTING AND BOOK-KEEPING"
        relevance_comment: "Прямое связывание поведения сотрудников с защитой деловой репутации компании."

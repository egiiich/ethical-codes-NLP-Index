analyst_summary_ru: "Кодекс Tempo Scan хорошо покрывает комплаенс, точность отчётности, антикоррупцию и HSE, но практически не содержит норм по конкуренции, поставщикам, клиентам, инвесторам и горизонтальным трудовым отношениям. По горячей линии и взаимодействию с руководителем есть только базовые краткие нормы без процедурных гарантий анонимности/защиты от репрессий."

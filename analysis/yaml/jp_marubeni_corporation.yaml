    key_excerpts:
      - excerpt_id: "COMP01_explicit_section"
        original: "Prohibition of Unfair Competition — Not to engage in unfair competition such as ... unlawfully acquiring and using trade secrets."
        translated_ru: "«Запрет недобросовестной конкуренции — не участвовать в недобросовестной конкуренции, включая незаконное получение и использование коммерческих тайн»."
        section_title: "Matters to be Observed"
        relevance_comment: "Прямой запрет незаконного получения коммерческих тайн релевантен запрету добычи конфиденциальной информации конкурента (COMP01)."
      - excerpt_id: "COMP03_explicit_section"
        original: "Compliance with the Antimonopoly Act and Related Laws and Regulations — Not to engage in private monopoly, unreasonable restraint of trade (cartel) and other unfair trading practices."
        translated_ru: "«Соблюдение антимонопольного законодательства — не участвовать в частной монополии, необоснованном ограничении торговли (картели) и иных недобросовестных практиках»."
        section_title: "Matters to be Observed"
        relevance_comment: "Явный запрет картельных/антиконкурентных практик (COMP03)."
      - excerpt_id: "COMP05_explicit_section"
        original: "Conduct Fair and Open Business Activities ... Comply with laws and promote fair transactions ... ensure sales activities in free competition."
        translated_ru: "«Вести честную и открытую деловую деятельность ... соблюдать законы и продвигать честные сделки ... обеспечивать продажи в условиях свободной конкуренции»."
        section_title: "Marubeni Corporate Principles"
        relevance_comment: "Явная установка на честную/свободную конкуренцию и уважение конкурентной среды (COMP05)."
      - excerpt_id: "COMP07_explicit_section"
        original: "Laws relating to Intellectual Property Rights — Not to infringe the intellectual property rights of others."
        translated_ru: "«Законы об интеллектуальной собственности — не нарушать права интеллектуальной собственности других лиц»."
        section_title: "Matters to be Observed"
        relevance_comment: "Прямое требование уважать права ИС других сторон, включая конкурентов (COMP07)."
    other_principles: []

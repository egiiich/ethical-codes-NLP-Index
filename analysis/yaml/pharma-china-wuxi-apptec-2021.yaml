    key_excerpts:
      - excerpt_id: "HOT01_explicit_section"
        original: "...reporting website ... reporting mailbox ... reporting hotline ... In Touch Ethics Hotline."
        translated_ru: "Для сотрудников предусмотрены формальные каналы сообщений о нарушениях."
        section_title: "II. Reporting and compliance procedures"
        relevance_comment: "Прямой доступ к каналам сообщения."
      - excerpt_id: "HOT04_explicit_section"
        original: "...the Company also accepts anonymous reports, except where prohibited by local law."
        translated_ru: "Кодекс допускает анонимные сообщения (если это не запрещено локальным правом)."
        section_title: "II. Reporting and compliance procedures"
        relevance_comment: "Прямое подтверждение анонимного канала."
      - excerpt_id: "HOT05_explicit_section"
        original: "All reported violations will be subject to a thorough and timely investigation."
        translated_ru: "Каждое сообщение о нарушении подлежит тщательному и своевременному расследованию."
        section_title: "II. Reporting and compliance procedures"
        relevance_comment: "Прямое требование к расследованию."
      - excerpt_id: "HOT06_explicit_section"
        original: "The Company strictly prohibits retaliation against anyone who in good faith ... reports a possible violation of the Code."
        translated_ru: "Кодекс прямо запрещает реталиацию в отношении добросовестных заявителей."
        section_title: "II. Zero tolerance for retaliation"
        relevance_comment: "Прямая защита информаторов."

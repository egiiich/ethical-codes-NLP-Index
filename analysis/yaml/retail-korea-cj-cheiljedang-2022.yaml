        relevance_comment: "Прямой принцип конфиденциальности и ИБ."
      - excerpt_id: "WtoC05_explicit_section"
        original: "We must comply with the laws and regulations of every country where we do business"
        translated_ru: "Мы обязаны соблюдать законы и нормы каждой страны, где ведём бизнес."
        section_title: "How can we utilize the Code of Conduct?"
        relevance_comment: "Прямой правовой комплаенс."
      - excerpt_id: "WtoC10_brief_mention"
        original: "uphold CJ’s reputation and protect ourselves and the Company from potential legal and social risks"
        translated_ru: "Соблюдение Кодекса направлено на защиту репутации CJ и снижение правовых/социальных рисков."
        section_title: "How can we utilize the Code of Conduct?"
        relevance_comment: "Краткий фокус на деловой репутации."

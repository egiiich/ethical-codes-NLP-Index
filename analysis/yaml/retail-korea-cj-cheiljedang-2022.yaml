    key_excerpts:
      - excerpt_id: "CtoS01_explicit_section"
        original: "We select our business partners in accordance with transparent and fair procedures and objective criteria"
        translated_ru: "Партнёры выбираются по прозрачным и справедливым процедурам и объективным критериям."
        section_title: "Companionship with Business Partners"
        relevance_comment: "Прямой стандарт справедливого отбора партнёров."
      - excerpt_id: "CtoS03_explicit_section"
        original: "Abusing superior bargaining power to the detriment of the transaction partner ... strictly prohibited"
        translated_ru: "Злоупотребление более сильной переговорной позицией в ущерб контрагенту строго запрещено."
        section_title: "Unfair Transactions"
        relevance_comment: "Прямой запрет злоупотребления рыночной властью."
      - excerpt_id: "CtoS06_explicit_section"
        original: "we communicate sincerely and deal fairly with them ... grow together with our business partners"
        translated_ru: "Компания декларирует честное взаимодействие и совместный рост с бизнес-партнерами."
        section_title: "Our Promise to Fellow Players in the Market"
        relevance_comment: "Прямой принцип устойчивого партнёрства."
      - excerpt_id: "CtoS07_explicit_section"
        original: "you must not provide gifts and hospitality that may affect your ability to conduct business fairly."
        translated_ru: "Нельзя предоставлять подарки/гостеприимство, которые влияют на справедливость деловых решений."
        section_title: "Gifts and Hospitality for Business"
        relevance_comment: "Прямой анти-манипуляционный контроль в отношениях с партнёрами."

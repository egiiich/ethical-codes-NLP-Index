        excerpt_id: "HOT03_explicit_section"
        original: "The Company is committed to protecting employees ... who honestly submit report ... from possible retaliation by others."
        translated_ru: "Компания прямо обязуется защищать сотрудников-заявителей от возможной реталиации."
        section_title: "Whistleblowing Mechanism"
        relevance_comment: "Прямой запрет преследования заявителей."
      -
        excerpt_id: "HOT05_explicit_section"
        original: "the Company may impose sanctions on employees who commit violations, in the form of ... Oral reprimands ... Written warning ... Administrative sanctions ... Termination of employment."
        translated_ru: "За нарушения кодекса предусмотрена эскалация санкций вплоть до увольнения."
        section_title: "Violation"
        relevance_comment: "Прямое подтверждение обязательного реагирования на нарушения."
      -
        excerpt_id: "HOT06_explicit_section"
        original: "the concerned employee is required to report such problem as soon as possible, before it becomes a violation of the law or risks the Company’s reputation."
        translated_ru: "Сотрудник обязан как можно раньше сообщать о проблемах/рисках нарушений."
        section_title: "Violation"
        relevance_comment: "Прямая обязанность сообщения о нарушениях."

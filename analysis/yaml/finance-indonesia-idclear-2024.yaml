    key_excerpts:
      -
        excerpt_id: "WtoC02_explicit_section"
        original: "Using the Company’s assets effectively and efficiently to achieve the Company’s objectives."
        translated_ru: "Сотрудники обязаны эффективно и целевым образом использовать активы компании."
        section_title: "Use and Protection of Company’s Assets"
        relevance_comment: "Прямой принцип защиты и целевого использования активов."
      -
        excerpt_id: "WtoC03_explicit_section"
        original: "Employees are also expected to always keep the confidentiality of Company’s information or data by not disclosing the information to the public."
        translated_ru: "Сотрудники обязаны сохранять конфиденциальность данных и не раскрывать их публично без оснований."
        section_title: "Maintaining the Confidentiality of Company Information"
        relevance_comment: "Прямое требование конфиденциальности."
      -
        excerpt_id: "WtoC05_explicit_section"
        original: "The Company obliges its employees to comply with the law."
        translated_ru: "Компания обязывает сотрудников соблюдать закон."
        section_title: "Compliance with the Laws and Regulations"
        relevance_comment: "Прямое требование правового комплаенса."

    key_excerpts:
      - excerpt_id: "WtoC02_explicit_section"
        original: "Employees shall not utilize the tangible or intangible assets of the company ... for any purpose other than their intended business purposes."
        translated_ru: "Активы компании (материальные и нематериальные) нельзя использовать вне служебных целей."
        section_title: "Section 2. Work Ethics for Employees"
        relevance_comment: "Прямое требование по защите активов."
      - excerpt_id: "WtoC03_explicit_section"
        original: "Employees shall refrain from ... providing undisclosed information to a third party without proper process."
        translated_ru: "Запрещено передавать третьим лицам непубличную информацию без установленной процедуры."
        section_title: "Section 2. Work Ethics for Employees"
        relevance_comment: "Прямой принцип конфиденциальности и инфобезопасности."
      - excerpt_id: "WtoC05_explicit_section"
        original: "Employees of group companies ... adhere to ... all laws and regulations governing the behavior of group companies."
        translated_ru: "Сотрудники обязаны соблюдать применимые законы и внутренние требования группы."
        section_title: "Section 1. Mutual Cooperation among Group Companies"
        relevance_comment: "Прямой комплаенс-принцип."
      - excerpt_id: "WtoC09_brief_mention"
        original: "All employees are well-acquainted with their roles and duties ... by strengthening their professionalism."
        translated_ru: "Сотрудники должны развивать профессионализм и выполнять обязанности на высоком уровне."
        section_title: "Section 2. Work Ethics for Employees"
        relevance_comment: "Краткое подтверждение профстандарта."
      - excerpt_id: "WtoC10_explicit_section"
        original: "Employees ... their individual actions shape the ethical reputation of Woori Financial Group."
        translated_ru: "Кодекс прямо связывает действия сотрудников с репутацией группы."
        section_title: "Section 2. Work Ethics for Employees"
        relevance_comment: "Прямое требование по защите деловой репутации."

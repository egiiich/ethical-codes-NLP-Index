        original: "Woori Financial Group upholds its shareholders' rights and strives to provide shareholders with the utmost value."
        translated_ru: "Компания декларирует защиту прав акционеров и стремление к созданию для них ценности."
        section_title: "Section 2. Ethics for Shareholders"
        relevance_comment: "Краткое подтверждение принципа прав акционеров."
      - excerpt_id: "CtoI03_explicit_section"
        original: "We shall furnish essential information to shareholders in a timely and fair manner..."
        translated_ru: "Существенная информация должна предоставляться акционерам своевременно и справедливо."
        section_title: "Section 2. Ethics for Shareholders"
        relevance_comment: "Прямой принцип раскрытия информации."
      - excerpt_id: "CtoI04_explicit_section"
        original: "...realize the equitable value ... by means of rational decision-making and transparent management activities."
        translated_ru: "Управленческие решения и деятельность должны быть рациональными и прозрачными."
        section_title: "Section 2. Ethics for Shareholders"
        relevance_comment: "Прямой принцип прозрачности управления."
      - excerpt_id: "CtoI07_explicit_section"
        original: "All shareholders shall be treated equitably and equally ..."
        translated_ru: "Все акционеры должны рассматриваться справедливо и равноправно."
        section_title: "Section 2. Ethics for Shareholders"
        relevance_comment: "Прямой принцип защиты миноритарных акционеров."

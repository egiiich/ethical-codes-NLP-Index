    key_excerpts:
      - excerpt_id: "HOT02_explicit_section"
        original: "...we will ensure the strict confidentiality of the reporter..."
        translated_ru: "При сообщении о нарушении гарантируется строгая конфиденциальность заявителя."
        section_title: "Section 3. Ethics for Employees"
        relevance_comment: "Прямой принцип конфиденциальности в системе сообщений."
      - excerpt_id: "HOT03_explicit_section"
        original: "...guarantee that no disadvantage arises as a result of their act of reporting the violation."
        translated_ru: "Компания гарантирует отсутствие негативных последствий для работника, сообщившего о нарушении."
        section_title: "Section 3. Ethics for Employees"
        relevance_comment: "Прямой запрет реталиации."
      - excerpt_id: "HOT06_brief_mention"
        original: "Employees who receive unfair instructions or requests shall not comply with them."
        translated_ru: "Сотрудник обязан не исполнять неправомерные указания и сообщать о нарушениях по процедуре."
        section_title: "Article 9"
        relevance_comment: "Краткое подтверждение обязанности реагировать на нарушения."

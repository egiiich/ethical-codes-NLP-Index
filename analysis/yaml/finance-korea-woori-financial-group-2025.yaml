    key_excerpts:
      - excerpt_id: "CtoS01_brief_mention"
        original: "...ensuring that the selection of suppliers goes through a fair and transparent process."
        translated_ru: "Выбор поставщиков должен проходить через справедливую и прозрачную процедуру."
        section_title: "Section 5. Ethics for Partner Companies"
        relevance_comment: "Краткое подтверждение принципов выбора поставщиков."
      - excerpt_id: "CtoS03_explicit_section"
        original: "We do not impose unreasonable or unfair transactions on our partners..."
        translated_ru: "Компания запрещает навязывать партнерам необоснованные и несправедливые условия."
        section_title: "Section 5. Ethics for Partner Companies"
        relevance_comment: "Прямой запрет злоупотребления в отношениях с партнерами."
      - excerpt_id: "CtoS06_explicit_section"
        original: "We shall establish a co-prosperity relationship with partners ... cooperate with them for mutual growth based on mutual respect."
        translated_ru: "Закрепляется курс на долгосрочное взаимовыгодное развитие с партнерами."
        section_title: "Section 5. Ethics for Partner Companies"
        relevance_comment: "Прямой принцип устойчивого партнерства."

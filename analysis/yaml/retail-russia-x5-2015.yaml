    key_excerpts:
      - excerpt_id: "COMP01_explicit_section"
        original: "Сотрудникам запрещается обмениваться с конкурентами информацией о ценах, сроках и условиях продаж, затратах, маркетинговых планах..."
        translated_ru: "Сотрудникам запрещён обмен чувствительной коммерческой информацией с конкурентами."
        section_title: "2.1.1"
        relevance_comment: "Прямой запрет неправомерного получения/обмена конфиденциальной информации конкурентов (COMP01)."
      - excerpt_id: "COMP03_explicit_section"
        original: "Любое формальное или неформальное соглашение с конкурентами о ценах или разделе рынка может привести к значительной ответственности для Компании."
        translated_ru: "Запрещены договоренности с конкурентами о ценах и разделе рынка."
        section_title: "2.1.1"
        relevance_comment: "Прямой антикартельный принцип (COMP03)."
      - excerpt_id: "COMP05_explicit_section"
        original: "Мы поддерживаем добросовестную конкуренцию."
        translated_ru: "Компания декларирует добросовестное поведение в конкурентной среде."
        section_title: "2.1.1"
        relevance_comment: "Прямой принцип уважительной конкуренции (COMP05)."
      - excerpt_id: "COMP08_explicit_section"
        original: "Сотрудникам запрещается делать ложные заявления о конкурентах или их товарах и услугах."
        translated_ru: "Кодекс прямо запрещает ложные/порочащие заявления о конкурентах."
        section_title: "2.4.3"
        relevance_comment: "Прямой запрет дискредитации конкурентов (COMP08)."

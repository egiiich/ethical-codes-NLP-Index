    key_excerpts:
      - excerpt_id: "HOT01_brief_mention"
        original: "Сотрудники могут сообщить о любых нарушениях настоящего Кодекса ... воспользоваться «горячей линией» по этическим вопросам."
        translated_ru: "Работникам доступен канал сообщений о нарушениях через горячую линию."
        section_title: "3.1"
        relevance_comment: "Краткое подтверждение доступности горячей линии (HOT01)."
      - excerpt_id: "HOT02_explicit_section"
        original: "Компания будет принимать все необходимые меры ... для предотвращения несанкционированного доступа ... и сохранения конфиденциальности данных о личности работника."
        translated_ru: "Компания гарантирует конфиденциальность заявителя и материалов обращения."
        section_title: "3.4"
        relevance_comment: "Прямой принцип конфиденциальности расследования (HOT02)."
      - excerpt_id: "HOT03_explicit_section"
        original: "Компания не будет предпринимать меры по отношению к сотруднику, добросовестно сообщившему о потенциальном нарушении Кодекса."
        translated_ru: "Запрещено преследование сотрудников за добросовестные сообщения."
        section_title: "3.5"
        relevance_comment: "Прямой запрет реталиации (HOT03)."
      - excerpt_id: "HOT04_explicit_section"
        original: "Сообщения о нарушении могут быть сделаны на анонимной основе, если сотрудник пожелает остаться неизвестным."
        translated_ru: "Горячая линия допускает анонимные сообщения."
        section_title: "3.3"
        relevance_comment: "Прямая гарантия анонимности заявителя (HOT04)."
      - excerpt_id: "HOT06_brief_mention"
        original: "Основной принцип Кодекса: «Если сомневаетесь, спрашивайте»."
        translated_ru: "Сотрудники обязаны эскалировать сомнения и возможные нарушения через руководителей/горячую линию."
        section_title: "1.4"
        relevance_comment: "Краткое подтверждение обязанности сообщения о проблемах (HOT06)."

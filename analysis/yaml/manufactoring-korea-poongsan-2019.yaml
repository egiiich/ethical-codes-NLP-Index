      -
        excerpt_id: "CtoS01_brief_mention"
        original: "All transactions of the Company shall be conducted based on free market principle with the guarantee of fair and equitable opportunities for participation."
        translated_ru: "Для участников транзакций закреплены справедливые и равные возможности участия."
        section_title: "3. Fair Transactions and Competitions"
        relevance_comment: "Подтверждение статуса для принципа CtoS01."
      -
        excerpt_id: "CtoS03_explicit_section"
        original: "The Company shall not force unfair action or exert influence using a superior position in transaction."
        translated_ru: "Запрещено принуждение и давление на контрагента за счёт доминирующей позиции."
        section_title: "3. Fair Transactions and Competitions"
        relevance_comment: "Подтверждение статуса для принципа CtoS03."
      -
        excerpt_id: "CtoS06_explicit_section"
        original: "The Company shall establish partnership relations based on trust and cooperation ... and pursue mutual development, with its partner businesses."
        translated_ru: "Компания закрепляет доверительное партнёрство и взаимное развитие с партнёрами."
        section_title: "3. Fair Transactions and Competitions"
        relevance_comment: "Подтверждение статуса для принципа CtoS06."

    key_excerpts:
      -
        excerpt_id: "WtoC02_explicit_section"
        original: "Officers and employees ... shall protect the assets of the Company and shall not use the assets of the Company for personal benefits."
        translated_ru: "Сотрудники обязаны защищать активы компании и не использовать их в личных целях."
        section_title: "1-2 Ethical conducts in work place"
        relevance_comment: "Подтверждение статуса для принципа WtoC02."
      -
        excerpt_id: "WtoC03_explicit_section"
        original: "Officers and employees shall not ... disclose to a third party confidential information of the Company, without a prior approval."
        translated_ru: "Запрещено раскрывать конфиденциальную информацию компании без предварительного согласования."
        section_title: "1-2 Ethical conducts in work place"
        relevance_comment: "Подтверждение статуса для принципа WtoC03."
      -
        excerpt_id: "WtoC05_explicit_section"
        original: "Poongsan ... desires to fulfil its social responsibilities by complying with relevant laws and regulations."
        translated_ru: "Соблюдение применимых законов и регуляторных требований прямо закреплено кодексом."
        section_title: "Preamble"
        relevance_comment: "Подтверждение статуса для принципа WtoC05."
      -
        excerpt_id: "WtoC08_brief_mention"
        original: "officers and employees ... conduct their given duties diligently, and shall bear responsibilities for the results of actions."
        translated_ru: "Сотрудники обязаны добросовестно выполнять обязанности и отвечать за результат."
        section_title: "1-2 Ethical conducts in work place"
        relevance_comment: "Подтверждение статуса для принципа WtoC08."
      -
        excerpt_id: "WtoC10_explicit_section"
        original: "officers and employees ... shall maintain personal dignity and honor of the Company."
        translated_ru: "Сотрудники должны поддерживать честь компании и её деловую репутацию."
        section_title: "1-1 Basic code of ethics"
        relevance_comment: "Подтверждение статуса для принципа WtoC10."
    other_principles: []

        section_title: "Article 25 (Product Quality Assurance)"
        relevance_comment: "Краткий стандарт качества работы."
      - excerpt_id: "WtoC03_explicit_section"
        original: "Officers and Employees shall be familiar with and comply with the Company’s personal information protection policies."
        translated_ru: "Сотрудники обязаны знать и соблюдать политики защиты персональных данных."
        section_title: "Article 26 (Personal Information Protection)"

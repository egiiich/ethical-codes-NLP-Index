        section_title: "Article 19 (Prohibition of Disclosure or Use of Non-Public Material Information)"
        relevance_comment: "Прямой запрет злоупотребления чувствительной информацией."
      - excerpt_id: "WtoC05_explicit_section"
        original: "... shall comply with various regulations and restrictions stipulated in each Company regulation."
        translated_ru: "Сотрудники обязаны соблюдать внутренние регламенты и применимые нормы."
        section_title: "Article 35"
        relevance_comment: "Прямой правовой и нормативный комплаенс."
      - excerpt_id: "WtoC08_brief_mention"
        original: "Officers and Employees shall carry out their work with a spirit of challenge, unafraid of change and failure."
        translated_ru: "Кодекс закрепляет ориентацию на результат и инициативность в выполнении задач."
        section_title: "Article 23 (Ideal Traits of Officers and Employees)"
        relevance_comment: "Краткое подтверждение ориентации на результат."
      - excerpt_id: "WtoC10_brief_mention"

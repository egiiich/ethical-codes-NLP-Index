      - excerpt_id: "HOT01_explicit_section"
        original: "... may report the matter either anonymously or under their real name to the internal reporting department ..."
        translated_ru: "О нарушениях можно сообщать через внутреннюю систему как анонимно, так и под своим именем."
        section_title: "Article 40 (Reporting of Violations)"
        relevance_comment: "Прямой доступ к каналу обращений."
      - excerpt_id: "HOT02_explicit_section"
        original: "The Company shall ensure the confidentiality of the identity of whistleblowers and the contents of their reports ..."
        translated_ru: "Компания обязана обеспечивать конфиденциальность личности заявителя и содержания сообщения."
        section_title: "Article 41 (Protection of Whistleblowers)"
        relevance_comment: "Прямой принцип конфиденциальности."
      - excerpt_id: "HOT03_explicit_section"
        original: "... take appropriate measures to protect whistleblowers from any retaliation or disadvantage."
        translated_ru: "Компания обязуется защищать информаторов от репрессий и ущерба."
        section_title: "Article 41 (Protection of Whistleblowers)"
        relevance_comment: "Прямой запрет реталиации."
      - excerpt_id: "HOT05_explicit_section"
        original: "... promptly verify the facts and commence an investigation."
        translated_ru: "По полученному сообщению факты должны быть оперативно проверены и инициировано расследование."
        section_title: "Article 40 (Reporting of Violations)"
        relevance_comment: "Прямой принцип обязательного расследования."
      - excerpt_id: "HOT06_explicit_section"

    key_excerpts:
      - excerpt_id: "CtoS01_explicit_section"
        original: "Selection of the business partners is based on professionalism and in line with QCDSM values"
        translated_ru: "Выбор бизнес-партнёров основан на профессионализме и критериях QCDSM."
        section_title: "1.2 Business Partners"
        relevance_comment: "Прямой принцип критериев выбора поставщика."
      - excerpt_id: "CtoS02_explicit_section"
        original: "Common interests, equality and mutual trust based on fairness and social responsibility"
        translated_ru: "Сотрудничество с партнёрами строится на равенстве, доверии и справедливости."
        section_title: "1.2 Business Partners"
        relevance_comment: "Прямой принцип партнёрских отношений."
      - excerpt_id: "CtoS03_explicit_section"
        original: "Complies with applicable laws and regulations"
        translated_ru: "В отношениях с партнёрами компания соблюдает применимое законодательство."
        section_title: "1.2 Business Partners"
        relevance_comment: "Прямой комплаенс в отношении поставщиков/партнёров."
      - excerpt_id: "CtoS04_explicit_section"
        original: "All agreements must be made in writing in good faith and based on mutual benefit"
        translated_ru: "Все соглашения оформляются письменно, добросовестно и на взаимной выгоде."
        section_title: "1.2 Business Partners"
        relevance_comment: "Прямой стандарт договорной прозрачности."
      - excerpt_id: "CtoS05_explicit_section"
        original: "Strive to empower small and medium scale business partners"
        translated_ru: "Компания стремится развивать малых и средних бизнес-партнёров."
        section_title: "1.2 Business Partners"
        relevance_comment: "Прямой принцип развития цепочки поставок."
      - excerpt_id: "CtoS07_explicit_section"
        original: "is not allowed to give to or accept from business partners (substantial) gifts which may influence decision-making"
        translated_ru: "Запрещены существенные подарки от/для партнёров, влияющие на решения."
        section_title: "1.2 Business Partners"
        relevance_comment: "Прямой антикоррупционный стандарт в закупочных отношениях."

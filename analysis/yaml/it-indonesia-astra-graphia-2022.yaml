    key_excerpts:
      - excerpt_id: "HOT01_explicit_section"
        original: "the Company has a working mechanism to convene periodic audits process and/or receive the violations of code of conduct of the Company reports"
        translated_ru: "Компания имеет рабочий механизм для получения сообщений о нарушениях кодекса."
        section_title: "V. Whistleblowing System Mechanism Policy"
        relevance_comment: "Наличие канала сообщений о нарушениях."
      - excerpt_id: "HOT03_explicit_section"
        original: "Reports of violations can also be submitted through the employees suggestion box in the Company’s intranet web portal"
        translated_ru: "Сообщения о нарушениях можно подавать через ящик предложений во внутреннем портале."
        section_title: "V. Whistleblowing System Mechanism Policy"
        relevance_comment: "Прямая норма подачи сообщений сотрудниками."
      - excerpt_id: "HOT05_explicit_section"
        original: "The Company shall reviews all reports and takes necessary and appropriate action"
        translated_ru: "Компания рассматривает все сообщения и принимает необходимые меры."
        section_title: "V. Whistleblowing System Mechanism Policy"
        relevance_comment: "Прямой принцип рассмотрения и реагирования."
      - excerpt_id: "HOT08_explicit_section"
        original: "Reports of violations can also be submitted through the employees suggestion box in the Company’s intranet web portal"
        translated_ru: "Канал подачи сообщений формализован через intranet-портал компании."
        section_title: "V. Whistleblowing System Mechanism Policy"
        relevance_comment: "Есть конкретный внутренний канал обращения."

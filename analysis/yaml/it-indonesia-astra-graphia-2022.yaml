    key_excerpts:
      - excerpt_id: "COMP03_explicit_section"
        original: "The Company is not allowed to develop cooperation with competitors, which could be detrimental to the customers and/or leads to monopolistic practices"
        translated_ru: "Компания не вправе вступать в сотрудничество с конкурентами, если это вредит клиентам или ведёт к монополии."
        section_title: "1.3 Competitors"
        relevance_comment: "Прямой антикартельный запрет."
      - excerpt_id: "COMP08_explicit_section"
        original: "The Company is not allowed to discredit competitors in its marketing, promotion and advertising activities"
        translated_ru: "Запрещено дискредитировать конкурентов в маркетинге, продвижении и рекламе."
        section_title: "1.3 Competitors"
        relevance_comment: "Прямой запрет порочащей информации о конкурентах."
      - excerpt_id: "COMP05_brief_mention"
        original: "The Company supports fair and healthy competition in accordance with applicable laws and regulations"
        translated_ru: "Компания поддерживает честную и здоровую конкуренцию в соответствии с законом."
        section_title: "1.3 Competitors"
        relevance_comment: "Краткая фиксация этичного отношения к конкурентам."

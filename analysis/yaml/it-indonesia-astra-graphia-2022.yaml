    key_excerpts:
      - excerpt_id: "WtoC01_explicit_section"
        original: "To apply and develop their maximum potentials for the benefit of the Company"
        translated_ru: "Сотрудник обязан применять и развивать свой потенциал в интересах компании."
        section_title: "2. Work Ethics"
        relevance_comment: "Прямой стандарт качественной работы."
      - excerpt_id: "WtoC02_explicit_section"
        original: "maintain and utilize all data, information, assets and facilities of the Company for the benefit of the Company"
        translated_ru: "Данные, информация и активы компании используются только в интересах компании."
        section_title: "2. Work Ethics"
        relevance_comment: "Прямой стандарт бережного и целевого использования активов."
      - excerpt_id: "WtoC03_explicit_section"
        original: "All Employees are responsible for maintaining the confidentiality of the Confidential Information of the Company"
        translated_ru: "Все сотрудники несут ответственность за сохранение конфиденциальной информации компании."
        section_title: "2.c Confidential Information"
        relevance_comment: "Прямой принцип конфиденциальности."
      - excerpt_id: "WtoC05_explicit_section"
        original: "complying with internal policies/rules ... and applicable laws and regulations"
        translated_ru: "Сотрудники обязаны соблюдать внутренние правила и применимое законодательство."
        section_title: "2. Work Ethics"
        relevance_comment: "Прямой комплаенс-стандарт."
      - excerpt_id: "WtoC07_explicit_section"
        original: "must avoid conflict of interest"
        translated_ru: "Комиссары, директора и сотрудники обязаны избегать конфликта интересов."
        section_title: "1.2 Business Partners"
        relevance_comment: "Прямой запрет конфликта интересов."
      - excerpt_id: "WtoC10_explicit_section"
        original: "To keep the Company's good reputation by minding their conduct and behavior"
        translated_ru: "Сотрудник обязан беречь деловую репутацию компании своим поведением."
        section_title: "2. Work Ethics"
        relevance_comment: "Прямой репутационный стандарт."

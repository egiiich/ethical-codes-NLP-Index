    key_excerpts:
      - excerpt_id: "COMP03_explicit_section"
        original: "Never enter into an oral or written agreement or understanding with a competitor to: • Divide markets or customers. • Fix prices. • Manipulate a competitive bidding process."
        translated_ru: "Кодекс прямо запрещает сговор с конкурентами о рынках, ценах и торгах."
        section_title: "Compete Fairly"
        relevance_comment: "Прямой антикартельный принцип."
      - excerpt_id: "COMP05_brief_mention"
        original: "Hitachi is committed to fair competition and abides by applicable competition laws."
        translated_ru: "Компания кратко подчеркивает уважительный и честный формат конкурентного поведения."
        section_title: "Compete Fairly"
        relevance_comment: "Краткое подтверждение добросовестной конкуренции."
      - excerpt_id: "COMP07_explicit_section"
        original: "Respect third parties’ intellectual property. Respect the intellectual property of others and ensure we use it only where we have obtained the right to do so."
        translated_ru: "Кодекс прямо требует уважать интеллектуальную собственность других компаний, включая конкурентов."
        section_title: "Protect Our Intellectual Property"
        relevance_comment: "Прямое покрытие COMP07."
    other_principles: []

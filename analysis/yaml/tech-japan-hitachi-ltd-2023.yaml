    key_excerpts:
      - excerpt_id: "HOT01_explicit_section"
        original: "How You Can Report a Concern ... • Your manager; • Next-level manager ... • Human Resources, Compliance or Legal team. Or, contact the Hitachi Global Compliance Hotline."
        translated_ru: "Кодекс фиксирует доступ сотрудников к нескольким равноправным каналам сообщения о нарушениях."
        section_title: "How You Can Report a Concern"
        relevance_comment: "Прямое покрытие доступа к hotline."
      - excerpt_id: "HOT02_brief_mention"
        original: "Your report is logged in the concerns management system ... routed to the appropriate internal resources."
        translated_ru: "Сообщения фиксируются и обрабатываются через формализованную систему с контролем доступа."
        section_title: "What Happens When You Report a Concern"
        relevance_comment: "Краткое подтверждение процедурной конфиденциальности."
      - excerpt_id: "HOT03_explicit_section"
        original: "Hitachi prohibits retaliation against anyone who shares a concern in good faith or participates in an investigation."
        translated_ru: "Кодекс прямо запрещает реталиацию против заявителей и участников расследования."
        section_title: "Zero-Tolerance for Retaliation"
        relevance_comment: "Прямой запрет преследования."
      - excerpt_id: "HOT04_explicit_section"
        original: "The hotline is available 24/7 and allows you to remain anonymous, where permitted by law."
        translated_ru: "Кодекс прямо допускает анонимные сообщения там, где это разрешено законом."
        section_title: "How You Can Report a Concern"
        relevance_comment: "Прямая гарантия анонимности."
      - excerpt_id: "HOT05_explicit_section"
        original: "The allegations are verified ... The appropriate action is taken. Determine if discipline is needed."
        translated_ru: "По каждому обращению предусмотрены проверка фактов, меры реагирования и дисциплинарные действия."
        section_title: "What Happens When You Report a Concern"
        relevance_comment: "Прямое подтверждение нулевой терпимости."
      - excerpt_id: "HOT06_explicit_section"
        original: "If so, you have a responsibility to report your concerns about potential misconduct even if you are uncertain that a violation has occurred."
        translated_ru: "Сотрудник обязан сообщать о потенциальных нарушениях даже при неполной уверенности."
        section_title: "How You Can Report a Concern"
        relevance_comment: "Прямая обязанность сообщения."

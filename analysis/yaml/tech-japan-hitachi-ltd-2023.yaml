    key_excerpts:
      - excerpt_id: "WtoC02_explicit_section"
        original: "Do not use Hitachi assets for personal benefit."
        translated_ru: "Сотрудникам прямо запрещено использовать активы компании в личных целях."
        section_title: "Safeguard Our Assets"
        relevance_comment: "Прямой принцип защиты активов."
      - excerpt_id: "WtoC03_explicit_section"
        original: "We are committed to keeping our non-public information protected and safe."
        translated_ru: "Кодекс прямо закрепляет защиту непубличной информации от раскрытия и утечек."
        section_title: "Protect Non-Public Information"
        relevance_comment: "Прямой принцип конфиденциальности и ИБ."
      - excerpt_id: "WtoC04_explicit_section"
        original: "We treat Hitachi’s intellectual property as a valuable Hitachi asset."
        translated_ru: "Сотрудники обязаны защищать интеллектуальную собственность компании как ключевой актив."
        section_title: "Protect Our Intellectual Property"
        relevance_comment: "Прямой принцип защиты ИС компании."
      - excerpt_id: "WtoC05_explicit_section"
        original: "Follow the law. Learn about applicable laws and regulations and how to apply them to your job."
        translated_ru: "Кодекс прямо требует знания и соблюдения применимых законов на рабочем месте."
        section_title: "What Employees Need to Do"
        relevance_comment: "Прямое требование правового комплаенса."
      - excerpt_id: "WtoC09_brief_mention"
        original: "Complete your ethics and business conduct training promptly."
        translated_ru: "Сотрудники обязаны регулярно поддерживать профессиональный/этический уровень через обучение."
        section_title: "What Employees Need to Do"
        relevance_comment: "Краткое подтверждение развития компетенций."
      - excerpt_id: "WtoC10_explicit_section"
        original: "Our reputation is one of our greatest assets, and it is up to each of us to protect it."
        translated_ru: "Каждый сотрудник обязан защищать деловую репутацию компании."
        section_title: "Communicate Responsibly"
        relevance_comment: "Прямой репутационный принцип."

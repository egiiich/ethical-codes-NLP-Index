    key_excerpts:
      - excerpt_id: "CtoS01_explicit_section"
        original: "select and register business partners based on a fair and transparent evaluation criteria in all transactions."
        translated_ru: "Партнёры отбираются по прозрачным и объективным критериям оценки."
        section_title: "Chapter 3.1"
        relevance_comment: "Прямой критерий отбора поставщиков (CtoS01)."
      - excerpt_id: "CtoS02_explicit_section"
        original: "Provide fair opportunities to all business applicants..."
        translated_ru: "Всем претендентам в партнёры предоставляются равные возможности."
        section_title: "Chapter 3.1"
        relevance_comment: "Прямой принцип равного доступа поставщиков (CtoS02)."
      - excerpt_id: "CtoS03_explicit_section"
        original: "We never engage in any form of unfair transaction taking advantage of any superior position."
        translated_ru: "Запрещены сделки с использованием доминирующей позиции."
        section_title: "Chapter 3.2"
        relevance_comment: "Прямой запрет злоупотребления рыночной властью (CtoS03)."
      - excerpt_id: "CtoS05_brief_mention"
        original: "We exchange transaction information through appropriate procedures in a timely manner."
        translated_ru: "Информация по сделкам обменивается своевременно и по регламенту."
        section_title: "Chapter 3.2"
        relevance_comment: "Краткое подтверждение своевременного информирования поставщиков (CtoS05)."
      - excerpt_id: "CtoS06_explicit_section"
        original: "We support the long-term growth of our dealers and vendors ... We share the profits derived from business innovations."
        translated_ru: "Компания поддерживает долгосрочный рост партнёров и совместно делит результаты улучшений."
        section_title: "Chapter 3.3"
        relevance_comment: "Прямой принцип долгосрочного партнёрства (CtoS06)."

    key_excerpts:
      - excerpt_id: "CtoB01_explicit_section"
        original: "Customers have top priority, thus all cases are to be judged and evaluated from the viewpoint of consumers."
        translated_ru: "Потребитель объявлен главным приоритетом при принятии решений."
        section_title: "Chapter 1.1"
        relevance_comment: "Прямой клиентоцентричный принцип (CtoB01)."
      - excerpt_id: "CtoB02_explicit_section"
        original: "Provide accurate information to enable customers to select the best products and services."
        translated_ru: "Клиентам должна предоставляться точная информация о продуктах и услугах."
        section_title: "Chapter 1.3(1)"
        relevance_comment: "Прямое требование полноты/точности информации для потребителей (CtoB02)."
      - excerpt_id: "CtoB03_explicit_section"
        original: "Provide the best products and services that exceed customers’ expectations."
        translated_ru: "Компания обязуется обеспечивать высокий уровень продукта и сервиса."
        section_title: "Chapter 1.3(2)"
        relevance_comment: "Прямое требование высокого качества обслуживания (CtoB03)."
      - excerpt_id: "CtoB05_explicit_section"
        original: "Do not engage in unethical acts that can damage the customer's benefits."
        translated_ru: "Запрещены неэтичные действия, наносящие ущерб интересам клиентов."
        section_title: "Chapter 1.1(2)"
        relevance_comment: "Прямой принцип этичного поведения с клиентом (CtoB05)."
      - excerpt_id: "CtoB07_explicit_section"
        original: "Respond promptly and accurately to reasonable requests of refund, exchange or services."
        translated_ru: "Компания обязуется оперативно и точно реагировать на обращения клиентов."
        section_title: "Chapter 1.3(4)"
        relevance_comment: "Прямой принцип канала обратной связи и реакции на запросы (CtoB07)."
      - excerpt_id: "CtoB08_explicit_section"
        original: "Maintain confidentiality of all information regarding customers."
        translated_ru: "Информация о клиентах должна оставаться конфиденциальной."
        section_title: "Chapter 1.1(3)"
        relevance_comment: "Прямой принцип защиты данных клиентов (CtoB08)."
      - excerpt_id: "CtoB09_explicit_section"
        original: "For items that require safety precautions, make sure that customers have the information needed to fully understand the details."
        translated_ru: "Для товаров с рисками клиент должен получить полную информацию по безопасности."
        section_title: "Chapter 1.3(3)"
        relevance_comment: "Прямое подтверждение принципа безопасности продукта (CtoB09)."

    key_excerpts:
      - excerpt_id: "WtoC02_brief_mention"
        original: "Tangible/intangible corporate assets and expenses must be used for the Company’s business activities and for authorized purposes only."
        translated_ru: "Активы и ресурсы компании должны использоваться только по служебному назначению."
        section_title: "Chapter 4.5(4)"
        relevance_comment: "Краткое подтверждение бережного использования активов компании (WtoC02)."
      - excerpt_id: "WtoC03_explicit_section"
        original: "Confidential and property information of the Company must be protected from unauthorized disclosure."
        translated_ru: "Конфиденциальная информация компании должна быть защищена от несанкционированного раскрытия."
        section_title: "Chapter 4.5(5)①"
        relevance_comment: "Прямой принцип информационной безопасности (WtoC03)."
      - excerpt_id: "WtoC04_brief_mention"
        original: "Information protection includes the Company’s intellectual properties..."
        translated_ru: "Защита информации включает интеллектуальную собственность компании."
        section_title: "Chapter 4.5(5)③"
        relevance_comment: "Краткое подтверждение защиты ИС компании (WtoC04)."
      - excerpt_id: "WtoC05_explicit_section"
        original: "I promise to obey ... the LX Code of Ethics and all obligations relating to compliance issues including what is required under antitrust law."
        translated_ru: "Сотрудники обязуются соблюдать кодекс и все комплаенс-требования, включая антимонопольные нормы."
        section_title: "Jeong-do Pledge 3"
        relevance_comment: "Прямой комплаенс-принцип соблюдения законов (WtoC05)."
      - excerpt_id: "WtoC10_brief_mention"
        original: "Employees ... should not be involved in activities ... that may incur losses to the Company or harm its reputation."
        translated_ru: "Сотрудникам запрещены действия, наносящие ущерб репутации компании."
        section_title: "Chapter 4(4)"
        relevance_comment: "Краткое подтверждение защиты деловой репутации (WtoC10)."
    other_principles: []

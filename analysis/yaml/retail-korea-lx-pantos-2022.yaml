    key_excerpts:
      - excerpt_id: "COMP01_explicit_section"
        original: "Acquire general information on competitors through fair methods that will not be subjected to social criticism."
        translated_ru: "Информация о конкурентах может собираться только добросовестными и допустимыми способами."
        section_title: "Chapter 2.1"
        relevance_comment: "Прямое требование законного/этичного сбора информации о конкурентах (COMP01)."
      - excerpt_id: "COMP03_explicit_section"
        original: "Do not inflict damage ... by unfairly colluding with competitors to set sales prices, sales conditions or market allocation."
        translated_ru: "Запрещён сговор с конкурентами по ценам, условиям продаж и разделу рынков."
        section_title: "Chapter 2.1"
        relevance_comment: "Прямой антикартельный принцип (COMP03)."
      - excerpt_id: "COMP05_brief_mention"
        original: "We compete fairly and capably with our competitors and do not interfere with their interests or exploit their weaknesses."
        translated_ru: "Компания декларирует честную и уважительную конкуренцию без эксплуатации слабостей конкурентов."
        section_title: "Chapter 2.1"
        relevance_comment: "Краткое подтверждение уважительного отношения к конкурентам (COMP05)."
      - excerpt_id: "COMP07_explicit_section"
        original: "Do not plagiarize or infringe on competitors’ tangible/intangible assets."
        translated_ru: "Запрещено плагиатить и нарушать материальные/нематериальные активы конкурентов."
        section_title: "Chapter 2.1(2)①"
        relevance_comment: "Прямое требование уважения ИС конкурентов (COMP07)."
      - excerpt_id: "COMP08_explicit_section"
        original: "Do not degrade competitors’ status or abuse their weaknesses."
        translated_ru: "Запрещено унижать конкурентов и злоупотреблять их уязвимостями."
        section_title: "Chapter 2.1(2)②"
        relevance_comment: "Прямой запрет порочащего поведения в отношении конкурентов (COMP08)."
    other_principles: []

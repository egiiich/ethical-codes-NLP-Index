        original: "All company employees shall promptly report ... when they or others violate the Code of Ethics."
        translated_ru: "При выявлении нарушений сотрудники обязаны незамедлительно сообщать о них."
        section_title: "Duties of Employees (2)"
        relevance_comment: "Краткий элемент обязательного реагирования на нарушения (HOT05)."
      - excerpt_id: "HOT06_explicit_section"
        original: "All company employees shall promptly report ... to the Ethics Bureau."
        translated_ru: "Установлена прямая обязанность сообщать о нарушениях в Ethics Bureau."
        section_title: "Duties of Employees (2)"
        relevance_comment: "Прямой принцип обязательного сообщения о нарушениях (HOT06)."

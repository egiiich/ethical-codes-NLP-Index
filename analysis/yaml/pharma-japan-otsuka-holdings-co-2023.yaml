        section_title: "Reporting Concerns"
        relevance_comment: "Прямой запрет реталиации."
      - excerpt_id: "HOT06_explicit_section"
        original: "We also urge you to report it immediately if you suspect or know of any violation of law, this Code, or internal Company policies and procedures."

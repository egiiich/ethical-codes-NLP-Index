    key_excerpts:
      - excerpt_id: "WtoC01_explicit_section"
        original: "... this Code sets forth the minimum standards of conduct for all individuals of the Otsuka Group."
        translated_ru: "Для всех сотрудников установлены минимальные стандарты профессионального поведения."
        section_title: "Introduction to the Code"
        relevance_comment: "Прямой стандарт качества работы и поведения."
      - excerpt_id: "WtoC03_explicit_section"
        original: "Privacy and Confidentiality ... We have a duty to safeguard the confidentiality of the information entrusted to us ..."
        translated_ru: "Сотрудники обязаны защищать конфиденциальную информацию компании и партнеров."
        section_title: "Privacy and Confidentiality"
        relevance_comment: "Прямой принцип инфобезопасности."
      - excerpt_id: "WtoC04_explicit_section"
        original: "Intellectual Property ... We should report any suspected misuse of our intellectual property ..."
        translated_ru: "Сотрудники обязаны защищать ИС компании и сообщать о её неправомерном использовании."
        section_title: "Intellectual Property"
        relevance_comment: "Прямой принцип защиты ИС."
      - excerpt_id: "WtoC05_explicit_section"
        original: "Our professional conduct should be in conformance with all applicable laws and regulations ..."
        translated_ru: "Сотрудники обязаны соблюдать применимые законы и нормы в своих ролях."
        section_title: "Introduction to the Code"
        relevance_comment: "Прямой правовой комплаенс."
      - excerpt_id: "WtoC10_explicit_section"
        original: "Business Integrity ... To earn and maintain the trust ... we consistently conduct business with integrity and transparency."
        translated_ru: "Поддержание доверия и репутации обеспечивается постоянной добросовестностью и прозрачностью."
        section_title: "Business Integrity"
        relevance_comment: "Прямой репутационный принцип."

        section_title: "Whistleblower Protection"
        relevance_comment: "Подтверждение статуса explicit_section для принципа HOT02."
      -
        excerpt_id: "HOT03_explicit_section"
        original: "Retaliation ... will not be tolerated if ... reports ... are submitted in good faith."
        translated_ru: "Преследование заявителей, действующих добросовестно, прямо запрещено."
        section_title: "Whistleblower Protection"
        relevance_comment: "Подтверждение статуса explicit_section для принципа HOT03."
      -

      -
        excerpt_id: "HOT01_explicit_section"
        original: "Each individual is guaranteed by the Company to report any indication of violations..."
        translated_ru: "Каждому гарантируется возможность сообщать о нарушениях."
        section_title: "Whistleblower System"
        relevance_comment: "Подтверждение статуса explicit_section для принципа HOT01."
      -
        excerpt_id: "HOT02_explicit_section"
        original: "Each report shall be held confidentially to then be followed up."

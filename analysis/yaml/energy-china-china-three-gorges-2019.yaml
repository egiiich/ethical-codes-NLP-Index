    key_excerpts:
      -
        excerpt_id: "COMP01_explicit_section"
        original: "Any Stakeholder who obtains or receives confidential or proprietary information related to UN procurement is ... prohibited from using such information unless it is publicly available."
        translated_ru: "Любой сотрудник, получивший конфиденциальную информацию о закупках ООН, не вправе использовать её, если она не является публичной."
        section_title: "22. PROCUREMENT"
        relevance_comment: "Запрет на использование конфиденциальной информации конкурентов/закупок."
      -
        excerpt_id: "COMP03_explicit_section"
        original: "CTG stakeholders must not engage in any form of price fixing, bid rigging, territory dividing or other similar activities with competitors."
        translated_ru: "Сотрудникам CTG запрещены ценовые сговоры, сговоры на торгах, раздел рынков и иные аналогичные практики с конкурентами."
        section_title: "23. ANTITRUST AND FAIR COMPETITION"
        relevance_comment: "Прямой запрет антиконкурентных соглашений."
      -
        excerpt_id: "COMP08_explicit_section"
        original: "Stakeholders must not release ... material that unfairly describes the services of a competitor or makes disparaging comments."
        translated_ru: "Сотрудникам запрещено выпускать материалы, недобросовестно описывающие услуги конкурента или содержащие дискредитирующие комментарии."
        section_title: "24. MARKETING AND ADVERTISING"
        relevance_comment: "Прямой запрет дискредитации конкурентов."

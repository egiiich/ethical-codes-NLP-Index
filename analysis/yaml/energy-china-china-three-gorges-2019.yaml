        excerpt_id: "WtoC03_explicit_section"
        original: "Stakeholders must not disclose confidential information belonging to or pertaining to CTG or any of its clients to any third party."
        translated_ru: "Сотрудникам запрещено раскрывать конфиденциальную информацию CTG и клиентов третьим лицам."
        section_title: "8. IMPROPER USE OF CTG OR ITS CLIENTS’ INFORMATION"
        relevance_comment: "Прямая обязанность конфиденциальности."
      -
        excerpt_id: "WtoC05_explicit_section"
        original: "Stakeholders shall ... learn, understand and conform with these laws."
        translated_ru: "Сотрудники обязаны изучать, понимать и соблюдать применимые законы."
        section_title: "21. COMPLIANCE WITH LAW"
        relevance_comment: "Явная обязанность соблюдения законов."
      -
        excerpt_id: "WtoC10_explicit_section"
        original: "Stakeholders must refrain ... from any activity ... that could cause CTG or its client’s public embarrassment, reputational risk."
        translated_ru: "Сотрудники должны воздерживаться от действий, способных нанести репутационный ущерб CTG или клиентам."
        section_title: "6. RESPONSIBILITIES FOR DEALING WITH EXTERNAL PARTIES"
        relevance_comment: "Явная обязанность защищать репутацию компании."

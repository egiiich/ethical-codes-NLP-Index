      -
        excerpt_id: "HOT03_explicit_section"
        original: "CTG will not harass or retaliate against any stakeholder or person who reports, in good faith, a suspected violation."
        translated_ru: "CTG не допускает преследования или ответных мер против любого лица, добросовестно сообщившего о нарушении."
        section_title: "26. WHISTLEBLOWERS"
        relevance_comment: "Явная защита от преследования."
      -
        excerpt_id: "HOT06_explicit_section"
        original: "all stakeholders are expected to report to the Ethics Committee good faith concerns about actual or suspected violations."
        translated_ru: "Все сотрудники обязаны сообщать в комитет по этике о добросовестных подозрениях на фактические или потенциальные нарушения."
        section_title: "26. WHISTLEBLOWERS"
        relevance_comment: "Прямая обязанность сообщать о нарушениях."

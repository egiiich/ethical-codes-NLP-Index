    key_excerpts:
      - excerpt_id: "COMP01_explicit_section"
        original: "Business Intelligence — We respect the confidential and proprietary information of third parties. We do not accept or solicit confidential and/or proprietary information belonging to third parties without their consent."
        translated_ru: "«Business Intelligence — мы уважаем конфиденциальную и проприетарную информацию третьих лиц. Мы не принимаем и не запрашиваем такую информацию без их согласия»."
        section_title: "Stakeholder Reliability"
        relevance_comment: "Прямой запрет на получение чужой конфиденциальной информации без согласия (COMP01)."
      - excerpt_id: "COMP03_explicit_section"
        original: "Anti-Trust & Fair Competition ... We compete vigorously, independently, and in compliance with the antitrust and competition laws."
        translated_ru: "«Anti-Trust & Fair Competition ... мы конкурируем активно, независимо и в соответствии с антимонопольным и конкурентным законодательством»."
        section_title: "Stakeholder Reliability"
        relevance_comment: "Явная норма антимонопольного соблюдения (COMP03)."
      - excerpt_id: "COMP05_explicit_section"
        original: "The purpose of the Code is to establish uniform standards of fairness, ethics and integrity."
        translated_ru: "«Цель Кодекса — установить единые стандарты справедливости, этики и добросовестности»."
        section_title: "Introduction"
        relevance_comment: "Явный принцип fairness как корпоративный стандарт поведения (COMP05)."
      - excerpt_id: "COMP08_explicit_section"
        original: "We do not permit or condone false or disparaging statements against our competitors or their products."
        translated_ru: "«Мы не допускаем и не одобряем ложные или дискредитирующие заявления в отношении наших конкурентов или их продуктов»."
        section_title: "Promotion & Advertising"
        relevance_comment: "Прямой запрет ложных/порочащих высказываний о конкурентах (COMP08)."

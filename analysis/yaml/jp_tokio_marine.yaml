    key_excerpts:
      - excerpt_id: "COMP03_explicit_section"
        original: "We shall not undertake any action that hampers free and fair competition, including collusion and cartel formation."
        translated_ru: "«Мы не должны предпринимать никаких действий, препятствующих свободной и честной конкуренции, включая сговор и создание картелей»."
        section_title: "1-3 Free and Fair Competition"
        relevance_comment: "Прямой запрет сговора и картелей (COMP03)."
      - excerpt_id: "COMP05_explicit_section"
        original: "We shall comply with applicable laws, rules and regulations and internal rules, engage in free and fair competition and conduct fair and equitable business activities in conformity with social norms."
        translated_ru: "«Мы обязаны соблюдать применимые законы, правила и внутренние нормы, вести свободную и честную конкуренцию и осуществлять справедливую деловую деятельность в соответствии с социальными нормами»."
        section_title: "1. Compliance"
        relevance_comment: "Явно закреплен принцип честной и справедливой конкуренции (COMP05)."
      - excerpt_id: "COMP07_explicit_section"
        original: "We shall respect and not infringe upon intellectual property rights of third parties, including copyrights, trademarks and patents."
        translated_ru: "«Мы обязаны уважать и не нарушать права интеллектуальной собственности третьих лиц, включая авторские права, товарные знаки и патенты»."
        section_title: "1-6 Intellectual Properties"
        relevance_comment: "Явное требование уважать права ИС третьих лиц, включая конкурентов (COMP07)."

    key_excerpts:
      -
        excerpt_id: "HOT03_explicit_section"
        original: "the Group prohibits the detrimental treatment of whistleblowers"
        translated_ru: "Группа прямо запрещает неблагоприятное обращение с информаторами."
        section_title: "Whistleblowing System"
        relevance_comment: "Прямой запрет преследования заявителей."
      -
        excerpt_id: "HOT04_explicit_section"
        original: "taking thoroughgoing measures to ensure the content of each whistleblower report is kept confidential, and all reports can be made anonymously."
        translated_ru: "Содержимое сообщений защищается конфиденциальностью, а сообщения можно делать анонимно."
        section_title: "Whistleblowing System"
        relevance_comment: "Прямая гарантия конфиденциальности и анонимности заявителя."
      -
        excerpt_id: "HOT05_explicit_section"
        original: "The Resona Group shall promptly investigate alleged violations ... and take disciplinary action"
        translated_ru: "По сообщениям о нарушениях проводится расследование и применяются дисциплинарные меры."
        section_title: "Anti-Bribery & Corruption Policy"
        relevance_comment: "Прямое подтверждение обязательного реагирования на нарушения."
      -
        excerpt_id: "HOT06_explicit_section"
        original: "they are required to report promptly to their supervisors or the relevant Compliance Division, or they can report through a whistle-blowing system"
        translated_ru: "Сотрудники обязаны своевременно сообщать о подозреваемых нарушениях через руководителя/комплаенс/горячую линию."
        section_title: "Anti-Bribery & Corruption Policy"
        relevance_comment: "Прямая обязанность сообщения о нарушениях."

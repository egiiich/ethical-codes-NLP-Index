        original: "We select suppliers carefully and fairly."
        translated_ru: "Мы тщательно и справедливо отбираем поставщиков."
        section_title: "5-2 Supply Chain Management"
        relevance_comment: "Прямой критерий выбора поставщиков."
      - excerpt_id: "CtoS03_brief_mention"

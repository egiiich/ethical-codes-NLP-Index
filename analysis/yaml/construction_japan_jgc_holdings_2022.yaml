        relevance_comment: "Краткий запрет злоупотребления рыночной властью."
      - excerpt_id: "CtoS06_explicit_section"
        original: "We build strong partnerships with suppliers and maintain and improve long-term relationships of mutual understanding and trust."
        translated_ru: "Мы строим прочные партнерства с поставщиками и поддерживаем долгосрочные отношения взаимопонимания и доверия."
        section_title: "5-2 Supply Chain Management"
        relevance_comment: "Прямой акцент на долгосрочном партнерстве."
      - excerpt_id: "CtoS07_brief_mention"
        original: "if, without a legitimate reason, you reduce the amount of or delay the payment... it may constitute a violation"
        translated_ru: "без законного основания уменьшать или задерживать оплату нельзя, это может быть нарушением"
        section_title: "Selection of Suppliers"
        relevance_comment: "Краткий запрет манипуляций условиями сделки."

        section_title: "Professional Commitments"
        relevance_comment: "Краткий стандарт качества и этики труда."
      - excerpt_id: "WtoC02_explicit_section"
        original: "We manage and use corporate assets solely for business purposes."
        translated_ru: "Мы управляем и используем корпоративные активы исключительно в служебных целях."
        section_title: "6-1 Use of Corporate Assets"
        relevance_comment: "Прямой принцип сохранности/целевого использования активов."
      - excerpt_id: "WtoC03_explicit_section"
        original: "We manage confidential information strictly to prevent unauthorized disclosure"
        translated_ru: "Мы строго управляем конфиденциальной информацией для предотвращения несанкционированного раскрытия."
        section_title: "6-2 Information Control"
        relevance_comment: "Прямая защита конфиденциальной информации."
      - excerpt_id: "WtoC04_brief_mention"
        original: "We prevent infringing on the intellectual property rights of others"
        translated_ru: "Мы предотвращаем нарушение прав интеллектуальной собственности других"
        section_title: "6-2"
        relevance_comment: "Краткая защита прав ИС в деятельности работников."
      - excerpt_id: "WtoC05_explicit_section"
        original: "As a member of society, we comply with domestic and international laws and regulations"
        translated_ru: "Как член общества, мы соблюдаем национальные и международные законы и нормы."
        section_title: "1-1 Our Pride"
        relevance_comment: "Прямой комплаенс с законами."
      - excerpt_id: "WtoC09_brief_mention"
        original: "We manage, guide and lead employees to realize their full potential"
        translated_ru: "Мы развиваем и направляем сотрудников для полной реализации их потенциала."
        section_title: "3-1 Motivating Work Environment"
        relevance_comment: "Краткая поддержка профессионального развития."
      - excerpt_id: "WtoC10_brief_mention"
        original: "we strive to enhance our reputation"
        translated_ru: "мы стремимся укреплять нашу репутацию"
        section_title: "1-2 Fairness and Honesty in Business"

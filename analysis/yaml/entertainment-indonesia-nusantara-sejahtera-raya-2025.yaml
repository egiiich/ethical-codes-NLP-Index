        excerpt_id: "COMP03_explicit_section"
        original: "Refrain from entering into agreements or understandings with competitors that violate applicable laws, including ... prohibitions against monopoly and unfair business practices."
        translated_ru: "Сотрудникам запрещены соглашения с конкурентами, нарушающие антимонопольные нормы."
        section_title: "Ethics Towards External Parties - Competitors"
        relevance_comment: "Прямой антимонопольный запрет."
      -
        excerpt_id: "COMP05_explicit_section"
        original: "Exhibit respectful behavior and maintain relationships with competitors."
        translated_ru: "Кодекс требует уважительного поведения по отношению к конкурентам."
        section_title: "Ethics Towards External Parties - Competitors"
        relevance_comment: "Прямой принцип уважения конкурентов."

    key_excerpts:
      -
        excerpt_id: "HOT01_brief_mention"
        original: "Every employee may report suspected violations ... to their immediate superior, either directly or via an email designated by the Company."
        translated_ru: "В компании предусмотрены каналы для подачи сообщений о нарушениях."
        section_title: "Guidelines for Implementing - Violation Reporting"
        relevance_comment: "Краткое подтверждение доступности каналов обращения."
      -
        excerpt_id: "HOT02_explicit_section"
        original: "The recipient of the report and the Company must ensure the confidentiality of the whistleblower’s identity."
        translated_ru: "Компания обязана обеспечивать конфиденциальность личности информатора."
        section_title: "Guidelines for Implementing - Violation Reporting"
        relevance_comment: "Прямое требование конфиденциальности."
      -
        excerpt_id: "HOT03_explicit_section"
        original: "The Company is responsible for ensuring protection for any employee who reports violations of this Code of Ethics."
        translated_ru: "Компания обязана защищать сотрудника, сообщившего о нарушении Кодекса."
        section_title: "Guidelines for Implementing - Violation Reporting"
        relevance_comment: "Прямой запрет реталиации."
      -
        excerpt_id: "HOT05_explicit_section"
        original: "The Company is obliged to accept and ensure that reports of violations ... are processed fairly and in a timely manner."
        translated_ru: "Компания обязана принимать и своевременно, справедливо рассматривать сообщения о нарушениях."
        section_title: "Guidelines for Implementing - Violation Reporting"
        relevance_comment: "Принцип обязательного реагирования и рассмотрения нарушений."
      -
        excerpt_id: "HOT06_explicit_section"
        original: "Employees who are aware of violations or attempted violations and fail to report them may be deemed to have committed a violation of equal severity."
        translated_ru: "Непредставление сообщения о известном нарушении само считается нарушением."
        section_title: "Guidelines for Implementing - Violation Reporting"
        relevance_comment: "Прямая обязанность сообщать о нарушениях."

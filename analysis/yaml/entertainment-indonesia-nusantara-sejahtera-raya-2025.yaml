    key_excerpts:
      -
        excerpt_id: "WtoC02_explicit_section"
        original: "Employees are obligated to safeguard, maintain, secure, and preserve the assets and facilities provided by the Company ... prohibited from using such assets ... for personal interests."
        translated_ru: "Сотрудники обязаны беречь активы компании и не использовать их в личных целях."
        section_title: "Work Ethics - Safeguarding and Use of Company Assets"
        relevance_comment: "Прямое требование сохранности активов."
      -
        excerpt_id: "WtoC03_explicit_section"
        original: "Every employee must maintain the confidentiality of Company information ..."
        translated_ru: "Каждый сотрудник обязан сохранять конфиденциальность информации компании."
        section_title: "Compliance - Confidentiality of Information"
        relevance_comment: "Прямой принцип защиты конфиденциальной информации."
      -
        excerpt_id: "WtoC05_explicit_section"
        original: "Every employee must comply with laws and Company Regulations."
        translated_ru: "Сотрудники обязаны соблюдать законы и внутренние регламенты компании."
        section_title: "Compliance with Laws and Regulations"
        relevance_comment: "Прямое требование правового комплаенса."
      -
        excerpt_id: "WtoC10_explicit_section"
        original: "Be mindful of and protect the Company’s positive image and reputation."
        translated_ru: "Сотрудники обязаны поддерживать и защищать положительный имидж и репутацию компании."
        section_title: "Protecting the Company’s Reputation"
        relevance_comment: "Прямой принцип сохранения деловой репутации."

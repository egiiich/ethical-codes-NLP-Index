    key_excerpts:
      -
        excerpt_id: "CtoS01_explicit_section"
        original: "Objectively and equitably evaluate business partners without discrimination."
        translated_ru: "Сотрудники обязаны объективно и без дискриминации оценивать деловых партнеров."
        section_title: "Ethics Towards External Parties - Business/Commercial Partners"
        relevance_comment: "Прямой принцип справедливого отношения к поставщикам/партнерам."
      -
        excerpt_id: "CtoS03_explicit_section"
        original: "Employees are prohibited from exploiting relationships with business partners for personal interests."
        translated_ru: "Запрещено использовать отношения с деловыми партнерами в личных интересах."
        section_title: "Ethics Towards External Parties - Business/Commercial Partners"
        relevance_comment: "Прямой запрет злоупотребления положением в отношениях с партнерами."
      -
        excerpt_id: "CtoS06_explicit_section"
        original: "The Company develops relationships with its business partners in a professional, equitable, and mutually beneficial manner."
        translated_ru: "Компания развивает отношения с партнерами на профессиональной, равной и взаимовыгодной основе."
        section_title: "Ethics Towards External Parties - Business/Commercial Partners"
        relevance_comment: "Прямой принцип долгосрочного взаимовыгодного партнерства."

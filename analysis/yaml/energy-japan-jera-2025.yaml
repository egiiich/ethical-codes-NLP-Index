    key_excerpts:
      -
        excerpt_id: "CtoS01_explicit_section"
        original: "In our procurement activities, we provide open, fair and equal participation opportunities ... and select suppliers through rational and transparent procedures."
        translated_ru: "В закупках обеспечиваются открытые, справедливые и равные условия участия, а выбор поставщиков ведется по прозрачным рациональным процедурам."
        section_title: "3. Fair and just business activities"
        relevance_comment: "Прямой справедливый подход к выбору поставщиков."
      -
        excerpt_id: "CtoS03_brief_mention"
        original: "As equal partners with business counterparts, we build relationships of trust."
        translated_ru: "С контрагентами выстраиваются отношения равноправного партнерства и доверия."
        section_title: "3. Fair and just business activities"
        relevance_comment: "Краткое указание на отказ от злоупотребления рыночной силой."
      -
        excerpt_id: "CtoS06_explicit_section"
        original: "As equal partners with business counterparts, we build relationships of trust based on mutual understanding and close communication."
        translated_ru: "Компания строит доверительные партнерские отношения на взаимопонимании и коммуникации."
        section_title: "3. Fair and just business activities"
        relevance_comment: "Явная ориентация на долгосрочное партнерство."

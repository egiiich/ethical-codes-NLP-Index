    key_excerpts:
      -
        excerpt_id: "WtoC02_explicit_section"
        original: "We do not use the company's assets ... for private purposes."
        translated_ru: "Мы не используем активы компании в личных целях."
        section_title: "6. Preventing unauthorized use of assets and information"
        relevance_comment: "Прямой запрет личного использования активов компании."
      -
        excerpt_id: "WtoC03_explicit_section"
        original: "We strictly control confidential information to prevent leakage and unauthorized disclosure to third parties."
        translated_ru: "Конфиденциальная информация строго контролируется для предотвращения утечек и несанкционированного раскрытия."
        section_title: "6. Management and protection of information and assets"
        relevance_comment: "Прямое требование конфиденциальности."
      -
        excerpt_id: "WtoC04_explicit_section"
        original: "We properly protect internal information according to its value as intellectual property."
        translated_ru: "Внутренняя информация защищается как объект интеллектуальной собственности."
        section_title: "6. Management and protection of information and assets"
        relevance_comment: "Прямое требование защиты ИС компании."
      -
        excerpt_id: "WtoC05_explicit_section"
        original: "We comply with the laws and regulations of Japan and of all places where we operate."
        translated_ru: "Мы соблюдаем законы и нормы Японии и всех стран присутствия."
        section_title: "1. Comply With the Law"
        relevance_comment: "Прямое требование соблюдения законов."
      -
        excerpt_id: "WtoC10_explicit_section"
        original: "act with integrity based on a heightened sense of ethics befitting a global corporation."
        translated_ru: "Компания требует действовать добросовестно и этично как глобальная корпорация."
        section_title: "Preamble"
        relevance_comment: "Явный репутационный и этический стандарт."

    key_excerpts:
      -
        excerpt_id: "CtoS01_explicit_section"
        original: "We give fair trading opportunities to partner companies."
        translated_ru: "Мы предоставляем партнёрским компаниям справедливые возможности для участия в сделках."
        section_title: "RELATIONSHIP WITH BUSINESS PARTNERS"
        relevance_comment: "Прямой принцип справедливого доступа партнёров."
      -
        excerpt_id: "CtoS03_explicit_section"
        original: "We do not engage in unfair practices based on superior bargaining position."
        translated_ru: "Мы не применяем недобросовестные практики, опираясь на более сильную переговорную позицию."
        section_title: "RELATIONSHIP WITH BUSINESS PARTNERS"
        relevance_comment: "Прямой запрет злоупотребления доминирующим положением."
      -
        excerpt_id: "CtoS06_explicit_section"
        original: "We seek mutual benefits and common development."
        translated_ru: "Мы стремимся к взаимной выгоде и совместному развитию."
        section_title: "RELATIONSHIP WITH BUSINESS PARTNERS"
        relevance_comment: "Ориентация на долгосрочное взаимовыгодное партнёрство."

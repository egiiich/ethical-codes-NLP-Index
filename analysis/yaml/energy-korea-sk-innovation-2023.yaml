    key_excerpts:
      -
        excerpt_id: "CtoP04_explicit_section"
        original: "We not only contribute to the economic development but also grow together with our society by engaging in social activities to create social values."
        translated_ru: "Мы не только содействуем экономическому развитию, но и растём вместе с обществом через социальные инициативы."
        section_title: "OUR ROLE IN THE COMMUNITY"
        relevance_comment: "Прямой вклад в социально-экономическое развитие общества."
      -
        excerpt_id: "CtoP08_explicit_section"
        original: "We build trust in our community, and develop and grow together with our community through the pursuit of disaster-free and eco-friendly management."
        translated_ru: "Мы развиваемся вместе с местным сообществом через безаварийное и экологичное управление."
        section_title: "OUR ROLE IN THE COMMUNITY"
        relevance_comment: "Прямое упоминание предотвращения аварий и экологичности."
      -
        excerpt_id: "CtoP09_explicit_section"
        original: "We comply with the local laws and respect the traditions and cultures of the communities in which we engage in business."
        translated_ru: "Мы соблюдаем местные законы и уважаем традиции и культуру сообществ, где ведём бизнес."
        section_title: "OUR ROLE IN THE COMMUNITY"
        relevance_comment: "Прямое уважение традиций местных сообществ."

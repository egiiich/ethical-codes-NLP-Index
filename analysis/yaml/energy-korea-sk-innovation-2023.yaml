    key_excerpts:
      -
        excerpt_id: "COMP03_explicit_section"
        original: "We will not conduct unfair common actions such as determining the price, Terms and Condition of goods and services through agreements with rival companies."
        translated_ru: "Мы не будем участвовать в недобросовестных согласованных действиях с конкурентами, включая согласование цен и условий товаров/услуг."
        section_title: "RELATIONSHIP WITH BUSINESS PARTNERS"
        relevance_comment: "Прямой запрет антиконкурентного сговора."
      -
        excerpt_id: "COMP05_brief_mention"
        original: "We also compete in good faith based on mutual respect."
        translated_ru: "Мы конкурируем добросовестно на основе взаимного уважения."
        section_title: "RELATIONSHIP WITH BUSINESS PARTNERS"
        relevance_comment: "Краткое упоминание уважительного отношения к конкурентам."

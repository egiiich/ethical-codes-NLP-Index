        relevance_comment: "Прямой запрет на получение чужих trade secrets (COMP01)."
      - excerpt_id: "COMP03_explicit_section"
        original: "Eisai’s policy is to compete fairly and legitimately and to comply with anti-trust or competition laws ... cartel, price fixing, etc. are prohibited."
        translated_ru: "«Политика Eisai — конкурировать честно и законно и соблюдать antitrust/competition laws ... картели и фиксация цен запрещены»."

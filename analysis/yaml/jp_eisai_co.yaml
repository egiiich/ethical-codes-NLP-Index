        relevance_comment: "Явный анти-картельный/антимонопольный блок (COMP03)."
      - excerpt_id: "COMP05_explicit_section"
        original: "We compete fairly."
        translated_ru: "«Мы конкурируем честно»."
        section_title: "Charter of Business Conduct"
        relevance_comment: "Краткое, но явное закрепление fair competition (COMP05)."

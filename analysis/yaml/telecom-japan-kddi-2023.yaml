    key_excerpts:
      - excerpt_id: "WtoC01_brief_mention"
        original: "II. Conscientious Performance of Duties"
        translated_ru: "II. Добросовестное исполнение обязанностей."
        section_title: "II. Conscientious Performance of Duties"
        relevance_comment: "Краткое требование качественного и добросовестного выполнения работы (WtoC01)."
      - excerpt_id: "WtoC03_explicit_section"
        original: "We will strictly refrain from acquiring customers' or business partners' information as well as the company's confidential information through unauthorized means..."
        translated_ru: "Мы будем строго воздерживаться от неправомерного получения информации клиентов/партнёров и конфиденциальной информации компании."
        section_title: "VI. Management of Information to Protect the Secrecy of Communications and Customers' Information"
        relevance_comment: "Прямое требование конфиденциальности и информационной безопасности (WtoC03)."
      - excerpt_id: "WtoC04_explicit_section"
        original: "We will strive to create and protect the company's intellectual properties..."
        translated_ru: "Мы будем стремиться создавать и защищать интеллектуальную собственность компании."
        section_title: "III. Respect for Intellectual Properties"
        relevance_comment: "Прямое требование защиты ИС компании (WtoC04)."
      - excerpt_id: "WtoC05_implicit_scattered"
        original: "We will adhere to the financial and accounting rules and create our records and documents correctly and in accordance with the rules."
        translated_ru: "Мы будем соблюдать финансовые и бухгалтерские правила и корректно формировать документы и записи."
        section_title: "IX. Appropriate Accounting and Adherence to Agreements"
        relevance_comment: "Требование соблюдения нормативных правил в рабочей деятельности (WtoC05)."
      - excerpt_id: "WtoC10_explicit_section"
        original: "...will not pursue our benefit or the benefit of a third party at the sacrifice of the company's benefits."
        translated_ru: "...мы не будем преследовать личную выгоду или выгоду третьих лиц в ущерб интересам компании."
        section_title: "II. Conscientious Performance of Duties"
        relevance_comment: "Прямое требование не наносить ущерб интересам компании/репутации (WtoC10)."

    key_excerpts:
      - excerpt_id: "COMP03_explicit_section"
        original: "We will pursue sound business activities as well as fair trade with all our customers and business partners, by prohibiting anti-competitive behavior and endeavoring to prevent such behavior."
        translated_ru: "Мы будем вести добросовестную деятельность и честную торговлю, запрещая антиконкурентное поведение и предотвращая его."
        section_title: "V. Promotion of Fair Business Activities"
        relevance_comment: "Прямой запрет антиконкурентных практик (COMP03)."
      - excerpt_id: "COMP07_explicit_section"
        original: "We will strive to create and protect the company's intellectual properties as well as have respect for others' intellectual properties."
        translated_ru: "Мы будем создавать и защищать интеллектуальную собственность компании, а также уважать интеллектуальную собственность других."
        section_title: "III. Respect for Intellectual Properties"
        relevance_comment: "Прямое уважение прав ИС третьих лиц, включая конкурентов (COMP07)."

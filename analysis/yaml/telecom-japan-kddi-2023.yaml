      - excerpt_id: "CtoS02_brief_mention"
        original: "We will pursue sound business activities as well as fair trade with all our customers and business partners..."
        translated_ru: "Мы будем вести честную торговлю со всеми клиентами и деловыми партнёрами."
        section_title: "V. Promotion of Fair Business Activities"
        relevance_comment: "Краткое подтверждение равноправного подхода к партнерам/поставщикам (CtoS02)."
      - excerpt_id: "CtoS03_implicit_scattered"
        original: "...and will not offer illicit financial contributions ... bribes ... or similar types of offers, promises, or improper benefits."
        translated_ru: "...и не будем предлагать незаконные финансовые взносы, взятки или иные неправомерные выгоды."
        section_title: "V. Promotion of Fair Business Activities"
        relevance_comment: "Косвенно поддерживает отказ от злоупотреблений и недобросовестного давления в цепочке поставок (CtoS03)."
      - excerpt_id: "CtoS06_brief_mention"
        original: "We will ensure faithful communication with society, including shareholders and business partners..."
        translated_ru: "Мы будем обеспечивать добросовестную коммуникацию с обществом, включая акционеров и деловых партнёров."
        section_title: "VII. Practice of Open and In-depth Communication"
        relevance_comment: "Краткая ориентация на устойчивое взаимодействие с бизнес-партнёрами (CtoS06)."

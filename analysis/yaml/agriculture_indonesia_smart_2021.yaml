    key_excerpts:
      - excerpt_id: "HOT01_explicit_section"
        original: "... employees may, in confidence and without fear of retaliation, bring ... concerns ..."
        translated_ru: "... работники могут конфиденциально и без страха преследования сообщать о проблемах ..."
        section_title: "How do I ask questions and raise concerns?"
        relevance_comment: "Гарантированный доступ работников к каналу сообщений."
      - excerpt_id: "HOT02_explicit_section"
        original: "The Company will keep details of investigations confidential to the maximum extent possible ..."
        translated_ru: "Компания будет сохранять детали расследований конфиденциальными в максимально возможной степени ..."
        section_title: "How are reports handled?"
        relevance_comment: "Прямой принцип конфиденциальности материалов расследования."
      - excerpt_id: "HOT03_explicit_section"
        original: "The Company will not tolerate any form of retaliation against you for making a good faith report ..."
        translated_ru: "Компания не потерпит никакой формы преследования за добросовестное сообщение ..."
        section_title: "What if I am worried about retaliation?"
        relevance_comment: "Прямой запрет реталиации."
      - excerpt_id: "HOT04_explicit_section"
        original: "Your concerns may be reported anonymously, if you wish ..."
        translated_ru: "Ваши сообщения могут подаваться анонимно, если вы этого хотите ..."
        section_title: "Q&A"
        relevance_comment: "Прямо закреплена возможность анонимных обращений."
      - excerpt_id: "HOT05_explicit_section"
        original: "The Company will promptly respond to all reports of misconduct."
        translated_ru: "Компания будет оперативно реагировать на все сообщения о нарушениях."
        section_title: "How are reports handled?"
        relevance_comment: "Прямой принцип обязательного реагирования на каждое сообщение."
      - excerpt_id: "HOT06_explicit_section"
        original: "It is up to each of us to protect our reputation by reporting issues immediately."
        translated_ru: "Каждый из нас обязан защищать репутацию компании, немедленно сообщая о проблемах."
        section_title: "Q&A"
        relevance_comment: "Прямая обязанность сообщать о нарушениях."
      - excerpt_id: "HOT09_brief_mention"
        original: "... provide complete and accurate information related to investigations."
        translated_ru: "... предоставлять полную и точную информацию, относящуюся к расследованиям."
        section_title: "How are reports handled?"
        relevance_comment: "Кратко подтверждает право/обязанность представить максимум информации до рассмотрения."
    other_principles: []

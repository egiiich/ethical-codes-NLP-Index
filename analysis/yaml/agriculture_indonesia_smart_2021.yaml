    key_excerpts:
      - excerpt_id: "CtoS01_explicit_section"
        original: "We choose our suppliers based on legitimate, business-related criteria ... quality ... cost, reliability and experience."
        translated_ru: "Мы выбираем поставщиков на основе легитимных бизнес-критериев ... качества ... стоимости, надёжности и опыта."
        section_title: "Fair treatment of suppliers"
        relevance_comment: "Прямой выбор по критериям эффективности."
      - excerpt_id: "CtoS02_implicit_scattered"
        original: "We are committed to dealing fairly with all our suppliers."
        translated_ru: "Мы обязуемся справедливо взаимодействовать со всеми нашими поставщиками."
        section_title: "Fair treatment of suppliers"
        relevance_comment: "Косвенное подтверждение равного подхода к поставщикам без прямого описания тендерного доступа."
      - excerpt_id: "CtoS03_explicit_section"
        original: "... never take unfair advantage of our suppliers through manipulation of our position or relationship ..."
        translated_ru: "... никогда не получаем несправедливых преимуществ за счёт поставщиков через манипулирование нашим положением или отношениями ..."
        section_title: "Fair treatment of suppliers"
        relevance_comment: "Прямой запрет злоупотребления рыночной/переговорной властью."
      - excerpt_id: "CtoS06_brief_mention"
        original: "... customers, suppliers and other business partners may share confidential information ..."
        translated_ru: "... клиенты, поставщики и другие деловые партнёры могут делиться конфиденциальной информацией ..."
        section_title: "Protection of third-party information"
        relevance_comment: "Краткий сигнал о выстраивании устойчивых партнёрских отношений через доверие и защиту данных."
      - excerpt_id: "CtoS07_explicit_section"
        original: "... never take unfair advantage ... through ... misrepresentation of material facts or any other unfair dealing practice."
        translated_ru: "... никогда не получаем несправедливых преимуществ ... через искажение существенных фактов или иные недобросовестные практики."
        section_title: "Fair treatment of suppliers"
        relevance_comment: "Прямой запрет манипулятивных практик при взаимодействии с поставщиками."
    other_principles: []

    key_excerpts:
      - excerpt_id: "WtoC01_brief_mention"
        original: "... no conflict between excellent business performance and high standard of integrity."
        translated_ru: "... нет конфликта между выдающейся бизнес-результативностью и высоким стандартом добросовестности."
        section_title: "Message from Chairman"
        relevance_comment: "Краткий акцент на качестве выполнения работы."
      - excerpt_id: "WtoC02_explicit_section"
        original: "All employees should protect the Company assets and ensure their efficient use."
        translated_ru: "Все сотрудники должны защищать активы компании и обеспечивать их эффективное использование."
        section_title: "Protecting The Company Assets"
        relevance_comment: "Прямое требование по активам компании."
      - excerpt_id: "WtoC03_explicit_section"
        original: "... such as confidential and proprietary information ... You should ... protect them from unauthorized use."
        translated_ru: "... включая конфиденциальную и проприетарную информацию ... Вы должны ... защищать их от несанкционированного использования."
        section_title: "Protecting The Company Assets"
        relevance_comment: "Прямое требование конфиденциальности и ИБ."
      - excerpt_id: "WtoC04_explicit_section"
        original: "The Company assets also include intangible assets, such as ... intellectual property ..."
        translated_ru: "Активы компании также включают нематериальные активы, такие как ... интеллектуальная собственность ..."
        section_title: "Protecting The Company Assets"
        relevance_comment: "Прямое признание и защита ИС компании."
      - excerpt_id: "WtoC05_explicit_section"
        original: "We are each responsible for following all of the laws that apply to our businesses."
        translated_ru: "Каждый из нас несёт ответственность за соблюдение всех законов, применимых к нашему бизнесу."
        section_title: "What law do I need to follow?"
        relevance_comment: "Прямое требование знания и соблюдения законов."
      - excerpt_id: "WtoC07_brief_mention"
        original: "INNOVATION We come up with ideas or create new products/tools/systems ..."
        translated_ru: "ИННОВАЦИИ: мы предлагаем идеи и создаём новые продукты/инструменты/системы ..."
        section_title: "Shared values"
        relevance_comment: "Краткая поддержка гибкости и адаптации через инновации."
      - excerpt_id: "WtoC08_brief_mention"
        original: "PERFORMANCE We deliver outstanding results."
        translated_ru: "РЕЗУЛЬТАТИВНОСТЬ: мы достигаем выдающихся результатов."
        section_title: "Company culture"
        relevance_comment: "Краткая нацеленность на результат."
      - excerpt_id: "WtoC09_brief_mention"
        original: "CONTINUOUS IMPROVEMENT We continuously enhance the capability of self ..."
        translated_ru: "ПОСТОЯННОЕ СОВЕРШЕНСТВОВАНИЕ: мы непрерывно повышаем собственные компетенции ..."
        section_title: "Shared values"
        relevance_comment: "Краткая поддержка профессионального развития."
      - excerpt_id: "WtoC10_explicit_section"
        original: "... it takes only one lapse and one person to blemish our reputation."
        translated_ru: "... достаточно одного сбоя и одного человека, чтобы запятнать нашу репутацию."
        section_title: "Message from Chairman"
        relevance_comment: "Прямое требование защищать репутацию компании."

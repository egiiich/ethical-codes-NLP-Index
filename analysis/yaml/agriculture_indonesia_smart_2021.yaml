    key_excerpts:
      - excerpt_id: "CtoI01_explicit_section"
        original: "The Company ensures that the Company’s shareholders are treated equitably and their rights are protected."
        translated_ru: "Компания обеспечивает равное отношение к акционерам и защиту их прав."
        section_title: "Shareholder Rights"
        relevance_comment: "Прямой принцип равного отношения к акционерам."
      - excerpt_id: "CtoI03_explicit_section"
        original: "... committed to providing shareholders with adequate, timely and sufficient information ..."
        translated_ru: "... обязуется предоставлять акционерам достаточную, своевременную и полную информацию ..."
        section_title: "Shareholder Rights"
        relevance_comment: "Прямое требование своевременного и полного раскрытия."
      - excerpt_id: "CtoI04_explicit_section"
        original: "... committed to observing high standards of corporate governance, to promote corporate transparency ..."
        translated_ru: "... привержена высоким стандартам корпоративного управления для продвижения корпоративной прозрачности ..."
        section_title: "Corporate Governance"
        relevance_comment: "Прямо закреплена прозрачность процедур управления."
      - excerpt_id: "CtoI05_explicit_section"
        original: "The laws of many countries and our own internal policies prohibit insider trading."
        translated_ru: "Законы многих стран и наши внутренние политики запрещают инсайдерскую торговлю."
        section_title: "Insider Trading"
        relevance_comment: "Прямой запрет инсайдерской торговли."
      - excerpt_id: "CtoI07_explicit_section"
        original: "... shareholders are treated equitably and their rights are protected."
        translated_ru: "... к акционерам относятся справедливо, и их права защищены."
        section_title: "Shareholder Rights"
        relevance_comment: "Прямое закрепление защиты, включая миноритариев."
    other_principles: []

    key_excerpts:
      - excerpt_id: "COMP01_explicit_section"
        original: "You may not obtain non-public information by illegal or unethical activities."
        translated_ru: "Вы не можете получать непубличную информацию незаконными или неэтичными способами."
        section_title: "Competitor information"
        relevance_comment: "Прямой запрет на получение конфиденциальной информации о конкурентах."
      - excerpt_id: "COMP03_explicit_section"
        original: "... avoid any discussions with competitors that could be viewed as an agreement to restrain trade ..."
        translated_ru: "... избегайте любых обсуждений с конкурентами, которые могут быть расценены как соглашение об ограничении торговли ..."
        section_title: "Competition and Antitrust Laws"
        relevance_comment: "Прямой запрет картельных договорённостей."
      - excerpt_id: "COMP05_brief_mention"
        original: "The Company is subject to competition laws ... We must always compete with integrity ..."
        translated_ru: "Компания подпадает под действие законов о конкуренции ... Мы всегда должны конкурировать добросовестно ..."
        section_title: "Competing Fairly"
        relevance_comment: "Краткий принцип уважительной и честной конкуренции."
      - excerpt_id: "COMP08_explicit_section"
        original: "... never disparage or discredit our competitors or their products or services."
        translated_ru: "... никогда не дискредитируем наших конкурентов или их продукты и услуги."
        section_title: "Sales and marketing"
        relevance_comment: "Прямой запрет порочащих заявлений о конкурентах."
      - excerpt_id: "COMP10_brief_mention"
        original: "If you are offered confidential or proprietary information ... you must immediately inform the Legal Department."
        translated_ru: "Если вам предлагают конфиденциальную или проприетарную информацию ... вы должны немедленно сообщить в юридический департамент."
        section_title: "Competitor information"
        relevance_comment: "Косвенная эскалация нарушений в юридическую функцию (внутренняя, не регуляторная)."
    other_principles: []

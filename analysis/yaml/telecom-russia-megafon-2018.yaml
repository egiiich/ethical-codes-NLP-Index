        section_title: "7. Защита активов"
        relevance_comment: "Прямое требование конфиденциальности и ИБ (WtoC03)."
      - excerpt_id: "WtoC05_explicit_section"
        original: "Сотрудники не должны совершать деяния ... нарушающие требования закона."
        translated_ru: "Сотрудники не должны совершать действия/бездействие, нарушающие закон."
        section_title: "5. Взаимоотношения с государством и обществом"
        relevance_comment: "Прямое требование соблюдения законов (WtoC05)."
      - excerpt_id: "WtoC10_explicit_section"
        original: "...в нерабочее время ... помнить о том, что последствия ... могут оказать негативное влияние на репутацию Компании."

    key_excerpts:
      - excerpt_id: "HOT01_explicit_section"
        original: "...задать вопрос/сообщить о нарушении можно ... либо ... по «прямой линии»."
        translated_ru: "О нарушении можно сообщить через руководителя, функции контроля или «прямую линию»."
        section_title: "10. Куда обращаться?"
        relevance_comment: "Прямо определены каналы обращения по нарушениям (HOT01)."
      - excerpt_id: "HOT02_explicit_section"
        original: "...Компания предпримет все возможные меры для ее сохранения [анонимности]..."
        translated_ru: "Компания обязуется предпринимать меры по сохранению анонимности заявителя."
        section_title: "10. Куда обращаться?"
        relevance_comment: "Прямое требование конфиденциальности данных заявителя (HOT02)."
      - excerpt_id: "HOT03_explicit_section"
        original: "...сотрудник, сообщивший о нарушениях, не будет ... подвергнут ... наказанию или преследованию..."
        translated_ru: "Сотрудник, сообщивший о нарушении, не подвергается наказанию или преследованию."
        section_title: "10. Куда обращаться?"
        relevance_comment: "Прямой запрет реталиации (HOT03)."
      - excerpt_id: "HOT04_explicit_section"
        original: "...обстоятельства могут вынудить сотрудника сохранить анонимность..."
        translated_ru: "Предусмотрена возможность анонимного обращения сотрудника."
        section_title: "10. Куда обращаться?"
        relevance_comment: "Прямая гарантия анонимного сообщения (HOT04)."
      - excerpt_id: "HOT06_brief_mention"
        original: "...в случае ... наличия информации о его нарушении, рекомендуется обращаться к своему непосредственному руководителю."
        translated_ru: "При наличии информации о нарушении рекомендуется обратиться к непосредственному руководителю."
        section_title: "10. Куда обращаться?"
        relevance_comment: "Краткое подтверждение обязанности/ожидания сообщения о нарушениях (HOT06)."

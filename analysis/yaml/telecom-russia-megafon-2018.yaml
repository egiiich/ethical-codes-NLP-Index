    key_excerpts:
      - excerpt_id: "COMP03_explicit_section"
        original: "Мы не вступаем в соглашения с конкурентами, которые приводят или могут привести к ограничению конкуренции и запрещены законом."
        translated_ru: "Мы не вступаем в запрещённые законом соглашения с конкурентами, ограничивающие конкуренцию."
        section_title: "4. Взаимоотношения с поставщиками, партнерами и конкурентами"
        relevance_comment: "Прямой запрет антиконкурентных соглашений (COMP03)."
      - excerpt_id: "COMP05_brief_mention"
        original: "Мы уважаем наших конкурентов и стараемся быть максимально объективными по отношению к ним..."
        translated_ru: "Мы уважаем конкурентов и придерживаемся объективности по отношению к ним."
        section_title: "4. Взаимоотношения с поставщиками, партнерами и конкурентами"
        relevance_comment: "Краткое подтверждение уважительного отношения к конкурентам (COMP05)."

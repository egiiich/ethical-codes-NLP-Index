    key_excerpts:
      - excerpt_id: "WtoC02_explicit_section"
        original: "Employees shall not use the Company's business opportunities, property, information, or other resources for their own or others' benefit."
        translated_ru: "Сотрудники не должны использовать бизнес-возможности, имущество, информацию или иные ресурсы Компании в личных интересах или интересах третьих лиц."
        section_title: "2.3 Protection of Trade Secrets"
        relevance_comment: "Прямой принцип защиты и целевого использования активов компании."
      - excerpt_id: "WtoC03_explicit_section"
        original: "Employees ... are prohibited from leaking commercial secrets to others."
        translated_ru: "Сотрудникам запрещено разглашать коммерческие тайны другим лицам."
        section_title: "2.3 Protection of Trade Secrets"
        relevance_comment: "Прямой принцип конфиденциальности и предотвращения утечек."
      - excerpt_id: "WtoC04_explicit_section"
        original: "The Company shall strengthen intellectual property protection ..."
        translated_ru: "Компания должна усиливать защиту интеллектуальной собственности ..."
        section_title: "2.4 Intellectual Property Rights"
        relevance_comment: "Прямое требование защищать ИС компании."
      - excerpt_id: "WtoC05_explicit_section"
        original: "Employees shall be obligated to maintain full awareness and adherence of this Code ... in addition to all applicable laws ..."
        translated_ru: "Сотрудники обязаны полностью осознавать и соблюдать этот Кодекс ... а также все применимые законы ..."
        section_title: "B. Compliance Responsibilities - Employee Responsibilities"
        relevance_comment: "Прямой принцип соблюдения законов и внутренних правил."
      - excerpt_id: "WtoC10_brief_mention"
        original: "Employees must be fully cognizant that any violation ... may ... damage to the Company's reputation."
        translated_ru: "Сотрудники должны полностью осознавать, что любое нарушение ... может ... нанести ущерб репутации Компании."
        section_title: "1.1 Compliance with National Laws"
        relevance_comment: "Краткий акцент на защите деловой репутации компании."

    key_excerpts:
      - excerpt_id: "CtoI03_brief_mention"
        original: "Financial record-keeping must be honest, objective and fair. Records and statements must accurately reflect the financial condition ..."
        translated_ru: "Финансовый учет должен быть честным, объективным и справедливым. Записи и отчеты должны точно отражать финансовое состояние ..."
        section_title: "1.1 Compliance with National Laws"
        relevance_comment: "Краткое подтверждение прозрачности и достоверности раскрытия финансовой информации."
      - excerpt_id: "CtoI05_explicit_section"
        original: "The Company prohibits any employee ... from utilizing the insider information to engage in or suggest others to engage in securities trading activities."
        translated_ru: "Компания запрещает любому сотруднику ... использовать инсайдерскую информацию для совершения или рекомендации операций с ценными бумагами."
        section_title: "2.1 Insider Trading"
        relevance_comment: "Прямой запрет инсайдерской торговли."

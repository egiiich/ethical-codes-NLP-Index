    key_excerpts:
      - excerpt_id: "HOT01_brief_mention"
        original: "The following communication channels are available to any department, employee, business partner or other parties ..."
        translated_ru: "Следующие каналы коммуникации доступны любому подразделению, сотруднику, бизнес-партнеру или иной стороне ..."
        section_title: "C. Inquiries, Reporting and Handling Violations"
        relevance_comment: "Краткое подтверждение широкого доступа к каналам сообщений."
      - excerpt_id: "HOT02_explicit_section"
        original: "The identity of the whistleblowers, content of the reports, subsequent investigations, witnesses ... shall be treated with strict confidentiality."
        translated_ru: "Личность информаторов, содержание сообщений, последующие расследования, свидетели ... подлежат строгой конфиденциальности."
        section_title: "C. Inquiries, Reporting and Handling Violations"
        relevance_comment: "Прямая гарантия конфиденциальности материалов расследования."
      - excerpt_id: "HOT03_explicit_section"
        original: "No persons or entities shall impede whistleblowing activities or retaliate against whistleblowers, investigators, witnesses or their relatives ..."
        translated_ru: "Никакие лица или организации не должны препятствовать информированию или преследовать информаторов, расследователей, свидетелей или их родственников ..."
        section_title: "C. Inquiries, Reporting and Handling Violations"
        relevance_comment: "Прямой запрет преследования заявителей и участников расследований."
      - excerpt_id: "HOT05_brief_mention"
        original: "Any substantiated violation of this Code ... shall result in disciplinary action commensurate with the violation ..."
        translated_ru: "Любое подтвержденное нарушение настоящего Кодекса ... влечет дисциплинарные меры, соразмерные нарушению ..."
        section_title: "C. Inquiries, Reporting and Handling Violations"
        relevance_comment: "Краткое подтверждение принципа обязательного реагирования на нарушения."
      - excerpt_id: "HOT06_explicit_section"
        original: "Employees have a duty to report any known or suspected violation of this Code ... in a timely manner ..."
        translated_ru: "Сотрудники обязаны своевременно сообщать о любом известном или предполагаемом нарушении этого Кодекса ..."
        section_title: "B. Compliance Responsibilities - Employee Responsibilities"
        relevance_comment: "Прямая обязанность сообщать о нарушениях/подозрениях."

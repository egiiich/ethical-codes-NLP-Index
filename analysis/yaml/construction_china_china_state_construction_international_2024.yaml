    key_excerpts:
      - excerpt_id: "COMP01_explicit_section"
        original: "Employees should comply with the Company's commercial secret protection regulations ... and are prohibited from leaking commercial secrets to others."
        translated_ru: "Сотрудники должны соблюдать правила защиты коммерческой тайны компании ... и им запрещено раскрывать коммерческие секреты другим лицам."
        section_title: "2.3 Protection of Trade Secrets"
        relevance_comment: "Прямой запрет на недобросовестное получение/раскрытие конфиденциальной информации в конкурентной среде."
      - excerpt_id: "COMP03_explicit_section"
        original: "Employees shall not collude ... including bid-rigging, forming price alliances, ... dividing markets ..."
        translated_ru: "Сотрудники не должны вступать в сговор ... включая сговор на торгах, ценовые альянсы ... раздел рынков ..."
        section_title: "1.2 Fair Competition"
        relevance_comment: "Прямой запрет картельного поведения."
      - excerpt_id: "COMP05_brief_mention"
        original: "Employees shall comply with ... laws ... for maintaining fair competition in the market."
        translated_ru: "Сотрудники должны соблюдать ... требования законодательства ... для поддержания честной конкуренции на рынке."
        section_title: "1.1 Adherence to Laws and Regulations"
        relevance_comment: "Краткая фиксация принципа добросовестной конкуренции."
      - excerpt_id: "COMP07_brief_mention"
        original: "The Company shall respect valid intellectual property rights and avoid unauthorized use of intellectual property belonging to others."
        translated_ru: "Компания должна уважать действующие права интеллектуальной собственности и избегать несанкционированного использования ИС, принадлежащей другим."
        section_title: "2.4 Intellectual Property Rights"
        relevance_comment: "Краткая фиксация уважения ИС конкурентов и иных сторон."
    other_principles: []

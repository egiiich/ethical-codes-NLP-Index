    key_excerpts:
      - excerpt_id: "CtoS01_explicit_section"
        original: "Procurement of goods or services must be evaluated on the basis of superiority in price, quality, performance, delivery and suitability."
        translated_ru: "Закупка товаров или услуг должна оцениваться на основе превосходства по цене, качеству, производительности, срокам поставки и пригодности."
        section_title: "3.2 With Suppliers"
        relevance_comment: "Прямой принцип выбора поставщиков по объективной эффективности."
      - excerpt_id: "CtoS03_brief_mention"
        original: "All forms of bribery and kickbacks are strictly prohibited, as are any conflicts of interest between the Company and its subcontractors and suppliers."
        translated_ru: "Все формы взяточничества и откатов строго запрещены, как и любые конфликты интересов между Компанией и ее субподрядчиками и поставщиками."
        section_title: "3.2 With Suppliers"
        relevance_comment: "Краткая фиксация недопустимости злоупотреблений во взаимоотношениях с поставщиками."
    other_principles: []

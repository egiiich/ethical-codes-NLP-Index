    key_excerpts:
      - excerpt_id: "HOT01_explicit_section"
        original: "Each of Officers and Employees ... is expected to notify the CEO promptly of any ... violation of this Code..."
        translated_ru: "Каждый сотрудник и руководитель должен оперативно уведомлять CEO о любых нарушениях Кодекса..."
        section_title: "IV. Enforcement of this Code"
        relevance_comment: "Прямо закреплен канал подачи сообщений (HOT01)."
      - excerpt_id: "HOT02_explicit_section"
        original: "...its identities shall be protected to the extent consistent with law and this Code."
        translated_ru: "...их личности должны быть защищены в пределах, согласующихся с законом и данным Кодексом."
        section_title: "IV. Enforcement of this Code"
        relevance_comment: "Прямое требование защиты конфиденциальности заявителя (HOT02)."
      - excerpt_id: "HOT03_explicit_section"
        original: "...no person who made such report in good faith shall be retaliated against..."
        translated_ru: "...ни одно лицо, добросовестно сделавшее сообщение, не должно подвергаться преследованию..."
        section_title: "IV. Enforcement of this Code"
        relevance_comment: "Прямой запрет реталиации (HOT03)."
      - excerpt_id: "HOT04_explicit_section"
        original: "...by the procedure of the confidential, anonymous submission"
        translated_ru: "...посредством процедуры конфиденциального анонимного сообщения."
        section_title: "IV. Enforcement of this Code"
        relevance_comment: "Прямая гарантия анонимного канала (HOT04)."
      - excerpt_id: "HOT05_explicit_section"
        original: "The CEO is responsible for investigating any potential or existing violation..."
        translated_ru: "CEO несет ответственность за расследование любых потенциальных или фактических нарушений..."
        section_title: "IV. Enforcement of this Code"
        relevance_comment: "Прямое обязательное расследование и реагирование (HOT05)."
      - excerpt_id: "HOT06_explicit_section"
        original: "...to encourage the prompt reporting of any illegal or unethical behaviors."
        translated_ru: "...поощрять оперативное сообщение о любых незаконных или неэтичных действиях."
        section_title: "II. Purpose of this Code"
        relevance_comment: "Прямая обязанность/поощрение сообщения о нарушениях (HOT06)."

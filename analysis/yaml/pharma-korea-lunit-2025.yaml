    key_excerpts:
      - excerpt_id: "HOT01_explicit_section"
        original: "The Company provides secure reporting channels"
        translated_ru: "Компания предоставляет защищённые каналы для сообщений о нарушениях."
        section_title: "8.5 Non-Retaliation Policy and Whistleblower Protection"
        relevance_comment: "Доступ к горячей линии для работников."
      - excerpt_id: "HOT03_explicit_section"
        original: "The Company’s whistleblower protection policy ensures that no reporter faces retaliation."
        translated_ru: "Политика защиты информаторов гарантирует отсутствие преследования за сообщение."
        section_title: "8.5 FAQ 1"
        relevance_comment: "Прямой запрет репрессий."
      - excerpt_id: "HOT04_explicit_section"
        original: "The Company operates an anonymous whistleblower hotline, ensuring the protection of the reporter’s identity."
        translated_ru: "Компания поддерживает анонимную горячую линию, защищающую личность заявителя."
        section_title: "8.5 FAQ 2"
        relevance_comment: "Прямая гарантия анонимности."
      - excerpt_id: "HOT05_explicit_section"
        original: "All potential violations of this Code are taken seriously, thoroughly investigated, and addressed with appropriate corrective and preventive measures."
        translated_ru: "Все потенциальные нарушения рассматриваются серьёзно, тщательно расследуются и сопровождаются корректирующими и превентивными мерами."
        section_title: "8.5 Non-Retaliation Policy and Whistleblower Protection"
        relevance_comment: "Принцип обязательного реагирования и расследования."
      - excerpt_id: "HOT06_brief_mention"
        original: "Employees have both the right and the responsibility to report ethical concerns or legal violations they witness."
        translated_ru: "Работники имеют право и обязанность сообщать об этических и правовых нарушениях."
        section_title: "8.5 Non-Retaliation Policy and Whistleblower Protection"
        relevance_comment: "Обязанность сообщать о нарушениях."

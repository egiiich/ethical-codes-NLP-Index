    key_excerpts:
      - excerpt_id: "CtoS01_brief_mention"
        original: "The Company ensures transparency in all dealings, maintains fair terms in contracts"
        translated_ru: "Компания обеспечивает прозрачность сделок и справедливые договорные условия с партнёрами."
        section_title: "8.4 FAQ 2"
        relevance_comment: "Краткий ориентир на добросовестный выбор/условия взаимодействия с поставщиками."
      - excerpt_id: "CtoS03_explicit_section"
        original: "The Company maintains transparency and fairness in all transactions with stakeholders and prohibits unethical practices aimed at obtaining monetary gains or undue advantages."
        translated_ru: "Компания поддерживает прозрачность и справедливость во всех сделках и запрещает практики, направленные на получение неправомерных выгод."
        section_title: "8.4 Prohibition of Unfair Transactions"
        relevance_comment: "Прямой отказ от злоупотреблений в отношениях с контрагентами."
      - excerpt_id: "CtoS06_brief_mention"
        original: "Mutual respect and ethical partnerships"
        translated_ru: "В кодексе отдельный раздел посвящён взаимному уважению и этичному партнёрству."
        section_title: "5.4 Table of Contents"
        relevance_comment: "Краткая ориентация на устойчивое партнёрство."
      - excerpt_id: "CtoS07_explicit_section"
        original: "All bids and contracts must be conducted through transparent and reasonable procedures, strictly excluding any illegal or unethical transactions during contract execution or bidding processes."
        translated_ru: "Все тендеры и контракты должны проходить по прозрачным и разумным процедурам, исключая незаконные и неэтичные действия."
        section_title: "8.4 Prohibition of Unfair Transactions"
        relevance_comment: "Прямой запрет манипуляций условиями тендера/контракта."

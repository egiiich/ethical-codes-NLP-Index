        relevance_comment: "Подтверждение статуса implicit_scattered для COMP01."
      - excerpt_id: "COMP03_explicit_section"
        original: "Компания и Группа VEON соблюдает применимое законодательство о защите конкуренции ... Сговор, соглашения о ценах, разделении рынков, клиентах или территориях запрещены."
        translated_ru: "Кодекс прямо запрещает антиконкурентный сговор (цены/рынки/территории)."
        section_title: "5.3. Добросовестность"
        relevance_comment: "Подтверждение статуса explicit_section для COMP03."
      - excerpt_id: "COMP05_brief_mention"
        original: "Мы ... относимся к нашим клиентам, конкурентам и бизнес-партнерам объективно и беспристрастно и уважаем их права."
        translated_ru: "Есть прямое упоминание уважительного и беспристрастного отношения к конкурентам."
        section_title: "5.3. Добросовестность"
        relevance_comment: "Подтверждение статуса brief_mention для COMP05."

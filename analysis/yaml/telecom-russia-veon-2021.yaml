        original: "Мы не стремимся получить неправомерное преимущество перед кем бы то ни было путем ... злоупотребления конфиденциальной информацией ..."
        translated_ru: "Кодекс запрещает получать преимущество через злоупотребление конфиденциальной информацией, что косвенно покрывает недопустимость добычи конфиденциальных данных конкурентов."

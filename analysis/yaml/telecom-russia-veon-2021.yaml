    key_excerpts:
      - excerpt_id: "HOT01_explicit_section"
        original: "Компания и VEON серьезно относятся к сообщениям о возможных нарушениях Кодекса ... оперативного и профессионального рассмотрения полученных сообщений."
        translated_ru: "Компания закрепляет обязательство принимать сообщения и профессионально их рассматривать."
        section_title: "9.2. Кому сообщать о проблеме?"
        relevance_comment: "Подтверждение статуса explicit_section для HOT01."
      - excerpt_id: "HOT02_explicit_section"
        original: "Компания и VEON ... делает все возможное для сохранения конфиденциальности ..."
        translated_ru: "Закреплена конфиденциальность обработки обращений."
        section_title: "9.2. Кому сообщать о проблеме?"
        relevance_comment: "Подтверждение статуса explicit_section для HOT02."
      - excerpt_id: "HOT03_explicit_section"
        original: "Компания и Группа VEON не приемлют каких-либо мер преследования по отношению к лицу, добросовестно сообщившему о нарушении ..."
        translated_ru: "Кодекс прямо запрещает реталиацию против заявителей."
        section_title: "9.5. Обеспечена ли Вам защита от преследования?"
        relevance_comment: "Подтверждение статуса explicit_section для HOT03."
      - excerpt_id: "HOT04_explicit_section"
        original: "При обращении на Горячую линию Speak Up ... Вы можете сохранить свою анонимность."
        translated_ru: "Прямо закреплена возможность анонимного сообщения."
        section_title: "9.3. Допускается ли анонимное сообщение о нарушении?"
        relevance_comment: "Подтверждение статуса explicit_section для HOT04."
      - excerpt_id: "HOT05_implicit_scattered"
        original: "Независимо от того, как Вы решите передать информацию о нарушении, Компания и Группа VEON рассмотрит Ваше сообщение и примет необходимые меры."
        translated_ru: "Для каждого сообщения декларируется рассмотрение и меры, что соответствует принципу обязательного реагирования."
        section_title: "9.3. Допускается ли анонимное сообщение о нарушении?"
        relevance_comment: "Подтверждение статуса implicit_scattered для HOT05."
      - excerpt_id: "HOT06_brief_mention"
        original: "Вы должны немедленно сообщить об этом ... в Дирекцию по деловой этике и комплаенсу или по Горячей линии SpeakUp."
        translated_ru: "Кодекс содержит обязанность сообщать о нарушении по линии комплаенса/горячей линии."
        section_title: "9.7. Вопросы и ответы"
        relevance_comment: "Подтверждение статуса brief_mention для HOT06."

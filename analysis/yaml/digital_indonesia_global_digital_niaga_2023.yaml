    key_excerpts:
      - excerpt_id: "WtoC01_brief_mention"
        original: "... required to perform their duties in good faith, full of responsibility, and with prudence."
        translated_ru: "Сотрудники обязаны выполнять обязанности добросовестно, ответственно и осмотрительно."
        section_title: "I. Individual Responsibilities"
        relevance_comment: "Краткое требование качественного и ответственного исполнения работы."
      - excerpt_id: "WtoC02_explicit_section"
        original: "To maintain and use all the company’s data, information, assets and or facilities for the Company’s benefit, not for personal or certain parties’ interests."
        translated_ru: "Данные, информация, активы и ресурсы компании должны использоваться в интересах компании, а не в личных интересах."
        section_title: "I. Individual Responsibilities"
        relevance_comment: "Прямой принцип сохранности и целевого использования активов компании."
      - excerpt_id: "WtoC03_explicit_section"
        original: "... all employees are responsible for maintaining confidentiality and prohibited from misusing the Company's Confidential Information."
        translated_ru: "Все сотрудники обязаны сохранять конфиденциальность и не вправе злоупотреблять конфиденциальной информацией компании."
        section_title: "I. Individual Responsibilities"
        relevance_comment: "Прямое требование информационной конфиденциальности."
      - excerpt_id: "WtoC05_explicit_section"
        original: "This policy requires every individual ... to comply with all applicable laws and regulations."
        translated_ru: "Политика требует от каждого сотрудника соблюдения всех применимых законов и нормативных требований."
        section_title: "Introduction"
        relevance_comment: "Прямое требование соблюдения законодательства."
      - excerpt_id: "WtoC10_explicit_section"
        original: "To maintain the Company’s good name in their attitudes and conduct, both outside and inside the Company."
        translated_ru: "Сотрудники обязаны поддерживать доброе имя компании своим поведением как внутри, так и вне компании."
        section_title: "I. Individual Responsibilities"
        relevance_comment: "Прямой принцип защиты деловой репутации компании."

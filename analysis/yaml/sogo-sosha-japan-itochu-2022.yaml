      - excerpt_id: "CtoP04_explicit_section"
        original: "...we will contribute to the development of local economies through our business activities."
        translated_ru: "...мы будем содействовать развитию местных экономик через нашу деятельность."
        section_title: "7. Contribution to Society"
        relevance_comment: "Прямой вклад в развитие регионов присутствия (CtoP04)."
      - excerpt_id: "CtoP10_implicit_scattered"
        original: "We will collaborate and cooperate with a wide range of stakeholders, including NPOs, NGOs, local communities, governments, and UN agencies..."

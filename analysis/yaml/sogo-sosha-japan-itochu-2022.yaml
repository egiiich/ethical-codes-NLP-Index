    key_excerpts:
      - excerpt_id: "WtoC01_brief_mention"
        original: "All of our executives and employees will act with high ethical standards..."
        translated_ru: "Все руководители и сотрудники будут действовать в соответствии с высокими этическими стандартами."
        section_title: "Code of Ethical Conduct"
        relevance_comment: "Краткое требование к качеству и добросовестности исполнения обязанностей (WtoC01)."
      - excerpt_id: "WtoC03_explicit_section"
        original: "Employees will undertake the proper handling, management, protection and maintenance of information in accordance with the Information Security Policy."
        translated_ru: "Сотрудники обязаны надлежащим образом обращаться с информацией, управлять, защищать и сохранять её согласно Политике ИБ."
        section_title: "6. Management and Provision of Information"
        relevance_comment: "Прямое требование конфиденциальности и инфобезопасности (WtoC03)."
      - excerpt_id: "WtoC04_explicit_section"
        original: "The company will appropriately protect and manage its own intellectual property rights..."
        translated_ru: "Компания будет надлежащим образом защищать и управлять собственными правами интеллектуальной собственности."
        section_title: "6. Management and Provision of Information"
        relevance_comment: "Прямое требование защиты ИС компании (WtoC04)."
      - excerpt_id: "WtoC05_explicit_section"
        original: "...comply with all relevant domestic and international laws and regulations..."
        translated_ru: "...соблюдать все применимые внутренние и международные законы и нормативные акты..."
        section_title: "Code of Ethical Conduct"
        relevance_comment: "Прямое требование соблюдения законодательства (WtoC05)."
      - excerpt_id: "WtoC10_explicit_section"
        original: "Employees will not engage in activities that conflict with the interests of the company..."
        translated_ru: "Сотрудники не будут участвовать в действиях, которые противоречат интересам компании."
        section_title: "5. Fair Business Practices"
        relevance_comment: "Прямой запрет конфликта интересов и вреда интересам компании (WtoC10)."

    key_excerpts:
      - excerpt_id: "COMP03_explicit_section"
        original: "We will conduct business practices in compliance with competition laws (antitrust laws) and related laws and regulations in each country and region."
        translated_ru: "Мы будем вести деловые практики в соответствии с антимонопольными и связанными законами каждой страны и региона."
        section_title: "5. Fair Business Practices"
        relevance_comment: "Прямое требование антимонопольного соблюдения (COMP03)."
      - excerpt_id: "COMP07_explicit_section"
        original: "...will not engage in business activities that infringe on intellectual property rights held by others."
        translated_ru: "...не будем вести деятельность, нарушающую права интеллектуальной собственности других лиц."
        section_title: "6. Management and Provision of Information"
        relevance_comment: "Прямое уважение ИС третьих лиц, включая конкурентов (COMP07)."

    key_excerpts:
      - excerpt_id: "HOT01_explicit_section"
        original: "...whistle-blowing using a real name or anonymously is permitted..."
        translated_ru: "...информирование о нарушениях под своим именем или анонимно разрешено..."
        section_title: "9. Reporting and Consultation"
        relevance_comment: "Прямо закреплён доступ к каналу сообщений о нарушениях (HOT01)."
      - excerpt_id: "HOT02_implicit_scattered"
        original: "...if this conduct constitutes or is likely to constitute a compliance case, it will be promptly reported in accordance with the ITOCHU Group Compliance Program."
        translated_ru: "...если поведение является или может являться комплаенс-инцидентом, о нём незамедлительно сообщают по Программе комплаенса ITOCHU Group."
        section_title: "9. Reporting and Consultation"
        relevance_comment: "Есть процедурное управление материалами расследования по комплаенс-программе (HOT02)."
      - excerpt_id: "HOT03_explicit_section"
        original: "...disadvantageous treatment of the whistle-blower or investigation partner on the grounds of such cases is prohibited."
        translated_ru: "...запрещено неблагоприятное обращение в отношении информатора или участника расследования."
        section_title: "9. Reporting and Consultation"
        relevance_comment: "Прямой запрет реталиации (HOT03)."
      - excerpt_id: "HOT04_explicit_section"
        original: "...whistle-blowing using a real name or anonymously is permitted..."
        translated_ru: "...разрешены как именные, так и анонимные сообщения..."
        section_title: "9. Reporting and Consultation"
        relevance_comment: "Прямая гарантия анонимного канала (HOT04)."
      - excerpt_id: "HOT05_implicit_scattered"
        original: "...will be promptly reported in accordance with the ITOCHU Group Compliance Program."
        translated_ru: "...будет оперативно сообщено в соответствии с Программой комплаенса ITOCHU Group."
        section_title: "9. Reporting and Consultation"
        relevance_comment: "Косвенно отражает обязательность реагирования в рамках комплаенс-процедур (HOT05)."
      - excerpt_id: "HOT06_explicit_section"
        original: "If employees discover ... conduct that violates or may violate the Code, they will immediately report to their superior."
        translated_ru: "Если сотрудники обнаружили поведение, нарушающее или потенциально нарушающее Кодекс, они должны немедленно сообщить руководителю."
        section_title: "9. Reporting and Consultation"
        relevance_comment: "Прямая обязанность сообщать о нарушениях (HOT06)."

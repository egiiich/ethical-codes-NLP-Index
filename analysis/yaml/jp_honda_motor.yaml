    key_excerpts:
      - excerpt_id: "honda_comp_01"
        original: "Required conduct I will comply with competition laws (antitrust laws)."
        translated_ru: "Требуемое поведение: я буду соблюдать законы о конкуренции (антимонопольные законы)."
        section_title: "Compliance with Competition Laws"
        relevance_comment: "Прямое и недвусмысленное требование соблюдения антимонопольного законодательства."
      - excerpt_id: "honda_comp_02"
        original: "Honda will engage in free and open competition with competitors to maintain its stance as a company trusted by customers and society."
        translated_ru: "Honda будет вести свободную и открытую конкуренцию с конкурентами, чтобы сохранять репутацию компании, которой доверяют клиенты и общество."
        section_title: "Compliance with Competition Laws"
        relevance_comment: "Фиксирует принцип добросовестной конкуренции, но без конкретных запретов на дискредитацию/ложные заявления."
      - excerpt_id: "honda_comp_03"
        original: "If I become aware of any violation or possible violation of laws, regulations or company policies ... consult as necessary with my manager, the legal department, or the compliance & ethics contact line*."
        translated_ru: "Если мне станет известно о любом нарушении или возможном нарушении законов, правил или политик компании ... я при необходимости обращусь к руководителю, в юридический отдел или на линию compliance & ethics*."
        section_title: "Reporting Non-compliance Incidents"
        relevance_comment: "Одновременно покрывает обязанность эскалации в legal/compliance и обязанность сообщать о нарушениях."
      - excerpt_id: "honda_comp_04"
        original: "In cases where violations or possible violations of the Code are found ... taking actions such as reporting to the legal department or compliance & ethics contact line."
        translated_ru: "Когда выявлены нарушения или возможные нарушения Кодекса ... необходимо предпринимать действия, включая сообщение в юридический отдел или на линию compliance & ethics."
        section_title: "Responsibilities of the Management"
        relevance_comment: "Подтверждает обязательность сообщения/эскалации на уровне управленцев."
      - excerpt_id: "honda_comp_05"
        original: "I will carry out appropriate procedures in accordance with company policies in selecting business partners, and will comply with laws, regulations, and company policies related to business transactions."
        translated_ru: "Я буду выполнять надлежащие процедуры в соответствии с политиками компании при выборе бизнес-партнёров и соблюдать законы, правила и политики компании, связанные с деловыми операциями."
        section_title: "Sound Business Practices"
        relevance_comment: "Косвенно закрепляет внутренние процедуры и контроль в контексте деловых взаимодействий."

analyst_summary_ru: "По теме отношений с конкурентами у Honda зафиксированы сильные базовые требования: соблюдение антимонопольного законодательства, добросовестная конкуренция, эскалация в legal/compliance и обязанность репортинга. Специфические анти-картельные запреты (price-fixing, market allocation, bid-rigging, sensitive info exchange) в явном виде не обнаружены."

      - excerpt_id: "WtoC05_explicit_section"
        original: "We will comply with laws and regulations, and act with the highest ethical standards."
        translated_ru: "Сотрудники обязаны соблюдать законы и действовать по высоким этическим стандартам."
        section_title: "Five Key Principles"
        relevance_comment: "Прямое требование правового комплаенса."
      - excerpt_id: "WtoC10_explicit_section"
        original: "We shall not perform any act that may injure the reputation and/or the credibility of this company."
        translated_ru: "Сотрудники обязаны воздерживаться от действий, наносящих ущерб репутации компании."

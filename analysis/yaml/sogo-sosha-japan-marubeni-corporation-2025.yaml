        original: "We shall not use the company’s assets for our personal benefit."
        translated_ru: "Сотрудникам прямо запрещено использовать активы компании в личных целях."
        section_title: "Drawing Lines between Official and Private Affairs"
        relevance_comment: "Прямой принцип защиты активов компании."
      - excerpt_id: "WtoC03_explicit_section"
        original: "Any and all confidential information shall be appropriately managed ... measures shall be taken to prevent the divulging of such confidential information."

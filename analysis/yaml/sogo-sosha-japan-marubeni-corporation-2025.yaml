    key_excerpts:
      - excerpt_id: "HOT01_explicit_section"
        original: "Can employees of the Group Companies use the “Marubeni Anti-Corruption Hotline”? ... We established the “Marubeni Anti-Corruption Hotline” as a Compliance Access Point for the entire Marubeni Group."
        translated_ru: "Горячая линия доступна работникам всей группы Marubeni, включая дочерние компании."
        section_title: "Q&A Regarding the Compliance Access Point"
        relevance_comment: "Прямое подтверждение равного доступа к каналу сообщений."
      - excerpt_id: "HOT02_explicit_section"
        original: "We strictly protect your confidentiality."
        translated_ru: "Кодекс прямо требует строгой защиты конфиденциальности заявителя и материалов дела."
        section_title: "Compliance Access Point process"
        relevance_comment: "Прямой принцип конфиденциальности."
      - excerpt_id: "HOT03_explicit_section"
        original: "The whistleblower will not be disadvantaged in any way ... We will not tolerate any retaliation against you for your honest report or consultation."
        translated_ru: "Кодекс прямо запрещает любую форму реталиации против добросовестного заявителя."
        section_title: "Compliance Access Point process"
        relevance_comment: "Прямой запрет преследования заявителей."
      - excerpt_id: "HOT04_explicit_section"
        original: "the “Marubeni Anti-Corruption Hotline” accepts anonymous report or consultation"
        translated_ru: "Горячая линия принимает анонимные сообщения."
        section_title: "Q&A Regarding the Compliance Access Point 33"
        relevance_comment: "Прямая гарантия анонимности."
      - excerpt_id: "HOT05_explicit_section"
        original: "We will implement corrective measures and measures to prevent recurrence based on the result of our fact-finding."
        translated_ru: "После расследования компания обязуется принимать корректирующие меры и меры недопущения повторения."
        section_title: "Compliance Access Point process"
        relevance_comment: "Прямой принцип обязательного реагирования."
      - excerpt_id: "HOT06_explicit_section"
        original: "We will not ignore concerns or problems that come to our attention, but will always raise them with our supervisor or the relevant division."
        translated_ru: "Сотрудники обязаны не игнорировать проблемы и всегда поднимать их через установленные каналы."
        section_title: "Reporting 18"
        relevance_comment: "Прямая обязанность сообщать о нарушениях."
      - excerpt_id: "HOT09_brief_mention"
        original: "The Reported Person has the right to have access to relevant information ... and rectify it if it is inaccurate."
        translated_ru: "Кодекс закрепляет процедурные права участников дела на доступ и уточнение информации до принятия решения."
        section_title: "Notice to the Reported Person"
        relevance_comment: "Краткое подтверждение процессуальных прав сторон."

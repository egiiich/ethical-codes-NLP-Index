    key_excerpts:
      - excerpt_id: "WtoC02_explicit_section"
        original: "Мы не используем имущество и активы Банка не по назначению, а также в личных целях..."
        translated_ru: "Запрещено использовать активы Банка в личных целях."
        section_title: "3.1. Бережное отношение к имуществу и активам"
        relevance_comment: "Прямой стандарт по активам компании."
      - excerpt_id: "WtoC03_explicit_section"
        original: "...обязанностью каждого из нас является защита таких сведений."
        translated_ru: "Каждый сотрудник обязан защищать конфиденциальные сведения."
        section_title: "3.2. Соблюдение конфиденциальности"
        relevance_comment: "Прямое требование конфиденциальности."
      - excerpt_id: "WtoC05_explicit_section"
        original: "Во всех регионах Банк осуществляет свою деятельность в соответствии с требованиями законодательства."
        translated_ru: "Работа Банка и сотрудников должна соответствовать законодательству."
        section_title: "6. Предупреждение нарушения правил"
        relevance_comment: "Прямой правовой комплаенс."
      - excerpt_id: "WtoC07_explicit_section"
        original: "...мы неукоснительно соблюдаем все требования ... направленных на предотвращение конфликта интересов..."
        translated_ru: "Сотрудники обязаны предотвращать и урегулировать конфликт интересов."
        section_title: "6.3. Предотвращение и урегулирование конфликта интересов"
        relevance_comment: "Прямой запрет конфликтов интересов."
      - excerpt_id: "WtoC09_explicit_section"
        original: "Владея инсайдерской информацией, мы не должны использовать ее для извлечения личной выгоды."
        translated_ru: "Инсайдерскую информацию запрещено использовать для личной выгоды."
        section_title: "6.4. Предотвращение использования инсайдерской информации"
        relevance_comment: "Прямое ограничение злоупотреблений."
      - excerpt_id: "WtoC10_explicit_section"
        original: "Деловая репутация, авторитет... Банка зависят от каждого из нас."
        translated_ru: "Каждый сотрудник отвечает за деловую репутацию Банка."
        section_title: "3. Забота об интересах и репутации Банка"
        relevance_comment: "Прямое требование беречь репутацию."

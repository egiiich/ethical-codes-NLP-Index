    key_excerpts:
      - excerpt_id: "HOT01_explicit_section"
        original: "Если вы усомнились в законности действий работников или деловых партнеров Банка, следует отправить сообщение по адресу trust_line@vbrr.ru ... на «Линию доверия» ВБРР."
        translated_ru: "Если есть сомнения в законности действий, кодекс прямо дает доступ к линии доверия."
        section_title: "7.2. Обратная связь"
        relevance_comment: "Наличие канала для сообщений о нарушениях."
      - excerpt_id: "HOT03_explicit_section"
        original: "Каждый сотрудник... обязан сообщить об этом непосредственному руководителю... или эксперту по этике Банка."
        translated_ru: "Сотрудник обязан эскалировать нарушения через установленные каналы."
        section_title: "7.1. Соблюдение норм кодекса"
        relevance_comment: "Обязанность сообщать о нарушениях."
      - excerpt_id: "HOT04_explicit_section"
        original: "...каждому заявителю гарантируются конфиденциальность информации о факте его заявления..."
        translated_ru: "Заявителю гарантируется конфиденциальность факта обращения."
        section_title: "7.1. Соблюдение норм кодекса"
        relevance_comment: "Защита конфиденциальности заявителя."
      - excerpt_id: "HOT05_brief_mention"
        original: "...к сотруднику, нарушившему Кодекс, могут быть применены меры дисциплинарной ответственности."
        translated_ru: "Кодекс кратко фиксирует, что по обращениям применяются меры ответственности."
        section_title: "7.1. Соблюдение норм кодекса"
        relevance_comment: "Есть реакция на нарушения, но процедура расследования раскрыта кратко."
      - excerpt_id: "HOT06_explicit_section"
        original: "...гарантируются ... отсутствие какого бы то ни было преследования."
        translated_ru: "Кодекс прямо запрещает преследование добросовестного заявителя."
        section_title: "7.1. Соблюдение норм кодекса"
        relevance_comment: "Антирепрессивная гарантия."
      - excerpt_id: "HOT08_explicit_section"
        original: "...следует отправить сообщение по адресу trust_line@vbrr.ru или позвонить ... на «Линию доверия» ВБРР."
        translated_ru: "Указаны конкретные email и телефон канала сообщений."
        section_title: "7.2. Обратная связь"
        relevance_comment: "Описаны практические каналы подачи сообщений."

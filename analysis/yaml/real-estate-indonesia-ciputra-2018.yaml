    key_excerpts:
      - excerpt_id: "HOT01_explicit_section"
        original: "Expressing Opinions, Providing Inputs and Reporting Negligence and Violation."
        translated_ru: "Сотрудникам прямо предоставлен канал для сообщений о нарушениях и проблемах."
        section_title: "Article 8 Employee Aspirations"
        relevance_comment: "Явно установлен доступ работников к каналу обращений."
      - excerpt_id: "HOT02_explicit_section"
        original: "The Company shall protect the confidentiality of the individuals reporting the violations of law, Company Policies or Code of Conduct."
        translated_ru: "Компания обязуется защищать конфиденциальность лиц, сообщающих о нарушениях."
        section_title: "Article 8 Employee Aspirations"
        relevance_comment: "Прямая гарантия конфиденциальности материалов и личности заявителя."
      - excerpt_id: "HOT03_explicit_section"
        original: "Avoiding the Conduct of Retaliation against the Informer ... Parties who make a threat will be imposed disciplinary sanction up to the termination of employment."
        translated_ru: "Реталиация против информатора запрещена и наказывается вплоть до увольнения."
        section_title: "Article 8 Employee Aspirations"
        relevance_comment: "Прямой запрет преследования заявителей."
      - excerpt_id: "HOT04_brief_mention"
        original: "the Individual concerned may ask for its name to be undisclosed."
        translated_ru: "Заявитель может попросить не раскрывать его имя."
        section_title: "Article 8 Employee Aspirations"
        relevance_comment: "Краткая гарантия анонимности по запросу."
      - excerpt_id: "HOT05_explicit_section"
        original: "The Company ... reports ... by forming an investigation team. Should a violation is found, the Company will take action."
        translated_ru: "Компания обязуется расследовать сообщения и принимать меры при подтверждении нарушения."
        section_title: "Article 8 Employee Aspirations"
        relevance_comment: "Принцип обязательного реагирования закреплен прямо."
      - excerpt_id: "HOT06_brief_mention"
        original: "All Management and Employees are required to be cooperative during the investigation process."
        translated_ru: "Все сотрудники обязаны содействовать расследованию нарушений."
        section_title: "Article 8 Employee Aspirations"
        relevance_comment: "Краткая норма об обязательном участии в эскалации и проверке нарушений."
      - excerpt_id: "HOT09_brief_mention"
        original: "the criticisms/suggestions ... shall be supported with adequate data analysis and proofs."
        translated_ru: "Сообщение должно сопровождаться максимально полной фактической информацией и доказательствами."
        section_title: "Article 8 Employee Aspirations"
        relevance_comment: "Краткий принцип полноты информации по делу."

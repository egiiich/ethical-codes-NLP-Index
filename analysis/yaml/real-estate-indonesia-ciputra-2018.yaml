    key_excerpts:
      - excerpt_id: "WtoC01_explicit_section"
        original: "each individual shall provide its best contribution to make the Company successful."
        translated_ru: "Каждый сотрудник обязан вносить максимальный вклад в успех компании."
        section_title: "Article 3.1 Company Performance & Quality"
        relevance_comment: "Прямой стандарт качества и результативности труда."
      - excerpt_id: "WtoC02_explicit_section"
        original: "The Employees shall preserve, protect and manage the Company’s assets ..."
        translated_ru: "Сотрудники обязаны сохранять, защищать и надлежащим образом управлять активами компании."
        section_title: "Article 3.1 Company Performance & Quality"
        relevance_comment: "Прямое требование бережного и эффективного использования активов."
      - excerpt_id: "WtoC03_explicit_section"
        original: "Each individual having access to the Confidential Information shall protect such information from any leakage."
        translated_ru: "Каждый сотрудник обязан защищать конфиденциальную информацию от утечек."
        section_title: "Article 3.5.b Confidential Information"
        relevance_comment: "Прямое требование конфиденциальности и инфобезопасности."
      - excerpt_id: "WtoC05_brief_mention"
        original: "violating the Company Regulations, state law ..."
        translated_ru: "Сотрудникам запрещено нарушать внутренние правила компании и закон."
        section_title: "Article 3.3 Disgraceful Conducts"
        relevance_comment: "Краткое подтверждение обязанности соблюдать закон."
      - excerpt_id: "WtoC08_brief_mention"
        original: "Each Management and Employee shall take part and contribute in delivering the best ..."
        translated_ru: "От сотрудников ожидается нацеленность на достижение целей компании."
        section_title: "Article 1 Background and Objectives"
        relevance_comment: "Краткое подтверждение ориентации на результат."
      - excerpt_id: "WtoC10_explicit_section"
        original: "the Employees and the Board of Directors ... possess ... high integrity that will create work ethics and positive image"
        translated_ru: "Высокая личная этика сотрудников рассматривается как основа позитивного имиджа компании."
        section_title: "FOREWORD"
        relevance_comment: "Прямое требование поддержания деловой репутации компании."

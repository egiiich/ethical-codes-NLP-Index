        original: "Choose Suppliers Fairly and Objectively."
        translated_ru: "Выбор поставщиков должен быть справедливым и объективным."
        section_title: "Article 6 Conduct Concerning Suppliers"
        relevance_comment: "Прямое правило объективного отбора поставщиков."
      - excerpt_id: "CtoS03_explicit_section"
        original: "Avoid the Acceptance of Bribery, Unofficial Commissions, Gifts and Other Kinds."
        translated_ru: "Компания и сотрудники обязуются избегать взяток, откатов и неофициальных комиссий в работе с поставщиками."
        section_title: "Article 6 Conduct Concerning Suppliers"
        relevance_comment: "Прямой запрет недобросовестных практик в цепочке поставок."
      - excerpt_id: "CtoS07_explicit_section"
        original: "Not being neutral/favoring certain suppliers in selecting and negotiating with suppliers ... [is a serious violation]."
        translated_ru: "Фаворитизм в выборе и переговорах с поставщиками признается серьезным нарушением."
        section_title: "Article 2 Serious Violations"
        relevance_comment: "Прямой запрет манипулятивного предоставления преимуществ отдельным поставщикам."

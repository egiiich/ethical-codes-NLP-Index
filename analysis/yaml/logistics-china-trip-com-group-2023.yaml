    key_excerpts:
      - excerpt_id: "WtoC02_explicit_section"
        original: "Employees should protect Trip.com Group’s assets and ensure their efficient use for legitimate business purposes only."
        translated_ru: "Сотрудники должны защищать активы Trip.com Group и обеспечивать их эффективное использование только в законных деловых целях."
        section_title: "Protection and Use of Company Assets"
        relevance_comment: "Прямое требование сохранности и корректного использования активов."
      - excerpt_id: "WtoC03_explicit_section"
        original: "The Company maintains a strict confidentiality policy."
        translated_ru: "Компания придерживается строгой политики конфиденциальности."
        section_title: "Intellectual Property and Confidentiality"
        relevance_comment: "Прямой стандарт конфиденциальности."
      - excerpt_id: "WtoC04_explicit_section"
        original: "All inventions, creative works, computer software, and technical or trade secrets developed by an employee shall be the property of the Company."
        translated_ru: "Все изобретения, результаты творчества, ПО и технические/коммерческие секреты, созданные сотрудником, являются собственностью компании."
        section_title: "Intellectual Property and Confidentiality"
        relevance_comment: "Прямой стандарт защиты и принадлежности ИС компании."
      - excerpt_id: "WtoC05_explicit_section"
        original: "Each employee has an obligation to comply with the laws of the cities, provinces, regions and countries in which Trip.com Group operates."
        translated_ru: "Каждый сотрудник обязан соблюдать законы городов, провинций, регионов и стран, где работает Trip.com Group."
        section_title: "Compliance with Laws and Regulations"
        relevance_comment: "Прямое требование соблюдения законов."
      - excerpt_id: "WtoC10_brief_mention"
        original: "Reporting a known or suspected violation of this Code by others will not be considered an act of disloyalty, but an action to safeguard the reputation and integrity of Trip.com Group and its employees."
        translated_ru: "Сообщение о нарушениях рассматривается как действие по защите репутации и целостности Trip.com Group и ее сотрудников."
        section_title: "Violations of the Code"
        relevance_comment: "Краткая фиксация требования защиты деловой репутации."

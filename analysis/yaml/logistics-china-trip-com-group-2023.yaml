    key_excerpts:
      - excerpt_id: "COMP03_brief_mention"
        original: "Competing Business. No employee may be employed by a business that competes with Trip.com Group or deprives it of any business."
        translated_ru: "Конкурирующий бизнес: ни один сотрудник не может работать в бизнесе, который конкурирует с Trip.com Group или лишает ее деловых возможностей."
        section_title: "Conflicts of Interest"
        relevance_comment: "Краткое подтверждение ограничения конфликтного конкурентного поведения."
      - excerpt_id: "COMP05_brief_mention"
        original: "Trip.com Group’s business conduct is founded on the principle of fair transaction."
        translated_ru: "Деловое поведение Trip.com Group основано на принципе справедливой сделки."
        section_title: "Gifts and Entertainment"
        relevance_comment: "Краткая фиксация принципа добросовестной конкуренции."

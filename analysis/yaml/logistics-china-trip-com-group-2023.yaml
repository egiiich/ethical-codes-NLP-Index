        section_title: "Family Members and Work"
        relevance_comment: "Краткий ориентир на объективность критериев отбора контрагентов."
      - excerpt_id: "CtoS07_explicit_section"
        original: "no employee may receive kickbacks, bribe others, or secretly receive commissions or any other personal benefits."
        translated_ru: "Ни один сотрудник не может получать откаты, давать взятки или тайно получать комиссии либо иные личные выгоды."
        section_title: "Gifts and Entertainment"
        relevance_comment: "Прямой запрет манипуляций и коррупционных схем при взаимодействии с контрагентами."

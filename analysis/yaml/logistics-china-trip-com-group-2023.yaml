    key_excerpts:
      - excerpt_id: "HOT01_brief_mention"
        original: "If you have any questions regarding the Code or would like to report any violation of the Code, please contact the Compliance Officer via e-mail at jubao@trip.com."
        translated_ru: "Если у вас есть вопросы по Кодексу или вы хотите сообщить о нарушении, обратитесь к Compliance Officer по e-mail jubao@trip.com."
        section_title: "Applicability"
        relevance_comment: "Формально определен доступ работников к каналу сообщения о нарушениях."
      - excerpt_id: "HOT02_explicit_section"
        original: "All questions and reports of known or suspected violations of this Code will be treated with sensitivity and discretion."
        translated_ru: "Все вопросы и сообщения об известных или предполагаемых нарушениях Кодекса рассматриваются деликатно и конфиденциально."
        section_title: "Violations of the Code"
        relevance_comment: "Прямое требование конфиденциальности материалов обращения."
      - excerpt_id: "HOT03_explicit_section"
        original: "Trip.com Group strictly prohibits retaliation against an employee who, in good faith, seeks help or reports known or suspected violations."
        translated_ru: "Trip.com Group строго запрещает преследование сотрудника, который добросовестно обращается за помощью или сообщает о нарушениях."
        section_title: "Violations of the Code"
        relevance_comment: "Прямой запрет репрессий в отношении заявителей."
      - excerpt_id: "HOT04_brief_mention"
        original: "The Compliance Officer and the Company will protect your confidentiality to the extent possible, consistent with the law and the Company’s need to investigate your concern."
        translated_ru: "Compliance Officer и компания будут защищать вашу конфиденциальность в максимально возможной степени с учетом закона и необходимости расследования."
        section_title: "Violations of the Code"
        relevance_comment: "Краткая гарантия конфиденциальности заявителя и участников процесса."
      - excerpt_id: "HOT05_explicit_section"
        original: "Trip.com Group’s policy that any employee who violates this Code will be subject to appropriate discipline, including termination of employment."
        translated_ru: "Политика Trip.com Group предусматривает, что любой сотрудник, нарушивший Кодекс, подлежит дисциплинарным мерам вплоть до увольнения."
        section_title: "Violations of the Code"
        relevance_comment: "Принцип обязательного реагирования на нарушения."
      - excerpt_id: "HOT06_explicit_section"
        original: "All employees have a duty to report any known or suspected violation of this Code."
        translated_ru: "Все сотрудники обязаны сообщать о любом известном или предполагаемом нарушении Кодекса."
        section_title: "Violations of the Code"
        relevance_comment: "Прямо закреплена обязанность сообщать о нарушениях."

    key_excerpts:
      - excerpt_id: "HOT01_explicit_section"
        original: "seek advice or report to your superior etc. without delay"
        translated_ru: "При возникновении проблемы необходимо без задержки обратиться за советом или сообщить руководителю."
        section_title: "Introduction / If a Problem Occurs"
        relevance_comment: "Прямо обозначена доступность канала обращения."
      - excerpt_id: "HOT03_explicit_section"
        original: "report it to your superior ... or report it through the whistleblowing system without delay"
        translated_ru: "Нарушения следует незамедлительно сообщать руководителю или через whistleblowing-систему."
        section_title: "If a Problem Occurs"
        relevance_comment: "Прямая обязанность сообщения."
      - excerpt_id: "HOT04_explicit_section"
        original: "The privacy of whistleblowers and people who seek consultation shall be protected"
        translated_ru: "Конфиденциальность и приватность информаторов и обращающихся за консультацией защищаются."
        section_title: "If a Problem Occurs"
        relevance_comment: "Прямая гарантия конфиденциальности."
      - excerpt_id: "HOT05_brief_mention"
        original: "in the case of a violation, a person may be subject to disciplinary action"
        translated_ru: "За нарушение кодекса предусмотрены дисциплинарные меры."
        section_title: "Violation of the Code of Conduct"
        relevance_comment: "Краткое подтверждение реагирования на нарушения."
      - excerpt_id: "HOT06_explicit_section"
        original: "they shall not receive disadvantageous treatment because of reporting, consultation, cooperation with investigation"
        translated_ru: "За сообщения и сотрудничество с расследованием не допускается неблагоприятное обращение."
        section_title: "If a Problem Occurs"
        relevance_comment: "Прямая антирепрессивная защита информатора."
      - excerpt_id: "HOT08_explicit_section"
        original: "use the whistleblowing system"
        translated_ru: "Канал «whistleblowing system» прямо предусмотрен кодексом."
        section_title: "If a Problem Occurs"
        relevance_comment: "Прямой канал подачи сообщений."

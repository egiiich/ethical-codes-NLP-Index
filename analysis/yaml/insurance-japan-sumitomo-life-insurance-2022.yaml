    key_excerpts:
      - excerpt_id: "WtoC03_explicit_section"
        original: "strictly manage such information to ensure there is no leakage to external parties"
        translated_ru: "Сотрудники обязаны строго управлять информацией, чтобы исключить утечки вовне."
        section_title: "Step 3 / Strict information management"
        relevance_comment: "Прямой стандарт конфиденциальности."
      - excerpt_id: "WtoC05_explicit_section"
        original: "Executives and employees must comply with laws and regulations, other rules, the Code of Conduct"
        translated_ru: "Сотрудники и руководители обязаны соблюдать законы, правила и кодекс поведения."
        section_title: "Violation of the Code of Conduct"
        relevance_comment: "Прямой правовой и этический комплаенс."
      - excerpt_id: "WtoC07_explicit_section"
        original: "we will strive to ensure that the interests of customers are not compromised due to conflict of interest"
        translated_ru: "Необходимо предотвращать ущерб интересам клиентов из-за конфликта интересов."
        section_title: "Step 3 / Prevention of internal collusion due to conflict of interest"
        relevance_comment: "Прямой принцип по конфликту интересов."
      - excerpt_id: "WtoC10_explicit_section"
        original: "A person will be held responsible for his/her behavior that damages the reputation of and trust in Sumitomo Life Group companies"
        translated_ru: "Сотрудник несёт ответственность за поведение, подрывающее репутацию и доверие к группе."
        section_title: "Violation of the Code of Conduct"
        relevance_comment: "Прямой репутационный стандарт."

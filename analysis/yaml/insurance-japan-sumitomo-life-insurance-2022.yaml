        original: "With our customers’ trust in us as the starting point of all our activities, we will provide optimal services"
        translated_ru: "Доверие клиентов — отправная точка всех действий, компания обязуется предоставлять оптимальные услуги."
        section_title: "Step 3 / Basic stance"
        relevance_comment: "Прямой принцип клиентоориентированности."
      - excerpt_id: "CtoB02_explicit_section"
        original: "pursuing the best interests of customers"
        translated_ru: "Компания закрепляет приоритет лучших интересов клиентов."
        section_title: "Code of Conduct and Customer-oriented Approach"
        relevance_comment: "Прямой принцип интересов клиента."
      - excerpt_id: "CtoB03_explicit_section"
        original: "appropriately handle customer information and other important information"
        translated_ru: "Компания обязуется надлежащим образом работать с клиентской и иной важной информацией."
        section_title: "Step 3 / Strict information management"
        relevance_comment: "Прямой стандарт защиты данных клиента."
      - excerpt_id: "CtoB04_explicit_section"
        original: "provide accurate and easy-to-understand explanations of the contents of insurance contracts and other important matters"
        translated_ru: "Клиентам предоставляются точные и понятные разъяснения по договорам и важным вопросам."
        section_title: "Step 3 / Basic stance"
        relevance_comment: "Прямой стандарт прозрачного информирования."
      - excerpt_id: "CtoB06_explicit_section"
        original: "provide optimal services to each and every person"
        translated_ru: "Компания обязуется оказывать оптимальные услуги каждому клиенту."
        section_title: "Step 3 / Basic stance"
        relevance_comment: "Прямой стандарт качества услуг."
      - excerpt_id: "CtoB09_brief_mention"
        original: "Do I accord priority to customers rather than the interests and convenience of the company and myself?"
        translated_ru: "Сотрудник должен ставить интересы клиента выше удобства компании и личных интересов."
        section_title: "Code of Conduct Checklist"
        relevance_comment: "Краткий стандарт обратной связи/ориентации на клиента."

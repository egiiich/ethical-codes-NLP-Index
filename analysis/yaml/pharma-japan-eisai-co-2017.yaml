    key_excerpts:
      - excerpt_id: "HOT01_explicit_section"
        original: "By providing reporting procedures and channels, we encourage each person to ask questions or express concerns."
        translated_ru: "Компания обеспечивает каналы и процедуры для сообщений о нарушениях и вопросах."
        section_title: "Message from the Chief Compliance Officer"
        relevance_comment: "Доступ работников к каналам сообщения."
      - excerpt_id: "HOT02_explicit_section"
        original: "a report of a compliance concern will be treated confidentially and information will be shared only in order to carry out any necessary investigation."
        translated_ru: "Сообщение о нарушении рассматривается конфиденциально; данные раскрываются только для расследования."
        section_title: "1.3.2 Reporting compliance concerns"
        relevance_comment: "Конфиденциальность материалов проверки."
      - excerpt_id: "HOT03_explicit_section"
        original: "No one will be punished or disciplined for making a report in good faith."
        translated_ru: "За добросовестное сообщение о нарушении запрещено наказывать заявителя."
        section_title: "1.3.1 Policy of non-retaliation"
        relevance_comment: "Прямой запрет преследования информаторов."
      - excerpt_id: "HOT05_explicit_section"
        original: "Compliance concerns should be reported promptly because the earlier the company knows about them the sooner it can investigate and take appropriate action."
        translated_ru: "Нарушения нужно сообщать незамедлительно, чтобы компания провела расследование и приняла меры."
        section_title: "1.3 Asking questions and reporting compliance concerns"
        relevance_comment: "Обязательное реагирование и расследование."
      - excerpt_id: "HOT06_brief_mention"
        original: "Everyone has an obligation to report concerns regarding non-compliance with written standards and Eisai’s ethical standards."
        translated_ru: "Каждый обязан сообщать о случаях несоблюдения письменных и этических стандартов."
        section_title: "1.1 Our responsibilities"
        relevance_comment: "Обязанность сообщать о нарушениях."

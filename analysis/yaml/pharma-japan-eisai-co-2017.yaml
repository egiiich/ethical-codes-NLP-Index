    key_excerpts:
      - excerpt_id: "WtoC02_explicit_section"
        original: "Any loss, theft or improper use of these assets can cause serious financial loss and damage to Eisai’s business."
        translated_ru: "Потеря, кража или ненадлежащее использование активов наносят серьёзный ущерб бизнесу."
        section_title: "5.6 Eisai’s assets"
        relevance_comment: "Прямое требование беречь активы компании."
      - excerpt_id: "WtoC03_explicit_section"
        original: "Confidential information is an important Eisai asset."
        translated_ru: "Конфиденциальная информация является важным активом Eisai."
        section_title: "5.3 Confidential information"
        relevance_comment: "Прямой принцип защиты конфиденциальных данных."
      - excerpt_id: "WtoC04_explicit_section"
        original: "These may give rise to valuable assets in the form of intellectual property rights such as patent rights, design rights, trademark rights, copyright, know-how, and trade secrets."
        translated_ru: "Результаты разработки формируют ценные активы ИС: патенты, товарные знаки, ноу-хау и коммерческие тайны."
        section_title: "5.2 Intellectual property"
        relevance_comment: "Прямой принцип защиты ИС компании."
      - excerpt_id: "WtoC05_explicit_section"
        original: "Compliance in Eisai means complying with written standards such as laws, regulations, Eisai policies and procedures"
        translated_ru: "Комплаенс в Eisai означает соблюдение законов, регуляторных требований и внутренних политик."
        section_title: "Introduction A. What is compliance in Eisai?"
        relevance_comment: "Прямое требование соблюдать законы и правила."
      - excerpt_id: "WtoC10_brief_mention"
        original: "Failing to do the right thing may also damage Eisai’s business, reputation and patients."
        translated_ru: "Неправильные действия могут нанести ущерб бизнесу и репутации Eisai."
        section_title: "1.3 Asking questions and reporting compliance concerns"
        relevance_comment: "Краткое указание на защиту деловой репутации."

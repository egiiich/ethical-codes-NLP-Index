    key_excerpts:
      - excerpt_id: "COMP01_explicit_section"
        original: "Do not use or obtain confidential information from third parties unjustly."
        translated_ru: "«Не использовать и не получать конфиденциальную информацию третьих сторон неправомерным способом»."
        section_title: "(3) Protect confidential information"
        relevance_comment: "Прямой запрет неправомерного получения конфиденциальных данных; применимо к информации конкурентов (COMP01)."
      - excerpt_id: "COMP03_explicit_section"
        original: "Respect ... antitrust laws ... and observe the company's Rules of Conduct Related to Antitrust Laws in order to maintain and promote free and fair competition."
        translated_ru: "«Соблюдать ... антимонопольные законы ... и правила компании по antitrust для поддержания и продвижения свободной и честной конкуренции»."
        section_title: "(8) Build good relationships based on trust with clients and contractors"
        relevance_comment: "Явная antitrust/competition норма (COMP03)."
      - excerpt_id: "COMP05_explicit_section"
        original: "Strive to build strong, trusting business relationships and partnerships with honesty, fairness and transparency."
        translated_ru: "«Стремиться строить прочные и доверительные деловые отношения на основе честности, справедливости и прозрачности»."
        section_title: "(8)"
        relevance_comment: "Явный ориентир на честные и справедливые рыночные практики (COMP05)."
      - excerpt_id: "COMP07_explicit_section"
        original: "Do not violate the intellectual property rights of third parties."
        translated_ru: "«Не нарушать права интеллектуальной собственности третьих лиц»."
        section_title: "(3) Protect confidential information and respect intellectual property rights"
        relevance_comment: "Прямое требование уважать ИС права третьих сторон (COMP07)."

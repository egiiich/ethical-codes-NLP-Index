    key_excerpts:
      -
        excerpt_id: "CtoS01_explicit_section"
        original: "Company shall seek to promote mutual growth with its business partners ... through fair transactions with them."
        translated_ru: "Компания развивает взаимный рост с партнерами через справедливые сделки."
        section_title: "ARTICLE 7"
        relevance_comment: "Прямой справедливый подход к сделкам с партнерами."
      -
        excerpt_id: "CtoS03_explicit_section"
        original: "Company shall not influence nor force any person to commit any illegal act through the use of its advantageous position."
        translated_ru: "Компания не вправе принуждать к незаконным действиям, используя свое преимущественное положение."
        section_title: "ARTICLE 7"
        relevance_comment: "Прямой запрет злоупотребления рыночной властью."
      -
        excerpt_id: "CtoS06_explicit_section"
        original: "enhancing mutual trust and cooperative relationships through fair transactions"
        translated_ru: "Компания формирует доверительные и кооперативные отношения с партнерами через справедливые сделки."
        section_title: "ARTICLE 7"
        relevance_comment: "Явная ориентация на устойчивое партнерство."

    key_excerpts:
      -
        excerpt_id: "WtoC02_explicit_section"
        original: "they shall not use [company property, intellectual property rights and business secrets] for personal purposes."
        translated_ru: "Имущество, ИС и коммерческие тайны компании нельзя использовать в личных целях."
        section_title: "ARTICLE 16"
        relevance_comment: "Прямой запрет личного использования активов."
      -
        excerpt_id: "WtoC03_explicit_section"
        original: "Executives and employees shall not disclose any material information to any third party that may prejudice company's interests."
        translated_ru: "Сотрудники не должны раскрывать третьим лицам существенную информацию, способную навредить интересам компании."
        section_title: "ARTICLE 16"
        relevance_comment: "Прямое требование конфиденциальности."
      -
        excerpt_id: "WtoC04_explicit_section"
        original: "Executives and employees are personally responsible for protecting ... intellectual property rights and business secrets."
        translated_ru: "Сотрудники лично отвечают за защиту интеллектуальной собственности и коммерческих тайн компании."
        section_title: "ARTICLE 16"
        relevance_comment: "Прямая защита ИС компании."
      -
        excerpt_id: "WtoC05_explicit_section"
        original: "Executives and employees shall perform their duties ... while complying with any laws and regulations."
        translated_ru: "Сотрудники обязаны выполнять свои обязанности, соблюдая законы и нормативные требования."
        section_title: "ARTICLE 13"
        relevance_comment: "Прямое требование соблюдения законов."
      -
        excerpt_id: "WtoC10_explicit_section"
        original: "perform their duties with integrity and in a legitimate manner"
        translated_ru: "Сотрудники должны выполнять обязанности добросовестно и правомерно."
        section_title: "ARTICLE 13"
        relevance_comment: "Прямой стандарт защиты деловой репутации компании."

        excerpt_id: "COMP01_explicit_section"
        original: "Never seek or accept information obtained illegally or unethically, such as through bribery or theft."
        translated_ru: "Нельзя запрашивать или принимать информацию, полученную незаконно или неэтично (в т.ч. через взятку или кражу)."

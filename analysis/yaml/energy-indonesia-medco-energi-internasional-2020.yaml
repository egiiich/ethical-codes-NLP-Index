        relevance_comment: "Прямой запрет на неэтичный сбор конкурентной информации."
      -
        excerpt_id: "COMP03_explicit_section"
        original: "Involve in antitrust and unfair competition ... sharing confidential or proprietary information ... to competitors."
        translated_ru: "Запрещено участвовать в антиконкурентных практиках и передавать конкурентам конфиденциальную информацию."

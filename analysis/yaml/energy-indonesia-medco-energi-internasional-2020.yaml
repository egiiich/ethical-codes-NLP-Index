    key_excerpts:
      -
        excerpt_id: "HOT01_explicit_section"
        original: "Our Whistleblowing Channels are provided for internal and external stakeholders."
        translated_ru: "Каналы информирования доступны внутренним и внешним стейкхолдерам."
        section_title: "Whistleblowing"
        relevance_comment: "Доступ к горячей линии для широкого круга заявителей."
      -
        excerpt_id: "HOT03_explicit_section"
        original: "MedcoEnergi does not tolerate any kind of retaliation."
        translated_ru: "MedcoEnergi не допускает никаких форм преследования."
        section_title: "No Retaliation"
        relevance_comment: "Прямой запрет реталиации."
      -
        excerpt_id: "HOT04_explicit_section"
        original: "our Company allows anonymity in reporting through the available whistleblowing channels."
        translated_ru: "Компания допускает анонимные сообщения через каналы информирования."
        section_title: "Whistleblowing"
        relevance_comment: "Явная гарантия анонимного сообщения."
      -
        excerpt_id: "HOT06_explicit_section"
        original: "Every individual has the responsibility to report and not to ignore potential violations to Our Code."
        translated_ru: "Каждый обязан сообщать и не игнорировать потенциальные нарушения Кодекса."
        section_title: "Whistleblowing"
        relevance_comment: "Прямая обязанность сообщать о нарушениях."

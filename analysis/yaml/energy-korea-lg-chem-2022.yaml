    key_excerpts:
      -
        excerpt_id: "COMP01_explicit_section"
        original: "Never seek competitor information from job applicants or current employees who worked for a competitor."
        translated_ru: "Запрещено запрашивать конфиденциальную информацию конкурентов у кандидатов или сотрудников конкурентов."
        section_title: "Gathering competitive information"
        relevance_comment: "Прямой запрет неэтичного сбора информации конкурентов."
      -
        excerpt_id: "COMP03_explicit_section"
        original: "Jointly fixing the price is illegal ... exchange of “competitive information” ... may be deemed as anti-competitive."
        translated_ru: "Совместная фиксация цен и обмен конкурентно-чувствительной информацией незаконны."
        section_title: "Potential Cartel"
        relevance_comment: "Прямой запрет картельных практик."

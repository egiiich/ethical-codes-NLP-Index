        excerpt_id: "CtoS01_explicit_section"
        original: "You should treat all business partners fairly and equally."
        translated_ru: "Бизнес-партнеры должны рассматриваться справедливо и на равных условиях."
        section_title: "Relationship with business partners"
        relevance_comment: "Прямой справедливый подход к партнерам/поставщикам."
      -
        excerpt_id: "CtoS06_explicit_section"
        original: "The purpose of this Guideline ... support joint growth of the employees and the Company together."
        translated_ru: "Кодекс направлен на совместный устойчивый рост компании и партнеров."
        section_title: "How is this created?"
        relevance_comment: "Ориентация на долгосрочное партнерство и совместный рост."

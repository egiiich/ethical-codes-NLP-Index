    key_excerpts:
      -
        excerpt_id: "WtoC03_explicit_section"
        original: "All employees should protect LG Chem’s business secrets, and ensure such secrets are not disclosed or leaked."
        translated_ru: "Сотрудники обязаны защищать коммерческие секреты LG Chem и не допускать их утечки."
        section_title: "Protection of business secrets"
        relevance_comment: "Прямое требование конфиденциальности."
      -
        excerpt_id: "WtoC04_explicit_section"
        original: "Use of any ... intellectual property of a third party is only permissible when a license is granted."
        translated_ru: "Использование ИС третьих лиц допускается только при наличии лицензии/правового основания."
        section_title: "Protection of intellectual property rights"
        relevance_comment: "Прямой стандарт защиты ИС и правомерного использования."
      -
        excerpt_id: "WtoC05_explicit_section"
        original: "Follow the laws and regulations in the countries where you work."
        translated_ru: "Сотрудники обязаны соблюдать законы и нормы стран, где они работают."
        section_title: "WHAT IS EXPECTED OF US"
        relevance_comment: "Прямое требование соблюдения законодательства."
      -
        excerpt_id: "WtoC10_explicit_section"
        original: "harm to the Company’s image and reputation"
        translated_ru: "Нарушения наносят ущерб имиджу и репутации компании."
        section_title: "What happens with Non-Compliance"
        relevance_comment: "Прямой акцент на защите репутации компании."

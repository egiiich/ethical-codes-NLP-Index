    key_excerpts:
      -
        excerpt_id: "HOT03_explicit_section"
        original: "LG Chem does not tolerate and will address retaliation against anyone who with true sincerity reports a non-compliance issue."
        translated_ru: "LG Chem не допускает реталиации в отношении лиц, добросовестно сообщающих о нарушениях."
        section_title: "MUST know"
        relevance_comment: "Прямой запрет преследования заявителей."
      -
        excerpt_id: "HOT06_explicit_section"
        original: "Ensure to report any suspicion of violation of the Compliance Guideline or other Company policies."
        translated_ru: "Сотрудники обязаны сообщать о любых подозрениях на нарушение Кодекса и политик компании."
        section_title: "WHAT IS EXPECTED OF US"
        relevance_comment: "Прямая обязанность сообщения о нарушениях."

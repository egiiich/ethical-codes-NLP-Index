        excerpt_id: "COMP03_explicit_section"
        original: "The Company prohibits any form of monopoly agreements ... and strictly forbids abuse of market dominance."
        translated_ru: "Компания прямо запрещает картельные соглашения и злоупотребление доминирующим положением."
        section_title: "2. Fair Competition"
        relevance_comment: "Подтверждение статуса для принципа COMP03."
      -
        excerpt_id: "COMP07_explicit_section"
        original: "Unfair competitive practices such as ... infringement of intellectual property ... are strictly prohibited."
        translated_ru: "Прямо запрещено нарушение интеллектуальной собственности в конкурентной борьбе."
        section_title: "2. Fair Competition"
        relevance_comment: "Подтверждение статуса для принципа COMP07."
      -
        excerpt_id: "COMP08_explicit_section"
        original: "Unfair competitive practices such as ... false advertising ... defamation ... are strictly prohibited."
        translated_ru: "Прямо запрещены ложная реклама и дискредитация конкурентов."
        section_title: "2. Fair Competition"
        relevance_comment: "Подтверждение статуса для принципа COMP08."

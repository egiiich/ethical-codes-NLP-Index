    key_excerpts:
      - excerpt_id: "COMP03_explicit_section"
        original: "Do not hinder fair, transparent, and free competition and appropriate transactions in any activity, particularly in the bidding and tendering for construction work."
        translated_ru: "«Не препятствуйте честной, прозрачной и свободной конкуренции и надлежащим сделкам в любой деятельности, особенно в торгах и тендерах на строительные работы»."
        section_title: "I. Fair and Honest Corporate Conduct"
        relevance_comment: "Прямой антимонопольный запрет антиконкурентного поведения в торгах (COMP03)."
      - excerpt_id: "COMP05_explicit_section"
        original: "Fair, Transparent and Free Competition, and Appropriate Trade."
        translated_ru: "«Честная, прозрачная и свободная конкуренция и надлежащая торговля»."
        section_title: "I. Fair and Honest Corporate Conduct"
        relevance_comment: "Явно закрепленный принцип fair competition (COMP05)."
      - excerpt_id: "COMP01_explicit_section"
        original: "Do not unlawfully or wrongfully harm intellectual property, trade secrets, rights, assets, reputation, trust of other individuals or companies."
        translated_ru: "«Не причиняйте незаконного или неправомерного ущерба интеллектуальной собственности, коммерческим тайнам, правам, активам, репутации и доверию других лиц или компаний»."
        section_title: "Protection of Intellectual Property, Rights and Assets"
        relevance_comment: "Прямой запрет на неправомерные действия в отношении чужих коммерческих тайн (COMP01)."
      - excerpt_id: "COMP07_explicit_section"
        original: "Do not unlawfully or wrongfully harm intellectual property ... of other individuals or companies."
        translated_ru: "«Не причиняйте незаконного или неправомерного ущерба интеллектуальной собственности ... других лиц или компаний»."
        section_title: "Protection of Intellectual Property, Rights and Assets"
        relevance_comment: "Прямое требование уважать права ИС третьих лиц (COMP07)."

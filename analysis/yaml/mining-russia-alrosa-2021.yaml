        section_title: "11.2.7"
        relevance_comment: "Прямое требование конфиденциальности расследования."
      - excerpt_id: "HOT03_explicit_section"
        original: "...а также отсутствие негативных последствий (в том числе какое-либо преследование или дискриминация)."
        translated_ru: "Компания прямо запрещает репрессии/дискриминацию в отношении заявителя."
        section_title: "11.2.7"
        relevance_comment: "Прямой запрет преследования заявителей."
      - excerpt_id: "HOT04_explicit_section"
        original: "...работники и иные лица могут подавать обращения, в том числе анонимно."
        translated_ru: "Допускаются анонимные обращения по нарушениям."
        section_title: "11.2.6"
        relevance_comment: "Гарантия анонимного канала."
      - excerpt_id: "HOT05_explicit_section"
        original: "По всем фактам нарушения Кодекса ... проводятся в установленном порядке проверки и/или служебные расследования."
        translated_ru: "По каждому сообщению о нарушении предусмотрена проверка/расследование и меры."
        section_title: "11.2.9"
        relevance_comment: "Нулевая терпимость к нарушениям."
      - excerpt_id: "HOT06_explicit_section"
        original: "Работники... обязаны незамедлительно сообщить об этом своему непосредственному руководителю и/или в Комиссию..."

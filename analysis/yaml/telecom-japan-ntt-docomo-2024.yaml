    key_excerpts:
      - excerpt_id: "WtoC01_brief_mention"
        original: "...we remain true and faithful to the spirit of compliance in our conduct."
        translated_ru: "...мы сохраняем верность духу комплаенса в нашем поведении."
        section_title: "1. Legal and ethical compliance"
        relevance_comment: "Краткое требование добросовестного выполнения обязанностей (WtoC01)."
      - excerpt_id: "WtoC03_explicit_section"
        original: "Recognizing the value of business information... we meticulously manage and safeguard this information to prevent its leakage..."
        translated_ru: "Признавая ценность деловой информации, мы тщательно управляем и защищаем её, предотвращая утечки."
        section_title: "4. Management and safeguarding of confidential corporate information"
        relevance_comment: "Прямое требование конфиденциальности и защиты информации (WtoC03)."
      - excerpt_id: "WtoC04_brief_mention"
        original: "We respect intellectual property rights and ensure that they are properly handled."
        translated_ru: "Мы уважаем права интеллектуальной собственности и обеспечиваем корректное обращение с ними."
        section_title: "4. Management and safeguarding of confidential corporate information"
        relevance_comment: "Краткое требование защиты ИС компании (WtoC04)."
      - excerpt_id: "WtoC05_explicit_section"
        original: "We comply with the spirit and letter of all laws, regulations and rules..."
        translated_ru: "Мы соблюдаем дух и букву всех законов, нормативных актов и правил..."
        section_title: "1. Legal and ethical compliance"
        relevance_comment: "Прямое требование соблюдения законодательства (WtoC05)."

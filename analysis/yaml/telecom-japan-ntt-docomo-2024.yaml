    key_excerpts:
      - excerpt_id: "HOT01_explicit_section"
        original: "...we immediately report such behavior to a superior or compliance officer, confer with our compliance consultation service..."
        translated_ru: "...мы немедленно сообщаем о таком поведении руководителю или комплаенс-офицеру, а также консультируемся через сервис комплаенс-консультаций..."
        section_title: "1. Legal and ethical compliance"
        relevance_comment: "Прямо закреплены каналы сообщения и рассмотрения нарушений (HOT01)."
      - excerpt_id: "HOT05_explicit_section"
        original: "Information provided to our compliance consultation service is handled swiftly and appropriately."
        translated_ru: "Информация, предоставленная в нашу службу комплаенс-консультаций, обрабатывается оперативно и надлежащим образом."
        section_title: "10. In-house ethical system and commitment"
        relevance_comment: "Прямой принцип обязательного реагирования на комплаенс-сообщения (HOT05)."
      - excerpt_id: "HOT06_explicit_section"
        original: "We do not allow questionable or suspicious behavior to go unnoted, and we immediately report such behavior..."
        translated_ru: "Мы не оставляем сомнительное поведение без внимания и немедленно сообщаем о нем..."
        section_title: "1. Legal and ethical compliance"
        relevance_comment: "Прямая обязанность сообщать о нарушениях/подозрительных действиях (HOT06)."

        original: "We proactively disclose accurate environmental information..."
        translated_ru: "Мы активно раскрываем точную экологическую информацию..."
        section_title: "8. Addressing environmental concerns"
        relevance_comment: "Краткий элемент ESG-прозрачности (CtoP01)."
      - excerpt_id: "CtoP02_explicit_section"
        original: "We engage in dialogue with our stakeholders, including customers, local communities..."
        translated_ru: "Мы ведем диалог со стейкхолдерами, включая клиентов и местные сообщества..."
        section_title: "5. Information disclosure and transparency"
        relevance_comment: "Прямое требование открытого взаимодействия с обществом (CtoP02)."
      - excerpt_id: "CtoP04_explicit_section"
        original: "We voluntarily contribute to local communities... in our civic interactions."
        translated_ru: "Мы добровольно вносим вклад в местные сообщества в рамках гражданской активности."
        section_title: "7. Corporate citizen and social activities"
        relevance_comment: "Прямой вклад в развитие локальных сообществ (CtoP04)."
      - excerpt_id: "CtoP08_explicit_section"
        original: "During times of disaster, we proactively contribute to recovery and support efforts..."
        translated_ru: "Во время бедствий мы активно содействуем восстановлению и поддержке..."
        section_title: "7. Corporate citizen and social activities"
        relevance_comment: "Прямые действия по снижению ущерба обществу при ЧС (CtoP08)."
      - excerpt_id: "CtoP09_explicit_section"
        original: "...we respect local and regional culture and customs..."
        translated_ru: "...мы уважаем местную и региональную культуру и обычаи..."
        section_title: "7. Corporate citizen and social activities"
        relevance_comment: "Прямое требование уважения местных традиций (CtoP09)."

    key_excerpts:
      - excerpt_id: "COMP03_explicit_section"
        original: "We operate within antitrust and unfair competition laws in Japan and overseas and always compete fairly in the market."
        translated_ru: "Мы действуем в рамках антимонопольного и антинедобросовестного конкурентного законодательства и всегда конкурируем честно."
        section_title: "6. Fair, open and free competition and trade"
        relevance_comment: "Прямой принцип честной конкуренции и соблюдения антимонопольных норм (COMP03)."
      - excerpt_id: "COMP05_brief_mention"
        original: "We always trade and compete fairly, openly and freely in Japan and overseas markets."
        translated_ru: "Мы всегда ведем торговлю и конкурируем честно, открыто и свободно на рынках Японии и других стран."
        section_title: "6. Fair, open and free competition and trade"
        relevance_comment: "Краткое подтверждение уважительного отношения к конкурентной среде (COMP05)."

    key_excerpts:
      - excerpt_id: "CtoS02_brief_mention"
        original: "We ensure that transactions are conducted openly and fairly with due respect for our business partners."
        translated_ru: "Мы обеспечиваем открытость и справедливость сделок с должным уважением к деловым партнерам."
        section_title: "6. Fair, open and free competition and trade"
        relevance_comment: "Краткое подтверждение равного и прозрачного подхода к партнёрам/поставщикам (CtoS02)."
      - excerpt_id: "CtoS03_brief_mention"
        original: "We absolutely reject coercive or illegal dealings with antisocial or criminal groups."
        translated_ru: "Мы абсолютно отвергаем принудительные или незаконные сделки с антисоциальными и криминальными группами."
        section_title: "6. Fair, open and free competition and trade"
        relevance_comment: "Краткое подтверждение отказа от недобросовестных практик в цепочке контрагентов (CtoS03)."
      - excerpt_id: "CtoS06_brief_mention"
        original: "We give due consideration to the compliance practices of our business partners..."
        translated_ru: "Мы уделяем должное внимание комплаенс-практикам наших деловых партнеров..."
        section_title: "6. Fair, open and free competition and trade"
        relevance_comment: "Краткий ориентир на ответственное партнерство с поставщиками (CtoS06)."
    other_principles: []

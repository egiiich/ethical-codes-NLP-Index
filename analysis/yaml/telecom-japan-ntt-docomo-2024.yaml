        original: "...adopted a customer-first approach for the provision of products and services..."
        translated_ru: "...применяем клиентоориентированный подход при предоставлении продуктов и услуг..."
        section_title: "2. Customer-oriented products and services"
        relevance_comment: "Прямой принцип ориентации на потребности клиентов (CtoB01)."
      - excerpt_id: "CtoB02_explicit_section"
        original: "...provide our customers with accurate, easy-to-understand information."
        translated_ru: "...предоставляем клиентам точную и понятную информацию."
        section_title: "2. Customer-oriented products and services"
        relevance_comment: "Прямое требование предоставления полной и понятной информации (CtoB02)."
      - excerpt_id: "CtoB05_explicit_section"
        original: "We comply with the spirit and letter of all laws... and base our conduct on the highest ethical standards."
        translated_ru: "Мы соблюдаем законы и основываем поведение на высоких этических стандартах."
        section_title: "1. Legal and ethical compliance"
        relevance_comment: "Прямое требование законности и этичности для клиентского взаимодействия (CtoB05)."
      - excerpt_id: "CtoB07_explicit_section"
        original: "We promptly and in good faith respond to customer inquiries about products and services."
        translated_ru: "Мы оперативно и добросовестно отвечаем на запросы клиентов по продуктам и услугам."
        section_title: "2. Customer-oriented products and services"
        relevance_comment: "Прямое требование поддержания каналов обратной связи с клиентами (CtoB07)."
      - excerpt_id: "CtoB08_explicit_section"
        original: "We never under any circumstances use the personal information of our customers for purposes beyond the originally stated intent..."
        translated_ru: "Мы ни при каких обстоятельствах не используем персональные данные клиентов вне изначально заявленной цели..."
        section_title: "3. Respect for the human rights of our customers..."
        relevance_comment: "Прямое требование защиты данных клиентов (CtoB08)."
      - excerpt_id: "CtoB09_explicit_section"
        original: "We place the highest priority on safety and quality in the development of our products and services..."
        translated_ru: "Мы ставим безопасность и качество наивысшим приоритетом при разработке наших продуктов и услуг..."
        section_title: "2. Customer-oriented products and services"
        relevance_comment: "Прямое требование безопасности и качества продуктов/услуг (CtoB09)."

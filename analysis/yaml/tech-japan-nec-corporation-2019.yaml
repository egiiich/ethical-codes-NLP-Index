    key_excerpts:
      - excerpt_id: "CtoS02_implicit_scattered"
        original: "I will always carry out transactions in good faith with our suppliers in a fair and equal manner."
        translated_ru: "Я всегда буду вести взаимодействие с поставщиками добросовестно, справедливо и на равных условиях."
        section_title: "Responsible procurement"
        relevance_comment: "Принцип равного и справедливого обращения с поставщиками (CtoS02)."
      - excerpt_id: "CtoS03_explicit_section"
        original: "I will not seek personal gain or carry out any transaction that causes another party to suffer an inappropriate disadvantage due to the abuse of a superior position."
        translated_ru: "Я не буду искать личную выгоду и совершать сделки, ставящие другую сторону в невыгодное положение из-за злоупотребления доминирующей позицией."
        section_title: "Responsible procurement"
        relevance_comment: "Прямой запрет злоупотребления рыночной властью по отношению к поставщикам (CtoS03)."
      - excerpt_id: "CtoS06_brief_mention"
        original: "In addition, I will encourage our suppliers to act in accordance with this Code of Conduct."
        translated_ru: "Кроме того, я буду побуждать поставщиков действовать в соответствии с этим Кодексом поведения."
        section_title: "Responsible procurement"
        relevance_comment: "Краткая ориентация на устойчивые партнерские отношения через единые стандарты (CtoS06)."
    other_principles: []

    key_excerpts:
      - excerpt_id: "WtoC01_explicit_section"
        original: "I will always endeavor to satisfy our customers and pay full attention to the safety and quality of our products and services."
        translated_ru: "Я всегда буду стремиться удовлетворять клиентов и уделять полное внимание безопасности и качеству наших продуктов и услуг."
        section_title: "Safe and reliable quality for all customers"
        relevance_comment: "Прямое требование поддерживать высокое качество работы (WtoC01)."
      - excerpt_id: "WtoC02_explicit_section"
        original: "I will properly manage the Company's assets (tangible and intangible) and will not use them for private purposes..."
        translated_ru: "Я буду надлежащим образом управлять активами компании и не использовать их в личных целях."
        section_title: "Management and proper use of the Company's assets"
        relevance_comment: "Прямое требование сохранности и целевого использования активов (WtoC02)."
      - excerpt_id: "WtoC03_explicit_section"
        original: "I will strictly manage the confidential information of internal and external parties... and will not disclose or divulge such information..."
        translated_ru: "Я буду строго управлять конфиденциальной информацией внутренних и внешних сторон и не раскрывать её ненадлежащим образом."
        section_title: "Management of confidential information"
        relevance_comment: "Прямое требование конфиденциальности и инфобезопасности (WtoC03)."
      - excerpt_id: "WtoC04_explicit_section"
        original: "I will protect and maintain the intellectual property rights... and will try to actively utilize them."
        translated_ru: "Я буду защищать и поддерживать права интеллектуальной собственности и активно использовать их в интересах компании."
        section_title: "Protection and utilization of intellectual property rights"
        relevance_comment: "Прямое требование защиты ИС компании (WtoC04)."
      - excerpt_id: "WtoC05_explicit_section"
        original: "I will comply with international rules, applicable laws and regulations, this Code of Conduct, and in-house policies and guidelines..."
        translated_ru: "Я буду соблюдать международные нормы, применимые законы и регламенты, данный Кодекс и внутренние политики."
        section_title: "Acts in good faith based on high ethical standards"
        relevance_comment: "Прямое требование соблюдения законодательства (WtoC05)."
      - excerpt_id: "WtoC06_brief_mention"
        original: "...I will consult with my superiors or the relevant divisions to solve the issue."
        translated_ru: "...я буду обращаться к руководителю или профильным подразделениям для решения вопроса."
        section_title: "Consultation and Report on Doubts and Concerns about Compliance"
        relevance_comment: "Краткое подтверждение соблюдения служебной иерархии (WtoC06)."
      - excerpt_id: "WtoC07_brief_mention"
        original: "In the event of a disaster... I will endeavor to bring about the early recovery of social infrastructure..."
        translated_ru: "В случае чрезвычайных ситуаций я буду стремиться к скорейшему восстановлению социальной инфраструктуры."
        section_title: "Response to emergency"
        relevance_comment: "Кратко отражена адаптивность в нестандартных условиях (WtoC07)."
      - excerpt_id: "WtoC10_explicit_section"
        original: "I will not perform any act... that may damage the trust or honor of the NEC Group..."
        translated_ru: "Я не буду совершать действий, которые могут нанести ущерб доверию или репутации NEC Group."
        section_title: "Prohibition on any act contrary to the Company's interests"
        relevance_comment: "Прямая защита деловой репутации компании (WtoC10)."

    key_excerpts:
      - excerpt_id: "COMP03_explicit_section"
        original: "I will recognize the importance of fair and free competition in the market, and will not engage in any unjust restrictions on transactions, such as collusion and cartels..."
        translated_ru: "Я буду признавать важность честной и свободной конкуренции и не вступать в сговоры и картели."
        section_title: "Fair competition"
        relevance_comment: "Прямой запрет антиконкурентного сговора (COMP03)."
      - excerpt_id: "COMP05_brief_mention"
        original: "I will maintain a fair, equitable, and transparent relationship with stakeholders..."
        translated_ru: "Я буду поддерживать справедливые, равноправные и прозрачные отношения со стейкхолдерами, включая конкурентов."
        section_title: "Fair relationship with stakeholders"
        relevance_comment: "Краткое общее требование уважительно и честно взаимодействовать со стейкхолдерами (COMP05)."
      - excerpt_id: "COMP07_implicit_scattered"
        original: "I will respect and not infringe or illegally use third party’s legitimate intellectual property rights."
        translated_ru: "Я буду уважать и не нарушать законные права интеллектуальной собственности третьих лиц."
        section_title: "Protection and utilization of intellectual property rights"
        relevance_comment: "Уважение ИС третьих лиц покрывает ИС конкурентов (COMP07)."
      - excerpt_id: "COMP08_implicit_scattered"
        original: "...will not use any expression that may be slanderous, libelous, or socially discriminatory."
        translated_ru: "...не буду использовать формулировки, которые могут быть клеветническими, порочащими или дискриминационными."
        section_title: "Sincere publicity and advertising"
        relevance_comment: "Запрет клеветы/порочащих утверждений применим к конкурентам (COMP08)."

    key_excerpts:
      - excerpt_id: "HOT01_implicit_scattered"
        original: "If I am unable to consult with my superiors or the relevant divisions, I will contact the whistleblowing system in place at the Company."
        translated_ru: "Если я не могу обратиться к руководителю или профильному подразделению, я обращусь в систему информирования о нарушениях."
        section_title: "Consultation and Report on Doubts and Concerns about Compliance"
        relevance_comment: "Канал hotline доступен работникам как альтернативный механизм (HOT01)."
      - excerpt_id: "HOT02_explicit_section"
        original: "The Company guarantees that the confidentiality of the facts and content of consultations and reports will be strictly maintained..."
        translated_ru: "Компания гарантирует строгое сохранение конфиденциальности фактов и содержания обращений и сообщений."
        section_title: "Strict Maintenance of Confidentiality"
        relevance_comment: "Прямое требование конфиденциальности по обращениям (HOT02)."
      - excerpt_id: "HOT03_explicit_section"
        original: "The Company prohibits any detrimental treatment of, or retaliation against any person who has consulted or reported on a matter..."
        translated_ru: "Компания запрещает любое неблагоприятное обращение или преследование в отношении лица, подавшего обращение или сообщение."
        section_title: "Prohibition against Retaliation"
        relevance_comment: "Прямой запрет реталиации (HOT03)."
      - excerpt_id: "HOT05_explicit_section"
        original: "The Company will respond in good faith to such consultation or report."
        translated_ru: "Компания будет добросовестно реагировать на такие обращения или сообщения."
        section_title: "Consultation and Report on Doubts and Concerns about Compliance"
        relevance_comment: "Закреплено обязательное реагирование на сообщения (HOT05)."
      - excerpt_id: "HOT06_explicit_section"
        original: "...or become aware of any act in violation thereof, I will not ignore it and will consult with my superiors or the relevant divisions..."
        translated_ru: "...или узнав о нарушении, я не буду это игнорировать и обращусь к руководителю или в профильное подразделение."
        section_title: "Consultation and Report on Doubts and Concerns about Compliance"
        relevance_comment: "Закреплена обязанность сообщать о нарушениях (HOT06)."
    other_principles: []

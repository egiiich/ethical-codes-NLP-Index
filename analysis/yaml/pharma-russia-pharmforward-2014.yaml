    key_excerpts:
      - excerpt_id: "COMP03_explicit_section"
        original: "В Компании запрещается заключение соглашений с партнерами по бизнесу, которые бы были направлены на ограничение конкуренции."
        translated_ru: "В компании прямо запрещены соглашения, ограничивающие конкуренцию."
        section_title: "6.1. Борьба со сговорами"
        relevance_comment: "Прямой запрет антиконкурентного сговора."
      - excerpt_id: "COMP06_explicit_section"
        original: "Примерами запрещенных соглашений ... служат соглашения, которые ведут ... к необоснованному отказу от заключения договоров ...; навязыванию контрагенту невыгодных условий договора."
        translated_ru: "Запрещены практики необоснованного отказа от договоров и навязывания невыгодных условий контрагентам."
        section_title: "6.1. Борьба со сговорами"
        relevance_comment: "Прямое ограничение практик ослабления конкурентов через доступ к сделкам."
      - excerpt_id: "COMP07_explicit_section"
        original: "Реализация товаров, изготовление которых нарушает авторские и патентные права владельцев изобретений, произведений и товарных знаков, преследуется законом."
        translated_ru: "Продажа контрафакта и нарушение патентных/авторских прав прямо признаются недопустимыми и преследуемыми законом."
        section_title: "6.2. Борьба с незаконной торговлей"
        relevance_comment: "Прямое уважение ИС и запрет нарушений прав."
      - excerpt_id: "COMP05_brief_mention"
        original: "Компания ... обеспечивает принцип свободной конкуренции."
        translated_ru: "Компания кратко фиксирует приверженность принципу свободной конкуренции."
        section_title: "5. Безопасность взаимодействия с контрагентами"
        relevance_comment: "Краткое подтверждение уважения к честной конкурентной среде."

    key_excerpts:
      - excerpt_id: "WtoC01_brief_mention"
        original: "Кодекс устанавливает стандарты ответственного поведения для всех сотрудников Компании."
        translated_ru: "Для всех сотрудников установлены стандарты ответственного поведения в работе."
        section_title: "1.1. Что такое Кодекс этики"
        relevance_comment: "Краткое подтверждение требуемого уровня качества исполнения обязанностей."
      - excerpt_id: "WtoC02_explicit_section"
        original: "Использование активов Компании в личных целях не допускается ..."
        translated_ru: "Использование активов компании в личных целях запрещено."
        section_title: "4.2. Электронные средства связи"
        relevance_comment: "Прямое требование сохранности и целевого использования активов."
      - excerpt_id: "WtoC03_explicit_section"
        original: "Каждый сотрудник ... в целях защиты конфиденциальной информации должен соблюдать следующие принципы ..."
        translated_ru: "Сотрудники обязаны соблюдать принципы защиты конфиденциальной информации."
        section_title: "4.1. Конфиденциальная информация"
        relevance_comment: "Прямое требование информационной безопасности."
      - excerpt_id: "WtoC04_implicit_scattered"
        original: "Контрафакт ... нарушает авторские и патентные права ...; Использование конфиденциальной информации ... только в интересах Компании."
        translated_ru: "Защита результатов интеллектуальной деятельности поддерживается через запрет контрафакта и нецелевого использования информации."
        section_title: "4.1 и 6.2"
        relevance_comment: "Принцип выражен в нескольких разделах, без единого выделенного блока об ИС компании."
      - excerpt_id: "WtoC05_explicit_section"
        original: "Сотрудники Компании ... обязаны следовать правилам и принципам, которые содержатся в настоящем Кодексе, и предотвращать нарушения."
        translated_ru: "Сотрудники обязаны соблюдать нормы кодекса и закона и предотвращать нарушения."
        section_title: "1.3. Помощь в вопросах регулирования"
        relevance_comment: "Прямой правовой комплаенс сотрудников."
      - excerpt_id: "WtoC06_brief_mention"
        original: "... им следует незамедлительно сообщить ... непосредственному руководителю ..."
        translated_ru: "При сомнениях сотрудник обязан эскалировать вопрос руководителю/ответственным лицам."
        section_title: "1.3. Помощь в вопросах регулирования"
        relevance_comment: "Краткое подтверждение субординации в принятии решений."
      - excerpt_id: "WtoC09_explicit_section"
        original: "Каждый сотрудник Компании обязан ... участвовать в обучении и тренингах ..."
        translated_ru: "Сотрудники обязаны участвовать в обучении и тренингах по кодексу."
        section_title: "1.4. Соблюдение Кодекса этики и ответственность"
        relevance_comment: "Прямое требование поддерживать профессиональный уровень."
      - excerpt_id: "WtoC10_explicit_section"
        original: "Компания придает огромное значение защите репутации."
        translated_ru: "Компания прямо закрепляет приоритет защиты деловой репутации."
        section_title: "7. Поведение сотрудников"
        relevance_comment: "Прямой акцент на репутационной ответственности сотрудников."

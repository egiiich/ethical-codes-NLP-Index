    key_excerpts:
      - excerpt_id: "HOT01_explicit_section"
        original: "В случае ... сомнений ... им следует незамедлительно сообщить ... одним или несколькими из указанных ниже способов."
        translated_ru: "При подозрениях работники должны использовать официальные каналы сообщения; доступ дан всем сотрудникам."
        section_title: "1.3. Помощь в вопросах регулирования"
        relevance_comment: "Прямое правило о доступности каналов сообщения для работников."
      - excerpt_id: "HOT02_explicit_section"
        original: "Вся информация ... будет рассматриваться с соблюдением конфиденциальности."
        translated_ru: "Все сообщения рассматриваются с соблюдением конфиденциальности."
        section_title: "1.3. Помощь в вопросах регулирования"
        relevance_comment: "Прямое требование конфиденциальности материалов обращения."
      - excerpt_id: "HOT03_explicit_section"
        original: "Компания гарантирует, что предоставление добросовестным сотрудником ... не ... вызовет негативных последствий в отношении сообщившего."
        translated_ru: "Компания гарантирует отсутствие негативных последствий для добросовестного заявителя."
        section_title: "1.3. Помощь в вопросах регулирования"
        relevance_comment: "Прямой запрет реталиации."
      - excerpt_id: "HOT05_explicit_section"
        original: "Каждый случай разумно обоснованного обвинения подлежит должному расследованию."
        translated_ru: "Каждое обоснованное сообщение должно быть расследовано."
        section_title: "1.3. Помощь в вопросах регулирования"
        relevance_comment: "Принцип обязательного реагирования и расследования."
      - excerpt_id: "HOT06_explicit_section"
        original: "Сотрудники ... обязаны ... предотвращать нарушения, сообщая о любых подозрительных ситуациях."
        translated_ru: "Сотрудники обязаны сообщать о любых подозрительных ситуациях."
        section_title: "1.3. Помощь в вопросах регулирования"
        relevance_comment: "Прямая обязанность сообщения о нарушениях."
      - excerpt_id: "HOT09_brief_mention"
        original: "Лица, о которых было заявлено, должны быть оповещены ... до начала ... расследований."
        translated_ru: "Лицам, в отношении которых подано сообщение, обеспечивается уведомление до старта предварительных действий."
        section_title: "1.3. Помощь в вопросах регулирования"
        relevance_comment: "Краткий процедурный элемент права на участие до начала рассмотрения."

    key_excerpts:
      - excerpt_id: "CtoS01_explicit_section"
        original: "Компания выбирает контрагентов исключительно на конкурсной основе, обеспечивая принцип свободной конкуренции."
        translated_ru: "Контрагенты выбираются на конкурсной основе по принципу свободной конкуренции."
        section_title: "5. Безопасность взаимодействия с контрагентами"
        relevance_comment: "Прямое правило отбора поставщиков по эффективности/конкурсу."
      - excerpt_id: "CtoS02_brief_mention"
        original: "Компания берет на себя ответственность по ознакомлению действующих и/или потенциальных контрагентов с Кодексом этики."
        translated_ru: "Компания доводит правила кодекса до действующих и потенциальных контрагентов."
        section_title: "1.2. Кто должен соблюдать Кодекс этики"
        relevance_comment: "Краткое подтверждение информирования поставщиков."
      - excerpt_id: "CtoS03_brief_mention"
        original: "... за своевременное и точное выполнение условий всех договоров ... с учетом интересов контрагентов."
        translated_ru: "Компания декларирует добросовестное исполнение договоров с учетом интересов контрагентов."
        section_title: "5. Безопасность взаимодействия с контрагентами"
        relevance_comment: "Краткое подтверждение отказа от недобросовестного давления на контрагентов."
      - excerpt_id: "CtoS06_explicit_section"
        original: "Компания стремится создать долгосрочные отношения, основанные на высоких стандартах производственной деятельности."
        translated_ru: "Компания прямо ориентируется на долгосрочные отношения с контрагентами."
        section_title: "5. Безопасность взаимодействия с контрагентами"
        relevance_comment: "Прямой принцип устойчивого долгосрочного партнерства."
      - excerpt_id: "CtoS07_explicit_section"
        original: "Кандидатуры потенциальных контрагентов должны подвергаться проверке и анализу согласно внутренним локальным актам Компании."
        translated_ru: "Поставщики проходят формализованную проверку и анализ по внутренним процедурам."
        section_title: "5. Безопасность взаимодействия с контрагентами"
        relevance_comment: "Снижает риск манипуляций условиями отбора и усиливает объективность процесса."

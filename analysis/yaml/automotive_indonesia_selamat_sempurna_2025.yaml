    key_excerpts:
      - excerpt_id: "COMP03_explicit_section"
        original: "The Company conducts its business based on fair competition principles in accordance with the prevailing regulations."
        translated_ru: "Компания ведёт бизнес на принципах добросовестной конкуренции в соответствии с действующим регулированием."
        section_title: "Relationship with Competitors"
        relevance_comment: "Прямой антиконкурентный стандарт поведения."
      - excerpt_id: "COMP05_brief_mention"
        original: "The Company sees competition as a challenge to raise the Company’s performance."
        translated_ru: "Компания рассматривает конкуренцию как вызов для повышения своей эффективности."
        section_title: "Relationship with Competitors"
        relevance_comment: "Краткий позитивный и уважительный подход к конкуренции."
      - excerpt_id: "COMP08_explicit_section"
        original: "The Company is not permitted to discredit competitors in marketing, promotion, or advertising activities."
        translated_ru: "Компании не разрешается дискредитировать конкурентов в маркетинге, продвижении или рекламе."
        section_title: "Relationship with Competitors"
        relevance_comment: "Прямой запрет дискредитации конкурентов."

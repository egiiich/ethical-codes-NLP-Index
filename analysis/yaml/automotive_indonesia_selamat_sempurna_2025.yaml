    key_excerpts:
      - excerpt_id: "CtoS01_explicit_section"
        original: "Selection of the suppliers is based on professionalism and in line with QCDSM ..."
        translated_ru: "Выбор поставщиков основывается на профессионализме и соответствии принципам QCDSM ..."
        section_title: "Relationship with Suppliers"
        relevance_comment: "Прямой выбор поставщиков по критериям эффективности."
      - excerpt_id: "CtoS03_explicit_section"
        original: "... is not allowed to give or accept or ask for gifts or gratuities ... from suppliers ..."
        translated_ru: "... не допускается предоставлять, принимать или запрашивать подарки/гратификации ... от поставщиков ..."
        section_title: "Relationship with Suppliers"
        relevance_comment: "Прямой запрет злоупотреблений/коррупционного давления во взаимодействии с поставщиками."
      - excerpt_id: "CtoS04_explicit_section"
        original: "Strive to empower small and medium scale suppliers to take part in the procurement process ..."
        translated_ru: "Стремиться к расширению участия малых и средних поставщиков в процессе закупок ..."
        section_title: "Relationship with Suppliers"
        relevance_comment: "Прямая поддержка МСП-поставщиков."
      - excerpt_id: "CtoS06_explicit_section"
        original: "Have a common interest, equality and mutual trust based on fairness and social responsibility ..."
        translated_ru: "Иметь общность интересов, равенство и взаимное доверие на основе справедливости и социальной ответственности ..."
        section_title: "Relationship with Suppliers"
        relevance_comment: "Прямой ориентир на устойчивое партнёрство."

    key_excerpts:
      - excerpt_id: "CtoI01_explicit_section"
        original: "Provide equal (fair) treatment to Shareholders to exercise their rights in accordance with the Articles of Association and applicable regulations."
        translated_ru: "Предоставлять акционерам равное (справедливое) обращение для реализации их прав в соответствии с Уставом и применимыми нормами."
        section_title: "Relationship with Shareholders"
        relevance_comment: "Прямое требование равных прав акционеров."
      - excerpt_id: "CtoI03_explicit_section"
        original: "Each reporting, statements, and disclosure of information to Shareholders must be transparent, clear, accurate, consistent, complete ..."
        translated_ru: "Каждая отчётность, заявления и раскрытия информации акционерам должны быть прозрачными, ясными, точными, последовательными и полными ..."
        section_title: "Relationship with Shareholders"
        relevance_comment: "Прямое требование к качеству и полноте раскрытия информации."
      - excerpt_id: "CtoI04_brief_mention"
        original: "... communication with Shareholders shall only be done through one door (one door policy) ..."
        translated_ru: "... коммуникация с акционерами осуществляется только через единый канал (one door policy) ..."
        section_title: "Relationship with Shareholders"
        relevance_comment: "Краткое подтверждение процедурной прозрачности и управляемости коммуникаций."
      - excerpt_id: "CtoI05_explicit_section"
        original: "... are not permitted to use or share that information for securities trading purposes (“insider trading\") ..."
        translated_ru: "... не имеют права использовать или передавать такую информацию для целей торговли ценными бумагами (\"insider trading\") ..."
        section_title: "Insider Trading"
        relevance_comment: "Прямой запрет инсайдерской торговли."
      - excerpt_id: "CtoI07_explicit_section"
        original: "... delivers optimum benefits to its shareholders."
        translated_ru: "... обеспечивает оптимальные выгоды для своих акционеров."
        section_title: "Relationship with Shareholders"
        relevance_comment: "Прямое закрепление ориентированности на защиту интересов акционеров."
    other_principles: []

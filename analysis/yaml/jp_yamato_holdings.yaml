    key_excerpts:
      - excerpt_id: "COMP03_explicit_section"
        original: "We will comply with the Antimonopoly Act, the Subcontract Act, and related laws and regulations, and always engage in fair and free competition. We will not engage in unfair transactions ... such as matching transaction conditions with other companies in the same industry."
        translated_ru: "«Мы будем соблюдать Antimonopoly Act, Subcontract Act и связанные нормы и всегда вести честную и свободную конкуренцию. Мы не будем участвовать в недобросовестных сделках, включая согласование условий с компаниями той же отрасли»."
        section_title: "5. Adherence to laws and fair practices"
        relevance_comment: "Явный антисговорный и антимонопольный блок (COMP03)."
      - excerpt_id: "COMP05_explicit_section"
        original: "The Yamato Group seeks to be profitable through fair and honest competition."
        translated_ru: "«Группа Yamato стремится к прибыльности через честную и добросовестную конкуренцию»."
        section_title: "Corporate Philosophy"
        relevance_comment: "Прямой принцип fair/honest competition (COMP05)."
      - excerpt_id: "COMP07_explicit_section"
        original: "We shall thoroughly manage the confidential information and intellectual property of our company and other companies ... and shall not leak or infringe upon such information."
        translated_ru: "«Мы должны тщательно управлять конфиденциальной информацией и интеллектуальной собственностью нашей и других компаний ... и не допускать утечки или нарушения»."
        section_title: "Information management"
        relevance_comment: "Явное требование уважения ИС/конфиденциальности других компаний (COMP07)."

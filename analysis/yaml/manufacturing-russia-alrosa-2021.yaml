        excerpt_id: "HOT01_explicit_section"
        original: "В Компании функционирует канал обратной связи – «горячая линия» ..."
        translated_ru: "В компании действует формализованный канал горячей линии для сообщений о нарушениях."
        section_title: "11.2.6"
        relevance_comment: "Подтверждение статуса для принципа HOT01."
      -
        excerpt_id: "HOT02_explicit_section"
        original: "Компания гарантирует обеспечение конфиденциальности полученной информации и сведений о нем."
        translated_ru: "Компания гарантирует конфиденциальность данных заявителя."
        section_title: "11.2.7"
        relevance_comment: "Подтверждение статуса для принципа HOT02."
      -
        excerpt_id: "HOT03_explicit_section"
        original: "... отсутствие негативных последствий (в том числе какое-либо преследование или дискриминация)."
        translated_ru: "Прямо запрещены преследование и дискриминация заявителей."
        section_title: "11.2.7"
        relevance_comment: "Подтверждение статуса для принципа HOT03."
      -
        excerpt_id: "HOT04_explicit_section"
        original: "... работники и иные лица могут подавать обращения, в том числе анонимно."
        translated_ru: "Кодекс разрешает анонимные обращения."
        section_title: "11.2.6"
        relevance_comment: "Подтверждение статуса для принципа HOT04."
      -
        excerpt_id: "HOT05_explicit_section"
        original: "По всем фактам нарушения Кодекса ... проводятся ... проверки и/или служебные расследования."
        translated_ru: "Каждое сообщение о нарушении подлежит проверке/расследованию."
        section_title: "11.2.9"
        relevance_comment: "Подтверждение статуса для принципа HOT05."
      -
        excerpt_id: "HOT06_explicit_section"
        original: "... работники ... обязаны незамедлительно сообщить об этом своему непосредственному руководителю и/или в Комиссию ..."
        translated_ru: "Сотрудники обязаны незамедлительно сообщать о нарушениях."
        section_title: "11.2.4"
        relevance_comment: "Подтверждение статуса для принципа HOT06."

    key_excerpts:
      - excerpt_id: "CtoI01_explicit_section"
        original: "... apply the principle of balanced treatment in providing necessary information."
        translated_ru: "... применяют принцип сбалансированного (равного) подхода при предоставлении необходимой информации."
        section_title: "Investors"
        relevance_comment: "Закрепляет равный доступ инвесторов к информации."
      - excerpt_id: "CtoI03_explicit_section"
        original: "... provide actual, accurate, and prospective information."
        translated_ru: "... предоставляют актуальную, точную и перспективную информацию."
        section_title: "Investors"
        relevance_comment: "Прямое требование к полноте/своевременности раскрытия информации."
      - excerpt_id: "CtoI04_brief_mention"
        original: "... implement the principles of Good Corporate Governance, namely Fairness, Transparency, Accountability, and Responsibility ..."
        translated_ru: "... внедряют принципы надлежащего корпоративного управления: справедливость, прозрачность, подотчётность и ответственность ..."
        section_title: "General"
        relevance_comment: "Краткая опора на прозрачность и процедурность корпоративного управления."
      - excerpt_id: "CtoI05_explicit_section"
        original: "... shall avoid conflicts of interest ... including but not limited to insider trading ..."
        translated_ru: "... должны избегать конфликта интересов ... включая, помимо прочего, инсайдерскую торговлю ..."
        section_title: "General"
        relevance_comment: "Прямой запрет инсайдерской торговли."
      - excerpt_id: "CtoI07_brief_mention"
        original: "... effectively implement the code of conduct to increase shareholder value and protect the rights of other stakeholders."
        translated_ru: "... эффективно внедряют кодекс, чтобы повышать акционерную стоимость и защищать права других стейкхолдеров."
        section_title: "General"
        relevance_comment: "Фиксируется защита прав акционеров в общей форме."
    other_principles: []

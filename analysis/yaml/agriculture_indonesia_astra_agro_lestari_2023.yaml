    key_excerpts:
      - excerpt_id: "CtoS01_explicit_section"
        original: "Business partner selection shall be based on professionalism, alignment of values, and QCDSM (Quality, Cost, Delivery, Safety, Morale)."
        translated_ru: "Отбор бизнес-партнёров должен основываться на профессионализме, совпадении ценностей и критериях QCDSM (качество, стоимость, поставка, безопасность, мораль)."
        section_title: "Partnerships"
        relevance_comment: "Прямой критерий эффективности при выборе поставщиков/партнёров."
      - excerpt_id: "CtoS02_explicit_section"
        original: "The Company conducts an open tender in a transparent and accountable manner ..."
        translated_ru: "Компания проводит открытый тендер прозрачным и подотчётным образом ..."
        section_title: "Suppliers"
        relevance_comment: "Прямое закрепление открытого и равного конкурсного доступа."
      - excerpt_id: "CtoS03_brief_mention"
        original: "... strictly prohibited from giving or receiving any form of compensation from business partners ..."
        translated_ru: "... строго запрещено давать или получать любую форму вознаграждения от бизнес-партнёров ..."
        section_title: "Partnerships"
        relevance_comment: "Кратко ограничивает недобросовестное давление/коррупционные практики во взаимодействии с поставщиками."
      - excerpt_id: "CtoS04_explicit_section"
        original: "The Company actively seeks to empower small and medium business partners."
        translated_ru: "Компания активно стремится развивать малых и средних бизнес-партнёров."
        section_title: "Partnerships"
        relevance_comment: "Прямая поддержка МСП как социально значимой группы поставщиков."
      - excerpt_id: "CtoS06_explicit_section"
        original: "... prioritize establishing partnerships based on equality and mutual trust ..."
        translated_ru: "... отдают приоритет партнёрствам на основе равенства и взаимного доверия ..."
        section_title: "Partnerships"
        relevance_comment: "Прямая ориентация на устойчивое партнёрство."

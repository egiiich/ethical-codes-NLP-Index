    key_excerpts:
      - excerpt_id: "COMP01_implicit_scattered"
        original: "The Company ... may gather information about competitors as long as it does not violate prevailing laws and regulations."
        translated_ru: "Компания ... может собирать информацию о конкурентах только если это не нарушает действующее законодательство."
        section_title: "Competitors"
        relevance_comment: "Разрешён сбор только законной информации о конкурентах; это косвенно ограничивает получение конфиденциальных данных."
      - excerpt_id: "COMP03_explicit_section"
        original: "... strictly prohibited from engaging in any form of cooperation with competitors that may ... result in monopolistic practices."
        translated_ru: "... строго запрещено вступать в любую форму сотрудничества с конкурентами, которая может привести к монополистическим практикам."
        section_title: "Competitors"
        relevance_comment: "Прямой запрет антиконкурентного сговора."
      - excerpt_id: "COMP05_brief_mention"
        original: "... uphold fair, healthy, and transparent competition ..."
        translated_ru: "... поддерживают честную, здоровую и прозрачную конкуренцию ..."
        section_title: "Competitors"
        relevance_comment: "Краткая формулировка о добросовестной конкуренции и корректном отношении к конкурентам."
      - excerpt_id: "COMP08_explicit_section"
        original: "... strictly prohibited from disparaging competitors in any marketing, promotional, or advertising endeavors."
        translated_ru: "... строго запрещено дискредитировать конкурентов в маркетинге, продвижении или рекламе."
        section_title: "Competitors"
        relevance_comment: "Прямой запрет очернения конкурентов."
    other_principles: []

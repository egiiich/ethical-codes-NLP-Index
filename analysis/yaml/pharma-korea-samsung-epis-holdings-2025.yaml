    key_excerpts:
      - excerpt_id: "HOT01_explicit_section"
        original: "a reporting hotline is available to all our officers and employees to raise concerns about compliance."
        translated_ru: "Для всех сотрудников и руководителей доступна горячая линия для комплаенс-обращений."
        section_title: "III.2 Reporting Violations"
        relevance_comment: "Прямой доступ к каналу сообщений."
      - excerpt_id: "HOT03_explicit_section"
        original: "An employee reporting a suspected wrongdoing in good faith will not be subject to retaliation"
        translated_ru: "Сотрудник, добросовестно сообщивший о нарушении, защищён от репрессий."
        section_title: "III.3 Anti-Retaliation"
        relevance_comment: "Прямой запрет преследования информаторов."
      - excerpt_id: "HOT04_explicit_section"
        original: "Anonymity will be always guaranteed."
        translated_ru: "Анонимность сообщений всегда гарантируется."
        section_title: "III.2 Reporting Violations"
        relevance_comment: "Прямая гарантия анонимности."
      - excerpt_id: "HOT05_explicit_section"
        original: "Regardless of the method used to report concerns, they will be taken seriously and investigated thoroughly and appropriately."
        translated_ru: "Независимо от канала, сообщения рассматриваются серьёзно и тщательно расследуются."
        section_title: "III.2 Reporting Violations"
        relevance_comment: "Прямое обязательное расследование нарушений."
      - excerpt_id: "HOT06_brief_mention"
        original: "failure to report any known wrongdoing may also be a basis for disciplinary action."
        translated_ru: "Несообщение об известном нарушении может само по себе повлечь дисциплинарные меры."
        section_title: "III.2 Reporting Violations"
        relevance_comment: "Краткая обязанность сообщать о нарушениях."

    key_excerpts:
      - excerpt_id: "CtoS01_explicit_section"
        original: "... relationships with service providers and suppliers are based on price, quality, service and reputation ..."
        translated_ru: "... отношения с сервис-провайдерами и поставщиками строятся на цене, качестве, сервисе и репутации ..."
        section_title: "Relationships with Service Providers and Suppliers"
        relevance_comment: "Прямой отбор поставщиков по критериям эффективности."
      - excerpt_id: "CtoS03_explicit_section"
        original: "... no employee should accept or solicit any personal benefit from a service provider or supplier ..."
        translated_ru: "... ни один сотрудник не должен принимать или запрашивать личную выгоду от сервис-провайдера или поставщика ..."
        section_title: "Relationships with Service Providers and Suppliers"
        relevance_comment: "Прямой запрет злоупотребления позицией по отношению к поставщикам."
      - excerpt_id: "CtoS06_brief_mention"
        original: "Appropriate business gifts and entertainment are welcome courtesies designed to foster relationships with business partners."
        translated_ru: "Надлежащие деловые подарки и представительские расходы допустимы как вежливые практики для развития отношений с бизнес-партнёрами."
        section_title: "Gifts and Entertainment"
        relevance_comment: "Краткий ориентир на поддержание рабочих партнерских отношений."
      - excerpt_id: "CtoS07_brief_mention"
        original: "Employees should not take unfair advantage of anyone through manipulation ..."
        translated_ru: "Сотрудники не должны получать несправедливое преимущество через манипуляции ..."
        section_title: "Competition and Fair Dealing"
        relevance_comment: "Краткий запрет манипулятивных практик во взаимодействии с контрагентами, включая поставщиков."

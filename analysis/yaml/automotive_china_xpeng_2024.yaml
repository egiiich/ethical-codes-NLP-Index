    key_excerpts:
      - excerpt_id: "WtoC02_explicit_section"
        original: "Employees have a duty to protect the Company’s assets and ensure their efficient use for legitimate business purposes only."
        translated_ru: "Сотрудники обязаны защищать активы Компании и обеспечивать их эффективное использование только для законных деловых целей."
        section_title: "Corporate Assets and Confidential Information"
        relevance_comment: "Прямое требование по сохранности и эффективности использования активов."
      - excerpt_id: "WtoC03_explicit_section"
        original: "Every employee has a duty to respect and safeguard the confidentiality of the Company’s information ..."
        translated_ru: "Каждый сотрудник обязан уважать и защищать конфиденциальность информации Компании ..."
        section_title: "Safeguarding Confidential Information and Intellectual Property"
        relevance_comment: "Прямое требование конфиденциальности и информационной безопасности."
      - excerpt_id: "WtoC04_explicit_section"
        original: "Employees also have a duty to protect the Company’s intellectual property and other business assets."
        translated_ru: "Сотрудники также обязаны защищать интеллектуальную собственность Компании и иные бизнес-активы."
        section_title: "Safeguarding Confidential Information and Intellectual Property"
        relevance_comment: "Прямое требование защиты ИС компании."
      - excerpt_id: "WtoC05_explicit_section"
        original: "Employees have an obligation to comply with all laws, rules and regulations applicable to the Company’s operations."
        translated_ru: "Сотрудники обязаны соблюдать все законы, правила и регуляторные требования, применимые к деятельности Компании."
        section_title: "Compliance with Laws, Regulations and Policies"
        relevance_comment: "Прямое требование соблюдать законодательство."
      - excerpt_id: "WtoC08_brief_mention"
        original: "... employees should strive to comply with the law and conduct business honestly, fairly and in the best interests of the Company."
        translated_ru: "... сотрудники должны стремиться соблюдать закон и вести дела честно, справедливо и в наилучших интересах Компании."
        section_title: "Introduction"
        relevance_comment: "Краткая ориентация на результативное и ответственное поведение сотрудника."
      - excerpt_id: "WtoC10_explicit_section"
        original: "Reporting ... violations ... is ... an effort to safeguard the reputation and integrity of the Company and its employees."
        translated_ru: "Сообщение о нарушениях ... это ... усилие по защите репутации и добросовестности Компании и её сотрудников."
        section_title: "Reporting Violations of the Code"
        relevance_comment: "Прямое требование защищать деловую репутацию компании."

    key_excerpts:
      - excerpt_id: "COMP01_explicit_section"
        original: "Such actions include misappropriation or misuse of a competitor’s confidential information ..."
        translated_ru: "К таким действиям относится незаконное присвоение или неправомерное использование конфиденциальной информации конкурента ..."
        section_title: "Relationships with Competitors"
        relevance_comment: "Прямой запрет добычи/использования конфиденциальной информации конкурента."
      - excerpt_id: "COMP03_explicit_section"
        original: "Employees should avoid actions that would be contrary to laws governing competitive practices in the marketplace, including antitrust laws."
        translated_ru: "Сотрудники должны избегать действий, противоречащих законам о конкурентных практиках на рынке, включая антимонопольные законы."
        section_title: "Competition and Fair Dealing"
        relevance_comment: "Прямой запрет антиконкурентных сговоров через соблюдение antitrust требований."
      - excerpt_id: "COMP05_brief_mention"
        original: "Employees are obligated to deal fairly with ... competitors."
        translated_ru: "Сотрудники обязаны вести себя справедливо по отношению к ... конкурентам."
        section_title: "Competition and Fair Dealing"
        relevance_comment: "Краткий принцип уважительного и честного отношения к конкурентам."
      - excerpt_id: "COMP07_brief_mention"
        original: "... laws covering ... copyrights, trademarks and trade secrets ..."
        translated_ru: "... законы, охватывающие ... авторские права, товарные знаки и коммерческие тайны ..."
        section_title: "Compliance with Laws, Regulations and Policies"
        relevance_comment: "Краткая фиксация уважения интеллектуальных прав конкурентов и иных лиц."
      - excerpt_id: "COMP08_explicit_section"
        original: "Such actions include ... making false statements about the competitor’s business and business practices."
        translated_ru: "К таким действиям относится ... распространение ложных заявлений о бизнесе и практиках конкурента."
        section_title: "Relationships with Competitors"
        relevance_comment: "Прямой запрет порочащих/ложных заявлений о конкурентах."

    key_excerpts:
      - excerpt_id: "CtoI03_explicit_section"
        original: "... require the disclosure of accurate and complete information regarding the Company’s business, financial condition and results of operations."
        translated_ru: "... требуют раскрытия точной и полной информации о бизнесе Компании, её финансовом положении и результатах деятельности."
        section_title: "Accuracy of Financial Reports and Other Public Communications"
        relevance_comment: "Прямое требование полного и своевременного раскрытия для инвесторов."
      - excerpt_id: "CtoI04_brief_mention"
        original: "... all filings with the SEC ... be accurate and timely."
        translated_ru: "... все подаваемые в SEC документы ... должны быть точными и своевременными."
        section_title: "Accuracy of Financial Reports and Other Public Communications"
        relevance_comment: "Краткое подтверждение прозрачного и процедурного раскрытия решений/отчетности."
      - excerpt_id: "CtoI05_explicit_section"
        original: "Employees are prohibited from trading in shares ... while in possession of material, non-public information ..."
        translated_ru: "Сотрудникам запрещено торговать акциями ... при наличии существенной непубличной информации ..."
        section_title: "Prohibition of Insider Trading"
        relevance_comment: "Прямой запрет инсайдерской торговли."

    key_excerpts:
      - excerpt_id: "HOT01_brief_mention"
        original: "This Code applies to all of the directors, officers, employees and advisors of the Company ..."
        translated_ru: "Этот Кодекс применяется ко всем директорам, должностным лицам, сотрудникам и советникам Компании ..."
        section_title: "Introduction"
        relevance_comment: "Краткое подтверждение общего охвата работников механизмом сообщений."
      - excerpt_id: "HOT02_explicit_section"
        original: "All questions and reports of known or suspected violations ... will be treated with sensitivity and discretion."
        translated_ru: "Все вопросы и сообщения о известных или предполагаемых нарушениях ... рассматриваются деликатно и конфиденциально."
        section_title: "Reporting Violations of the Code"
        relevance_comment: "Прямой принцип конфиденциальности обращений."
      - excerpt_id: "HOT03_explicit_section"
        original: "The Company prohibits retaliation against an employee who, in good faith, seeks help or reports known or suspected violations."
        translated_ru: "Компания запрещает преследование сотрудника, который добросовестно обращается за помощью или сообщает о нарушениях."
        section_title: "Policy Against Retaliation"
        relevance_comment: "Прямой запрет реталиации."
      - excerpt_id: "HOT04_brief_mention"
        original: "... will protect your confidentiality to the greatest extent consistent with the law ..."
        translated_ru: "... будет защищать вашу конфиденциальность в максимально возможной степени в рамках закона ..."
        section_title: "Reporting Violations of the Code"
        relevance_comment: "Косвенная гарантия защищённости заявителя."
      - excerpt_id: "HOT05_brief_mention"
        original: "... reports ... involving an executive officer ... will be reviewed directly by the Board ..."
        translated_ru: "... сообщения ... в отношении executive officer ... будут рассмотрены напрямую Советом директоров ..."
        section_title: "Seeking Help and Information"
        relevance_comment: "Краткое подтверждение обязательного рассмотрения обращений."
      - excerpt_id: "HOT06_explicit_section"
        original: "Employees have a duty to report any known or suspected violation of this Code ..."
        translated_ru: "Сотрудники обязаны сообщать о любом известном или предполагаемом нарушении этого Кодекса ..."
        section_title: "Reporting Violations of the Code"
        relevance_comment: "Прямая обязанность сообщать о нарушениях."

        section_title: "Stakeholder Reliability"
        relevance_comment: "Прямой принцип инфобезопасности."
      - excerpt_id: "WtoC04_brief_mention"
        original: "Business Intelligence ... We respect the confidential and proprietary information of third parties."
        translated_ru: "Сотрудники должны уважать и не присваивать чужую конфиденциальную/проприетарную информацию."
        section_title: "Stakeholder Reliability"
        relevance_comment: "Краткое подтверждение этики обращения с ИС/данными."
      - excerpt_id: "WtoC05_explicit_section"
        original: "... act in compliance with not only applicable laws, regulations and industry codes, but also this ... Code of Conduct ..."
        translated_ru: "Сотрудники обязаны действовать в соответствии с законом, отраслевыми кодами и внутренними политиками."
        section_title: "CEO Message"
        relevance_comment: "Прямой правовой комплаенс."
      - excerpt_id: "WtoC10_brief_mention"
        original: "... maintaining credibility with our patients ... shareholders, and regulators."
        translated_ru: "Надежность отчетности и действий сотрудников напрямую связана с репутацией компании."
        section_title: "Stakeholder Reliability"
        relevance_comment: "Краткий репутационный принцип."

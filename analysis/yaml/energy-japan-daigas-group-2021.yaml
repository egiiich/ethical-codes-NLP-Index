    key_excerpts:
      -
        excerpt_id: "WtoC02_explicit_section"
        original: "We do not use the company's property, whether tangible or intangible, for personal purposes."
        translated_ru: "Мы не используем имущество компании (материальное и нематериальное) в личных целях."
        section_title: "4. Avoiding the use ... for personal reasons"
        relevance_comment: "Прямой запрет личного использования активов компании."
      -
        excerpt_id: "WtoC03_explicit_section"
        original: "We value information as an important corporate asset and handle it responsibly while preventing its leakage and loss."
        translated_ru: "Мы рассматриваем информацию как важный корпоративный актив и предотвращаем ее утечки и утраты."
        section_title: "14. Managing the proper use of information"
        relevance_comment: "Прямое требование по конфиденциальности и ИБ."
      -
        excerpt_id: "WtoC04_explicit_section"
        original: "We value intellectual properties as important corporate assets and properly manage our own intellectual properties."
        translated_ru: "Мы признаем интеллектуальную собственность важным активом и надлежаще ею управляем."
        section_title: "16. Properly handling intellectual property"
        relevance_comment: "Прямое требование защищать ИС компании."
      -
        excerpt_id: "WtoC05_explicit_section"
        original: "We maintain our proper knowledge of, and comply with, laws and regulations relevant to our business activities."
        translated_ru: "Мы поддерживаем знания и соблюдаем законы и нормы, относящиеся к нашей деятельности."
        section_title: "3. Complying with laws and regulations"
        relevance_comment: "Прямое требование соблюдения законов."
      -
        excerpt_id: "WtoC10_explicit_section"
        original: "we aim to be a corporate group that continues to be recognized for its excellence in business operations."
        translated_ru: "Компания стремится сохранять признание за высокое качество и этичность деятельности."
        section_title: "Preamble"
        relevance_comment: "Репутационный ориентир закреплен прямо."

    key_excerpts:
      -
        excerpt_id: "CtoB01_explicit_section"
        original: "We offer products and services at reasonable prices ... to meet the needs of society now and in the future."
        translated_ru: "Мы предоставляем продукты и услуги по разумной цене для удовлетворения потребностей общества."
        section_title: "8. Providing products and services"
        relevance_comment: "Прямой фокус на потребностях потребителей."
      -
        excerpt_id: "CtoB02_explicit_section"
        original: "We provide customers with clear explanations ... and accurate information on our products and services."
        translated_ru: "Мы предоставляем клиентам понятные объяснения и точную информацию о продуктах и услугах."
        section_title: "10. Interacting with customers"
        relevance_comment: "Прямое требование полноты и точности информации."
      -
        excerpt_id: "CtoB03_explicit_section"
        original: "We respond promptly to accidents and customer complaints ..."
        translated_ru: "Мы оперативно реагируем на инциденты и жалобы клиентов."
        section_title: "10. Interacting with customers"
        relevance_comment: "Прямой стандарт качества обслуживания."
      -
        excerpt_id: "CtoB04_explicit_section"
        original: "We offer products and services at reasonable prices ..."
        translated_ru: "Мы предлагаем продукты и услуги по разумным ценам."
        section_title: "8. Providing products and services"
        relevance_comment: "Прямое закрепление принципа справедливой цены."
      -
        excerpt_id: "CtoB05_explicit_section"
        original: "We conduct our business operations not only in accordance with laws and regulations but also based on sound ethical standards."
        translated_ru: "Бизнес ведется в соответствии с законом и высокими этическими стандартами."
        section_title: "3. Complying with laws and regulations"
        relevance_comment: "Прямое требование законности и этики."
      -
        excerpt_id: "CtoB07_explicit_section"
        original: "We respond promptly to accidents and customer complaints ... improve our work and prevent recurrence."
        translated_ru: "Компания поддерживает обратную связь через обработку жалоб и улучшение процессов."
        section_title: "10. Interacting with customers"
        relevance_comment: "Прямая поддержка каналов обратной связи."
      -
        excerpt_id: "CtoB09_explicit_section"
        original: "We prioritize safety in every aspect of our products and services."
        translated_ru: "Мы приоритизируем безопасность на всех этапах жизненного цикла продуктов и услуг."
        section_title: "9. Ensuring the safety of products and services"
        relevance_comment: "Прямое требование безопасности продукта/услуги."

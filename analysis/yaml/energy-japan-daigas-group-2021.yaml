    key_excerpts:
      -
        excerpt_id: "CtoS01_explicit_section"
        original: "We conduct business transactions ... making fair judgment based on ... quality and prices ..."
        translated_ru: "Сделки осуществляются на основе справедливой оценки качества, цены и иных факторов."
        section_title: "7. fair transactions"
        relevance_comment: "Прямые критерии справедливого выбора контрагента."
      -
        excerpt_id: "CtoS03_brief_mention"
        original: "We maintain equal terms with our counterparties, ensuring we do not unduly exploit our favorable positions."
        translated_ru: "Компания поддерживает равные условия с контрагентами и не злоупотребляет рыночной позицией."
        section_title: "7. fair transactions"
        relevance_comment: "Краткое, но прямое указание против злоупотребления властью."
      -
        excerpt_id: "CtoS06_explicit_section"
        original: "Building and maintaining sound relationships with business partners."
        translated_ru: "Компания прямо закрепляет курс на выстраивание и поддержание здоровых отношений с партнерами."
        section_title: "12. Business partners"
        relevance_comment: "Явная ориентация на устойчивое партнерство."

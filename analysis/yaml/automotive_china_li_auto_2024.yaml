        original: "No employee should take unfair advantage of anyone through manipulation, concealment ..."
        translated_ru: "Ни один сотрудник не должен получать несправедливое преимущество через манипуляции, сокрытие ..."
        section_title: "Brand and Reputation"
        relevance_comment: "Прямой запрет злоупотребления переговорной/рыночной позицией."
      - excerpt_id: "CtoS06_brief_mention"
        original: "... encourages its business partners ... to comply with this Code for a fair, trustworthy, and open corroborative environment."
        translated_ru: "... поощряет бизнес-партнёров ... соблюдать Кодекс для справедливой, доверительной и открытой среды сотрудничества."
        section_title: "Applicability"
        relevance_comment: "Краткий ориентир на устойчивое долгосрочное партнёрство."
      - excerpt_id: "CtoS07_explicit_section"
        original: "No employee should take unfair advantage of anyone through manipulation ... misrepresentation of material facts ... or any other unfair-dealing practice."
        translated_ru: "Ни один сотрудник не должен получать несправедливое преимущество через манипуляции ... искажение существенных фактов ... или иные недобросовестные практики."
        section_title: "Brand and Reputation"
        relevance_comment: "Прямой запрет манипулятивных практик во взаимодействии с поставщиками и партнёрами."

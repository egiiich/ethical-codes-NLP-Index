    key_excerpts:
      - excerpt_id: "WtoC02_explicit_section"
        original: "Employees should protect the Company’s assets and ensure their efficient use for legitimate business purposes only."
        translated_ru: "Сотрудники должны защищать активы компании и обеспечивать их эффективное использование только для законных деловых целей."
        section_title: "Protection and Use of Company Assets"

    key_excerpts:
      - excerpt_id: "COMP01_brief_mention"
        original: "No employee should take unfair advantage of anyone through ... abuse of privileged information ..."
        translated_ru: "Ни один сотрудник не должен получать несправедливое преимущество через ... злоупотребление привилегированной информацией ..."
        section_title: "Brand and Reputation"
        relevance_comment: "Кратко ограничивает неправомерное использование чувствительной информации в конкуренции."
      - excerpt_id: "COMP03_explicit_section"
        original: "The Company promotes fair dealing and fair competition ..."
        translated_ru: "Компания продвигает честные практики ведения бизнеса и добросовестную конкуренцию ..."
        section_title: "Brand and Reputation"
        relevance_comment: "Прямой принцип добросовестной конкуренции."
      - excerpt_id: "COMP05_brief_mention"
        original: "Each employee should endeavor to deal fairly with the Company’s customers, suppliers, competitors and employees."
        translated_ru: "Каждый сотрудник должен стремиться к справедливому взаимодействию с клиентами, поставщиками, конкурентами и коллегами."
        section_title: "Brand and Reputation"
        relevance_comment: "Краткий принцип уважительного отношения к конкурентам."
      - excerpt_id: "COMP07_explicit_section"
        original: "The Company respects intellectual property ..."
        translated_ru: "Компания уважает интеллектуальную собственность ..."
        section_title: "Brand and Reputation"
        relevance_comment: "Прямое требование уважать ИС конкурентов и других участников рынка."
      - excerpt_id: "COMP08_explicit_section"
        original: "No employee should take unfair advantage of anyone through ... misrepresentation of material facts ..."
        translated_ru: "Ни один сотрудник не должен получать несправедливое преимущество через ... искажение существенных фактов ..."
        section_title: "Brand and Reputation"
        relevance_comment: "Прямой запрет недобросовестной дискредитации и обмана в отношении конкурентов."

    key_excerpts:
      - excerpt_id: "HOT01_brief_mention"
        original: "This Code applies to all employees, interns, directors, supervisors and officers ..."
        translated_ru: "Этот Кодекс применяется ко всем сотрудникам, стажёрам, директорам, наблюдателям и должностным лицам ..."
        section_title: "Applicability"
        relevance_comment: "Кратко подтверждает универсальный охват механизма сообщений на всех работников."
      - excerpt_id: "HOT02_explicit_section"
        original: "All questions and reports of known or suspected violations of this Code will be treated with sensitivity and discretion."
        translated_ru: "Все вопросы и сообщения о известных или предполагаемых нарушениях Кодекса рассматриваются с соблюдением чувствительности и конфиденциальности."
        section_title: "Conclusion"
        relevance_comment: "Прямой принцип конфиденциальности обращения."
      - excerpt_id: "HOT03_explicit_section"
        original: "The Company strictly prohibits retaliation against an employee who, in good faith, seeks help or reports known or suspected violations."
        translated_ru: "Компания строго запрещает преследование сотрудника, который добросовестно обращается за помощью или сообщает о нарушениях."
        section_title: "Conclusion"
        relevance_comment: "Прямой запрет реталиации."
      - excerpt_id: "HOT04_brief_mention"
        original: "... will protect the employee’s confidentiality to the extent possible ..."
        translated_ru: "... будет защищать конфиденциальность сотрудника в максимально возможной степени ..."
        section_title: "Conclusion"
        relevance_comment: "Косвенная гарантия защищённости заявителя; анонимность как отдельная процедура не детализирована."
      - excerpt_id: "HOT05_brief_mention"
        original: "... immediately report the violation to the Compliance Officer, who will work with the employee to investigate his/her concern."
        translated_ru: "... нарушение нужно немедленно сообщить Compliance Officer, который совместно с сотрудником проведёт расследование его обращения."
        section_title: "Conclusion"
        relevance_comment: "Краткое подтверждение обязательного реагирования и расследования по поступившему сообщению."
      - excerpt_id: "HOT06_explicit_section"
        original: "All employees have a duty to report any known or suspected violation of this Code ..."
        translated_ru: "Все сотрудники обязаны сообщать о любом известном или предполагаемом нарушении Кодекса ..."
        section_title: "Conclusion"
        relevance_comment: "Прямая обязанность сообщать о нарушениях."

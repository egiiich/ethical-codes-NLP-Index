      - excerpt_id: "WtoC03_explicit_section"
        original: "... safeguard all electronic programs, data, communications and written materials from unauthorized access ..."
        translated_ru: "... защищать все электронные программы, данные, коммуникации и документы от несанкционированного доступа ..."
        section_title: "Protection and Use of Company Assets"
        relevance_comment: "Прямой принцип информационной безопасности и конфиденциальности."
      - excerpt_id: "WtoC04_explicit_section"
        original: "Intellectual property and relevant confidential information are the Company’s core assets ..."
        translated_ru: "Интеллектуальная собственность и соответствующая конфиденциальная информация — ключевые активы компании ..."
        section_title: "Intellectual Property and Confidentiality"
        relevance_comment: "Прямое требование защиты ИС компании."
      - excerpt_id: "WtoC05_explicit_section"
        original: "... compliance with applicable laws, rules and regulations;"
        translated_ru: "... соблюдение применимых законов, правил и регуляторных требований;"
        section_title: "Overview and Purpose"

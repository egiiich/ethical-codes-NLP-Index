    key_excerpts:
      - excerpt_id: "CtoI03_explicit_section"
        original: "... full, fair, accurate, timely, and understandable disclosure in reports and documents ... filed with ... the SEC ..."
        translated_ru: "... полное, справедливое, точное, своевременное и понятное раскрытие в отчётах и документах ... подаваемых в SEC ..."
        section_title: "Overview and Purpose"
        relevance_comment: "Прямое требование полного и своевременного раскрытия информации инвесторам."
      - excerpt_id: "CtoI04_brief_mention"
        original: "The Company has established a comprehensive risk assessment and internal management system ..."
        translated_ru: "Компания создала комплексную систему оценки рисков и внутреннего управления ..."
        section_title: "Management Systems"
        relevance_comment: "Краткая поддержка прозрачности и процедурности принятия решений."
      - excerpt_id: "CtoI05_explicit_section"
        original: "... employees are strictly forbidden to engage in any insider trading ..."
        translated_ru: "... сотрудникам строго запрещено участвовать в любой инсайдерской торговле ..."
        section_title: "Insider Trading"
        relevance_comment: "Прямой запрет инсайдерской торговли."

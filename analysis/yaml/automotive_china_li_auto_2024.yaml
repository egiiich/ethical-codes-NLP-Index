      - excerpt_id: "WtoC08_brief_mention"
        original: "... accountability for adherence to the Code."
        translated_ru: "... подотчётность за соблюдение Кодекса."
        section_title: "Overview and Purpose"
        relevance_comment: "Краткая нацеленность на достижение требуемого результата поведения."
      - excerpt_id: "WtoC09_brief_mention"
        original: "The Company also provides appropriate trainings for employees’ career development ..."
        translated_ru: "Компания также предоставляет соответствующие обучения для карьерного развития сотрудников ..."
        section_title: "Employees Growth"
        relevance_comment: "Краткая поддержка профессионального уровня сотрудников."
      - excerpt_id: "WtoC10_explicit_section"
        original: "The Company values brand awareness in long-term development and prohibits any behavior that harms the brand or the reputation of the Company ..."

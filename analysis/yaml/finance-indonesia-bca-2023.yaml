    key_excerpts:
      -
        excerpt_id: "WtoC01_brief_mention"
        original: "Pursue to achieve high standards of performance."
        translated_ru: "Сотрудники должны стремиться к высоким стандартам выполнения работы."
        section_title: "Duties and Authorities"
        relevance_comment: "Краткое подтверждение ориентации на качество труда."
      -
        excerpt_id: "WtoC02_explicit_section"
        original: "Every asset of the Company must be protected by the Company personnel and is fully utilized for the Company's business."
        translated_ru: "Сотрудники обязаны защищать активы компании и использовать их только для бизнеса."
        section_title: "Asset Security and Risk Management"
        relevance_comment: "Прямой принцип сохранности и целевого использования активов."
      -
        excerpt_id: "WtoC03_explicit_section"
        original: "Protect the confidentiality of customer and Company data."
        translated_ru: "Сотрудник обязан защищать конфиденциальность данных клиентов и компании."
        section_title: "Introduction"
        relevance_comment: "Прямое требование конфиденциальности информации."
      -
        excerpt_id: "WtoC05_explicit_section"
        original: "All decisions and actions must comply with the prevailing laws and regulations, as well as Company policies."
        translated_ru: "Все решения и действия должны соответствовать законам и внутренним политикам."
        section_title: "Compliance with the Code of Conduct"
        relevance_comment: "Прямое требование соблюдения законодательства."
      -
        excerpt_id: "WtoC10_explicit_section"
        original: "Maintain the Company's reputation."
        translated_ru: "Сотрудники обязаны поддерживать деловую репутацию компании."
        section_title: "Duties and Authorities"
        relevance_comment: "Прямой принцип защиты репутации компании."

        excerpt_id: "CtoS01_explicit_section"
        original: "The Company purchases equipment, materials, products and/or services based on an evaluation of the quality, benefits and prices offered by suppliers/vendors."
        translated_ru: "Выбор поставщиков строится на оценке качества, пользы и цены."
        section_title: "Suppliers and Vendors"
        relevance_comment: "Прямой критерий эффективности при выборе поставщика."
      -
        excerpt_id: "CtoS07_explicit_section"
        original: "Do not make excessive compromise in pre-qualifying vendors and verifying bills from vendors."
        translated_ru: "Запрещается манипулировать предквалификацией и проверкой счетов поставщиков."
        section_title: "Code of Conduct related to vendors and internal user"
        relevance_comment: "Прямой запрет действий, искажающих объективность закупки."

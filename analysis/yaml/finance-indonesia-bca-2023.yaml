      -
        excerpt_id: "COMP05_brief_mention"
        original: "Human dignity is always respected in any relations between the Company personnel and other parties."
        translated_ru: "Требование уважительного поведения можно интерпретировать как общий стандарт корректного отношения к внешним сторонам, включая конкурентов."

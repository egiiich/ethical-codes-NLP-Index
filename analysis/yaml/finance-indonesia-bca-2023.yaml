    key_excerpts:
      -
        excerpt_id: "HOT02_explicit_section"
        original: "Protection towards whistleblowers ... will be kept confidential."
        translated_ru: "Кодекс прямо требует конфиденциальности в отношении заявителя."
        section_title: "Obligation to Report on Violations of the Company Code of Conduct"
        relevance_comment: "Прямая защита конфиденциальности материалов и личности заявителя."
      -
        excerpt_id: "HOT04_explicit_section"
        original: "Company personnel who report the irregularities will be kept confidential, to prevent them from experiencing moral and material damage as a result of the report."
        translated_ru: "Компания гарантирует сокрытие личности сообщившего о нарушении."
        section_title: "Obligation to Report on Violations of the Company Code of Conduct"
        relevance_comment: "Прямая гарантия анонимности/защиты заявителя."
      -
        excerpt_id: "HOT06_explicit_section"
        original: "Company personnel who have information regarding violations of the Company's Code of Conduct, should immediately report it to the Anti-Fraud Bureau for follow-up."
        translated_ru: "Сотрудники обязаны незамедлительно сообщать о нарушениях в Anti-Fraud Bureau."
        section_title: "Obligation to Report on Violations of the Company Code of Conduct"
        relevance_comment: "Прямая обязанность сообщения о нарушениях."

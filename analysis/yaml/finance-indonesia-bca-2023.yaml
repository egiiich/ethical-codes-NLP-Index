      -
        excerpt_id: "CtoW04_brief_mention"
        original: "The Company provides: Health facilities, loans, and occupational safety guarantees for the Company personnel."
        translated_ru: "Есть краткое указание на поддержку здоровья сотрудников через медицинские бенефиты."
        section_title: "Welfare of the Company Personnel"
        relevance_comment: "Краткое подтверждение заботы о благополучии работников."
      -
        excerpt_id: "CtoW06_explicit_section"

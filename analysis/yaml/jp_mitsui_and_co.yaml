        section_title: "Part 3 Fair Business Practices"
        relevance_comment: "Явная норма антимонопольного и конкурентного соблюдения (COMP03)."
      - excerpt_id: "COMP05_explicit_section"
        original: "We will engage in fair business practices ... maintain our commitment to fairness and honesty in our business activities."
        translated_ru: "«Мы будем вести честные деловые практики ... сохранять приверженность честности и добросовестности в деловой деятельности»."
        section_title: "Key Principle — Fair Business Practices"
        relevance_comment: "Явно сформулирован принцип fair competition/fair conduct (COMP05)."
      - excerpt_id: "COMP07_explicit_section"
        original: "We will respect the confidential information and intellectual property rights of third parties."
        translated_ru: "«Мы будем уважать конфиденциальную информацию и права интеллектуальной собственности третьих лиц»."
        section_title: "Information and Intellectual Property"
        relevance_comment: "Прямая обязанность уважать ИС и конфиденциальные права третьих лиц (COMP07)."

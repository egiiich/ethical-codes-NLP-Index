        excerpt_id: "WtoC02_explicit_section"
        original: "we will not engage in personal conduct during working hours or use company property for personal purposes."
        translated_ru: "Запрещено использовать рабочее время и имущество компании в личных целях."
        section_title: "3. Distinction between public and private"
        relevance_comment: "Прямой запрет личного использования активов компании."
      -
        excerpt_id: "WtoC03_explicit_section"
        original: "we will not disclose ... information ... including postings on social media"

        section_title: "3. Thorough information management"
        relevance_comment: "Прямое требование конфиденциальности."
      -
        excerpt_id: "WtoC04_explicit_section"
        original: "We will protect and utilize the intellectual property rights of the corporate group and respect the intellectual property rights of others."
        translated_ru: "Компания защищает и использует ИС группы и уважает ИС других."
        section_title: "3. Protection of intellectual property"
        relevance_comment: "Прямая защита интеллектуальной собственности."
      -
        excerpt_id: "WtoC05_explicit_section"
        original: "we will ensure compliance with all relevant laws and regulations and the spirit of the law"
        translated_ru: "Компания обеспечивает соблюдение всех применимых законов и духа закона."
        section_title: "3. Compliance with laws"
        relevance_comment: "Прямое требование соблюдения законодательства."
      -
        excerpt_id: "WtoC10_explicit_section"

    key_excerpts:
      - excerpt_id: "WtoC02_explicit_section"
        original: "Employees should protect the Company’s assets and ensure their efficient use for legitimate business purposes only."
        translated_ru: "Сотрудники должны защищать активы Компании и обеспечивать их эффективное использование только в законных деловых целях."
        section_title: "Protection and Use of Company Assets"
        relevance_comment: "Прямое требование сохранности и эффективного использования активов."
      - excerpt_id: "WtoC03_explicit_section"
        original: "... safeguard all electronic programs, data, communications and written materials from unauthorized access ..."
        translated_ru: "... защищать все электронные программы, данные, коммуникации и документы от несанкционированного доступа ..."
        section_title: "Protection and Use of Company Assets"
        relevance_comment: "Прямой принцип конфиденциальности и ИБ."
      - excerpt_id: "WtoC04_explicit_section"
        original: "Employees shall abide by the Company’s rules and policies in protecting the intellectual property ..."
        translated_ru: "Сотрудники обязаны соблюдать правила Компании по защите интеллектуальной собственности ..."
        section_title: "Intellectual Property and Confidentiality"
        relevance_comment: "Прямое требование защиты интеллектуальной собственности компании."
      - excerpt_id: "WtoC05_explicit_section"
        original: "Each employee has an obligation to comply with the laws ... where the Company operates."
        translated_ru: "Каждый сотрудник обязан соблюдать законы ... где работает Компания."
        section_title: "Compliance with Laws and Regulations"
        relevance_comment: "Прямое требование соблюдения законодательства."
      - excerpt_id: "WtoC08_brief_mention"
        original: "... accountability for adherence to the Code."
        translated_ru: "... подотчётность за соблюдение Кодекса."
        section_title: "Purpose"
        relevance_comment: "Краткая ориентация на результативное соблюдение требований."
      - excerpt_id: "WtoC10_explicit_section"
        original: "Reporting ... violations ... is ... an action to safeguard the reputation and integrity of the Company ..."
        translated_ru: "Сообщение о нарушениях ... это действие по защите репутации и добросовестности Компании ..."
        section_title: "Violations of the Code"
        relevance_comment: "Прямое требование сохранять и защищать репутацию компании."

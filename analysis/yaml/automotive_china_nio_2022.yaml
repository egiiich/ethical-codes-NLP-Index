    key_excerpts:
      - excerpt_id: "COMP01_brief_mention"
        original: "No employee should take unfair advantage of anyone through ... abuse of privileged information ..."
        translated_ru: "Ни один сотрудник не должен получать несправедливое преимущество через ... злоупотребление привилегированной информацией ..."
        section_title: "Fair Dealing"
        relevance_comment: "Краткое ограничение на неправомерное использование чувствительной информации конкурента."
      - excerpt_id: "COMP03_implicit_scattered"
        original: "... laws covering ... antitrust prohibitions ..."
        translated_ru: "... законы, охватывающие ... антимонопольные запреты ..."
        section_title: "Compliance with Laws and Regulations"
        relevance_comment: "Косвенное подтверждение запрета антиконкурентных сговоров через обязательное соблюдение antitrust норм."
      - excerpt_id: "COMP05_brief_mention"
        original: "Each employee should endeavor to deal fairly with the Company’s ... competitors ..."
        translated_ru: "Каждый сотрудник должен стремиться к справедливому взаимодействию с ... конкурентами ..."
        section_title: "Fair Dealing"
        relevance_comment: "Краткий принцип уважительного и честного отношения к конкурентам."
      - excerpt_id: "COMP07_brief_mention"
        original: "... laws covering ... patent, copyrights, trademarks and trade secrets ..."
        translated_ru: "... законы, охватывающие ... патенты, авторские права, товарные знаки и коммерческие тайны ..."
        section_title: "Compliance with Laws and Regulations"
        relevance_comment: "Краткая фиксация уважения интеллектуальной собственности третьих лиц, включая конкурентов."
      - excerpt_id: "COMP08_brief_mention"
        original: "No employee should take unfair advantage of anyone through ... misrepresentation of material facts ..."
        translated_ru: "Ни один сотрудник не должен получать несправедливое преимущество через ... искажение существенных фактов ..."
        section_title: "Fair Dealing"
        relevance_comment: "Краткий запрет на порочащие/вводящие в заблуждение практики в отношении конкурентов."

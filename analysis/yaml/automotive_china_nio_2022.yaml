    key_excerpts:
      - excerpt_id: "HOT01_brief_mention"
        original: "This Code applies to all directors, officers and employees ..."
        translated_ru: "Этот Кодекс применяется ко всем директорам, должностным лицам и сотрудникам ..."
        section_title: "Applicability"
        relevance_comment: "Кратко подтверждает универсальный охват работников правилами сообщения о нарушениях."
      - excerpt_id: "HOT02_explicit_section"
        original: "All questions and reports of known or suspected violations ... will be treated with sensitivity and discretion."
        translated_ru: "Все вопросы и сообщения о известных или предполагаемых нарушениях ... рассматриваются с соблюдением чувствительности и конфиденциальности."
        section_title: "Violations of the Code"
        relevance_comment: "Прямой принцип конфиденциальности обращений."
      - excerpt_id: "HOT03_explicit_section"
        original: "The Company strictly prohibits retaliation against an employee who, in good faith, seeks help or reports known or suspected violations."
        translated_ru: "Компания строго запрещает преследование сотрудника, который добросовестно обращается за помощью или сообщает о нарушениях."
        section_title: "Violations of the Code"
        relevance_comment: "Прямой запрет реталиации."
      - excerpt_id: "HOT04_brief_mention"
        original: "... will protect the employee’s confidentiality to the extent possible ..."
        translated_ru: "... будет защищать конфиденциальность сотрудника в максимально возможной степени ..."
        section_title: "Violations of the Code"
        relevance_comment: "Косвенная гарантия защищённости заявителя/свидетелей."
      - excerpt_id: "HOT05_brief_mention"
        original: "... immediately report the violation to the Compliance Officer, who will work with the employee to investigate his/her concern."
        translated_ru: "... нарушение необходимо немедленно сообщать Compliance Officer, который совместно с сотрудником проведёт расследование обращения."
        section_title: "Violations of the Code"
        relevance_comment: "Краткое подтверждение обязательного реагирования и расследования."
      - excerpt_id: "HOT06_explicit_section"
        original: "All employees have a duty to report any known or suspected violation of this Code ..."
        translated_ru: "Все сотрудники обязаны сообщать о любом известном или предполагаемом нарушении данного Кодекса ..."
        section_title: "Violations of the Code"
        relevance_comment: "Прямая обязанность сообщать о нарушениях."

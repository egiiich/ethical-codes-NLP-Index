    key_excerpts:
      - excerpt_id: "CtoI03_explicit_section"
        original: "... full, fair, accurate, timely, and understandable disclosure in reports and documents that the Company files with ... the SEC ..."
        translated_ru: "... полное, справедливое, точное, своевременное и понятное раскрытие в отчётах и документах, которые Компания подает в SEC ..."
        section_title: "Purpose"
        relevance_comment: "Прямое требование к своевременному и полному раскрытию значимой информации."
      - excerpt_id: "CtoI04_brief_mention"
        original: "... all Company records must be complete, accurate and reliable ... and form the basis of ... disclosures to the public."
        translated_ru: "... все записи Компании должны быть полными, точными и надежными ... и являются основой публичных раскрытий."
        section_title: "Company Records"
        relevance_comment: "Краткое подтверждение прозрачности процедур раскрытия и принятия решений."
      - excerpt_id: "CtoI05_brief_mention"

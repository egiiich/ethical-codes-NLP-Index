    key_excerpts:
      - excerpt_id: "COMP03_explicit_section"
        original: "We do not participate in any concerted actions that wrongfully restrict trade, including discussing and agreeing with competitors about prices, volumes, production facilities or market distribution."
        translated_ru: "«Мы не участвуем ни в каких согласованных действиях, неправомерно ограничивающих торговлю, включая обсуждение и согласование с конкурентами цен, объемов, производственных мощностей или распределения рынка»."
        section_title: "5-1 Fair and Transparent Transactions"
        relevance_comment: "Прямой запрет картельного взаимодействия и рыночного сговора (COMP03)."
      - excerpt_id: "COMP05_explicit_section"
        original: "We respect the interests of our business partners and conduct fair business based on equitable relationships."
        translated_ru: "«Мы уважаем интересы наших деловых партнеров и ведем честный бизнес на основе равноправных отношений»."
        section_title: "5-1 Fair and Transparent Transactions"
        relevance_comment: "Явное закрепление принципа честной и справедливой конкуренции/ведения бизнеса (COMP05)."
      - excerpt_id: "COMP06_explicit_section"
        original: "We do not collude with companies in the same business area to refuse or suspend business transactions with any specific suppliers."
        translated_ru: "«Мы не вступаем в сговор с компаниями той же отрасли, чтобы отказывать конкретным поставщикам в сделках или приостанавливать такие сделки»."
        section_title: "5-1 Fair and Transparent Transactions"
        relevance_comment: "Прямой запрет координированного ограничения доступа контрагентов к сделкам/ресурсам (COMP06)."
      - excerpt_id: "COMP07_explicit_section"
        original: "We prevent infringing on the intellectual property rights of others, such as unauthorized use of software."
        translated_ru: "«Мы предотвращаем нарушение прав интеллектуальной собственности других лиц, например несанкционированное использование программного обеспечения»."
        section_title: "6-2 Information Control and Protection of Intellectual Property Rights"
        relevance_comment: "Прямое требование уважать ИС третьих лиц, включая конкурентов (COMP07)."

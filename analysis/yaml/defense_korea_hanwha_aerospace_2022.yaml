    key_excerpts:
      - excerpt_id: "CtoS02_explicit_section"
        original: "We will strive to provide fair trading opportunities in accordance with the applicable laws and regulations, and to achieve transparency and fair dealing in all transactions."
        translated_ru: "Мы будем стремиться предоставлять справедливые торговые возможности в соответствии с законами и обеспечивать прозрачность и честность всех сделок."
        section_title: "8. Shared growth with Business Partners"
        relevance_comment: "Прямой принцип равного и справедливого доступа/взаимодействия с партнерами и поставщиками."
      - excerpt_id: "CtoS03_explicit_section"
        original: "We will not make any rude remarks or engage in unfair practices by taking advantage of our Company’s superior position over our business partners."
        translated_ru: "Мы не будем использовать превосходящее положение компании для недобросовестных практик в отношении бизнес-партнеров."
        section_title: "8. Shared growth with Business Partners"
        relevance_comment: "Прямой запрет злоупотребления рыночной/переговорной властью."
      - excerpt_id: "CtoS06_explicit_section"
        original: "We will try to ensure mutual best interests with our business partners by acting in accordance with the principle of shared growth and fair trade."
        translated_ru: "Мы будем обеспечивать взаимную выгоду с бизнес-партнерами, следуя принципам совместного роста и честной торговли."
        section_title: "Shared growth with Business Partners"
        relevance_comment: "Прямая ориентация на долгосрочное и устойчивое партнерство."

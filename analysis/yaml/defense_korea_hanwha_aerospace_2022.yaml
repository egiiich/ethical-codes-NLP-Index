    key_excerpts:
      - excerpt_id: "WtoC01_explicit_section"
        original: "We understand the Company’s business ideologies and principles, and we will work diligently and responsibly in performing all of our duties."
        translated_ru: "Мы понимаем бизнес-принципы компании и будем выполнять все обязанности добросовестно и ответственно."
        section_title: "1. Good faith and dignity"
        relevance_comment: "Прямое требование высокого стандарта качества и ответственности в работе."
      - excerpt_id: "WtoC02_explicit_section"
        original: "We will use the Company’s expenses and all of its assets efficiently and appropriately for legitimate business purposes."
        translated_ru: "Мы будем использовать средства и активы компании эффективно и надлежащим образом только для легитимных деловых целей."
        section_title: "Protection of Company assets and information"
        relevance_comment: "Прямой принцип сохранности и эффективного использования активов."
      - excerpt_id: "WtoC03_explicit_section"
        original: "We will not disclose any non-public information about the Company ... to any third party."
        translated_ru: "Мы не будем раскрывать третьим лицам непубличную информацию о компании."
        section_title: "6. Harmony with the Company"
        relevance_comment: "Прямое требование конфиденциальности информации компании."
      - excerpt_id: "WtoC04_explicit_section"
        original: "We will strive to protect the intellectual property rights and trade secrets of the Company, and will prevent external leaks, disclosure, or personal use of the same."
        translated_ru: "Мы будем защищать права интеллектуальной собственности и коммерческие тайны компании, предотвращая утечки, раскрытие и личное использование."
        section_title: "5. Protection of Company assets and information"
        relevance_comment: "Прямое требование защиты интеллектуальной собственности компании."
      - excerpt_id: "WtoC05_explicit_section"
        original: "We will clearly distinguish between work and our personal affairs ... and comply with all applicable laws, industrial norms and standards."
        translated_ru: "Мы будем четко разделять работу и личные дела и соблюдать все применимые законы, отраслевые нормы и стандарты."
        section_title: "2. Fair and Transparent Work Ethics"
        relevance_comment: "Прямое требование соблюдения законов и норм."
      - excerpt_id: "WtoC06_brief_mention"
        original: "We will not harm the working environment by giving improper work orders or otherwise improperly exercise influence in abuse of our job position or authority."
        translated_ru: "Мы не будем вредить рабочей среде ненадлежащими распоряжениями и злоупотреблением должностными полномочиями."
        section_title: "3. Treating colleagues with consideration and respect"
        relevance_comment: "Краткое упоминание корректной управленческой субординации и запрета злоупотребления властью."
      - excerpt_id: "WtoC08_brief_mention"
        original: "As proud members of Hanwha, we will act with dignity and act in good faith to fulfil all of our responsibilities."
        translated_ru: "Как члены Hanwha, мы будем действовать достойно и добросовестно, исполняя все свои обязанности."
        section_title: "H-Standard action points"
        relevance_comment: "Краткая ориентация на ответственное достижение результата."
      - excerpt_id: "WtoC10_brief_mention"
        original: "Recognizing that our actions and decisions can affect the reputation and trustworthiness of the Company as a whole, we will strive to live with discipline and dignity."
        translated_ru: "Понимая, что наши действия влияют на репутацию и надежность компании, мы будем придерживаться дисциплины и достоинства."
        section_title: "1. Good faith and dignity"
        relevance_comment: "Краткая фиксация обязанности сохранять деловую репутацию компании."

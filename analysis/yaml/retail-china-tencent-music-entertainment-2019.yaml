    key_excerpts:
      - excerpt_id: "HOT01_explicit_section"
        original: "Reporting of such violations may also be done anonymously through email to the Company at a designated email address for compliance reporting."
        translated_ru: "Сообщения о нарушениях могут направляться анонимно на специальный email комплаенс-канала."
        section_title: "Compliance with this Code and Reporting"
        relevance_comment: "Прямой доступ к каналу сообщений."
      - excerpt_id: "HOT02_brief_mention"
        original: "If concerns or complaints require confidentiality ... the Company will endeavor to protect this confidentiality"
        translated_ru: "При необходимости конфиденциальности компания стремится обеспечить её защиту."
        section_title: "Compliance with this Code and Reporting"
        relevance_comment: "Краткий принцип конфиденциальности обращения."
      - excerpt_id: "HOT03_explicit_section"
        original: "The Company will not tolerate any kind of retaliation for reports or complaints regarding misconduct that were made in good faith."
        translated_ru: "Компания не допускает репрессий за добросовестные сообщения о нарушениях."
        section_title: "Compliance with this Code and Reporting"
        relevance_comment: "Прямой запрет преследования заявителей."
      - excerpt_id: "HOT04_explicit_section"
        original: "An anonymous report should provide enough information about the incident"
        translated_ru: "Кодекс прямо предусматривает формат анонимного сообщения о нарушении."
        section_title: "Compliance with this Code and Reporting"
        relevance_comment: "Прямая гарантия анонимного канала."
      - excerpt_id: "HOT05_explicit_section"
        original: "intends to thoroughly investigate any good faith reports of violations."
        translated_ru: "Компания обязуется тщательно расследовать добросовестные сообщения о нарушениях."
        section_title: "Compliance with this Code and Reporting"
        relevance_comment: "Прямой принцип обязательного расследования."
      - excerpt_id: "HOT06_explicit_section"
        original: "Employees, officers and directors should promptly report any concerns about a violation of ethics, laws, rules, regulations or this Code"
        translated_ru: "Сотрудники должны оперативно сообщать о подозрениях на нарушение этики, закона и Кодекса."
        section_title: "Compliance with this Code and Reporting"
        relevance_comment: "Прямая обязанность сообщать о нарушениях."

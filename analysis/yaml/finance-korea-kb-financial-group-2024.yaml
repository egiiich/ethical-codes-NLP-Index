    key_excerpts:
      - excerpt_id: "CtoB01_explicit_section"
        original: "KB Financial Group places the top priority on our customers ... and deliver customer delight by providing excellence in financial products and services."
        translated_ru: "Интересы клиентов являются главным приоритетом при оказании услуг."
        section_title: "Chapter 1: Ethics on Customers"
        relevance_comment: "Прямой клиент-ориентированный принцип."
      - excerpt_id: "CtoB03_brief_mention"
        original: "Employees and staff ... engaging in ethical marketing activities building on a strong foundation of expert financial knowledge."
        translated_ru: "Качество обслуживания поддерживается профессиональной экспертизой и этичным взаимодействием с клиентом."
        section_title: "Chapter 1: Ethics on Customers"
        relevance_comment: "Краткое указание на высокий стандарт сервиса."
      - excerpt_id: "CtoB05_explicit_section"
        original: "...does not engage in any immoral or unethical practices that infringe upon the rights of our customers."
        translated_ru: "Компания прямо запрещает неэтичные практики, нарушающие права клиентов."
        section_title: "Chapter 1: Ethics on Customers"
        relevance_comment: "Прямое требование действовать в рамках права и этики."
      - excerpt_id: "CtoB08_explicit_section"
        original: "KB Financial Group is committed to safeguarding the property, security and personal information of our customers."
        translated_ru: "Компания обязуется защищать имущество, безопасность и персональные данные клиентов."
        section_title: "Chapter 1: Ethics on Customers"
        relevance_comment: "Прямой принцип защиты данных клиентов."

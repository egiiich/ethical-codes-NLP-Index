    key_excerpts:
      - excerpt_id: "HOT05_brief_mention"
        original: "Should violation of employee ethics guidelines occur, KB Financial Group must strive to prevent a reoccurrence ... through thorough investigation ..."
        translated_ru: "При нарушениях этики компания обязуется проводить тщательное разбирательство и профилактику повторов."
        section_title: "Chapter 7: Employee Code of Conduct"
        relevance_comment: "Упоминается обязательная реакция на нарушения."
      - excerpt_id: "HOT06_explicit_section"
        original: "Employees and staff of KB Financial Group must report to the ethics department any attempt to force behavior in violation ... or upon witnessing such behavior."
        translated_ru: "Сотрудники обязаны сообщать в отдел этики о попытках нарушений и о замеченных нарушениях."
        section_title: "Chapter 7: Employee Code of Conduct"
        relevance_comment: "Прямая обязанность сообщения о нарушениях."

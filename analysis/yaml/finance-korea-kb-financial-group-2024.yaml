        original: "We do not make unfair demands by using our preferred market position."
        translated_ru: "Запрещено предъявлять несправедливые требования, используя более сильную рыночную позицию."
        section_title: "Chapter 4: Ethics on Competitors and Partners"
        relevance_comment: "Прямой запрет злоупотребления рыночной властью к партнерам."
      - excerpt_id: "CtoS06_explicit_section"
        original: "KB Financial Group pursues joint win-win growth and development by building mutual trust and cooperative relationships with our suppliers through fair and transparent business practices."

    key_excerpts:
      - excerpt_id: "CtoI01_explicit_section"
        original: "KB Financial Group protects the rights of our shareholders and investors, respecting their rightful demands and suggestions."
        translated_ru: "Компания защищает права акционеров и инвесторов и уважает их законные требования."
        section_title: "Chapter 2: Ethics on Shareholders and Investors"
        relevance_comment: "Прямое закрепление прав инвесторов."
      - excerpt_id: "CtoI03_explicit_section"
        original: "We disclose our business information ... in complete, unbiased, timely and accurate and easily understandable manner."
        translated_ru: "Раскрытие информации осуществляется полно, объективно, своевременно и точно."
        section_title: "Chapter 2: Ethics on Shareholders and Investors"
        relevance_comment: "Прямой стандарт раскрытия информации."
      - excerpt_id: "CtoI04_explicit_section"
        original: "...building trust through a transparent and reasonable decision-making process..."
        translated_ru: "Процесс принятия решений должен быть прозрачным и обоснованным."
        section_title: "Chapter 2: Ethics on Shareholders and Investors"
        relevance_comment: "Прямой принцип прозрачного принятия решений."
      - excerpt_id: "CtoI07_explicit_section"
        original: "...engages with all of our shareholders fairly and equally, whether they be minor or major shareholders..."
        translated_ru: "Группа обязуется к равному и справедливому отношению к миноритарным и мажоритарным акционерам."
        section_title: "Chapter 2: Ethics on Shareholders and Investors"
        relevance_comment: "Прямой принцип защиты миноритариев."

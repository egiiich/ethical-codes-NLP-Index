    key_excerpts:
      - excerpt_id: "WtoC02_explicit_section"
        original: "Employees ... must use the physical assets, intellectual property rights, confidential business information and all other ... assets belonging to the company solely for the purpose of enhancing the company’s business value."
        translated_ru: "Активы компании разрешено использовать только в интересах бизнеса и повышения ее ценности."
        section_title: "Chapter 7: Employee Code of Conduct"
        relevance_comment: "Прямое требование по защите и целевому использованию активов."
      - excerpt_id: "WtoC03_explicit_section"
        original: "Employees ... must not unlawfully provide private or undisclosed information encountered during the course of their business activities to outside parties."
        translated_ru: "Запрещено незаконно передавать внешним лицам непубличную и конфиденциальную информацию."
        section_title: "Chapter 7: Employee Code of Conduct"
        relevance_comment: "Прямой принцип конфиденциальности."
      - excerpt_id: "WtoC05_explicit_section"
        original: "Employees ... comply with all work-related rules and regulations, upholding basic social values and integrity."
        translated_ru: "Сотрудники обязаны соблюдать все рабочие правила и законодательные требования."
        section_title: "Chapter 7: Employee Code of Conduct"
        relevance_comment: "Прямой комплаенс-принцип."
      - excerpt_id: "WtoC09_explicit_section"
        original: "KB Financial Group ... operating a wide range of training programs for building professional expertise."
        translated_ru: "Группа поддерживает профессиональное развитие и экспертизу через системные программы обучения."
        section_title: "Chapter 6: Ethics on Employees and Staff"
        relevance_comment: "Поддержание высокого профессионального уровня."

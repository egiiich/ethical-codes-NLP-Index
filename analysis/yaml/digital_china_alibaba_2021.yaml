    key_excerpts:
      - excerpt_id: "CtoI03_explicit_section"
        original: "It is Alibaba Group's policy to make true, fair, accurate, timely and full disclosure in compliance with all applicable laws, regulations and securities exchange rules."
        translated_ru: "Политика Alibaba — обеспечивать правдивое, справедливое, точное, своевременное и полное раскрытие информации в соответствии с требованиями законодательства и биржевых правил."
        section_title: "III.4 Disclosure of Material Information"
        relevance_comment: "Прямой принцип полного и своевременного раскрытия существенной информации."
      - excerpt_id: "CtoI04_brief_mention"
        original: "Employees must record Alibaba Group's financial activities ... true, fair, accurate, timely and complete."
        translated_ru: "Сотрудники обязаны отражать финансовую деятельность Alibaba правдиво, справедливо, точно, своевременно и полно."
        section_title: "III.5 Corporate Account Books and Records"
        relevance_comment: "Краткая фиксация прозрачности и корректности корпоративной отчетности."
      - excerpt_id: "CtoI05_explicit_section"
        original: "Alibaba Group prohibits trading in the stock or other securities of any company on the basis of material information that is not generally known or available to the public."
        translated_ru: "Alibaba запрещает торговлю ценными бумагами на основе существенной непубличной информации."
        section_title: "III.6 Insider Trading"
        relevance_comment: "Прямой запрет инсайдерской торговли."

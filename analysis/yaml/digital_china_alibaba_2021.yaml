    key_excerpts:
      - excerpt_id: "WtoC01_brief_mention"
        original: "Employees are expected to dedicate their best efforts to Alibaba Group's business."
        translated_ru: "От сотрудников ожидается, что они будут прилагать максимум усилий в интересах бизнеса Alibaba."
        section_title: "III. Responsibility to Alibaba Group"
        relevance_comment: "Краткое требование к качеству и добросовестности выполнения работы."
      - excerpt_id: "WtoC02_explicit_section"
        original: "Every Employee has a duty to protect Alibaba Group's assets ... and ensure their efficient use."
        translated_ru: "Каждый сотрудник обязан защищать активы Alibaba и обеспечивать их эффективное использование."
        section_title: "III.3 Protection and Proper Use of Assets"
        relevance_comment: "Прямой принцип сохранности и эффективного использования активов компании."
      - excerpt_id: "WtoC03_explicit_section"
        original: "Employees ... must not disclose private information in violation of applicable laws or Alibaba Group policies."
        translated_ru: "Сотрудники не должны раскрывать персональные данные в нарушение закона или политик Alibaba."
        section_title: "I.2 Employee Privacy"
        relevance_comment: "Прямое требование информационной конфиденциальности."
      - excerpt_id: "WtoC04_explicit_section"
        original: "Proprietary data and information and intellectual property rights are core assets of Alibaba Group."
        translated_ru: "Собственные данные, информация и права интеллектуальной собственности являются ключевыми активами Alibaba."
        section_title: "III.3 Protection and Proper Use of Assets"
        relevance_comment: "Прямое требование защиты интеллектуальной собственности компании."
      - excerpt_id: "WtoC05_explicit_section"
        original: "Each Employee must maintain the highest standards of business ethics and comply with all applicable laws, rules and regulations."
        translated_ru: "Каждый сотрудник обязан соблюдать высочайшие стандарты деловой этики и все применимые законы и нормы."
        section_title: "II. Compliance with Law and Ethical Conduct"
        relevance_comment: "Прямой комплаенс-стандарт для сотрудников."
      - excerpt_id: "WtoC08_brief_mention"
        original: "Employees are expected ... to make decisions that affect Alibaba Group using objective and independent standards."
        translated_ru: "Сотрудники должны принимать решения, влияющие на Alibaba, на основе объективных и независимых критериев."
        section_title: "III. Responsibility to Alibaba Group"
        relevance_comment: "Краткая ориентация на результативные и ответственные решения."
      - excerpt_id: "WtoC10_brief_mention"
        original: "The conduct of all Employees should ... promote a work environment that upholds and improves Alibaba Group's reputation for integrity and trust."
        translated_ru: "Поведение сотрудников должно поддерживать и укреплять репутацию Alibaba как компании с высоким уровнем честности и доверия."
        section_title: "Meeting Our Shared Obligations"
        relevance_comment: "Краткая фиксация обязанности поддерживать репутацию компании."

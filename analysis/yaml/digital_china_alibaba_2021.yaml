    key_excerpts:
      - excerpt_id: "HOT01_brief_mention"
        original: "Alibaba Group has instituted whistleblower rules and procedures ... for all Employees as well as other companies, organizations and individuals who deal with Alibaba Group."
        translated_ru: "Alibaba внедрила правила и процедуры горячей линии для сотрудников, а также внешних организаций и лиц, взаимодействующих с компанией."
        section_title: "IV.1 Reporting Violations"
        relevance_comment: "Кратко подтверждает доступность канала сообщений для широкого круга заявителей."
      - excerpt_id: "HOT02_brief_mention"
        original: "Alibaba Group will treat the information in a sensitive manner and disclose the information only as reasonably necessary to deal with the issues involved."
        translated_ru: "Alibaba обрабатывает информацию деликатно и раскрывает ее только в объеме, необходимом для рассмотрения вопроса."
        section_title: "IV.3 Reporting Complaints and Concerns Related to Accounting Issues"
        relevance_comment: "Краткая гарантия конфиденциального обращения с материалами."
      - excerpt_id: "HOT03_explicit_section"
        original: "Employees are prohibited from retaliating against any person for providing information or otherwise assisting in an investigation."
        translated_ru: "Сотрудникам запрещено преследовать любого человека за предоставление информации или помощь в расследовании."
        section_title: "IV.2 Prohibiting Retaliation"
        relevance_comment: "Прямой запрет реталиации за сообщения и участие в расследовании."
      - excerpt_id: "HOT05_brief_mention"
        original: "Alibaba Group may investigate any violations of this Code ... Employees who violate this Code ... may be subject to disciplinary action."
        translated_ru: "Alibaba может расследовать любые нарушения Кодекса, а нарушители подлежат дисциплинарным мерам."
        section_title: "IV.4 Discipline for Violations"
        relevance_comment: "Краткое подтверждение обязательного реагирования на нарушения."
      - excerpt_id: "HOT06_explicit_section"
        original: "If Employees know of or suspect a violation ... Employees must immediately report that information to the Compliance Officer."
        translated_ru: "Если сотрудник знает или подозревает нарушение, он обязан немедленно сообщить об этом сотруднику по комплаенсу."
        section_title: "IV.1 Reporting Violations"
        relevance_comment: "Прямо установлена обязанность сообщать о нарушениях."
    other_principles: []

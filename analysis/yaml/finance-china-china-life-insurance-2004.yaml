    key_excerpts:
      -
        excerpt_id: "WtoC02_explicit_section"
        original: "Each Director and Senior Officer shall protect the Company's assets and have them utilized reasonably, efficiently and effectively..."
        translated_ru: "Сотрудники обязаны защищать активы компании и обеспечивать их эффективное использование."
        section_title: "4. Protection and Use of the Company's Assets"
        relevance_comment: "Прямое требование сохранности активов."
      -
        excerpt_id: "WtoC03_explicit_section"
        original: "Each Director and Senior Officer shall strictly observe the confidentiality of non-public information..."
        translated_ru: "Сотрудники обязаны строго соблюдать конфиденциальность непубличной информации."
        section_title: "6. Confidentiality of Information"
        relevance_comment: "Прямое требование конфиденциальности."
      -
        excerpt_id: "WtoC05_explicit_section"
        original: "Each Director and Senior Officer shall comply with all applicable laws, rules, regulations and government policies..."
        translated_ru: "Сотрудники обязаны соблюдать применимые законы, правила и регуляторные требования."
        section_title: "8. Compliance with Laws, Regulations and Rules"
        relevance_comment: "Прямое требование правового комплаенса."

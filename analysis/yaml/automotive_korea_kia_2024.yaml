      - excerpt_id: "HOT03_explicit_section"
        original: "Organizations ... shall protect the identity of whistleblowers and take ... measures ... to protect them from ... discrimination and retaliation."
        translated_ru: "Организации должны защищать личность информаторов и принимать меры по защите от дискриминации и преследования."
        section_title: "3. Management System - Whistleblower Protection"
        relevance_comment: "Прямой запрет преследования заявителей."

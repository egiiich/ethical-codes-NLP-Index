    key_excerpts:
      - excerpt_id: "HOT01_explicit_section"
        original: "...all personnel of Lotte Shopping should report to the department in charge..."
        translated_ru: "...все сотрудники Lotte Shopping должны сообщать в ответственное подразделение..."
        section_title: "Article 5 [Operation of Whistleblowing System]"
        relevance_comment: "Прямо закреплен канал и обязанность сообщений (HOT01)."
      - excerpt_id: "HOT02_explicit_section"
        original: "No department staff and administrators working for the internal report system should reveal the identity of the whistleblower..."
        translated_ru: "Ни сотрудники, ни администраторы системы внутренних сообщений не должны раскрывать личность информатора..."
        section_title: "Article 5 [Operation of Whistleblowing System]"
        relevance_comment: "Прямое требование конфиденциальности материалов/личности заявителя (HOT02)."
      - excerpt_id: "HOT03_explicit_section"
        original: "...there should be no consequences or unfair treatment as a result of the reporting."
        translated_ru: "...не должно быть последствий или несправедливого обращения в результате сообщения о нарушении."
        section_title: "Article 5 [Operation of Whistleblowing System]"
        relevance_comment: "Прямой запрет реталиации (HOT03)."
      - excerpt_id: "HOT04_explicit_section"
        original: "...these internal reports should be processed anonymously."
        translated_ru: "...такие внутренние сообщения должны обрабатываться анонимно."
        section_title: "Article 5 [Operation of Whistleblowing System]"
        relevance_comment: "Прямая гарантия анонимности (HOT04)."
      - excerpt_id: "HOT05_explicit_section"
        original: "...should report ... regardless of the severity of the situation..."
        translated_ru: "...должны сообщать ... независимо от степени тяжести ситуации..."
        section_title: "Article 5 [Operation of Whistleblowing System]"
        relevance_comment: "Прямой принцип нулевой терпимости и обязательного реагирования (HOT05)."
      - excerpt_id: "HOT06_explicit_section"
        original: "Whistleblower: the employees, partner companies, and customers that are obliged to report..."
        translated_ru: "Информатор: сотрудники, партнерские компании и клиенты, которые обязаны сообщать..."
        section_title: "Article 3 [Definitions]"
        relevance_comment: "Прямо закреплена обязанность сообщения о нарушениях (HOT06)."

        original: "We will give our best to sincerely complete all tasks for which we are responsible..."
        translated_ru: "Мы будем добросовестно выполнять все задачи, за которые несем ответственность..."
        section_title: "Article 11 [Good Faith]"
        relevance_comment: "Прямое требование качественного исполнения обязанностей (WtoC01)."
      - excerpt_id: "WtoC02_explicit_section"
        original: "We will not use company assets for personal reasons..."
        translated_ru: "Мы не будем использовать активы компании в личных целях..."
        section_title: "Article 10 [Observation of Regulations]"
        relevance_comment: "Прямое требование сохранности и целевого использования активов (WtoC02)."
      - excerpt_id: "WtoC03_explicit_section"
        original: "...refrain from disclosing confidential company information to external parties."
        translated_ru: "...воздерживаться от раскрытия конфиденциальной информации компании внешним сторонам."
        section_title: "Article 10 [Observation of Regulations]"
        relevance_comment: "Прямое требование конфиденциальности (WtoC03)."
      - excerpt_id: "WtoC05_explicit_section"
        original: "Employees will refrain from all actions that go against relevant laws..."
        translated_ru: "Сотрудники должны воздерживаться от любых действий, нарушающих применимые законы..."
        section_title: "Article 10 [Observation of Regulations]"
        relevance_comment: "Прямое требование соблюдения законодательства (WtoC05)."
      - excerpt_id: "WtoC10_explicit_section"

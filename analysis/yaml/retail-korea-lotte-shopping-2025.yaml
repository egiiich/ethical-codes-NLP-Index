    key_excerpts:
      - excerpt_id: "CtoS02_explicit_section"
        original: "...we will guarantee equal opportunities for participation and ensure equitable provision of information necessary for transactions..."
        translated_ru: "...мы гарантируем равные возможности участия и справедливое предоставление информации, необходимой для сделок..."
        section_title: "Article 14 [Fair Trade]"
        relevance_comment: "Прямое требование равных возможностей и доступа к информации для поставщиков (CtoS02)."
      - excerpt_id: "CtoS03_explicit_section"
        original: "We will not receive any money, goods... from our suppliers for any operations related to our work."
        translated_ru: "Мы не будем получать деньги, товары и иные выгоды от поставщиков по вопросам, связанным с работой."
        section_title: "Article 16 [Prohibition of Non-Ethical Acts]"
        relevance_comment: "Прямой запрет злоупотреблений и неэтичных выгод в отношениях с поставщиками (CtoS03)."
      - excerpt_id: "CtoS05_explicit_section"
        original: "We will not unilaterally make alterations to the conditions and procedures of the transactions... without prior negotiation with the suppliers."
        translated_ru: "Мы не будем в одностороннем порядке изменять условия и процедуры сделок без предварительных переговоров с поставщиками."
        section_title: "Article 14 [Fair Trade]"
        relevance_comment: "Прямое требование своевременного информирования и согласования изменений (CtoS05)."
      - excerpt_id: "CtoS06_explicit_section"
        original: "...maintain equal positions in contracts, and give our best efforts to improving mutual cooperation."
        translated_ru: "...поддерживать равноправные позиции в договорах и прилагать усилия для улучшения взаимного сотрудничества."
        section_title: "Article 15 [Pursuit of Mutual Development]"
        relevance_comment: "Прямая ориентация на долгосрочное партнерство и взаимное развитие (CtoS06)."
      - excerpt_id: "CtoS07_brief_mention"
        original: "All transactions will undergo sufficient negotiations under the principle of reciprocity..."
        translated_ru: "Все сделки проходят достаточные переговоры на принципе взаимности..."
        section_title: "Article 14 [Fair Trade]"
        relevance_comment: "Краткий элемент против манипуляций условиями торгов (CtoS07)."

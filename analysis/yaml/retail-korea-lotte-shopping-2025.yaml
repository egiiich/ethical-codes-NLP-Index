      - excerpt_id: "CtoB02_explicit_section"
        original: "...provide customers with accurate information in a timely manner so that they can reasonably choose products and services..."
        translated_ru: "...предоставлять клиентам точную и своевременную информацию, чтобы они могли рационально выбирать продукты и услуги..."
        section_title: "Article 1.2 [Customer-centered Business Management]"

      - excerpt_id: "CtoB03_explicit_section"
        original: "We will maintain a pleasant and clean facility and business environment for the convenience of our customers."
        translated_ru: "Мы будем поддерживать приятную и чистую инфраструктуру и среду обслуживания для удобства клиентов."
        section_title: "Article 5 [Customer Satisfaction]"
        relevance_comment: "Прямое требование высокого уровня обслуживания (CtoB03)."
      - excerpt_id: "CtoB05_explicit_section"
        original: "...adhere to the company's articles of incorporation, company rules, and relevant laws..."
        translated_ru: "...соблюдать устав компании, внутренние правила и применимое законодательство..."
        section_title: "Article 7 [Open, Honest, and Principled Management]"
        relevance_comment: "Прямое требование законности и этичности (CtoB05)."
      - excerpt_id: "CtoB07_explicit_section"
        original: "We will address customer complaints and suggestions in a swift and accurate manner."

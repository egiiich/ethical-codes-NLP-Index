    key_excerpts:
      - excerpt_id: "CtoI03_explicit_section"
        original: "Employees must make accurate, transparent, timely and appropriate disclosures of the Company’s business activities to our stakeholders, including shareholders ..."
        translated_ru: "Сотрудники должны обеспечивать точное, прозрачное, своевременное и надлежащее раскрытие бизнес-деятельности Компании стейкхолдерам, включая акционеров ..."
        section_title: "Be Transparent and Accountable"
        relevance_comment: "Прямое требование полного и своевременного раскрытия информации."
      - excerpt_id: "CtoI04_brief_mention"
        original: "Employees must maintain accounts and records with integrity."
        translated_ru: "Сотрудники должны вести счета и записи добросовестно."
        section_title: "Be Transparent and Accountable"
        relevance_comment: "Краткая опора на прозрачное и ответственное корпоративное управление."
      - excerpt_id: "CtoI05_explicit_section"
        original: "Using it to trade or sharing it with others could result in insider trading, which is a serious violation."
        translated_ru: "Использование этой информации для торговли или передача другим может привести к инсайдерской торговле, что является серьёзным нарушением."
        section_title: "Be Transparent and Accountable"
        relevance_comment: "Прямой запрет инсайдерской торговли."

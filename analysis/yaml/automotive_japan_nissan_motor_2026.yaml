      - excerpt_id: "WtoC03_explicit_section"
        original: "Personal data of employees, third parties, and customers must be preserved with the same respect as company assets."
        translated_ru: "Персональные данные сотрудников, третьих лиц и клиентов должны защищаться с тем же уровнем ответственности, что и активы компании."
        section_title: "Preserve Company Assets"
        relevance_comment: "Прямой принцип конфиденциальности и ИБ."
      - excerpt_id: "WtoC04_explicit_section"
        original: "Nissan assets also include ... patents, intellectual property ..."

    key_excerpts:
      - excerpt_id: "CtoS01_explicit_section"
        original: "Do not work with any suppliers or other third parties that have not been properly reviewed and selected according to Nissan policies."
        translated_ru: "Не работайте с поставщиками или третьими сторонами, которые не прошли надлежащую проверку и отбор по политикам Nissan."
        section_title: "Be Impartial and Fair"
        relevance_comment: "Прямой выбор поставщиков по регламентированным критериям."
      - excerpt_id: "CtoS03_explicit_section"
        original: "Never ask for or offer any payment, gift, or hospitality to influence a business decision or secure an improper advantage."
        translated_ru: "Никогда не запрашивайте и не предлагайте платежи, подарки или гостеприимство для влияния на бизнес-решение или получения неправомерного преимущества."
        section_title: "Avoid Conflicts of Interest"
        relevance_comment: "Прямой запрет злоупотреблений/коррупционных преимуществ в отношениях с партнёрами."
      - excerpt_id: "CtoS06_brief_mention"
        original: "Our success depends on the strength of our relationships with our business partners and employees."
        translated_ru: "Наш успех зависит от прочности отношений с нашими бизнес-партнёрами и сотрудниками."
        section_title: "Be Impartial and Fair"
        relevance_comment: "Краткий ориентир на устойчивые партнёрские отношения."

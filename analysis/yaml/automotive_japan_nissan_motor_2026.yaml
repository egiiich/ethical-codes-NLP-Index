    key_excerpts:
      - excerpt_id: "HOT01_brief_mention"
        original: "The Code applies to everyone at Nissan."
        translated_ru: "Кодекс применяется ко всем в Nissan."
        section_title: "Our Responsibilities"
        relevance_comment: "Краткое подтверждение универсального охвата канала сообщений."
      - excerpt_id: "HOT03_explicit_section"
        original: "Employees who act in good faith when reporting suspected violations will be protected from retaliation."
        translated_ru: "Сотрудники, добросовестно сообщающие о предполагаемых нарушениях, защищены от преследования."
        section_title: "Be Active and Report Violations"
        relevance_comment: "Прямой запрет реталиации."
      - excerpt_id: "HOT04_brief_mention"
        original: "Remember that you may choose to report anonymously. Nissan will protect confidentiality to the extent allowable by local law."
        translated_ru: "Помните, что вы можете сообщать анонимно. Nissan будет защищать конфиденциальность в пределах, допустимых местным правом."
        section_title: "Be Active and Report Violations"
        relevance_comment: "Краткая гарантия анонимности/конфиденциальности."
      - excerpt_id: "HOT05_brief_mention"
        original: "Speaking up means ... reporting any ethical concerns or violations of the law, the Code, or Nissan policies."
        translated_ru: "Сигнализировать означает ... сообщать о любых этических сомнениях или нарушениях закона, Кодекса или политик Nissan."
        section_title: "Be Active and Report Violations"
        relevance_comment: "Краткое подтверждение обязательного реагирования через механизм SpeakUp."
      - excerpt_id: "HOT06_explicit_section"
        original: "Employees who suspect that a violation of the Code has occurred are obligated to report it as soon as possible."
        translated_ru: "Сотрудники, подозревающие нарушение Кодекса, обязаны сообщить об этом как можно скорее."
        section_title: "Be Active and Report Violations"
        relevance_comment: "Прямая обязанность сообщать о нарушениях."

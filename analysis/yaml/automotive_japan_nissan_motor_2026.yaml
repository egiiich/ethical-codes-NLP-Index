    key_excerpts:
      - excerpt_id: "WtoC02_explicit_section"
        original: "Nissan Employees must preserve and protect Company assets."
        translated_ru: "Сотрудники Nissan обязаны сохранять и защищать активы Компании."
        section_title: "Preserve Company Assets"

        relevance_comment: "Прямое требование защиты ИС компании."
      - excerpt_id: "WtoC05_explicit_section"
        original: "Nissan Employees must follow all applicable laws, regulations and Nissan policies and rules."
        translated_ru: "Сотрудники Nissan обязаны соблюдать все применимые законы, регуляторные требования и политики Nissan."

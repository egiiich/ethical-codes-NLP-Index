    key_excerpts:
      - excerpt_id: "WtoC02_explicit_section"
        original: "Covered Officers have the responsibility of protecting the Company's assets and preventing their misuse and misappropriation."
        translated_ru: "Руководители несут ответственность за защиту активов компании и предотвращение их неправомерного использования и присвоения."
        section_title: "VII. PROTECTION AND APPROPRIATE USE OF COMPANY ASSETS"
        relevance_comment: "Прямой стандарт сохранности активов компании."
      - excerpt_id: "WtoC03_explicit_section"
        original: "Each Covered Officer shall take all reasonable measures to protect, and prevent the unauthorized disclosure of confidential information."
        translated_ru: "Каждый руководитель должен принимать все разумные меры для защиты конфиденциальной информации и предотвращения ее несанкционированного раскрытия."
        section_title: "IV. CONFIDENTIALITY"
        relevance_comment: "Прямой стандарт по конфиденциальности и инфобезопасности."
      - excerpt_id: "WtoC05_explicit_section"
        original: "The Company requires each Covered Officer to act in accordance with all applicable laws, regulations and rules."
        translated_ru: "Компания требует, чтобы каждый руководитель действовал в соответствии со всеми применимыми законами, нормами и правилами."
        section_title: "VIII. COMPLIANCE, RULES AND REGULATIONS"
        relevance_comment: "Прямое требование соблюдения законодательства."
      - excerpt_id: "WtoC10_brief_mention"
        original: "The Covered Officers shall act honestly and ethically in all their business activities."
        translated_ru: "Руководители должны действовать честно и этично во всей своей деловой деятельности."
        section_title: "I. INTRODUCTION"
        relevance_comment: "Краткая фиксация репутационного стандарта поведения."

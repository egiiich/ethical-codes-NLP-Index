    key_excerpts:
      - excerpt_id: "COMP03_brief_mention"
        original: "No Covered Officer may take unfair advantage of others through manipulation, concealment, abuse of privileged information, misrepresentation of material facts or any other unfair dealing practice."
        translated_ru: "Ни один руководитель не должен получать нечестное преимущество через манипуляции, сокрытие фактов, злоупотребление привилегированной информацией или иные практики недобросовестного поведения."
        section_title: "VI. FAIR TRADE"
        relevance_comment: "Краткое подтверждение принципа честной конкуренции и запрета недобросовестных практик."
      - excerpt_id: "COMP05_brief_mention"
        original: "Each Covered Officer should deal fairly with the Company's customers, competitors, suppliers and employees."
        translated_ru: "Каждый руководитель должен действовать справедливо по отношению к клиентам, конкурентам, поставщикам и сотрудникам компании."
        section_title: "VI. FAIR TRADE"
        relevance_comment: "Краткая фиксация уважительного и корректного конкурентного поведения."

    key_excerpts:
      - excerpt_id: "HOT01_brief_mention"
        original: "This regulation applies to all stakeholders, including the company's executives and employees and partner companies that have a business relationship with the company."
        translated_ru: "Данный регламент распространяется на всех стейкхолдеров, включая руководителей, сотрудников и партнёрские компании."
        section_title: "Article 2 (Scope of Application)"
        relevance_comment: "Краткое подтверждение доступности механизма сообщений для широкого круга участников."
      - excerpt_id: "HOT02_explicit_section"
        original: "The informant's personal information or facts that may indicate that he or she is an informant must not be disclosed."
        translated_ru: "Персональные данные информатора и сведения, позволяющие его идентифицировать, не должны раскрываться."
        section_title: "Chapter 8 Whistle-blowing and informant protection"
        relevance_comment: "Прямая защита конфиденциальности данных заявителя."
      - excerpt_id: "HOT03_explicit_section"
        original: "There must not be any disadvantages, such as personnel or disciplinary action, or discrimination in working conditions due to whistle-blowing or reporting."
        translated_ru: "Не допускаются какие-либо негативные последствия, включая кадровые/дисциплинарные меры или дискриминацию условий труда из-за сообщения о нарушении."
        section_title: "Chapter 8 Whistle-blowing and informant protection"
        relevance_comment: "Прямой запрет преследования заявителей."
      - excerpt_id: "HOT04_brief_mention"
        original: "If unavoidable due to the circumstances of the reporter, it may be done anonymously."
        translated_ru: "Если это неизбежно по обстоятельствам заявителя, сообщение может быть анонимным."
        section_title: "Article 7 (Method of reporting)"
        relevance_comment: "Краткая гарантия анонимного сообщения."
      - excerpt_id: "HOT05_brief_mention"
        original: "The company may conduct audit activities if activities that violate the ethics regulations have been carried out."
        translated_ru: "Компания может проводить проверочные мероприятия, если установлено или предполагается нарушение этических норм."
        section_title: "Article 22 (Measures in case of violation)"
        relevance_comment: "Краткое подтверждение обязательного реагирования на нарушения."
      - excerpt_id: "HOT06_explicit_section"
        original: "Executives and employees ... if they become aware of ... misconduct ... must report the fact to the ES) Business Management Team."
        translated_ru: "Руководители и сотрудники, узнав о нарушении, обязаны сообщить этот факт в ES Business Management Team."
        section_title: "Article 20 (Reporting Obligation)"
        relevance_comment: "Прямая обязанность сообщать о нарушениях."
    other_principles: []

      - {principle_code: "WtoC09", principle_status: "brief_mention", evidence_excerpt_ids: ["WtoC09_brief_mention"]}
      - {principle_code: "WtoC10", principle_status: "explicit_section", evidence_excerpt_ids: ["WtoC10_explicit_section"]}
    key_excerpts:
      - excerpt_id: "WtoC01_brief_mention"
        original: "We faithfully perform the duties assigned to us according to our position."
        translated_ru: "Мы добросовестно выполняем обязанности, закреплённые за нами в соответствии с должностью."
        section_title: "Article 5 (Basic Principles)"
        relevance_comment: "Краткий акцент на качестве и добросовестности выполнения работы."
      - excerpt_id: "WtoC02_explicit_section"
        original: "All company assets ... are used only for business purposes ... and are not used for personal purposes."
        translated_ru: "Все активы компании используются только в служебных целях и не используются в личных целях."
        section_title: "Article 7 (Fair use of company assets)"
        relevance_comment: "Прямое требование сохранного и целевого использования активов."
      - excerpt_id: "WtoC03_explicit_section"
        original: "Company information and trade secrets must not be disclosed ... without prior approval."
        translated_ru: "Информация компании и коммерческие тайны не должны раскрываться без предварительного одобрения."
        section_title: "Article 17 (Leakage of company assets and information)"
        relevance_comment: "Прямое требование конфиденциальности и предотвращения утечек."
      - excerpt_id: "WtoC04_brief_mention"
        original: "All executives and employees must protect the corporate brands and trademarks of Hankook & Company."
        translated_ru: "Все руководители и сотрудники обязаны защищать корпоративные бренды и товарные знаки Hankook & Company."
        section_title: "Article 17 (Leakage of company assets and information)"
        relevance_comment: "Краткая фиксация защиты объектов ИС компании."
      - excerpt_id: "WtoC05_explicit_section"
        original: "Comply with relevant laws and company regulations when performing work."
        translated_ru: "При выполнении работы соблюдать применимые законы и внутренние регламенты компании."
        section_title: "Article 5 (Basic Principles)"
        relevance_comment: "Прямое требование соблюдения законов на рабочем месте."
      - excerpt_id: "WtoC09_brief_mention"
        original: "Create a working atmosphere where executives and employees can demonstrate proactive leadership through continuous self-development."
        translated_ru: "Создавать рабочую атмосферу, где руководители и сотрудники проявляют инициативное лидерство через непрерывное саморазвитие."
        section_title: "Article 13 (Creating a healthy organizational atmosphere)"
        relevance_comment: "Краткая поддержка профессионального развития сотрудников."
      - excerpt_id: "WtoC10_explicit_section"
        original: "Members must keep in mind that their words and actions represent the company and do their best to protect the company's trust and reputation."
        translated_ru: "Сотрудники должны помнить, что их слова и действия представляют компанию, и делать всё возможное для защиты доверия и репутации компании."
        section_title: "Article 24 (Damage to dignity and company reputation)"
        relevance_comment: "Прямое требование защиты деловой репутации компании."

    key_excerpts:
      - excerpt_id: "COMP01_brief_mention"
        original: "Also prohibited from sympathizing with or encouraging illegal activities to collect important information from competitors."
        translated_ru: "Также запрещено поддерживать или поощрять незаконные действия по сбору важной информации о конкурентах."
        section_title: "Article 17 (Leakage of company assets and information)"
        relevance_comment: "Краткий запрет недобросовестного получения конфиденциальной информации конкурентов."
      - excerpt_id: "COMP03_explicit_section"
        original: "Unfair practices such as bid rigging and abuse of market dominance are prohibited."
        translated_ru: "Недобросовестные практики, такие как сговор на торгах и злоупотребление рыночным доминированием, запрещены."
        section_title: "Article 26 (Compliance with anti-corruption laws)"
        relevance_comment: "Прямой запрет сговоров и антиконкурентных практик."
      - excerpt_id: "COMP05_brief_mention"
        original: "We comply with fair competition principles without slandering competitors."
        translated_ru: "Мы соблюдаем принципы честной конкуренции и не допускаем очернения конкурентов."
        section_title: "Article 9 (Responsibility to Customers)"
        relevance_comment: "Краткое подтверждение уважительного отношения в конкурентной среде."
      - excerpt_id: "COMP06_explicit_section"
        original: "Do not use your superior position to make unfair demands on partner companies."
        translated_ru: "Не использовать своё превосходящее положение для предъявления несправедливых требований к партнёрским компаниям."
        section_title: "Article 8 (Partner companies and partnerships)"
        relevance_comment: "Прямой запрет ослаблять других участников рынка за счёт властной позиции."
      - excerpt_id: "COMP07_brief_mention"
        original: "Respect the rights of others regarding intellectual property while also protecting your own rights."
        translated_ru: "Уважать права других в сфере интеллектуальной собственности, одновременно защищая собственные права."
        section_title: "Article 7 (Fair use of company assets)"
        relevance_comment: "Краткая фиксация уважения прав ИС конкурентов."
      - excerpt_id: "COMP08_explicit_section"
        original: "Making false or illegal claims about competitors or their products and services is prohibited."
        translated_ru: "Запрещено делать ложные или незаконные заявления о конкурентах либо их продуктах и услугах."
        section_title: "Article 19 (Marketing and sales using proper SNS)"
        relevance_comment: "Прямой запрет на порочащие/ложные утверждения о конкурентах."
    other_principles: []

    key_excerpts:
      - excerpt_id: "CtoI03_explicit_section"
        original: "Provide management performance accurately and promptly to respect shareholders' right to know and legitimate demands and suggestions."
        translated_ru: "Предоставлять информацию о результатах управления точно и своевременно, уважая право акционеров на осведомлённость и их законные запросы."
        section_title: "Article 10 (Responsibility to shareholders)"
        relevance_comment: "Прямое требование своевременного и точного раскрытия информации акционерам."
      - excerpt_id: "CtoI05_explicit_section"
        original: "Do not trade securities, such as buying or selling stocks, using information acquired in the course of your duties."
        translated_ru: "Не совершать сделки с ценными бумагами, включая покупку и продажу акций, используя информацию, полученную в ходе служебной деятельности."
        section_title: "Article 12 (Classification between public and private)"
        relevance_comment: "Прямой запрет инсайдерской торговли."
    other_principles: []

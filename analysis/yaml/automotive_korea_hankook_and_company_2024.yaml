    key_excerpts:
      - excerpt_id: "CtoS01_explicit_section"
        original: "Select partner companies based on objective and fair review standards."
        translated_ru: "Выбирать партнёрские компании на основе объективных и справедливых критериев оценки."
        section_title: "Article 8 (Partner companies and partnerships)"
        relevance_comment: "Прямой критерий отбора поставщиков по объективной эффективности."
      - excerpt_id: "CtoS02_explicit_section"
        original: "We provide equal trading opportunities to all qualified companies."
        translated_ru: "Мы предоставляем равные торговые возможности всем квалифицированным компаниям."
        section_title: "Article 8 (Partner companies and partnerships)"
        relevance_comment: "Прямое требование равного доступа поставщиков."
      - excerpt_id: "CtoS03_explicit_section"
        original: "Do not use your superior position to make unfair demands on partner companies."
        translated_ru: "Не использовать своё превосходящее положение для предъявления несправедливых требований к партнёрским компаниям."
        section_title: "Article 8 (Partner companies and partnerships)"
        relevance_comment: "Прямой запрет злоупотребления рыночной властью по отношению к поставщикам."
      - excerpt_id: "CtoS06_brief_mention"
        original: "We form reciprocal relationships with partner companies based on the principle of good faith."
        translated_ru: "Мы формируем взаимные отношения с партнёрскими компаниями на принципе добросовестности."
        section_title: "Article 8 (Partner companies and partnerships)"
        relevance_comment: "Краткая фиксация ориентации на устойчивое партнёрство."
    other_principles: []

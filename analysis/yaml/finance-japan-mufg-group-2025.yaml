      -
        excerpt_id: "HOT03_explicit_section"
        original: "No repercussive actions will be taken against a colleague making an honest report to protect what’s right."
        translated_ru: "MUFG прямо запрещает преследование сотрудников за добросовестные сообщения о нарушениях."
        section_title: "Message from the Group CEO"
        relevance_comment: "Прямой запрет реталиации заявителей."
      -
        excerpt_id: "HOT05_explicit_section"
        original: "Any conduct that fails to meet these standards may result in disciplinary measures, up to and including termination of employment."
        translated_ru: "Нарушение кодекса влечёт дисциплинарные меры вплоть до увольнения."
        section_title: "Failure to Abide by the Code of Conduct"
        relevance_comment: "Прямое подтверждение обязательного реагирования на нарушения."
      -
        excerpt_id: "HOT06_explicit_section"
        original: "If you become aware of conduct that contravenes ... you must promptly report the matter and seek advice ... via Compliance Helpline."
        translated_ru: "Сотрудник обязан оперативно сообщать о проблемных ситуациях через менеджера/комплаенс/горячую линию."
        section_title: "Reporting Issues and Seeking Advice"
        relevance_comment: "Прямая обязанность сообщения о нарушениях."

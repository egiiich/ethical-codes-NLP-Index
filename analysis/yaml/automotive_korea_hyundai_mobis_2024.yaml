        section_title: "Reporting Violations"
        relevance_comment: "Прямой запрет репрессий в отношении заявителей."
      - excerpt_id: "HOT04_explicit_section"
        original: "Hyundai Mobis shall undertake to ensure the anonymity of the whistleblower ..."

      - excerpt_id: "HOT02_explicit_section"
        original: "Hyundai Mobis shall undertake to ensure the anonymity of the whistleblower and maintain strict confidentiality of the content of the report."
        translated_ru: "Hyundai Mobis обеспечивает анонимность информатора и строгую конфиденциальность содержания сообщения."
        section_title: "Reporting Violations"

        section_title: "1.1 Conflict of Interest"
        relevance_comment: "Прямое требование защиты интеллектуальной собственности компании."
      - excerpt_id: "WtoC05_explicit_section"
        original: "A ll work mus t be carried out according to the regulations and procedures of the Company."
        translated_ru: "Вся работа должна выполняться в соответствии с регламентами и процедурами компании."
        section_title: "Compliance at Work"
        relevance_comment: "Прямой принцип соблюдения норм и правил на рабочем месте."
      - excerpt_id: "WtoC09_brief_mention"
        original: "We actively encourage and support our Employees efforts for self-enrichment through improving their capabilities ..."
        translated_ru: "Мы активно поддерживаем усилия сотрудников по саморазвитию через повышение их компетенций ..."
        section_title: "2.2 Working Environment"
        relevance_comment: "Краткая поддержка профессионального развития сотрудников."

    key_excerpts:
      - excerpt_id: "COMP01_explicit_section"
        original: "We must not acquire confidential and proprietary information related to other companies through improper means such as manipulation, misrepresentation, concealment, or breach of any non-disclosure agreement."
        translated_ru: "«Мы не должны получать конфиденциальную и проприетарную информацию других компаний неправомерными способами (манипуляция, искажение, сокрытие, нарушение NDA)»."
        section_title: "Privacy and Confidentiality"
        relevance_comment: "Прямой запрет на добычу конфиденциальной информации конкурентов/третьих сторон (COMP01)."
      - excerpt_id: "COMP03_explicit_section"
        original: "Fair Competition ... we abide by antitrust laws ... preventing unfair practices such as agreements among competitors to fix prices, divide markets, allocate customers or limit quality/production."
        translated_ru: "«Fair Competition ... мы соблюдаем антимонопольные законы ... предотвращая недобросовестные практики, такие как соглашения между конкурентами о фиксации цен, разделе рынков, распределении клиентов или ограничении качества/производства»."
        section_title: "Fair Competition"
        relevance_comment: "Явный анти-картельный и анти-сговорный блок (COMP03)."
      - excerpt_id: "COMP05_explicit_section"
        original: "We commit ourselves to fair and open competition on the merits of our products and services."
        translated_ru: "«Мы привержены честной и открытой конкуренции на основе достоинств наших продуктов и услуг»."
        section_title: "Fair Competition"
        relevance_comment: "Явный принцип fair/open competition (COMP05)."
      - excerpt_id: "COMP07_explicit_section"
        original: "We all have a duty to respect and protect the intellectual property rights of third parties."
        translated_ru: "«Мы все обязаны уважать и защищать права интеллектуальной собственности третьих лиц»."
        section_title: "Intellectual Property"
        relevance_comment: "Прямое требование по уважению ИС прав третьих сторон (COMP07)."

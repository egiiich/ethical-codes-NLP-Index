        original: "Partner companies are selected through fair and transparent processes."
        translated_ru: "Партнеры выбираются по справедливым и прозрачным процедурам."
        section_title: "Chapter 7 | Our Partners and Competitors"
        relevance_comment: "Краткое подтверждение прозрачного выбора контрагентов."
      - excerpt_id: "CtoS03_explicit_section"

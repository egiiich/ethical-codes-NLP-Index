    key_excerpts:
      - excerpt_id: "HOT01_explicit_section"
        original: "Any employee ... may report the facts through the Compliance Reporting System, regardless of their position, affiliation, or type of employment."
        translated_ru: "Любой сотрудник может подать сообщение независимо от должности и формы занятости."
        section_title: "Compliance Reporting System"
        relevance_comment: "Равный доступ к каналу сообщений."
      - excerpt_id: "HOT02_explicit_section"
        original: "The personal information of the reporter and the contents of the report are strictly protected as confidential."
        translated_ru: "Личность заявителя и содержание сообщения строго защищены как конфиденциальные."
        section_title: "Guarantee of Anonymity and Protection against Retaliation"
        relevance_comment: "Прямая конфиденциальность по горячей линии."
      - excerpt_id: "HOT03_explicit_section"
        original: "Guarantee of Anonymity and Protection against Retaliation."
        translated_ru: "Кодекс прямо закрепляет защиту заявителя от реталиации."
        section_title: "Compliance Reporting System"
        relevance_comment: "Прямой запрет преследования информаторов."
      - excerpt_id: "HOT05_explicit_section"
        original: "Any decision-making or behavior that violates the Group Code of Ethics may be subject to necessary measures, including disciplinary action."
        translated_ru: "Нарушения кодекса влекут обязательные меры, включая дисциплинарные взыскания."
        section_title: "Consequences of Violation"
        relevance_comment: "Принцип обязательного реагирования на нарушение."
      - excerpt_id: "HOT06_explicit_section"
        original: "If you witness or become aware of any conduct subject to reporting ... you are encouraged to actively utilize the Compliance Reporting System."
        translated_ru: "При выявлении нарушений сотрудники обязаны/поощряются использовать систему комплаенс-сообщений."
        section_title: "Compliance Reporting System"
        relevance_comment: "Прямое требование репортинга."

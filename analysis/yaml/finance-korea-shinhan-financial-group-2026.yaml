    key_excerpts:
      - excerpt_id: "COMP01_explicit_section"
        original: "We comply with antitrust and competition laws, and compete in a fair and transparent manner."
        translated_ru: "Компания прямо требует соблюдения антимонопольного законодательства и честной конкуренции."
        section_title: "Chapter 7 | Our Partners and Competitors"
        relevance_comment: "Прямой принцип fair competition."
      - excerpt_id: "COMP03_brief_mention"
        original: "Employees shall not collude with competitors about pricing ... nor will they exchange internal information with competitors."
        translated_ru: "Сотрудникам запрещен сговор с конкурентами по ценам и обмен внутренней информацией."
        section_title: "Notes on the Monopoly Regulation and Fair Trade Act"
        relevance_comment: "Краткое подтверждение запрета картельных практик."

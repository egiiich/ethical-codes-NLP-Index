        translated_ru: "Компания запрещает несправедливые и необоснованные сделки с партнерами."
        section_title: "Chapter 7 | Our Partners and Competitors"
        relevance_comment: "Прямой запрет злоупотребления в отношениях с партнерами."
      - excerpt_id: "CtoS06_explicit_section"

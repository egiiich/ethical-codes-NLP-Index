    key_excerpts:
      -
        excerpt_id: "WtoC02_explicit_section"
        original: "Keep and use Company assets in accordance with relevant systems and regulations."
        translated_ru: "Активы компании необходимо использовать и сохранять в соответствии с установленными правилами."
        section_title: "2 Properly Using and Protecting Company Assets"
        relevance_comment: "Прямое требование беречь активы компании."
      -
        excerpt_id: "WtoC03_explicit_section"
        original: "Disclose confidential information in violation of regulations."
        translated_ru: "Разглашение конфиденциальной информации с нарушением правил запрещено."
        section_title: "1 Keeping Confidential Information"
        relevance_comment: "Прямое требование конфиденциальности."
      -
        excerpt_id: "WtoC04_explicit_section"
        original: "Protect the Company’s intellectual property rights."
        translated_ru: "Необходимо защищать права интеллектуальной собственности компании."
        section_title: "2 Properly Using and Protecting Company Assets"
        relevance_comment: "Явная защита ИС компании."
      -
        excerpt_id: "WtoC05_explicit_section"
        original: "All CNPC employees ... should also comply with laws, regulations and other rules and regulations of CNPC."
        translated_ru: "Все сотрудники обязаны соблюдать законы, нормы и внутренние правила CNPC."
        section_title: "How to Use the Guidelines"
        relevance_comment: "Прямая обязанность соблюдать законы."
      -
        excerpt_id: "WtoC10_explicit_section"
        original: "improve CNPC’s image and reputation."
        translated_ru: "Сотрудники обязаны содействовать укреплению имиджа и репутации CNPC."
        section_title: "Message from the Chairman"
        relevance_comment: "Прямой акцент на сохранении репутации компании."

    key_excerpts:
      - excerpt_id: "COMP01_explicit_section"
        original: "We shall not improperly obtain information from competitors ... nor use or disclose information obtained illicitly."
        translated_ru: "Мы не должны неправомерно получать информацию у конкурентов ... и не должны использовать или раскрывать информацию, полученную незаконно."
        section_title: "2. Fair Competition and Trade"
        relevance_comment: "Прямой запрет на недобросовестный сбор конкурентной информации."
      - excerpt_id: "COMP03_explicit_section"
        original: "We shall not engage in activities with other businesses ... including ... price fixing, bid rigging, or improper market allocation."
        translated_ru: "Мы не должны участвовать в действиях с другими компаниями ... включая фиксацию цен, сговор на торгах или неправомерный раздел рынка."
        section_title: "2. Fair Competition and Trade"
        relevance_comment: "Прямой запрет картельного сговора."
      - excerpt_id: "COMP05_brief_mention"
        original: "We shall compete in the market fairly and conduct business ethically ..."
        translated_ru: "Мы должны конкурировать на рынке честно и вести бизнес этично ..."
        section_title: "2. Fair Competition and Trade"
        relevance_comment: "Краткая фиксация принципа добросовестной конкуренции."
      - excerpt_id: "COMP06_explicit_section"
        original: "We shall not engage in activities that would disrupt fair competition through ... abusing our market dominance or trading position."
        translated_ru: "Мы не должны совершать действия, нарушающие честную конкуренцию, включая злоупотребление рыночным доминированием или торговой позицией."
        section_title: "2. Fair Competition and Trade"
        relevance_comment: "Прямой запрет злоупотребления рыночной властью."
      - excerpt_id: "COMP07_explicit_section"
        original: "We shall ... not infringe on the intellectual property rights of other companies or individuals."
        translated_ru: "Мы не должны нарушать права интеллектуальной собственности других компаний или физических лиц."
        section_title: "2. Fair Competition and Trade"
        relevance_comment: "Прямое требование уважения ИС конкурентов."

        original: "Organizations implementing this Ethics Charter and Code of Conduct shall develop a reporting system that is internally and externally accessible 24 hours a day."
        translated_ru: "Организации, внедряющие данный Кодекс, должны развивать систему сообщений, доступную внутри и вне компании 24 часа в сутки."

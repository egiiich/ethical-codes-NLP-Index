    key_excerpts:
      - excerpt_id: "CtoI03_explicit_section"
        original: "All expenditures made by the Company are accurately reflected in the Company’s financial records ..."
        translated_ru: "Все расходы компании должны точно отражаться в финансовой отчетности."
        section_title: "V. Ensure Financial Integrity and Responsibility"
        relevance_comment: "Прямой принцип точного и прозрачного раскрытия финансовой информации."
      - excerpt_id: "CtoI04_brief_mention"
        original: "Our Company honors the practice of appropriateness, transparency, and accuracy in all of its business dealings."
        translated_ru: "Компания придерживается принципов надлежащести, прозрачности и точности во всех бизнес-процессах."
        section_title: "V. Ensure Financial Integrity and Responsibility"
        relevance_comment: "Краткое покрытие прозрачности процессов принятия решений и отчетности."
      - excerpt_id: "CtoI05_explicit_section"
        original: "Company Personnel ... are prohibited from trading securities based on Confidential Information and/or material information ... not officially published ..."
        translated_ru: "Сотрудникам запрещена торговля ценными бумагами на основе непубличной существенной информации."
        section_title: "VI.4 Insider Trading"
        relevance_comment: "Прямой запрет инсайдерской торговли."

    key_excerpts:
      - excerpt_id: "HOT01_explicit_section"
        original: "If You see or suspect any violation to the Code ... submit a report ... through our whistleblowing channel."
        translated_ru: "При обнаружении или подозрении на нарушение Кодекса необходимо сообщать через канал whistleblowing."
        section_title: "Speak Up"
        relevance_comment: "Прямое наличие канала и права на справедливое рассмотрение сообщений."
      - excerpt_id: "HOT02_brief_mention"
        original: "Whistleblowing reports are treated seriously, with full confidentiality ..."
        translated_ru: "Сообщения по whistleblowing рассматриваются серьезно и с полной конфиденциальностью."
        section_title: "Speak Up"
        relevance_comment: "Краткая гарантия конфиденциальности рассмотрения обращений."
      - excerpt_id: "HOT03_explicit_section"
        original: "Our Company does not tolerate any form of retaliation against anyone who makes a report in good faith."
        translated_ru: "Компания не допускает никаких форм преследования лиц, добросовестно подающих сообщения."
        section_title: "Non-Retaliation"
        relevance_comment: "Прямой запрет реталиации."
      - excerpt_id: "HOT04_brief_mention"
        original: "Reports are accepted anonymously where permitted by law."
        translated_ru: "Сообщения принимаются анонимно там, где это разрешено законом."
        section_title: "Speak Up"
        relevance_comment: "Краткая гарантия возможности анонимного обращения."
      - excerpt_id: "HOT06_explicit_section"
        original: "When encountering any suspected unethical behaviour or misconduct ... we must speak up and report it."
        translated_ru: "При любом подозрении на неэтичное поведение необходимо сообщать о нем."
        section_title: "Know Your Responsibilities"
        relevance_comment: "Прямая обязанность сообщать о нарушениях."

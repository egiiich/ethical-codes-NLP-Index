    key_excerpts:
      - excerpt_id: "COMP01_brief_mention"
        original: "We are committed to fair and ethical competition in our business and do not make use of Confidential Information relating to our competitors that is not disclosed in good faith."
        translated_ru: "Компания придерживается честной конкуренции и не использует конфиденциальную информацию конкурентов, полученную недобросовестно."
        section_title: "III. Protecting Confidentiality"
        relevance_comment: "Краткое покрытие запрета использования закрытой информации конкурентов."
      - excerpt_id: "COMP03_explicit_section"
        original: "Prevent the Company from forming cartels or monopolies and from abusing a dominant market position."
        translated_ru: "Компания предотвращает создание картелей/монополий и злоупотребление доминирующим положением."
        section_title: "VI.5 Anti Trust and Competition"
        relevance_comment: "Прямой антикартельный и антимонопольный принцип."
      - excerpt_id: "COMP06_brief_mention"
        original: "... prevent the Company ... from abusing a dominant market position."
        translated_ru: "Компания не допускает злоупотребления доминирующим положением."
        section_title: "VI.5 Anti Trust and Competition"
        relevance_comment: "Краткий запрет ослабления конкурентов за счет рыночной власти."

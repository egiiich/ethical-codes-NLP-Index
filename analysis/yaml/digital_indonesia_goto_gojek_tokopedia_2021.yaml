    key_excerpts:
      - excerpt_id: "WtoC01_explicit_section"
        original: "All Company Personnel should actively demonstrate the highest level of quality and ethical standards at all times."
        translated_ru: "Все сотрудники должны постоянно демонстрировать высочайший уровень качества и этических стандартов."
        section_title: "Know Your Responsibilities"
        relevance_comment: "Прямой стандарт качества выполняемой работы."
      - excerpt_id: "WtoC02_explicit_section"
        original: "Company Personnel have the responsibility to use and protect Company assets ..."
        translated_ru: "Сотрудники обязаны использовать и защищать активы компании."
        section_title: "IV. Protecting Company Assets"
        relevance_comment: "Прямой принцип сохранности активов компании."
      - excerpt_id: "WtoC03_explicit_section"
        original: "Confidential Information must at all times be kept confidential ..."
        translated_ru: "Конфиденциальная информация должна всегда сохраняться в тайне."
        section_title: "III.1 Confidential Information"
        relevance_comment: "Прямое требование информационной конфиденциальности."
      - excerpt_id: "WtoC04_explicit_section"
        original: "The Company’s intellectual property rights ... are among our most valuable assets ..."
        translated_ru: "Права интеллектуальной собственности компании являются одними из наиболее ценных активов и подлежат защите."
        section_title: "IV.1 Intellectual Property"
        relevance_comment: "Прямое требование защиты интеллектуальной собственности компании."
      - excerpt_id: "WtoC05_explicit_section"
        original: "Our Company ... takes its responsibilities to comply with the prevailing laws and regulations very seriously ..."
        translated_ru: "Компания и сотрудники обязаны строго соблюдать применимые законы и регулирование."
        section_title: "VI. Obey the Law"
        relevance_comment: "Прямой комплаенс-принцип соблюдения законов."
      - excerpt_id: "WtoC08_brief_mention"
        original: "Doing the right thing ... working with integrity ... is our way to realize the core values ..."
        translated_ru: "Добросовестная и честная работа рассматривается как основа устойчивого развития компании."
        section_title: "Know About the Code"
        relevance_comment: "Краткая ориентация на результат и ответственность."
      - excerpt_id: "WtoC10_brief_mention"
        original: "Do not share or post anything that may be detrimental to the Company’s business and/or its reputation."
        translated_ru: "Сотрудникам запрещено публиковать материалы, способные нанести вред бизнесу и репутации компании."
        section_title: "III.2 Social Media and External Communications"
        relevance_comment: "Краткое требование защиты деловой репутации компании."

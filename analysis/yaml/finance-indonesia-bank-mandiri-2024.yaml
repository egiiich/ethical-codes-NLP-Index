        excerpt_id: "HOT05_explicit_section"
        original: "Any action that has been proven as a violation of the code of conduct will be subject to sanctions in accordance with applicable regulations."
        translated_ru: "За доказанные нарушения кодекса прямо предусмотрены санкции."
        section_title: "Effort in Implementation and Enforcement of the Code of Conduct"
        relevance_comment: "Прямое подтверждение обязательного реагирования на нарушения."
      -
        excerpt_id: "HOT06_explicit_section"
        original: "The employees can report alleged violations of the implementation of the code of conduct to superiors through a whistleblowing system mechanism called a Letter to CEO (LTC)."
        translated_ru: "Сотрудники обязаны/могут сообщать о нарушениях через систему whistleblowing LTC."
        section_title: "Effort in Implementation and Enforcement of the Code of Conduct"
        relevance_comment: "Прямая обязанность/механизм сообщения о нарушениях."

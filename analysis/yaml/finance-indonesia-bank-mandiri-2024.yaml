    key_excerpts:
      -
        excerpt_id: "WtoC02_explicit_section"
        original: "Always maintains and protects all assets owned by the Bank, both tangible and intangible."
        translated_ru: "Сотрудники обязаны сохранять и защищать все материальные и нематериальные активы банка."
        section_title: "Protection of Bank Property"
        relevance_comment: "Прямой принцип защиты активов компании."
      -
        excerpt_id: "WtoC03_explicit_section"
        original: "Shall be required to understand and maintain the confidentiality of any information, in accordance with prevailing regulations."
        translated_ru: "Сотрудники обязаны понимать и сохранять конфиденциальность любой информации."
        section_title: "Confidentially"
        relevance_comment: "Прямое требование конфиденциальности."
      -
        excerpt_id: "WtoC05_explicit_section"
        original: "Always complying with the prevailing laws and regulations and Company’s regulations."
        translated_ru: "Сотрудники обязаны соблюдать действующие законы и внутренние регламенты."
        section_title: "Individual behaviour"
        relevance_comment: "Прямое требование комплаенса."
      -
        excerpt_id: "WtoC10_explicit_section"
        original: "Has a commitment to maintain the Bank’s image and reputation."
        translated_ru: "Сотрудники обязаны поддерживать имидж и репутацию банка."
        section_title: "Individual behaviour"
        relevance_comment: "Прямой принцип защиты деловой репутации."

      -
        excerpt_id: "CtoB08_explicit_section"
        original: "Employees shall not illegally refer consumer information to the companies and teams owning the products."
        translated_ru: "Запрещена незаконная передача информации о клиентах, что подтверждает защиту данных потребителей."
        section_title: "Mis-selling"
        relevance_comment: "Прямой запрет на несанкционированное использование клиентских данных."

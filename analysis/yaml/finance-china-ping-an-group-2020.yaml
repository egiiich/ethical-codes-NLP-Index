    key_excerpts:
      -
        excerpt_id: "HOT03_explicit_section"
        original: "Retaliation against whistleblowers of sexual harassment or person giving relevant information is prohibited."
        translated_ru: "Компания прямо запрещает репрессии против заявителей и информаторов."
        section_title: "Sexual harassment"
        relevance_comment: "Прямой запрет реталиации в канале сообщений о нарушениях."
      -
        excerpt_id: "HOT05_explicit_section"
        original: "Ping An Group’s member companies will take disciplinary action regards employees who violate the requirements of the codes of conduct."
        translated_ru: "За нарушения кодекса предусмотрены дисциплинарные меры."
        section_title: "Five Norms"
        relevance_comment: "Прямое указание на обязательные санкции за нарушения."
      -
        excerpt_id: "HOT06_brief_mention"
        original: "They shall promptly report matters that may cause conflicts of interest so as to prevent moral hazards."
        translated_ru: "Сотрудники обязаны своевременно сообщать о потенциальных конфликтах интересов."
        section_title: "Diligence"
        relevance_comment: "Обязанность сообщать о рисковых ситуациях."

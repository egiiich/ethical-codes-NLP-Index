      -
        excerpt_id: "CtoB01_explicit_section"
        original: "All employees shall provide consumers with products or services by following the principle of voluntariness, equality, fairness, and honesty."
        translated_ru: "Обслуживание потребителей должно строиться на добровольности, равенстве, справедливости и добросовестности."

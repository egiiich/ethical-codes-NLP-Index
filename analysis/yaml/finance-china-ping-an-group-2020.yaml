        excerpt_id: "WtoC03_explicit_section"
        original: "All employees shall hold in strict confidence the state secrets, business secrets and individual privacy obtained from the work."
        translated_ru: "Сотрудники обязаны строго соблюдать конфиденциальность служебной, коммерческой и персональной информации."
        section_title: "Protection of trade secrets"
        relevance_comment: "Прямое требование по защите информации."
      -
        excerpt_id: "WtoC05_explicit_section"
        original: "All employees shall strictly abide by laws, regulations, regulatory rules, industry self-regulations, and company rules and regulations."
        translated_ru: "Кодекс требует строгого соблюдения законов, регуляторных требований и внутренних правил."
        section_title: "Strict adherence to laws and regulations"
        relevance_comment: "Прямой комплаенс-принцип."

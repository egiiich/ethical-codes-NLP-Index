    key_excerpts:
      -
        excerpt_id: "WtoC02_explicit_section"
        original: "employees should not use the Company’s assets and information for personal purposes."
        translated_ru: "Сотрудники не должны использовать активы и информацию компании в личных целях."
        section_title: "1.2 Avoid Conflicts of Interest"
        relevance_comment: "Прямая защита активов от личного использования."
      -
        excerpt_id: "WtoC03_explicit_section"
        original: "Employees ... protect the Company’s confidentiality."
        translated_ru: "Сотрудники обязаны защищать конфиденциальность компании."
        section_title: "Basic Requirements"
        relevance_comment: "Прямое требование конфиденциальности."
      -
        excerpt_id: "WtoC04_explicit_section"
        original: "While protecting the Company’s intellectual property rights, we shall also respect the intellectual property rights of others."
        translated_ru: "Защищая ИС компании, мы также должны уважать ИС других лиц."
        section_title: "5.2 Protection of Intellectual Property Rights"
        relevance_comment: "Прямые правила защиты ИС."
      -
        excerpt_id: "WtoC05_explicit_section"
        original: "All units and employees ... shall strictly abide by the laws and regulations ..."
        translated_ru: "Все подразделения и сотрудники обязаны строго соблюдать применимые законы и нормы."
        section_title: "Basic Requirements"
        relevance_comment: "Явное требование соблюдения законодательства."
      -
        excerpt_id: "WtoC10_explicit_section"
        original: "Employees should ... maintain the reputation of the Company."
        translated_ru: "Сотрудники должны поддерживать репутацию компании."
        section_title: "Basic Requirements"
        relevance_comment: "Явная обязанность поддержания деловой репутации."

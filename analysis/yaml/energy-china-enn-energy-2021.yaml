      -
        excerpt_id: "COMP03_explicit_section"
        original: "The Company never enters into monopolistic agreements ... including ... fixing or changing the prices of commodities."
        translated_ru: "Компания никогда не заключает монополистических соглашений, включая фиксацию или изменение цен."
        section_title: "3.4 Anti-monopoly"
        relevance_comment: "Прямой запрет картелей/сговоров."
      -
        excerpt_id: "COMP08_explicit_section"
        original: "it is prohibited to make up, disseminate false information or harm the reputation of competitors."
        translated_ru: "Запрещено распространять ложную информацию и вредить репутации конкурентов."
        section_title: "3.3 Prohibition of Improper Competition"
        relevance_comment: "Прямой запрет ложных и порочащих заявлений о конкурентах."

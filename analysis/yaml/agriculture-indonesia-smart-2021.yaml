    key_excerpts:
      -
        excerpt_id: "HOT01_explicit_section"
        original: "You may raise your concerns through the hotlines as below..."
        translated_ru: "Сотрудникам предоставлены каналы горячей линии для сообщений о нарушениях."
        section_title: "How do I Ask Questions and Raise Concerns?"
        relevance_comment: "Подтверждение статуса explicit_section для принципа HOT01."
      -
        excerpt_id: "HOT02_explicit_section"
        original: "The Company will keep details of investigations confidential to the maximum extent possible..."
        translated_ru: "Компания обязуется сохранять конфиденциальность расследований в максимально возможной степени."
        section_title: "How are Reports Handled?"
        relevance_comment: "Подтверждение статуса explicit_section для принципа HOT02."
      -
        excerpt_id: "HOT03_explicit_section"
        original: "The Company will not tolerate any form of retaliation against you for making a good faith report..."
        translated_ru: "Компания запрещает преследование за добросовестные сообщения."
        section_title: "What if I am Worried about Retaliation?"
        relevance_comment: "Подтверждение статуса explicit_section для принципа HOT03."
      -
        excerpt_id: "HOT04_explicit_section"
        original: "Your concerns may be reported anonymously, if you wish..."
        translated_ru: "Допускается анонимная подача сообщений."
        section_title: "Q&A"
        relevance_comment: "Подтверждение статуса explicit_section для принципа HOT04."
      -
        excerpt_id: "HOT05_implicit_scattered"
        original: "The Company will promptly respond to all reports of misconduct."
        translated_ru: "Компания обязуется оперативно реагировать на все сообщения о нарушениях."
        section_title: "How are Reports Handled?"
        relevance_comment: "Подтверждение статуса implicit_scattered для принципа HOT05."
      -
        excerpt_id: "HOT06_explicit_section"
        original: "If you witness or learn about harassment, violence or threats of violence, you should report it immediately."
        translated_ru: "Сотрудник обязан немедленно сообщать о нарушениях."
        section_title: "Respect in the Workplace"
        relevance_comment: "Подтверждение статуса explicit_section для принципа HOT06."

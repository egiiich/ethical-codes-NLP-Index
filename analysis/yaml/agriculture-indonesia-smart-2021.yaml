        excerpt_id: "COMP01_explicit_section"
        original: "You may not obtain non-public information by illegal or unethical activities."
        translated_ru: "Запрещено получать непубличную информацию о конкурентах незаконными/неэтичными методами."
        section_title: "Competitor information"
        relevance_comment: "Подтверждение статуса explicit_section для принципа COMP01."
      -
        excerpt_id: "COMP03_explicit_section"
        original: "...avoid any discussions with competitors that could be viewed as an agreement to restrain trade in any way."
        translated_ru: "Запрещены обсуждения с конкурентами, которые могут рассматриваться как антиконкурентный сговор."
        section_title: "Competition and Antitrust Laws"
        relevance_comment: "Подтверждение статуса explicit_section для принципа COMP03."
      -
        excerpt_id: "COMP04_brief_mention"
        original: "...agreements with that competitor on the specific terms of a transaction are necessary and acceptable."
        translated_ru: "Допускается ограниченное сотрудничество с конкурентами в рамках легитимной сделки."
        section_title: "Competition and Antitrust Laws"
        relevance_comment: "Подтверждение статуса brief_mention для принципа COMP04."
      -
        excerpt_id: "COMP08_explicit_section"
        original: "...never disparage or discredit our competitors or their products or services."
        translated_ru: "Запрещена дискредитация конкурентов и их продукции/услуг."
        section_title: "Sales and marketing"
        relevance_comment: "Подтверждение статуса explicit_section для принципа COMP08."

    key_excerpts:
      - excerpt_id: "HOT01_brief_mention"
        original: "This Code of Conduct applies to Toyota Motor Corporation, its board of directors, all its team members and its consolidated subsidiaries."
        translated_ru: "Этот Кодекс поведения применяется к Toyota Motor Corporation, совету директоров, всем сотрудникам и консолидированным дочерним компаниям."
        section_title: "The Purpose of Toyota's Code of Conduct"
        relevance_comment: "Краткое подтверждение охвата канала сообщений для всех сотрудников."
      - excerpt_id: "HOT03_explicit_section"
        original: "Toyota prohibits retaliation against team members for reporting concerns in good faith or for participating in an investigation."
        translated_ru: "Toyota запрещает преследование сотрудников за добросовестные сообщения о проблемах или участие в расследовании."
        section_title: "Non-Retaliation Commitment"
        relevance_comment: "Прямая гарантия отсутствия репрессий."
      - excerpt_id: "HOT04_explicit_section"
        original: "You can ask questions or report anonymously, where permitted by local law."
        translated_ru: "Вы можете задавать вопросы или сообщать анонимно, если это допускается местным законодательством."
        section_title: "Speak Up Resources"
        relevance_comment: "Прямое подтверждение анонимного канала сообщений."
      - excerpt_id: "HOT05_brief_mention"
        original: "Toyota takes violations of the Code seriously, and reviews questions and concerns in a fair and consistent manner."
        translated_ru: "Toyota серьёзно относится к нарушениям Кодекса и рассматривает вопросы и обращения справедливо и последовательно."
        section_title: "Speak Up"
        relevance_comment: "Краткое подтверждение обязательного реагирования и рассмотрения сообщений."
      - excerpt_id: "HOT06_brief_mention"
        original: "Whenever you're not sure about the right action to take, or you find known or suspected misconduct, please consult with your supervisor or company's internal resources."
        translated_ru: "Если вы не уверены в правильности действий или обнаружили известное/предполагаемое нарушение, обратитесь к руководителю или внутренним ресурсам компании."
        section_title: "Speak Up"
        relevance_comment: "Краткая обязанность сообщать о предполагаемых нарушениях."
    other_principles: []

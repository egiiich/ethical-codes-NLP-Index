    key_excerpts:
      - excerpt_id: "COMP03_explicit_section"
        original: "Do not discuss or make agreements with competitors about pricing, costs, bids, markets, territories, customers, suppliers or contract terms and conditions."
        translated_ru: "Не обсуждать и не заключать соглашения с конкурентами о ценах, издержках, тендерах, рынках, территориях, клиентах, поставщиках или условиях контрактов."
        section_title: "Sales Activities and Fair Competition"
        relevance_comment: "Прямой запрет антиконкурентного сговора."
      - excerpt_id: "COMP05_brief_mention"
        original: "Toyota develops products and services that meet the needs of our customers, and provides them through fair competition and responsible marketing."
        translated_ru: "Toyota развивает продукты и услуги под потребности клиентов и предоставляет их через честную конкуренцию и ответственный маркетинг."
        section_title: "Sales Activities and Fair Competition"
        relevance_comment: "Краткая фиксация принципа добросовестной конкуренции."
      - excerpt_id: "COMP07_brief_mention"
        original: "Respect the intellectual property rights of others at all times."
        translated_ru: "Всегда уважать права интеллектуальной собственности других."
        section_title: "Research and Development Activities"
        relevance_comment: "Краткое требование уважения ИС конкурентов и иных сторон."
    other_principles: []

    key_excerpts:
      - excerpt_id: "CtoI03_explicit_section"
        original: "Toyota makes accurate, timely and fair disclosure of our financial condition."
        translated_ru: "Toyota обеспечивает точное, своевременное и справедливое раскрытие своего финансового положения."
        section_title: "Accurate Record Keeping"
        relevance_comment: "Прямое требование раскрытия информации для инвесторов."
      - excerpt_id: "CtoI05_explicit_section"
        original: "Toyota does not engage in insider trading or tolerate insider trading by team members."
        translated_ru: "Toyota не занимается инсайдерской торговлей и не допускает её со стороны сотрудников."
        section_title: "Insider Trading"
        relevance_comment: "Прямой запрет инсайдерской торговли."
    other_principles: []

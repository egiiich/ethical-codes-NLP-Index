    key_excerpts:
      - excerpt_id: "WtoC02_explicit_section"
        original: "Ensure that Toyota's assets are not damaged, abused, wasted, lost or stolen, and report any misuse of assets."
        translated_ru: "Обеспечивать, чтобы активы Toyota не повреждались, не использовались не по назначению, не растрачивались, не терялись и не похищались, а о злоупотреблениях сообщать."
        section_title: "Asset Protection and Confidentiality"
        relevance_comment: "Прямой принцип защиты и сохранности активов компании."
      - excerpt_id: "WtoC03_explicit_section"
        original: "Keep confidential information (about Toyota, team members, customers and business partners) secure and out of public view."
        translated_ru: "Хранить конфиденциальную информацию (о Toyota, сотрудниках, клиентах и партнёрах) в безопасности и вне публичного доступа."
        section_title: "Corporate Communication Activities"
        relevance_comment: "Прямой принцип конфиденциальности и информационной безопасности."
      - excerpt_id: "WtoC04_explicit_section"
        original: "Toyota appropriately protects both physical assets ... and intangible assets, such as intellectual property and confidential information."
        translated_ru: "Toyota надлежащим образом защищает как материальные активы, так и нематериальные, такие как интеллектуальная собственность и конфиденциальная информация."
        section_title: "Asset Protection and Confidentiality"
        relevance_comment: "Прямое требование защиты ИС компании."
      - excerpt_id: "WtoC05_explicit_section"
        original: "Toyota complies with applicable laws and regulations that apply to our international operations."
        translated_ru: "Toyota соблюдает применимые законы и нормативные требования, относящиеся к международной деятельности."
        section_title: "International Business Activities"
        relevance_comment: "Прямой принцип соблюдения применимого законодательства."
      - excerpt_id: "WtoC10_brief_mention"
        original: "Toyota is respectful and thoughtful in all of our communications activities to prevent harm to people or to Toyota's reputation."
        translated_ru: "Toyota действует уважительно и осмотрительно во всей коммуникационной деятельности, чтобы не допускать вреда людям и репутации Toyota."
        section_title: "Corporate Communication Activities"
        relevance_comment: "Краткая фиксация требования защищать деловую репутацию компании."

      - {principle_code: "CtoS07", principle_status: "absent", evidence_excerpt_ids: []}
    key_excerpts:
      - excerpt_id: "CtoS01_explicit_section"
        original: "Toyota selects suppliers based on fair and reasonable criteria."
        translated_ru: "Toyota выбирает поставщиков на основе справедливых и разумных критериев."
        section_title: "Procurement Activities"
        relevance_comment: "Прямой принцип выбора поставщиков по объективной эффективности."
      - excerpt_id: "CtoS03_brief_mention"
        original: "Deal fairly and honestly with all suppliers, regardless of the value of the transaction or the length of the relationship."
        translated_ru: "Вести дела со всеми поставщиками честно и добросовестно, независимо от суммы сделки или длительности отношений."
        section_title: "Procurement Activities"
        relevance_comment: "Краткая фиксация недопустимости злоупотреблений в отношениях с поставщиками."
      - excerpt_id: "CtoS06_explicit_section"
        original: "Toyota aims for mutual growth based on mutual trust with the suppliers."
        translated_ru: "Toyota стремится к взаимному росту на основе взаимного доверия с поставщиками."
        section_title: "Procurement Activities"
        relevance_comment: "Прямой акцент на долгосрочном партнёрстве с поставщиками."
    other_principles: []

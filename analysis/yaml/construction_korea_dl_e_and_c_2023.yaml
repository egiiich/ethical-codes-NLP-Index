    key_excerpts:
      - excerpt_id: "COMP03_explicit_section"
        original: "We do not agree to engage in acts that unreasonably disturb fair competition ... regarding product price, participation in bidding, transaction conditions."
        translated_ru: "Мы не вступаем в соглашения, необоснованно нарушающие честную конкуренцию по цене, участию в торгах и условиям сделок."
        section_title: "Chapter III.2 Fair Competition"
        relevance_comment: "Прямой запрет картелей/сговоров."
      - excerpt_id: "COMP05_brief_mention"
        original: "compete with others in a fair manner"
        translated_ru: "конкурировать с другими на справедливой основе"
        section_title: "Chapter III Fair Transaction and Competition"
        relevance_comment: "Краткая фиксация добросовестной конкуренции."
      - excerpt_id: "COMP06_brief_mention"
        original: "We shall NOT violate the profits of competitors in an unfair manner, nor take advantage of their weakness in a dishonest manner."
        translated_ru: "Мы не нарушаем интересы конкурентов несправедливо и не используем их слабости нечестным способом."
        section_title: "Chapter III.2 Fair Competition"
        relevance_comment: "Краткий запрет на ослабление конкурентов недобросовестными методами."

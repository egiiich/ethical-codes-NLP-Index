    key_excerpts:
      - excerpt_id: "WtoC01_explicit_section"
        original: "All employees ... complete their duties through just practices."
        translated_ru: "Все сотрудники выполняют свои обязанности через надлежащие практики."
        section_title: "Chapter I Basic Ethics for Employees"
        relevance_comment: "Прямой стандарт качественного выполнения работы."
      - excerpt_id: "WtoC02_explicit_section"
        original: "Employees shall protect the tangible and intangible assets of the Company ... and NOT use them for personal purposes."
        translated_ru: "Сотрудники защищают материальные и нематериальные активы компании и не используют их в личных целях."
        section_title: "Chapter I.8"
        relevance_comment: "Прямой принцип сохранности активов."
      - excerpt_id: "WtoC03_explicit_section"
        original: "Employees shall NOT disclose material information which could have a significant impact on the profits of the Company."
        translated_ru: "Сотрудники не должны раскрывать существенную информацию, которая может повлиять на прибыль компании."
        section_title: "Chapter I.9 Information Security"
        relevance_comment: "Прямое требование конфиденциальности информации."
      - excerpt_id: "WtoC04_explicit_section"
        original: "Employees shall protect ... copyright, trade secret"
        translated_ru: "Сотрудники защищают ... авторские права и коммерческие тайны"
        section_title: "Chapter I.8"
        relevance_comment: "Прямая защита интеллектуальной собственности."
      - excerpt_id: "WtoC05_explicit_section"
        original: "perform our duties ... observe the internal regulations of the Company and applicable laws"
        translated_ru: "выполнять обязанности ... соблюдать внутренние регламенты компании и применимое законодательство"
        section_title: "Chapter I.1.C"
        relevance_comment: "Прямое требование соблюдения законов и норм."
      - excerpt_id: "WtoC09_explicit_section"
        original: "offer an opportunity for self-development and growth to develop autonomous and creative talents"
        translated_ru: "предоставлять возможности для саморазвития и роста для формирования самостоятельных и креативных талантов"
        section_title: "Chapter IV.2"
        relevance_comment: "Прямая поддержка профессионального развития."
      - excerpt_id: "WtoC10_brief_mention"
        original: "shall NOT engage in any immoral or unethical acts which could tarnish the Company’s name"
        translated_ru: "не совершать аморальные/неэтичные действия, которые могут подорвать имя компании"
        section_title: "Chapter I.4.B"
        relevance_comment: "Краткая ориентация на защиту репутации компании."

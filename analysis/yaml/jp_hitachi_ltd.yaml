    key_excerpts:
      - excerpt_id: "COMP01_explicit_section"
        original: "Gather competitive information fairly ... Do not encourage anyone to give you confidential information."
        translated_ru: "«Собирайте конкурентную информацию честно ... не побуждайте никого передавать вам конфиденциальную информацию»."
        section_title: "Compete Fairly"
        relevance_comment: "Прямой запрет на добычу конфиденциальной информации конкурентов (COMP01)."
      - excerpt_id: "COMP03_explicit_section"
        original: "Never enter into an oral or written agreement with a competitor to divide markets/customers, fix prices, manipulate bids, or exchange sensitive information."
        translated_ru: "«Никогда не вступайте в устные или письменные соглашения с конкурентом о разделе рынков/клиентов, фиксации цен, манипуляции тендерами или обмене чувствительной информацией»."
        section_title: "Compete Fairly — In Your Daily Work"
        relevance_comment: "Явный анти-картельный запрет (COMP03)."
      - excerpt_id: "COMP05_explicit_section"
        original: "Hitachi is committed to fair competition and abides by applicable competition laws. We compete fairly and comply with competition laws in all countries in which we do business."
        translated_ru: "«Hitachi привержена честной конкуренции и соблюдению применимых competition laws. Мы конкурируем честно и соблюдаем конкурентное законодательство во всех странах присутствия»."
        section_title: "Compete Fairly"
        relevance_comment: "Явное закрепление принципа fair competition (COMP05)."

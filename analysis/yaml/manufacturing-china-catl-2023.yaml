      -
        excerpt_id: "HOT02_explicit_section"
        original: "The COC Advisory Office shall keep the information obtained ... confidential."
        translated_ru: "Информация по сообщениям и расследованиям должна сохраняться конфиденциальной."
        section_title: "3.3 Responsibilities and obligations of COC Advisory Office"
        relevance_comment: "Подтверждение статуса для принципа HOT02."
      -
        excerpt_id: "HOT03_explicit_section"
        original: "CATL ... will protect the informer’s personal information and prevent the informer from being framed or retaliated."

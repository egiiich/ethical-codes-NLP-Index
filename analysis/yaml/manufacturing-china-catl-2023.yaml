        section_title: "3.5 Informer reporting and prevention"
        relevance_comment: "Подтверждение статуса для принципа HOT03."
      -
        excerpt_id: "HOT05_explicit_section"
        original: "Those who violate the CATL Code of Conduct will be subject to disciplinary action."
        translated_ru: "Нарушения кодекса влекут обязательные дисциплинарные меры."
        section_title: "3.6 Disciplinary punishment"
        relevance_comment: "Подтверждение статуса для принципа HOT05."
      -
        excerpt_id: "HOT06_explicit_section"
        original: "Employees noticing violations or suspected violations ... shall report ... to ... COC Advisory Office."
        translated_ru: "Сотрудники обязаны сообщать о выявленных или предполагаемых нарушениях."
        section_title: "3.5 Informer reporting and prevention"
        relevance_comment: "Подтверждение статуса для принципа HOT06."

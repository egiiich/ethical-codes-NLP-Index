        excerpt_id: "HOT01_explicit_section"
        original: "Hotline number: 19959356699 ... E-mail: CATL-COC@catl.com"
        translated_ru: "Кодекс содержит формальные каналы горячей линии (телефон/почта) для сообщений."
        section_title: "3.3 Responsibilities and obligations of COC Advisory Office"

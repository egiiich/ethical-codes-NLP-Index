    key_excerpts:
      - excerpt_id: "WtoC02_explicit_section"
        original: "Appropriately manage the tangible and intangible assets of our Group companies"
        translated_ru: "Сотрудники обязаны надлежаще управлять материальными и нематериальными активами группы."
        section_title: "For the trust of Society"
        relevance_comment: "Прямой стандарт по активам компании."
      - excerpt_id: "WtoC03_explicit_section"
        original: "protect the confidentiality, safety and privacy of third-party information"
        translated_ru: "Необходимо защищать конфиденциальность, безопасность и приватность информации третьих лиц."
        section_title: "For the trust of Society"
        relevance_comment: "Прямой принцип конфиденциальности."
      - excerpt_id: "WtoC05_explicit_section"
        original: "You must follow applicable laws and regulations as well as company policies"
        translated_ru: "Сотрудник обязан соблюдать законодательство и политики компании."
        section_title: "Foundational Conduct"
        relevance_comment: "Прямой правовой комплаенс."
      - excerpt_id: "WtoC07_explicit_section"
        original: "Avoid conflicts of interest and do not pursue personal gain"
        translated_ru: "Нужно избегать конфликтов интересов и личной выгоды."
        section_title: "For the trust of Society"
        relevance_comment: "Прямой запрет конфликта интересов."
      - excerpt_id: "WtoC09_explicit_section"
        original: "Strictly manage important information and do not condone insider trading."
        translated_ru: "Нужно строго управлять важной информацией и не допускать инсайдерской торговли."
        section_title: "Foundational Conduct / Compliance"
        relevance_comment: "Прямой запрет злоупотребления инсайдом."
      - excerpt_id: "WtoC10_brief_mention"
        original: "degrade or threaten to degrade the Group's brand value and credibility"
        translated_ru: "Нарушения подрывают бренд и доверие группы; сотрудник должен предотвращать это."
        section_title: "Failure to observe the Group Code"
        relevance_comment: "Краткий репутационный стандарт."

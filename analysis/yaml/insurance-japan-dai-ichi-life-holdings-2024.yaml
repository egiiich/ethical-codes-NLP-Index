    key_excerpts:
      - excerpt_id: "CtoB01_explicit_section"
        original: "Conduct business with honesty, integrity and fairness to build trust with customers."
        translated_ru: "Работа с клиентами строится на честности, добросовестности и справедливости."
        section_title: "For our Customers"
        relevance_comment: "Прямой стандарт отношения к клиенту."
      - excerpt_id: "CtoB02_explicit_section"
        original: "Always listen to customers and strive to meet their expectations"
        translated_ru: "Нужно всегда слушать клиентов и стремиться соответствовать их ожиданиям."
        section_title: "For our Customers"
        relevance_comment: "Прямой принцип обратной связи с клиентом."
      - excerpt_id: "CtoB03_explicit_section"
        original: "appropriately using information received from customers to ensure that we maintain their trust"
        translated_ru: "Информация от клиентов должна использоваться корректно для сохранения доверия."
        section_title: "For our Customers"
        relevance_comment: "Прямой принцип защиты интересов клиента."
      - excerpt_id: "CtoB06_explicit_section"
        original: "Strive to provide innovative products and services that meet the changing values and needs of customers."
        translated_ru: "Нужно предоставлять инновационные продукты и услуги под меняющиеся потребности клиентов."
        section_title: "For our Customers"
        relevance_comment: "Прямой стандарт качества и развития клиентского продукта."
      - excerpt_id: "CtoB09_explicit_section"
        original: "accurately and clearly explain our products and services"
        translated_ru: "Продукты и услуги должны объясняться клиенту точно и ясно."
        section_title: "For our Customers"
        relevance_comment: "Прямой стандарт информирования клиента."

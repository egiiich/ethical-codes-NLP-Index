    key_excerpts:
      - excerpt_id: "CtoP03_explicit_section"
        original: "helping to address people’s needs and concerns and make a positive contribution to solving social issues"
        translated_ru: "Группа обязуется помогать людям и вносить вклад в решение социальных проблем."
        section_title: "CEO Message"
        relevance_comment: "Прямой общественный принцип."
      - excerpt_id: "CtoP04_explicit_section"
        original: "We actively engage in environmental protection on an ongoing basis"
        translated_ru: "Группа системно занимается защитой окружающей среды."
        section_title: "Contribution to a sustainable society and future"
        relevance_comment: "Прямой экологический стандарт."
      - excerpt_id: "CtoP06_explicit_section"
        original: "contribute to the realization of a sustainable society and the development of local communities"
        translated_ru: "Группа способствует устойчивому обществу и развитию местных сообществ."
        section_title: "Contribution to a sustainable society and future"
        relevance_comment: "Прямой социальный вклад."
      - excerpt_id: "CtoP08_explicit_section"
        original: "We respect the human rights of all people and actively work to raise awareness of human rights."
        translated_ru: "Группа уважает права человека и продвигает осведомлённость о них."
        section_title: "Respect for human rights"
        relevance_comment: "Прямой правозащитный принцип."

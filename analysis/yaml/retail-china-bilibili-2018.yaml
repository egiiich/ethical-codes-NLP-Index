    key_excerpts:
      - excerpt_id: "WtoC02_explicit_section"
        original: "Employees should protect the Company’s assets and ensure their efficient use for legitimate business purposes only."
        translated_ru: "Сотрудники обязаны защищать активы компании и использовать их только в законных деловых целях."
        section_title: "V. Protection and Use of Company Assets"
        relevance_comment: "Прямой принцип сохранности активов."
      - excerpt_id: "WtoC03_explicit_section"
        original: "all proprietary information should be maintained in strict confidence, except when disclosure is authorized by the Company or required by law."
        translated_ru: "Вся конфиденциальная служебная информация должна храниться в строгой тайне, кроме случаев одобренного или обязательного раскрытия."
        section_title: "III. Protection of Confidential Proprietary Information"
        relevance_comment: "Прямой принцип конфиденциальности и ИБ."
      - excerpt_id: "WtoC04_explicit_section"
        original: "We respect the property rights of other companies and their proprietary information"
        translated_ru: "Компания требует уважать права собственности и конфиденциальную информацию других компаний."
        section_title: "III. Protection of Confidential Proprietary Information"
        relevance_comment: "Прямой принцип защиты ИС."
      - excerpt_id: "WtoC05_explicit_section"
        original: "full compliance with all applicable laws, rules and regulations."
        translated_ru: "Сотрудники и руководство обязаны действовать в полном соответствии с применимыми законами и нормами."
        section_title: "I. Compliance with Laws, Rules and Regulations"
        relevance_comment: "Прямой правовой комплаенс."
      - excerpt_id: "WtoC10_explicit_section"
        original: "our Company’s most valuable assets is our reputation for integrity, professionalism and fairness."
        translated_ru: "Репутация честности, профессионализма и справедливости названа одним из ключевых активов компании."
        section_title: "Introduction"
        relevance_comment: "Прямой фокус на защите деловой репутации."

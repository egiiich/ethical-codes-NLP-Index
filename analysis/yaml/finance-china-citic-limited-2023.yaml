    key_excerpts:
      -
        excerpt_id: "WtoC02_explicit_section"
        original: "Employees with authorization to manage or use the Company assets should use them solely for the purpose of conducting the Company's businesses."
        translated_ru: "Активы компании разрешено использовать только для целей бизнеса компании."
        section_title: "1.3 Abuse of authority, company assets..."
        relevance_comment: "Прямое требование сохранности и целевого использования активов."
      -
        excerpt_id: "WtoC03_explicit_section"
        original: "Employees are not allowed at any time to disclose or misuse any proprietary information ... without prior written permission..."
        translated_ru: "Сотрудникам запрещено раскрывать или неправомерно использовать служебную информацию без письменного разрешения."
        section_title: "1.3 Abuse of authority, company assets..."
        relevance_comment: "Прямое требование конфиденциальности."
      -
        excerpt_id: "WtoC05_explicit_section"
        original: "Every employee must comply with laws and Company Regulations."
        translated_ru: "Сотрудники обязаны соблюдать законы и корпоративные регламенты."
        section_title: "1. Compliance with Laws and Regulations"
        relevance_comment: "Прямой принцип правового комплаенса."
      -
        excerpt_id: "WtoC10_explicit_section"
        original: "...must ensure that the Group's reputation is not tarnished by dishonesty, lack of integrity or corruption."
        translated_ru: "Сотрудники обязаны не допускать ущерба репутации группы."
        section_title: "Preamble"
        relevance_comment: "Прямой акцент на защите деловой репутации."

    key_excerpts:
      - excerpt_id: "WtoC02_explicit_section"
        original: "We will only use the assets of the Group for the Groupʼs business activities and properly protect them."
        translated_ru: "Активы группы можно использовать только для бизнес-деятельности группы и необходимо надлежащим образом их защищать."
        section_title: "4. Protection of Company Assets"
        relevance_comment: "Прямой стандарт использования активов."
      - excerpt_id: "WtoC03_explicit_section"
        original: "We will properly deal with personal information, confidential information ... in accordance with laws, regulations and internal rules."
        translated_ru: "Персональные и конфиденциальные данные должны обрабатываться надлежащим образом по закону и внутренним правилам."
        section_title: "9. Protection and Management of Personal and Confidential Information"
        relevance_comment: "Прямой принцип конфиденциальности."
      - excerpt_id: "WtoC05_explicit_section"
        original: "We will act with integrity and good sense in compliance with laws, regulations and internal rules"
        translated_ru: "Сотрудники действуют добросовестно и в полном соответствии с законами и внутренними правилами."
        section_title: "1. Compliance with Laws, Regulations and Internal Rules"
        relevance_comment: "Прямой правовой комплаенс."
      - excerpt_id: "WtoC07_explicit_section"
        original: "Under situations where the interests of Employees conflict with the interests of the company, we will take actions with preference to the interests of the company"
        translated_ru: "При конфликте интересов сотрудника и компании приоритет отдается интересам компании."
        section_title: "8. Prohibition of Conflict of Interest"
        relevance_comment: "Прямой стандарт урегулирования конфликта интересов."
      - excerpt_id: "WtoC09_explicit_section"
        original: "By strictly prohibiting insider trading by Employees, we will ensure investors' trust in the securities market."
        translated_ru: "Инсайдерская торговля сотрудниками строго запрещена для поддержания доверия инвесторов."
        section_title: "11. Prohibition of Insider Trading"
        relevance_comment: "Прямой запрет злоупотребления инсайдом."
      - excerpt_id: "WtoC10_brief_mention"
        original: "act in ways that consider compliance seriously"
        translated_ru: "От сотрудников требуется серьезно относиться к комплаенсу в ежедневном поведении."
        section_title: "SOMPO Group Compliance Code of Conduct"
        relevance_comment: "Краткая репутационно-этическая норма."

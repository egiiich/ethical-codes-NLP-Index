    key_excerpts:
      - excerpt_id: "HOT01_explicit_section"
        original: "do not overlook or conceal them, but promptly notify your workplace supervisor or the Consultation Desk"
        translated_ru: "Нарушения нельзя игнорировать или скрывать; необходимо оперативно уведомить руководителя или консультационный центр."
        section_title: "SOMPO Group Compliance Code of Conduct (preface)"
        relevance_comment: "Прямой доступ к внутренним каналам сообщения."
      - excerpt_id: "HOT03_explicit_section"
        original: "promptly notify your workplace supervisor or the Consultation Desk"
        translated_ru: "Сотрудники обязаны оперативно сообщать о комплаенс-рисках через руководителя или консультационный центр."
        section_title: "Preface / Reporting concerns"
        relevance_comment: "Прямая обязанность эскалации нарушений."
      - excerpt_id: "HOT05_brief_mention"
        original: "Violations may result in disciplinary action based on the applicable Group company’s policies."
        translated_ru: "Нарушения могут повлечь дисциплинарные меры по политикам компании группы."
        section_title: "7. Violation of the Code of Conduct"
        relevance_comment: "Краткое подтверждение реагирования на нарушения."
      - excerpt_id: "HOT08_explicit_section"
        original: "promptly notify your workplace supervisor or the Consultation Desk"
        translated_ru: "Каналы сообщений прямо определены: руководитель рабочего места или Consultation Desk."
        section_title: "6. Reporting of Concerns or Problems"
        relevance_comment: "Прямо указаны каналы обращения."

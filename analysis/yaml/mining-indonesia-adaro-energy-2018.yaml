    key_excerpts:
      -
        excerpt_id: "WtoC02_explicit_section"
        original: "Responsible for protecting the Company’s assets and only use them for the Company’s interests."
        translated_ru: "Сотрудники обязаны защищать активы компании и использовать их только в интересах компании."
        section_title: "12. Company Assets"
        relevance_comment: "Подтверждение статуса для принципа WtoC02."
      -
        excerpt_id: "WtoC03_explicit_section"
        original: "Not disclose, disseminate and/or use the Company’s confidential information to unauthorized parties."
        translated_ru: "Запрещено раскрывать конфиденциальную информацию неуполномоченным лицам."
        section_title: "5(c) Insider Trading and Use of Company Information"
        relevance_comment: "Подтверждение статуса для принципа WtoC03."
      -
        excerpt_id: "WtoC05_explicit_section"
        original: "Comply with all applicable laws and regulations and apply Good Corporate Governance’s principles."
        translated_ru: "Сотрудники обязаны соблюдать все применимые законы и принципы GCG."
        section_title: "2. Compliance with Laws and Regulations"
        relevance_comment: "Подтверждение статуса для принципа WtoC05."
      -
        excerpt_id: "WtoC10_brief_mention"
        original: "Provide only factual data and information."
        translated_ru: "Поддержание точности информации направлено на защиту деловой репутации компании."
        section_title: "Company Values — Integrity"
        relevance_comment: "Подтверждение статуса для принципа WtoC10."

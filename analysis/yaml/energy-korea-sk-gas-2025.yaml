    key_excerpts:
      -
        excerpt_id: "WtoC02_explicit_section"
        original: "Employees shall protect and utilize tangible or intangible corporate assets in a fair manner."
        translated_ru: "Сотрудники обязаны защищать и надлежащим образом использовать материальные и нематериальные активы компании."
        section_title: "1.6 Protection and Proper Use of Corporate Assets and Information"
        relevance_comment: "Прямое требование сохранности и корректного использования активов."
      -
        excerpt_id: "WtoC03_explicit_section"
        original: "Employees shall not provide or reveal any information related with company business to outsiders."
        translated_ru: "Сотрудники не должны раскрывать внешним лицам информацию, связанную с деятельностью компании."
        section_title: "1.2 Prohibition of Unauthorized Use of Management Information"
        relevance_comment: "Прямая защита конфиденциальной информации."
      -
        excerpt_id: "WtoC04_explicit_section"
        original: "Employees shall protect corporate intellectual properties including patents, sales rights, trademarks, copyrights or others."
        translated_ru: "Сотрудники должны защищать интеллектуальную собственность компании (патенты, товарные знаки, авторские права и т.д.)."
        section_title: "1.6.3"
        relevance_comment: "Прямое требование защиты ИС компании."
      -
        excerpt_id: "WtoC05_explicit_section"
        original: "Employees shall conduct business honestly and impartially by complying with fair standards, laws and moral standards."
        translated_ru: "Сотрудники обязаны вести деятельность честно и беспристрастно, соблюдая стандарты, законы и моральные нормы."
        section_title: "1.1 Faithful Execution of Business"
        relevance_comment: "Прямое требование соблюдения законов на рабочем месте."
    other_principles: []

    key_excerpts:
      -
        excerpt_id: "CtoB01_explicit_section"
        original: "Company and employees shall do their best to provide the best quality in their products and services."
        translated_ru: "Компания и сотрудники обязаны обеспечивать наилучшее качество продукции и услуг."
        section_title: "2.1.1 Provision of Best Quality Product and Service"
        relevance_comment: "Фокус на удовлетворении потребностей клиента через качество."
      -
        excerpt_id: "CtoB07_explicit_section"
        original: "Company shall have in place a system to collect customer appeals and complaints while making sustained efforts to improve the quality of products and services."
        translated_ru: "Компания должна иметь систему для сбора обращений и жалоб клиентов и постоянно улучшать качество."
        section_title: "2.1.1 Provision of Best Quality Product and Service"
        relevance_comment: "Наличие канала обратной связи клиентов."
      -
        excerpt_id: "CtoB08_explicit_section"
        original: "Company shall not use customer information for any purpose other than for the rightful business purpose of the Company, nor shall it offer such information to a third party."
        translated_ru: "Компания не должна использовать информацию клиентов вне законной деловой цели и передавать её третьим лицам без оснований."
        section_title: "2.1.2 Protection of Customer Information"
        relevance_comment: "Прямая защита персональных данных клиентов."
      -
        excerpt_id: "CtoB09_brief_mention"
        original: "Company and employees shall do their best to protect the life and assets of the members and the customers against any possible accidents."
        translated_ru: "Компания стремится защищать жизнь и имущество клиентов от возможных аварий."
        section_title: "2.4.2 Safe Working Environment"
        relevance_comment: "Упоминание безопасности для клиентов в контексте предотвращения аварий."

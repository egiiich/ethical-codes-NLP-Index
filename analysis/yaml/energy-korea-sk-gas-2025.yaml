    key_excerpts:
      -
        excerpt_id: "CtoP04_explicit_section"
        original: "Company shall actively participate in voluntary works and cultural development projects for the benefit of society."
        translated_ru: "Компания должна активно участвовать в волонтёрских и культурных проектах в интересах общества."
        section_title: "2.4.1 Social Contribution"
        relevance_comment: "Поддержка социального развития регионов присутствия."
      -
        excerpt_id: "CtoP06_explicit_section"
        original: "Company shall promote and increase the sense of unity between the Company and local communities by expanding citizens’ access to welfare facilities, support for the disadvantaged."
        translated_ru: "Компания развивает единство с местными сообществами, расширяя доступ к благополучию и поддерживая уязвимые группы."
        section_title: "2.4.1 Social Contribution"
        relevance_comment: "Прямая поддержка уязвимых групп."
      -
        excerpt_id: "CtoP08_explicit_section"
        original: "Company and employees shall do their best to protect the life and assets of the members and the customers against any possible accidents."
        translated_ru: "Компания и сотрудники обязаны защищать жизнь и имущество сотрудников и клиентов от возможных аварий."
        section_title: "2.4.2 Safe Working Environment"
        relevance_comment: "Требование предотвращения аварий и рисков для населения/клиентов."

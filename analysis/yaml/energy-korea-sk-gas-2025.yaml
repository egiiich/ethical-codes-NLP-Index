        original: "Employees shall understand that fair trade is a duty in a market economy system, and thus shall perform management practices and activities fairly and transparently."
        translated_ru: "Сотрудники должны понимать, что добросовестная конкуренция является обязанностью в рыночной экономике и вести деятельность справедливо и прозрачно."
        section_title: "2.3 Fair Trade and Coexistence"
        relevance_comment: "Общее упоминание конкурентной добросовестности без конкретного картельного механизма."

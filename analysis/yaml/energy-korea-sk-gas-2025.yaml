    key_excerpts:
      -
        excerpt_id: "CtoS01_explicit_section"
        original: "In selection of business partners, a set of rational and fair standards shall be applied so that those eligible for the business can be selected."
        translated_ru: "При выборе партнеров применяются рациональные и справедливые стандарты отбора."
        section_title: "2.3.2 Management for Coexistence"
        relevance_comment: "Прямое требование справедливого выбора поставщиков."
      -
        excerpt_id: "CtoS03_explicit_section"
        original: "Company shall not utilize its privileged status for unfair practices, but pursue mutual benefits and cooperative development."
        translated_ru: "Компания не должна использовать привилегированное положение для недобросовестных практик и должна стремиться к взаимной выгоде."
        section_title: "2.3.2 Management for Coexistence"
        relevance_comment: "Прямой запрет злоупотребления рыночной властью."
      -
        excerpt_id: "CtoS06_explicit_section"
        original: "Company shall provide full support to the selected business partner(s) in such way to increase competitiveness from a long term perspective."
        translated_ru: "Компания должна поддерживать выбранных партнеров для роста конкурентоспособности в долгосрочной перспективе."
        section_title: "2.3.2 Management for Coexistence"
        relevance_comment: "Ориентация на долгосрочное партнерство и совместный рост."

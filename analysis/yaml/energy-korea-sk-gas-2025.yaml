    key_excerpts:
      -
        excerpt_id: "HOT02_explicit_section"
        original: "The company prioritizes protecting the identity of the counselee and the whistleblower and the contents of the counseling and report."
        translated_ru: "Компания ставит в приоритет защиту личности заявителя и содержания консультаций/сообщений."
        section_title: "4.3 Protect Counselee·Whistleblower"
        relevance_comment: "Прямое требование конфиденциальности материалов сообщений."
      -
        excerpt_id: "HOT03_explicit_section"
        original: "no disadvantage such as status or working condition should be given to the counselee or whistleblower who has provided a legitimate consultation or report."
        translated_ru: "К заявителю/информатору, сделавшему добросовестное сообщение, не должны применяться негативные меры по статусу или условиям труда."
        section_title: "4.3.3"
        relevance_comment: "Прямой запрет реталиации."
      -
        excerpt_id: "HOT04_explicit_section"
        original: "Members of the department in charge of ethical management must ensure that the identity of the counselee, whistleblower, and collaborator is not exposed."
        translated_ru: "Сотрудники этического подразделения обязаны обеспечить неразглашение личности заявителя, информатора и содействующих лиц."
        section_title: "4.3.2"
        relevance_comment: "Явная гарантия анонимности/неразглашения личности."
      -
        excerpt_id: "HOT05_explicit_section"
        original: "Those who directly or indirectly infringe any provisions specified in this Code of Ethics, or those who condone or permit them shall be disciplined for violation of corporate regulations."
        translated_ru: "Лица, прямо или косвенно нарушающие Кодекс, подлежат дисциплинарным мерам."
        section_title: "3.5 Disciplinary Action against Infringement"
        relevance_comment: "Фиксирует обязательное реагирование на нарушения."
      -
        excerpt_id: "HOT06_explicit_section"
        original: "In the case of any infringements of this Code of Ethics, employees shall report to the Manager, and those who witnessed or acknowledged infringement of others shall report to the Manager as well."
        translated_ru: "При любом нарушении Кодекса сотрудник обязан сообщить руководителю; свидетели нарушений также обязаны сообщить."
        section_title: "3.2 Reporting of Infringements"
        relevance_comment: "Прямая обязанность сообщения о нарушениях."

        original: "Компания постоянно работает над тем, чтобы предоставлять покупателям наилучший сервис."
        translated_ru: "Компания прямо ориентирована на максимальное удовлетворение потребностей покупателей."
        section_title: "3.1.1"
        relevance_comment: "Прямой клиентоцентричный принцип (CtoB01)."
      - excerpt_id: "CtoB02_explicit_section"
        original: "Компания обеспечивает коммуникацию с клиентами максимально честно, не вводя в заблуждение, предоставляя только правдивую информацию."
        translated_ru: "Покупателям предоставляется правдивая и полная информация."
        section_title: "3.1.3"
        relevance_comment: "Прямое требование корректного информирования покупателя (CtoB02)."
      - excerpt_id: "CtoB03_explicit_section"
        original: "каждый сотрудник Компании должен оперативно реагировать на запросы покупателей."
        translated_ru: "Установлен стандарт оперативного и качественного обслуживания покупателей."
        section_title: "3.1.2"
        relevance_comment: "Прямое требование высокого уровня сервиса (CtoB03)."
      - excerpt_id: "CtoB05_explicit_section"
        original: "Сотрудники Компании, занятые маркетингом или рекламой, должны знать и соблюдать требования законодательства."
        translated_ru: "Маркетинг и коммуникации с потребителем должны соответствовать закону и этике."
        section_title: "3.3.5"
        relevance_comment: "Прямой принцип законности в отношениях с покупателями (CtoB05)."
      - excerpt_id: "CtoB07_explicit_section"
        original: "Компания ценит обратную связь от покупателей и их мнение о нашей работе."
        translated_ru: "Компания поддерживает каналы обратной связи с клиентами."
        section_title: "3.1.2"
        relevance_comment: "Прямой принцип обратной связи с покупателями (CtoB07)."
      - excerpt_id: "CtoB08_explicit_section"
        original: "Независимо от того, кому принадлежат данные ... мы обязаны обеспечивать их защиту от неправомерного доступа."
        translated_ru: "Компания обязуется защищать персональные данные покупателей."
        section_title: "3.4.5"
        relevance_comment: "Прямой принцип конфиденциальности данных клиентов (CtoB08)."
      - excerpt_id: "CtoB09_explicit_section"
        original: "Мы предлагаем нашим покупателям продукцию высокого качества..."

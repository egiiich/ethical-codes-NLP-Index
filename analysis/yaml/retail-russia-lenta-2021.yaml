    key_excerpts:
      - excerpt_id: "COMP01_explicit_section"
        original: "Сотрудники Компании обязаны не запрашивать и не использовать информацию о ценах, планах продаж, маркетинговых активностях и любой другой информацией, составляющей коммерческую или иную охраняемую законом тайну конкурентов."
        translated_ru: "Сотрудникам запрещено собирать и использовать конфиденциальную информацию конкурентов."
        section_title: "3.8.7"
        relevance_comment: "Прямой запрет на получение конфиденциальных данных конкурента (COMP01)."
      - excerpt_id: "COMP03_explicit_section"
        original: "Если иное не установлено законодательством, сотрудникам Компании запрещено заключать с конкурентами соглашения, если такие соглашения ограничивают конкуренцию."
        translated_ru: "Сотрудникам запрещены соглашения с конкурентами, ограничивающие конкуренцию."
        section_title: "3.8.8"
        relevance_comment: "Прямой антикартельный принцип (COMP03)."
      - excerpt_id: "COMP05_explicit_section"
        original: "Мы строим взаимоотношения с конкурентами на принципах добросовестной конкуренции."
        translated_ru: "Компания закрепляет уважительный и добросовестный подход к конкурентам."
        section_title: "3.8.2"
        relevance_comment: "Прямой принцип уважительной конкуренции (COMP05)."
    other_principles: []

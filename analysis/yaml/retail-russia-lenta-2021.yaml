    key_excerpts:
      - excerpt_id: "HOT01_explicit_section"
        original: "Если у сотрудника Компании возникают сомнения ... он обязан сообщить ... непосредственному руководителю и в Комитет по этике."
        translated_ru: "Любой сотрудник имеет право и обязанность пользоваться каналом сообщений в Комитет по этике."
        section_title: "2.1.1"
        relevance_comment: "Прямое правило доступа работников к этическому каналу (HOT01)."
      - excerpt_id: "HOT02_brief_mention"
        original: "Конфиденциальность гарантируется."
        translated_ru: "Компания гарантирует конфиденциальность обращений в этический канал."
        section_title: "1. О Кодексе"
        relevance_comment: "Краткое подтверждение конфиденциальности материалов обращения (HOT02)."
      - excerpt_id: "HOT03_explicit_section"
        original: "Мы защищаем сотрудников ... от наказания, дискриминации или иных неблагоприятных последствий, связанных с подачей сообщения."
        translated_ru: "Компания прямо запрещает преследование работников за добросовестные сообщения."
        section_title: "2.1.4"
        relevance_comment: "Прямой запрет реталиации (HOT03)."
      - excerpt_id: "HOT04_explicit_section"
        original: "Сотрудники могут сообщить о любом инциденте анонимно или оставить свои контактные данные для обратной связи."
        translated_ru: "Разрешены как анонимные, так и персонифицированные сообщения."
        section_title: "2.1.2"
        relevance_comment: "Прямая гарантия анонимности заявителя (HOT04)."
      - excerpt_id: "HOT05_explicit_section"
        original: "В случае если факты нарушений Кодекса ... подтверждаются, Компания принимает необходимые меры."
        translated_ru: "Подтверждённые нарушения подлежат обязательному разбору и мерам реагирования."
        section_title: "2.1.3"
        relevance_comment: "Прямой принцип обязательного реагирования (HOT05)."
      - excerpt_id: "HOT06_explicit_section"
        original: "Все сотрудники Компании обязаны ... сообщать о нарушениях законодательства и Кодекса третьими лицами в Комитет по этике."
        translated_ru: "Все сотрудники обязаны сообщать о нарушениях в Комитет по этике."
        section_title: "2.3.1.4"
        relevance_comment: "Прямая обязанность сообщения о нарушениях (HOT06)."

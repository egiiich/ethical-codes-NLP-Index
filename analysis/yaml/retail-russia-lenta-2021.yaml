        translated_ru: "Сотрудники обязаны защищать конфиденциальную информацию компании."
        section_title: "3.11.3"
        relevance_comment: "Прямое требование информационной безопасности (WtoC03)."
      - excerpt_id: "WtoC04_brief_mention"
        original: "При разработке новых объектов интеллектуальной собственности сотрудники обязаны сохранять их конфиденциальность."
        translated_ru: "Сотрудники обязаны защищать результаты интеллектуальной деятельности компании."
        section_title: "3.10.4"
        relevance_comment: "Краткое подтверждение защиты интеллектуальной собственности (WtoC04)."
      - excerpt_id: "WtoC05_explicit_section"
        original: "Сотрудники Компании должны знать и соблюдать требования законодательства и локальных нормативных актов."
        translated_ru: "От сотрудников требуется знание и соблюдение применимого законодательства."
        section_title: "3.7.1"
        relevance_comment: "Прямой комплаенс-принцип (WtoC05)."
      - excerpt_id: "WtoC10_brief_mention"
        original: "Наша репутация и доброе имя зависят от каждого из нас."
        translated_ru: "Сохранение деловой репутации компании закреплено как личная обязанность сотрудников."
        section_title: "2.2.1"
        relevance_comment: "Краткий принцип защиты репутации компании (WtoC10)."

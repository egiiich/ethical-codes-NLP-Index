    key_excerpts:
      - excerpt_id: "CtoS01_explicit_section"
        original: "Мы выбираем поставщиков и контрагентов на основе качества, надежности поставок, прозрачности и соблюдения законодательства."
        translated_ru: "Отбор поставщиков базируется на объективных критериях эффективности и надежности."
        section_title: "3.8.3"
        relevance_comment: "Прямой критерий выбора поставщиков (CtoS01)."
      - excerpt_id: "CtoS02_explicit_section"
        original: "Принцип отбора поставщиков и контрагентов - обеспечить равные и недискриминационные условия участия."
        translated_ru: "Поставщикам обеспечиваются равные условия участия в отборе."
        section_title: "3.8.3"
        relevance_comment: "Прямой принцип равного доступа поставщиков (CtoS02)."
      - excerpt_id: "CtoS03_brief_mention"
        original: "Сотрудники Компании обязаны придерживаться положений честной конкурентной деловой практики."
        translated_ru: "Сотрудникам запрещено злоупотреблять рыночным положением во взаимоотношениях с контрагентами."
        section_title: "3.8.5"
        relevance_comment: "Краткое подтверждение недопустимости злоупотреблений (CtoS03)."
      - excerpt_id: "CtoS06_brief_mention"
        original: "И мы, и наши поставщики работаем для обеспечения устойчивого качества и надежности поставок."
        translated_ru: "Кодекс ориентирует отношения с поставщиками на устойчивость и долгосрочную надежность."
        section_title: "3.9.3"
        relevance_comment: "Краткий ориентир на устойчивое партнёрство (CtoS06)."
      - excerpt_id: "CtoS07_explicit_section"
        original: "Компания стремится работать с поставщиками, которые имеют деловую репутацию, соблюдают закон и общепринятые нормы корпоративной и деловой этики."
        translated_ru: "Отбор исключает необъективные преимущества и основан на проверяемых требованиях."
        section_title: "3.8.4"
        relevance_comment: "Прямой анти-манипуляционный принцип отбора (CtoS07)."
    other_principles: []

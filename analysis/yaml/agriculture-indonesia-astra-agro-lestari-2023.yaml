      -
        excerpt_id: "COMP03_explicit_section"
        original: "The Company... are strictly prohibited from engaging in any form of cooperation with competitors that may negatively impact customers or result in monopolistic practices."
        translated_ru: "Запрещены формы сотрудничества с конкурентами, ведущие к ущербу клиентам или монополистическим практикам."
        section_title: "Competitors"
        relevance_comment: "Подтверждение статуса explicit_section для принципа COMP03."
      -

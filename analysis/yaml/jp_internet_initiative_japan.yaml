    key_excerpts:
      - excerpt_id: "COMP03_brief_mention"
        original: "It is the policy of IIJ Group to comply with applicable antitrust, competition and fair trade laws and regulations of each country and region where IIJ Group conducts its businesses."
        translated_ru: "«Политика IIJ Group заключается в соблюдении применимого антимонопольного законодательства, норм о конкуренции и честной торговле в каждой стране и регионе, где группа ведет бизнес»."
        section_title: "VI. Fair Dealing"
        relevance_comment: "Общее антимонопольное обязательство без детализации конкретных типов сговора (COMP03 как brief_mention)."
      - excerpt_id: "COMP05_explicit_section"
        original: "Directors, officers and employees are required to deal fairly with ... competitors ... and to base their business relationships on lawful, efficient and fair practices."
        translated_ru: "«Директора, должностные лица и сотрудники обязаны вести справедливые отношения ... с конкурентами ... и строить деловые отношения на законных, эффективных и честных практиках»."
        section_title: "VI. Fair Dealing"
        relevance_comment: "Явная норма о честном и справедливом поведении по отношению к конкурентам (COMP05)."

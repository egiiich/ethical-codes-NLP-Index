    key_excerpts:
      - excerpt_id: "HOT01_explicit_section"
        original: "The system accepts reports on regulatory and compliance violations, which the relevant department will then investigate and respond to."
        translated_ru: "Система принимает сообщения о нарушениях нормативных требований и комплаенса, после чего профильное подразделение проводит проверку и реагирует."
        section_title: "Whistleblowing System"
        relevance_comment: "Прямо закреплен действующий канал приема обращений (HOT01)."
      - excerpt_id: "HOT02_explicit_section"
        original: "Protects the confidentiality of the whistleblower and the details of their report"
        translated_ru: "Обеспечивается конфиденциальность личности информатора и деталей его сообщения."
        section_title: "Whistleblowing System"
        relevance_comment: "Прямое требование конфиденциальности материалов расследования (HOT02)."
      - excerpt_id: "HOT03_explicit_section"
        original: "Forbids the disadvantageous treatment of, retaliation against, or probing of whistleblowers..."
        translated_ru: "Запрещает неблагоприятное обращение, преследование или попытки выяснения личности информаторов..."
        section_title: "Whistleblowing System"
        relevance_comment: "Прямой запрет реталиации и давления на информаторов (HOT03)."
      - excerpt_id: "HOT04_explicit_section"
        original: "Allows for anonymous reporting"
        translated_ru: "Разрешает анонимные сообщения."
        section_title: "Whistleblowing System"
        relevance_comment: "Прямая гарантия анонимности заявителя (HOT04)."
      - excerpt_id: "HOT05_explicit_section"
        original: "...internal investigations, cause analysis, and the implementation of recurrence prevention strategies will be taken..."
        translated_ru: "...будут проводиться внутренние расследования, анализ причин и внедрение мер предупреждения повторения..."
        section_title: "LY Corporation Group Code of Conduct"
        relevance_comment: "Прямой принцип обязательного реагирования и принятия мер (HOT05)."
      - excerpt_id: "HOT06_brief_mention"
        original: "...officers and employees ... can make anonymous reports via this hotline."
        translated_ru: "...руководители и сотрудники ... могут делать анонимные сообщения через эту горячую линию."
        section_title: "Whistleblowing System"
        relevance_comment: "Краткое подтверждение права/возможности сообщать о нарушениях (HOT06)."

    key_excerpts:
      -
        excerpt_id: "HOT01_explicit_section"
        original: "The Company has established various reporting channels that Employees are encouraged to use to report any illegal or unethical conduct."
        translated_ru: "Определены формальные каналы сообщений о нарушениях для всех работников."
        section_title: "Reporting Violations"
        relevance_comment: "Подтверждение статуса explicit_section для принципа HOT01."
      -
        excerpt_id: "HOT03_explicit_section"
        original: "The Company has a zero tolerance policy for retaliating against Employees who report misconduct in good faith."
        translated_ru: "Установлен прямой запрет репрессий к добросовестным заявителям."
        section_title: "Reporting Violations"
        relevance_comment: "Подтверждение статуса explicit_section для принципа HOT03."
      -
        excerpt_id: "HOT04_explicit_section"
        original: "Hyundai Mobis shall undertake to ensure the anonymity of the whistleblower and maintain strict confidentiality of the content of the report."
        translated_ru: "Прямо гарантируются анонимность заявителя и конфиденциальность сообщения."
        section_title: "Reporting Violations"
        relevance_comment: "Подтверждение статуса explicit_section для принципа HOT04."
      -
        excerpt_id: "HOT06_explicit_section"
        original: "Employees have an obligation to immediately report any violations of the Code of Conduct, related guidelines, and/or any other unethical or illegal acts to the Compliance Department."
        translated_ru: "Закреплена обязанность незамедлительно сообщать о нарушениях."
        section_title: "Reporting Violations"
        relevance_comment: "Подтверждение статуса explicit_section для принципа HOT06."

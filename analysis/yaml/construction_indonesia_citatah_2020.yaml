    key_excerpts:
      - excerpt_id: "WtoC01_brief_mention"
        original: "Promoting integrity, loyalty, and professionalism in carrying out tasks ..."
        translated_ru: "Продвигать честность, лояльность и профессионализм при выполнении задач ..."
        section_title: "D. Commitment and Attitude of Employee"
        relevance_comment: "Краткая фиксация высокого стандарта выполнения работы."
      - excerpt_id: "WtoC02_explicit_section"
        original: "All assets of the Company must be protected against unauthorized use, embezzlement, and fraud."
        translated_ru: "Все активы Компании должны быть защищены от несанкционированного использования, растраты и мошенничества."
        section_title: "3. Assets Utilization and Maintenance"
        relevance_comment: "Прямой принцип сохранности активов."
      - excerpt_id: "WtoC03_explicit_section"
        original: "The Individuals of Company shall maintain the confidentiality of the Company's information."
        translated_ru: "Сотрудники компании обязаны сохранять конфиденциальность информации компании."
        section_title: "11. Confidentiality of Information"
        relevance_comment: "Прямой принцип конфиденциальности и ИБ."
      - excerpt_id: "WtoC04_explicit_section"
        original: "All the Individuals of Company commit to ... participate actively in protecting the Company's intellectual property rights."
        translated_ru: "Все сотрудники обязуются ... активно участвовать в защите прав интеллектуальной собственности компании."
        section_title: "12. Intellectual Property Rights"
        relevance_comment: "Прямое требование защиты ИС компании."
      - excerpt_id: "WtoC05_explicit_section"
        original: "The Individuals of Company must comply and apply applicable legislation and regulations consistently."
        translated_ru: "Сотрудники компании обязаны последовательно соблюдать и применять действующие законы и нормативные требования."
        section_title: "10. Laws and Regulations Compliance"
        relevance_comment: "Прямое требование соблюдения законодательства."
      - excerpt_id: "WtoC06_brief_mention"
        original: "Workers adhere to the superior's instructions relating to their positions and responsibilities ..."
        translated_ru: "Сотрудники должны следовать указаниям руководителей, относящимся к их должности и обязанностям ..."
        section_title: "1. Relationship between subordinates and superiors"
        relevance_comment: "Краткое требование соблюдения субординации."
      - excerpt_id: "WtoC09_brief_mention"
        original: "Provide equal opportunities ... for career and self-development in the Company."
        translated_ru: "Предоставлять равные возможности ... для карьерного роста и саморазвития в Компании."
        section_title: "3. Workers"
        relevance_comment: "Краткая поддержка профессионального развития."
      - excerpt_id: "WtoC10_explicit_section"
        original: "The Company's reputation always related to the behavior of the Individuals of Company."
        translated_ru: "Репутация Компании всегда связана с поведением сотрудников Компании."
        section_title: "7. Maintain The Company's Reputation"
        relevance_comment: "Прямой принцип защиты деловой репутации компании."

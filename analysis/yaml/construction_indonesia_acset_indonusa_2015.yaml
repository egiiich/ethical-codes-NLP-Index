    key_excerpts:
      - excerpt_id: "COMP02_brief_mention"
        original: "Commissioners, Directors and Employees ... are not allowed taking part in the management and/or to own shares of a competitor ..."
        translated_ru: "Комиссары, директора и сотрудники ... не вправе участвовать в управлении конкурентом и/или владеть его акциями ..."
        section_title: "3.3 Competitors"
        relevance_comment: "Краткое ограничение на ослабление конкурентной среды через кадрово-управленческое пересечение."
      - excerpt_id: "COMP03_explicit_section"
        original: "The Company is not allowed to develop cooperation with competitors ... leads to monopolistic practices."
        translated_ru: "Компания не вправе развивать сотрудничество с конкурентами ... приводящее к монополистическим практикам."
        section_title: "3.3 Competitors"
        relevance_comment: "Прямой запрет антиконкурентного сговора/монополистических практик."
      - excerpt_id: "COMP05_brief_mention"
        original: "The Company supports fair and healthy competition in accordance with applicable laws and regulations."
        translated_ru: "Компания поддерживает честную и здоровую конкуренцию в соответствии с применимым законодательством."
        section_title: "3.3 Competitors"
        relevance_comment: "Краткая фиксация принципа добросовестной конкуренции."
      - excerpt_id: "COMP08_explicit_section"
        original: "The Company is not allowed to discredit competitors in its marketing, promotion and advertising activities."
        translated_ru: "Компании запрещено дискредитировать конкурентов в маркетинговой, промо- и рекламной деятельности."
        section_title: "3.3 Competitors"
        relevance_comment: "Прямой запрет порочащих практик в отношении конкурентов."
    other_principles: []

    key_excerpts:
      - excerpt_id: "CtoS01_explicit_section"
        original: "We select our suppliers transparently and fairly in accordance with the Company’s procedure."
        translated_ru: "Мы выбираем поставщиков прозрачно и справедливо в соответствии с процедурами компании."
        section_title: "3-3 Respecting Suppliers"
        relevance_comment: "Прямой критерий выбора поставщиков."
      - excerpt_id: "CtoS03_explicit_section"
        original: "We do not make unjust demands by using the Company’s authority and position."
        translated_ru: "Мы не предъявляем несправедливых требований, используя полномочия и позицию компании."
        section_title: "3-3 Respecting Suppliers"
        relevance_comment: "Прямой запрет злоупотребления рыночной властью."
      - excerpt_id: "CtoS06_explicit_section"
        original: "We support our suppliers’ effort to strengthen their competitiveness ... and strive to achieve mutual growth."
        translated_ru: "Мы поддерживаем усилия поставщиков по повышению конкурентоспособности и стремимся к взаимному росту."
        section_title: "3-3 Respecting Suppliers"
        relevance_comment: "Прямой акцент на устойчивом партнерстве."

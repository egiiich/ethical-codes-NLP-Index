    key_excerpts:
      - excerpt_id: "WtoC01_brief_mention"
        original: "We do our best in our work."
        translated_ru: "Мы делаем все возможное в своей работе."
        section_title: "2-2 Sense of Responsibility"
        relevance_comment: "Краткая ориентация на высокое качество работы."
      - excerpt_id: "WtoC02_explicit_section"
        original: "We protect the Company’s tangible properties ... We never use the Company’s properties for personal purposes."
        translated_ru: "Мы защищаем материальные активы компании и никогда не используем их в личных целях."
        section_title: "2-4 Information Security and Responsible Asset Management"
        relevance_comment: "Прямой принцип сохранности активов."
      - excerpt_id: "WtoC03_explicit_section"
        original: "We never leak information acquired while doing our job ..."
        translated_ru: "Мы никогда не раскрываем информацию, полученную при выполнении работы."
        section_title: "2-4 Information Security and Responsible Asset Management"
        relevance_comment: "Прямое требование конфиденциальности и ИБ."
      - excerpt_id: "WtoC04_explicit_section"
        original: "We strive to secure and maintain the Company’s intellectual properties"
        translated_ru: "Мы стремимся обеспечивать сохранность и поддержку интеллектуальной собственности компании."
        section_title: "2-4 Information Security and Responsible Asset Management"
        relevance_comment: "Прямая защита интеллектуальной собственности."
      - excerpt_id: "WtoC05_explicit_section"
        original: "we ... comply with laws, regulations and policies related to our work"
        translated_ru: "мы соблюдаем законы, нормы и политики, относящиеся к нашей работе"
        section_title: "2-2 Sense of Responsibility"
        relevance_comment: "Прямой правовой комплаенс работников."
      - excerpt_id: "WtoC09_brief_mention"
        original: "The Company ... provides opportunity for self-development and growth for employees"
        translated_ru: "Компания предоставляет сотрудникам возможности для саморазвития и роста."
        section_title: "3-4 Respecting Employees"
        relevance_comment: "Краткая поддержка профессионального развития."
      - excerpt_id: "WtoC10_brief_mention"
        original: "Each of us ... maintains the Company’s honor and dignity with proper attire and polite behaviors"
        translated_ru: "Каждый из нас поддерживает честь и достоинство компании надлежащим поведением."
        section_title: "2-1 Maintaining Honor and Dignity"

    key_excerpts:
      - excerpt_id: "COMP03_explicit_section"
        original: "we comply with anti-trust and fair transactions laws ... refraining from inappropriate joint actions like collusion"
        translated_ru: "мы соблюдаем антимонопольные и торговые нормы ... воздерживаемся от ненадлежащих совместных действий, таких как сговор"
        section_title: "1-3 Fair Transactions"
        relevance_comment: "Прямой запрет на сговор и антиконкурентные действия."
      - excerpt_id: "COMP04_brief_mention"
        original: "we comply with anti-trust and fair transactions laws and regulations"
        translated_ru: "мы соблюдаем антимонопольные и нормы добросовестных сделок"
        section_title: "1-3 Fair Transactions"
        relevance_comment: "Краткое подтверждение про-конкурентного сотрудничества в рамках закона."
      - excerpt_id: "COMP05_brief_mention"
        original: "we contribute to enhancing the efficiency of the market by engaging in fair competition"
        translated_ru: "мы повышаем эффективность рынка, участвуя в честной конкуренции"
        section_title: "1-3 Fair Transactions"
        relevance_comment: "Краткая фиксация принципа честной конкуренции."
      - excerpt_id: "COMP06_brief_mention"
        original: "we refrain from using weaknesses of our competitors or from undermining free competition"
        translated_ru: "мы воздерживаемся от использования слабостей конкурентов и подрыва свободной конкуренции"
        section_title: "1-3 Fair Transactions"
        relevance_comment: "Краткий запрет на ослабление конкурентов недобросовестными методами."
      - excerpt_id: "COMP07_brief_mention"
        original: "We strive to protect intellectual properties and trade secrets of all stakeholders including our clients and suppliers"
        translated_ru: "Мы стремимся защищать интеллектуальную собственность и коммерческие тайны всех заинтересованных сторон"
        section_title: "1-4 Information Protection"
        relevance_comment: "Краткое уважение к ИС внешних сторон, включая рыночных участников."

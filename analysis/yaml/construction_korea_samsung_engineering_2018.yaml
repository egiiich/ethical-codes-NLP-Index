        section_title: "5-2 Reporting Violations"
        relevance_comment: "Прямая гарантия анонимности."
      - excerpt_id: "HOT05_explicit_section"
        original: "Any employee that violates the Code is subject to consequences such as disciplinary actions."
        translated_ru: "Любой сотрудник, нарушивший Кодекс, подлежит последствиям, включая дисциплинарные меры."
        section_title: "5-1 Duty to Comply"
        relevance_comment: "Прямое обязательство реагировать на нарушения."
      - excerpt_id: "HOT06_explicit_section"
        original: "When an employee ... is aware of violation of the Code, he/she must report it."
        translated_ru: "Когда сотрудник знает о нарушении Кодекса, он/она обязан(а) сообщить об этом."
        section_title: "5-2 Reporting Violations"
        relevance_comment: "Прямая обязанность сообщать о нарушениях."

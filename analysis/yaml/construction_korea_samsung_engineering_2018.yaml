    key_excerpts:
      - excerpt_id: "HOT02_explicit_section"
        original: "The Company must protect the anonymity of those reporting violations."
        translated_ru: "Компания должна защищать анонимность сообщающих о нарушениях."
        section_title: "5-2 Reporting Violations"
        relevance_comment: "Прямая защита конфиденциальности заявителя."
      - excerpt_id: "HOT03_explicit_section"
        original: "The Company must ... strive to prevent any retaliatory acts."
        translated_ru: "Компания должна стремиться предотвращать любые ответные репрессии."
        section_title: "5-2 Reporting Violations"
        relevance_comment: "Прямой запрет преследования заявителей."
      - excerpt_id: "HOT04_explicit_section"
        original: "The Company must protect the anonymity of those reporting violations"

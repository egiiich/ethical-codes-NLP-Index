      -
        excerpt_id: "CtoS01_explicit_section"
        original: "SeAH guarantees its business partners equal opportunity to participate in transactions."
        translated_ru: "Поставщикам гарантируется равный доступ к участию в сделках."
        section_title: "Code of Ethics Chapter 2"
        relevance_comment: "Подтверждение статуса для принципа CtoS01."
      -
        excerpt_id: "CtoS02_explicit_section"
        original: "...equal opportunity to participate in transactions and to set reasonable transaction terms and conditions..."
        translated_ru: "Кодекс требует равных условий участия и разумных условий сделок."
        section_title: "Code of Ethics Chapter 2"
        relevance_comment: "Подтверждение статуса для принципа CtoS02."
      -
        excerpt_id: "CtoS03_explicit_section"
        original: "SeAH ... does not engage in any form of unfair conduct using its superior bargaining position."
        translated_ru: "Запрещено злоупотреблять переговорной/рыночной силой в отношении поставщиков."
        section_title: "Code of Ethics Chapter 2"
        relevance_comment: "Подтверждение статуса для принципа CtoS03."
      -
        excerpt_id: "CtoS06_explicit_section"
        original: "...promotes mutual growth by establishing mutual trust through transparent transactions."
        translated_ru: "Компания ориентирована на долгосрочное взаимное развитие с поставщиками."
        section_title: "Code of Ethics Chapter 2"
        relevance_comment: "Подтверждение статуса для принципа CtoS06."
      -
        excerpt_id: "CtoS07_explicit_section"
        original: "You shall not ... favor or discriminate a specific company ... preferring school or regional ties..."
        translated_ru: "Прямо запрещены фаворитизм и манипуляции при выборе контрагентов."
        section_title: "Chapter 4 Lack of Transparency in the Selection of Business Partners"
        relevance_comment: "Подтверждение статуса для принципа CtoS07."

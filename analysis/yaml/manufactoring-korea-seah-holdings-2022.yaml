        relevance_comment: "Подтверждение статуса для принципа WtoC04."
      -
        excerpt_id: "WtoC05_explicit_section"
        original: "SeAH ... complies with all laws and regulations of Korea and aboard where it conducts business."
        translated_ru: "Прямо закреплено соблюдение законов и нормативных требований во всех юрисдикциях."
        section_title: "Code of Ethics Chapter 1"
        relevance_comment: "Подтверждение статуса для принципа WtoC05."
      -
        excerpt_id: "WtoC10_explicit_section"

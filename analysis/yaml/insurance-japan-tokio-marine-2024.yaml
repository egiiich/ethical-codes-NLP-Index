    key_excerpts:
      - excerpt_id: "COMP03_explicit_section"
        original: "We shall not undertake any action that hampers free and fair competition, including collusion and cartel formation."
        translated_ru: "Запрещены действия, препятствующие честной и свободной конкуренции, включая сговоры и картели."
        section_title: "1-3 Free and Fair Competition"
        relevance_comment: "Прямой антикартельный запрет."
      - excerpt_id: "COMP05_brief_mention"
        original: "engage in free and fair competition"
        translated_ru: "Компания обязуется вести деятельность в условиях свободной и честной конкуренции."
        section_title: "1. Compliance"
        relevance_comment: "Краткое подтверждение уважения к принципам конкуренции."
      - excerpt_id: "COMP06_brief_mention"
        original: "abstain from any act falling under "unfair trade practices" such as overreaching"
        translated_ru: "Нужно воздерживаться от недобросовестных торговых практик, включая злоупотребление позицией."
        section_title: "1-3 Free and Fair Competition"
        relevance_comment: "Краткое подтверждение недопустимости ослабления конкурентов нечестными методами."

    key_excerpts:
      - excerpt_id: "WtoC02_brief_mention"
        original: "we shall protect the confidentiality of nonpublic information"
        translated_ru: "Сотрудники должны защищать непубличную информацию компании."
        section_title: "3-4 Confidential Information"
        relevance_comment: "Краткая защита активов/информации компании."
      - excerpt_id: "WtoC03_explicit_section"
        original: "shall protect the confidentiality of nonpublic information and not disclose such information to anyone who is not authorized"
        translated_ru: "Запрещено раскрывать непубличную информацию неуполномоченным лицам."
        section_title: "3-4 Confidential Information"
        relevance_comment: "Прямой принцип конфиденциальности."
      - excerpt_id: "WtoC05_explicit_section"
        original: "will obey applicable laws, rules and regulations and internal rules"
        translated_ru: "Сотрудники обязаны соблюдать применимые законы, нормы и внутренние правила."
        section_title: "Code preface"
        relevance_comment: "Прямой правовой комплаенс."
      - excerpt_id: "WtoC07_explicit_section"
        original: "shall not tolerate any action pursuing our personal or a third party's interests against our respective company's legitimate interests"
        translated_ru: "Запрещены действия в личных интересах или интересах третьих лиц в ущерб законным интересам компании."
        section_title: "1-4 Conflicts of Interest"
        relevance_comment: "Прямой запрет конфликта интересов."
      - excerpt_id: "WtoC09_explicit_section"
        original: "shall not buy or sell the securities ... while in possession of material information"
        translated_ru: "Запрещена торговля ценными бумагами при владении существенной непубличной информацией."
        section_title: "1-5 Insider Trading"
        relevance_comment: "Прямой запрет инсайдерской торговли."
      - excerpt_id: "WtoC10_brief_mention"
        original: "Good Company that lives up to the trust placed in us"
        translated_ru: "Сотрудники должны поддерживать доверие к группе как к «Good Company»."
        section_title: "Code preface"
        relevance_comment: "Краткий репутационный ориентир."

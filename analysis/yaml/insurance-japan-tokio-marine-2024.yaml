    key_excerpts:
      - excerpt_id: "HOT01_explicit_section"
        original: "If we determine that our ordinary reporting line is not appropriate, we shall use the hotline."
        translated_ru: "Если обычная линия подчинения не подходит, необходимо использовать горячую линию."
        section_title: "Preamble"
        relevance_comment: "Прямой доступ к альтернативному каналу обращения."
      - excerpt_id: "HOT03_explicit_section"
        original: "we shall immediately report and discuss it with our immediate supervisor"
        translated_ru: "О выявленном нарушении нужно немедленно сообщить и обсудить с непосредственным руководителем."
        section_title: "Preamble"
        relevance_comment: "Прямая обязанность сообщения о нарушениях."
      - excerpt_id: "HOT04_explicit_section"
        original: "committed to protecting the anonymity of such persons to the maximum extent possible"
        translated_ru: "Группа обязуется максимально защищать анонимность таких лиц."
        section_title: "Hotline protection paragraph"
        relevance_comment: "Прямая гарантия анонимности заявителя."
      - excerpt_id: "HOT05_explicit_section"
        original: "Non-compliance ... are subject to appropriate action, including investigation, corrective action, reporting to the supervising authorities, disciplinary action"
        translated_ru: "За нарушения предусмотрены расследование, корректирующие меры, сообщение надзору и дисциплинарные меры."
        section_title: "Non-compliance consequences"
        relevance_comment: "Прямая процедура реагирования на нарушения."
      - excerpt_id: "HOT06_explicit_section"
        original: "no one will be treated detrimentally because of his or her use of the hotline"
        translated_ru: "Никто не должен подвергаться ухудшению положения из-за использования hotline."
        section_title: "Hotline protection paragraph"
        relevance_comment: "Прямая антирепрессивная гарантия."
      - excerpt_id: "HOT08_explicit_section"
        original: "we shall use the hotline"
        translated_ru: "Канал hotline прямо закреплен как рабочий инструмент эскалации."
        section_title: "Preamble"
        relevance_comment: "Наличие конкретного канала сообщений."

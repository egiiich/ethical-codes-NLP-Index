    key_excerpts:
      - excerpt_id: "COMP01_explicit_section"
        original: "Lawful Information Collection — Information shall be collected in a lawful way."
        translated_ru: "Сбор информации должен осуществляться только законным способом."
        section_title: "Theme P4"
        relevance_comment: "Прямой запрет на незаконный сбор данных о конкурентах (COMP01)."
      - excerpt_id: "COMP03_explicit_section"
        original: "Do not inflict damage to customers and other businesses by unfairly colluding with competitors to set sales prices, sales conditions or market allocation."
        translated_ru: "Запрещён сговор с конкурентами по ценам, условиям продаж и разделу рынка."
        section_title: "P3 Fair Competition"
        relevance_comment: "Прямой антикартельный принцип (COMP03)."
      - excerpt_id: "COMP04_brief_mention"
        original: "Thorough prior legal review when working with competitors."
        translated_ru: "При взаимодействии с конкурентами требуется предварительная правовая проверка."
        section_title: "Compliance Keywords P3.5"
        relevance_comment: "Краткое подтверждение допуска регулируемого взаимодействия с конкурентами (COMP04)."
      - excerpt_id: "COMP05_explicit_section"
        original: "Fairness and trust is the power binding us and our partners as one team."
        translated_ru: "Справедливость и доверие объявлены базой отношений с партнёрами и конкурентной среды."
        section_title: "Theme P"
        relevance_comment: "Прямой ценностный принцип уважительной конкуренции (COMP05)."
      - excerpt_id: "COMP07_brief_mention"
        original: "No infringement of intellectual property rights of partners and stakeholders."
        translated_ru: "Запрещено нарушение прав интеллектуальной собственности партнёров и стейкхолдеров."
        section_title: "Compliance Keywords E6.8"
        relevance_comment: "Краткое подтверждение уважения ИС других участников рынка, включая конкурентов (COMP07)."
      - excerpt_id: "COMP08_explicit_section"
        original: "Refrain from the marketing plan indiscriminately criticizing competitors’ products based on information which is distorted and not objective."
        translated_ru: "Запрещается недобросовестная критика продукции конкурентов на искажённой/необъективной информации."
        section_title: "C2.4 Honest Marketing"
        relevance_comment: "Прямой запрет порочащей/ложной информации о конкурентах (COMP08)."

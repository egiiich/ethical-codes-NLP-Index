    key_excerpts:
      - excerpt_id: "HOT01_brief_mention"
        original: "The executives and employees of the company shall report any violations or suspicions to the whistle-blowing department, known as “Sinmungo”."
        translated_ru: "Сотрудники и руководители обязаны сообщать о нарушениях в систему «Sinmungo»."
        section_title: "G4.1 Others"
        relevance_comment: "Канал заявлений открыт для всех сотрудников (HOT01)."
      - excerpt_id: "HOT02_explicit_section"
        original: "The company shall ... keep the identity of the whistleblower and the details of the report confidential."
        translated_ru: "Компания обязана сохранять конфиденциальность личности заявителя и деталей сообщения."
        section_title: "G4.2 Others"
        relevance_comment: "Прямое требование конфиденциальности расследований (HOT02)."
      - excerpt_id: "HOT03_explicit_section"
        original: "The company shall take no retaliatory action on the executives and employees who report such violations or suspicions of violation."
        translated_ru: "Компания не допускает репрессий в отношении заявителей."
        section_title: "G4.3 Others"
        relevance_comment: "Прямой запрет преследования заявителей (HOT03)."
      - excerpt_id: "HOT04_explicit_section"
        original: "The company shall allow its officers and employees to report violations or concerns using their real names or on an anonymous basis."
        translated_ru: "Сообщение о нарушениях допускается как по имени, так и анонимно."
        section_title: "G4.2 Others"
        relevance_comment: "Прямая гарантия анонимного канала (HOT04)."
      - excerpt_id: "HOT05_explicit_section"
        original: "The company shall take appropriate actions such as disciplinary action ... and shall investigate problems and prepare improvement measures in order to prevent the recurrence of the problems."
        translated_ru: "По нарушениям предусмотрены расследование, меры и дисциплинарные действия."
        section_title: "G2.4 Responsibility of the Company"
        relevance_comment: "Прямой принцип обязательного реагирования на нарушения (HOT05)."
      - excerpt_id: "HOT06_explicit_section"
        original: "All company employees shall promptly report ... when they or others violate the Code of Ethics."
        translated_ru: "Все сотрудники обязаны незамедлительно сообщать о нарушениях Кодекса."
        section_title: "Duties of Employees (2)"
        relevance_comment: "Прямая обязанность сообщения о нарушениях (HOT06)."
    other_principles: []

        relevance_comment: "Прямое требование наличия рабочей обратной связи (CtoB07)."
      - excerpt_id: "CtoB08_explicit_section"
        original: "Protecting Customer Information — Customer information matters the most."
        translated_ru: "Защита и конфиденциальность данных клиентов объявлены приоритетом."
        section_title: "Theme C3"
        relevance_comment: "Прямой принцип защиты данных клиентов (CtoB08)."
      - excerpt_id: "CtoB09_explicit_section"
        original: "strictly comply with all policies and procedures regarding safety, hygiene and quality at every moment."
        translated_ru: "Компания требует строгого соблюдения стандартов безопасности и качества продуктов."

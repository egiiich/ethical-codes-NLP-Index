        section_title: "C3 Providing Value"
        relevance_comment: "Краткое подтверждение высокого уровня сервиса (CtoB03)."
      - excerpt_id: "CtoB04_brief_mention"
        original: "We shall provide the best products and services at reasonable prices."
        translated_ru: "Продукты и услуги должны предоставляться по разумной цене."
        section_title: "C1 Providing the Best Products and Services"
        relevance_comment: "Краткий ориентир на справедливое ценообразование (CtoB04)."
      - excerpt_id: "CtoB05_explicit_section"
        original: "Those who are responsible for the marketing ... shall ... comply with the related laws and company regulations."
        translated_ru: "Маркетинг и коммуникации с клиентами обязаны соответствовать законам и правилам."
        section_title: "C2.1 Honest Marketing"

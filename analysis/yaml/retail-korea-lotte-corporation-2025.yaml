    key_excerpts:
      - excerpt_id: "WtoC02_explicit_section"
        original: "Protecting Our Assets — The assets of the company are for all employees."
        translated_ru: "Сотрудники обязаны бережно относиться к активам компании."
        section_title: "Theme E5"
        relevance_comment: "Прямое требование сохранности активов компании (WtoC02)."
      - excerpt_id: "WtoC03_explicit_section"
        original: "Preventing Information Leakage — Information leakage begins with minor carelessness."
        translated_ru: "Предотвращение утечки информации закреплено как обязанность сотрудников."
        section_title: "Theme E7"
        relevance_comment: "Прямое требование информационной безопасности (WtoC03)."
      - excerpt_id: "WtoC04_explicit_section"
        original: "Protecting Our Intellectual Property Rights — We shall protect our intellectual property that we achieved by our sweat and efforts."
        translated_ru: "Сотрудники обязаны защищать интеллектуальную собственность компании."
        section_title: "Theme E6"
        relevance_comment: "Прямое требование защиты ИС компании (WtoC04)."
      - excerpt_id: "WtoC05_explicit_section"
        original: "We, the members of LOTTE, shall comply with the related laws, company regulations and this code of conduct."
        translated_ru: "Все сотрудники обязаны соблюдать законы, внутренние правила и кодекс."
        section_title: "G1.1"
        relevance_comment: "Прямой комплаенс-принцип (WtoC05)."
      - excerpt_id: "WtoC10_brief_mention"
        original: "Thinking that we are the face of LOTTE... be committed to protecting the ... brand value of our company."
        translated_ru: "Сотрудники должны защищать бренд и репутацию LOTTE в публичных коммуникациях."
        section_title: "C4 Protecting Our Brand"
        relevance_comment: "Краткое подтверждение обязанности беречь деловую репутацию (WtoC10)."

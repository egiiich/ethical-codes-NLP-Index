    key_excerpts:
      - excerpt_id: "CtoS01_explicit_section"
        original: "select and register business partners based on a fair and transparent evaluation criteria in all transactions."
        translated_ru: "Выбор и регистрация партнёров осуществляются по прозрачным и объективным критериям."
        section_title: "Chapter 3.1 Equal Opportunity"
        relevance_comment: "Прямой критерий отбора поставщиков по эффективности/объективности (CtoS01)."
      - excerpt_id: "CtoS02_explicit_section"
        original: "Provide fair opportunities to all business applicants according to the principles and procedures established by the Company."
        translated_ru: "Всем кандидатам в партнёры предоставляются равные возможности."
        section_title: "Chapter 3.1 Equal Opportunity"
        relevance_comment: "Прямой принцип равного доступа поставщиков (CtoS02)."
      - excerpt_id: "CtoS03_explicit_section"
        original: "We never engage in any form of unfair transaction taking advantage of any superior position."
        translated_ru: "Запрещены несправедливые сделки с использованием превосходящей позиции."
        section_title: "Chapter 3.2 Fair Transaction Process"
        relevance_comment: "Прямой запрет злоупотребления рыночной властью (CtoS03)."
      - excerpt_id: "CtoS05_brief_mention"
        original: "We exchange transaction information through appropriate procedures in a timely manner."
        translated_ru: "Информация по сделкам обменивается своевременно через надлежащие процедуры."
        section_title: "Chapter 3.2 Fair Transaction Process"
        relevance_comment: "Краткое подтверждение своевременного информирования партнёров (CtoS05)."
      - excerpt_id: "CtoS06_explicit_section"
        original: "We support the long-term growth of our dealers and vendors ... We share the profits derived from business innovations."
        translated_ru: "Компания поддерживает долгосрочный рост партнёров и совместно делит выгоды от улучшений."
        section_title: "Chapter 3.3 Pursuing Mutual Growth"
        relevance_comment: "Прямой ориентир на устойчивое долгосрочное партнёрство (CtoS06)."
      - excerpt_id: "CtoS07_brief_mention"
        original: "specific companies cannot receive preferential treatment or experience disadvantage without a legitimate reason during the selection process."
        translated_ru: "Без законных оснований нельзя создавать преференции или ухудшать положение отдельных компаний при отборе."
        section_title: "Chapter 3.1 Equal Opportunity"
        relevance_comment: "Краткий запрет манипуляций условиями отбора (CtoS07)."
    other_principles: []

    key_excerpts:
      - excerpt_id: "HOT01_explicit_section"
        original: "Employees have a duty to report any known or suspected violation of this Code..."
        translated_ru: "Кодекс требует оперативно сообщать о нарушениях внутри компании."
        section_title: "I. PURPOSE / XIII. VIOLATIONS OF THE CODE"
        relevance_comment: "Прямое требование использовать внутренний канал сообщений о нарушениях (HOT01)."
      - excerpt_id: "HOT02_explicit_section"
        original: "All questions and reports ... will be treated with sensitivity and discretion."
        translated_ru: "Все сообщения о нарушениях рассматриваются деликатно и конфиденциально."
        section_title: "XIII. VIOLATIONS OF THE CODE"
        relevance_comment: "Прямое подтверждение конфиденциального режима рассмотрения обращений (HOT02)."
      - excerpt_id: "HOT03_explicit_section"
        original: "The Company prohibits retaliation against an employee who, in good faith, seeks help or reports known or suspected violations."
        translated_ru: "Компания запрещает ответные меры против работников, которые добросовестно сообщают о нарушениях."
        section_title: "XIII. VIOLATIONS OF THE CODE"
        relevance_comment: "Прямой запрет реталиации в отношении заявителей (HOT03)."
      - excerpt_id: "HOT05_implicit_scattered"
        original: "...consistent with the law and the Company’s need to investigate your concern."
        translated_ru: "Нарушения подлежат расследованию совместно с комплаенс-офицером и влекут дисциплинарные меры."
        section_title: "XIII. VIOLATIONS OF THE CODE"
        relevance_comment: "Нулевая терпимость выводится из связки обязательного расследования и санкций (HOT05)."
      - excerpt_id: "HOT06_explicit_section"
        original: "Employees have a duty to report any known or suspected violation..."
        translated_ru: "Каждый сотрудник обязан сообщать о известных или предполагаемых нарушениях Кодекса."
        section_title: "XIII. VIOLATIONS OF THE CODE"
        relevance_comment: "Прямая обязанность сообщения о нарушениях (HOT06)."

    key_excerpts:
      - excerpt_id: "COMP01_explicit_section"
        original: "...avoid actions that would be contrary to laws governing competitive practices... Such actions include misappropriation or misuse of a competitor’s confidential information..."
        translated_ru: "Сотрудникам запрещено незаконно присваивать или использовать конфиденциальную информацию конкурентов."
        section_title: "COMPETITION AND FAIR DEALING"
        relevance_comment: "Прямой запрет на использование чужой конфиденциальной информации конкурента (COMP01)."
      - excerpt_id: "COMP03_implicit_scattered"
        original: "...laws covering ... antitrust prohibitions..."
        translated_ru: "Кодекс требует соблюдать антимонопольные запреты и честную конкуренцию на рынке."
        section_title: "COMPLIANCE WITH LAWS... / COMPETITION AND FAIR DEALING"
        relevance_comment: "Имплицитный антикартельный принцип через запрет antitrust-нарушений (COMP03)."
      - excerpt_id: "COMP08_explicit_section"
        original: "...actions include ... making false statements about the competitor’s business and business practices."
        translated_ru: "Сотрудникам запрещено делать ложные заявления о бизнесе и практиках конкурентов."
        section_title: "COMPETITION AND FAIR DEALING"
        relevance_comment: "Прямой запрет распространения ложной информации о конкурентах (COMP08)."

      - excerpt_id: "WtoC02_explicit_section"
        original: "Employees have a duty to protect the Company’s assets and ensure their efficient use for legitimate business purposes only."
        translated_ru: "Сотрудники обязаны защищать активы компании и использовать их только для законных деловых целей."
        section_title: "V. PROTECTION AND USE OF COMPANY ASSETS"
        relevance_comment: "Прямой принцип сохранности и эффективного использования активов компании (WtoC02)."
      - excerpt_id: "WtoC03_explicit_section"
        original: "Every employee has a duty to ... safeguard the confidentiality of the Company’s information..."
        translated_ru: "Сотрудники обязаны сохранять конфиденциальность доверенной им информации компании и партнеров."
        section_title: "VI. INTELLECTUAL PROPERTY AND CONFIDENTIALITY"
        relevance_comment: "Прямое требование по защите конфиденциальной информации (WtoC03)."
      - excerpt_id: "WtoC04_explicit_section"
        original: "All inventions, creative works, computer software, and technical or trade secrets ... shall be property of the Company."
        translated_ru: "Сотрудники обязаны соблюдать правила защиты интеллектуальной собственности компании."
        section_title: "VI. INTELLECTUAL PROPERTY AND CONFIDENTIALITY"
        relevance_comment: "Прямое требование по охране ИС компании (WtoC04)."
      - excerpt_id: "WtoC05_explicit_section"
        original: "Employees have an obligation to comply with all laws, rules and regulations applicable to the Company’s operations."
        translated_ru: "Каждый сотрудник обязан соблюдать законы и нормы в юрисдикциях присутствия компании."
        section_title: "IX. COMPLIANCE WITH LAWS AND REGULATIONS"
        relevance_comment: "Прямой комплаенс-принцип соблюдения законов на рабочем месте (WtoC05)."
